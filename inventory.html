    <style>
        :root {
            --accent: #B4844D;
            --accent-rgb: 180, 132, 77;
            --brown-dark: #3a2614;
            --brown-mid: #5c3d22;
            --brown-light: #8b5e34;
            --brown-bg: rgba(58, 38, 20, 0.95);
        }

        body {
            margin: 0;
            font-family: 'Nunito', sans-serif;
        }

        .frame {
            position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
            width: 560px; max-height: 82vh;
            background: linear-gradient(180deg, rgba(80, 52, 28, 0.96), rgba(42, 28, 14, 0.98));
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 3px solid rgba(180, 132, 77, 0.6);
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.6), 0 0 60px rgba(180, 132, 77, 0.15), inset 0 2px 0 rgba(255,255,255,0.08);
            display:flex; flex-direction:column; overflow:hidden;
        }

        .header {
            padding: 14px 20px; text-align:center; position:relative; flex-shrink:0;
            background: linear-gradient(180deg, rgba(180, 132, 77, 0.3) 0%, rgba(139, 94, 52, 0.1) 100%);
            border-bottom: 2px solid rgba(180, 132, 77, 0.35);
        }
        .header h1 {
            font-family: 'Luckiest Guy', Impact, sans-serif;
            font-size: 28px;
            color: #ffd9a8; margin: 0;
            letter-spacing: 2px;
            text-shadow: 2px 2px 0 rgba(0,0,0,0.6), 0 0 20px rgba(255, 180, 100, 0.4);
        }

        /* Rarity tabs */
        .tabs {
            display:flex; flex-shrink:0;
            background: rgba(30, 20, 10, 0.6);
            border-bottom: 2px solid rgba(180, 132, 77, 0.25);
            padding: 4px 6px 0;
            gap: 2px;
        }
        .tab {
            flex: 1; padding: 8px 4px;
            font-family: 'Luckiest Guy', Impact, sans-serif;
            font-size: 11px;
            text-align: center;
            cursor: pointer;
            border-radius: 10px 10px 0 0;
            color: rgba(255, 217, 168, 0.5);
            background: transparent;
            transition: all 0.15s;
            letter-spacing: 0.5px;
            text-shadow: 1px 1px 0 rgba(0,0,0,0.3);
            border-top: 2px solid transparent;
            border-left: 2px solid transparent;
            border-right: 2px solid transparent;
        }
        .tab:hover { color: rgba(255, 217, 168, 0.8); }
        .tab.active {
            color: #fff;
            background: linear-gradient(180deg, rgba(180, 132, 77, 0.5), rgba(139, 94, 52, 0.2));
            border-color: rgba(180, 132, 77, 0.5);
            border-bottom-color: transparent;
            box-shadow: 0 -2px 12px rgba(180, 132, 77, 0.2);
        }
        .tab .count { font-family: 'Nunito', sans-serif; font-size: 9px; opacity: 0.7; display:block; margin-top:1px; }

        .body {
            flex:1; overflow-y:auto; padding: 14px;
            background: rgba(30, 20, 10, 0.4);
        }
        .body::-webkit-scrollbar { width: 8px; }
        .body::-webkit-scrollbar-track { background: transparent; }
        .body::-webkit-scrollbar-thumb { background: rgba(180, 132, 77, 0.5); border-radius: 10px; }

        /* Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .card {
            background: linear-gradient(180deg, rgba(58, 38, 20, 0.9), rgba(30, 20, 10, 0.95));
            border: 2px solid rgba(139, 94, 52, 0.5);
            border-radius: 14px;
            padding: 8px 6px 6px;
            display: flex; flex-direction: column; align-items: center;
            box-shadow: 0 3px 0 rgba(0,0,0,0.4), inset 0 2px 0 rgba(255,255,255,0.05);
            transition: all 0.15s;
            position: relative;
        }
        .card.owned {
            border-color: rgba(255, 200, 100, 0.8);
            background: linear-gradient(180deg, rgba(120, 80, 36, 0.9), rgba(60, 40, 18, 0.95));
            box-shadow: 0 3px 0 rgba(0,0,0,0.4), 0 0 14px rgba(255, 200, 100, 0.25), inset 0 2px 0 rgba(255,255,255,0.12);
        }

        .card-img-wrap {
            width: 100%; aspect-ratio: 1;
            background: rgba(15, 10, 5, 0.5);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
            margin-bottom: 6px;
            border: 1px solid rgba(139, 94, 52, 0.3);
        }
        .card-img {
            width: 90%; height: 90%; object-fit: contain;
            image-rendering: -webkit-optimize-contrast;
        }
        .card:not(.owned) .card-img {
            filter: brightness(0) opacity(0.35);
        }
        .card.owned .card-img {
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
        }

        .card-name {
            font-family: 'Luckiest Guy', Impact, sans-serif;
            font-size: 22px;
            color: #ffd9a8;
            text-align: center;
            line-height: 1.05;
            margin-bottom: 6px;
            min-height: 70px;
            padding: 6px 4px;
            word-break: break-word;
            display: flex; align-items: center; justify-content: center;
            text-shadow: 2px 2px 0 rgba(0,0,0,0.7);
            letter-spacing: 0.3px;
        }
        .card:not(.owned) .card-name {
            color: rgba(255, 217, 168, 0.35);
        }

        .card-gps {
            font-family: 'Luckiest Guy', Impact, sans-serif;
            font-size: 11px;
            color: #ffd966;
            text-align: center;
            line-height: 1;
            margin: 1px 0 2px;
            text-shadow: 1px 1px 0 rgba(0,0,0,0.6), 0 0 6px rgba(255,200,80,0.4);
        }
        .card:not(.owned) .card-gps {
            color: rgba(255, 217, 168, 0.3);
            text-shadow: 1px 1px 0 rgba(0,0,0,0.4);
        }

        .card-zone {
            font-family: 'Nunito', sans-serif;
            font-size: 8px;
            font-weight: 800;
            color: rgba(255, 217, 168, 0.55);
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }
        .card:not(.owned) .card-zone {
            color: rgba(255, 217, 168, 0.25);
        }

        .card-count {
            position: absolute;
            top: -6px; right: -6px;
            background: linear-gradient(180deg, #ffd966, #cc8800);
            color: #3a1a00;
            font-family: 'Luckiest Guy', Impact, sans-serif;
            font-size: 11px;
            min-width: 22px; height: 22px;
            border-radius: 50%;
            border: 2px solid #3a2614;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 2px 0 rgba(0,0,0,0.5);
            padding: 0 3px;
        }

        .summary {
            flex-shrink:0; padding:8px 16px;
            background: rgba(20, 12, 6, 0.7);
            border-top: 2px solid rgba(180, 132, 77, 0.3);
            display:flex; justify-content:space-between;
            font-family: 'Luckiest Guy', Impact, sans-serif;
            font-size:12px;
            color: rgba(255, 217, 168, 0.85);
            letter-spacing: 0.5px;
            text-shadow: 1px 1px 0 rgba(0,0,0,0.6);
        }
    </style>

                        var uLower = myUsername.toLowerCase();
                        for (var k in parsed) {
                            if (k.toLowerCase() === uLower) return Number(parsed[k]) || 0;
                        }
                    }
                    var vals = Object.values(parsed);
                    return vals.length > 0 ? (Number(vals[0]) || 0) : 0;
                }
            } catch(e) {
                if (raw.indexOf('=') > -1) {
                    var eqParts = raw.replace(/[{}"]/g, '').split('&');
                    for (var i = 0; i < eqParts.length; i++) {
                        var ep = eqParts[i].split('=');
                        if (ep.length === 2 && myUsername && ep[0].toLowerCase() === myUsername.toLowerCase()) {
                            return Number(ep[1]) || 0;
                        }
                    }
                }
            }
            var m = raw.match(/[=:](\d+\.?\d*)/);
            if (m) return parseFloat(m[1]) || 0;
            return 0;
        }

        function getBrainrotsForRarity(rarityId) {
            var rarity = RARITIES.find(function(r){return r.id === rarityId;});
            if (!rarity) return [];
            var list = [];
            if (rarity.bvs) {
                var dz = rarity.displayZone || 'Fusion';
                for (var i = 0; i < rarity.bvs.length; i++) {
                    list.push({bv: rarity.bvs[i], zone: dz});
                }
            } else if (rarity.zones) {
                for (var i = 0; i < rarity.zones.length; i++) {
                    var zone = rarity.zones[i];
                    var brs = ZONES[zone] || [];
                    for (var j = 0; j < brs.length; j++) {
                        list.push({bv: brs[j], zone: zone});
                    }
                }
            }
            return list;
        }

        function renderTabs() {
            var html = '';
            for (var i = 0; i < RARITIES.length; i++) {
                var r = RARITIES[i];
                var list = getBrainrotsForRarity(r.id);
                var ownedCount = 0;
                for (var j = 0; j < list.length; j++) {
                    if ((ownedBrainrots[list[j].bv] || 0) > 0) ownedCount++;
                }
                var isActive = currentTab === r.id;
                html += '<div class="tab' + (isActive ? ' active' : '') + '" onclick="switchTab(\'' + r.id + '\')">';
                html += r.label;
                html += '<span class="count">' + ownedCount + '/' + list.length + '</span>';
                html += '</div>';
            }
            document.getElementById('tabs').innerHTML = html;
        }

        function switchTab(tab) {
            currentTab = tab;
            var body = document.getElementById('body-content');
            if (body) body.scrollTop = 0;
            renderTabs();
            render();
        }

        function render() {
            var body = document.getElementById('body-content');
            var prevScroll = body ? body.scrollTop : 0;
            var list = getBrainrotsForRarity(currentTab);
            var html = '<div class="grid">';
            var ownedCount = 0;
            for (var i = 0; i < list.length; i++) {
                var bv = list[i].bv;
                var zone = list[i].zone;
                var count = ownedBrainrots[bv] || 0;
                if (count > 0) ownedCount++;
                var imgUrl = IMG_BASE + encodeURIComponent(bv) + '.webp?v=' + IMG_VERSION;
                html += '<div class="card' + (count > 0 ? ' owned' : '') + '">';
                html += '<div class="card-img-wrap"><img class="card-img" src="' + imgUrl + '" alt="" onerror="this.style.display=\'none\'" /></div>';
                var gps = GOLD_PER_SECOND[bv] || 0;
                html += '<div class="card-name">' + richName(bv) + '</div>';
                html += '<div class="card-gps">$' + gps.toFixed(1) + '/s</div>';
                html += '<div class="card-zone">' + zonePretty(zone) + '</div>';
                if (count > 1) html += '<div class="card-count">x' + count + '</div>';
                html += '</div>';
            }
            html += '</div>';
            body.innerHTML = html;
            // Preserve scroll position across re-renders triggered by live sync messages.
            // Clamp in case content got shorter than the previous scrollTop.
            if (prevScroll > 0) body.scrollTop = Math.min(prevScroll, body.scrollHeight - body.clientHeight);

            // Summary — count across all rarity tabs (covers regular zones + fusion tiers)
            var totalOwned = 0, totalTypes = 0, totalBrainrots = 0;
            for (var ri = 0; ri < RARITIES.length; ri++) {
                var rlist = getBrainrotsForRarity(RARITIES[ri].id);
                for (var rk = 0; rk < rlist.length; rk++) {
                    totalBrainrots++;
                    var rc = ownedBrainrots[rlist[rk].bv] || 0;
                    if (rc > 0) { totalTypes++; totalOwned += rc; }
                }
            }
            document.getElementById('summary-bar').innerHTML =
                '<span>' + ownedCount + '/' + list.length + ' in tab</span>' +
                '<span>' + totalTypes + '/' + totalBrainrots + ' total</span>';
        }

        var _lastMsgId = '', _lastMsgTime = 0;
        function processMessage(msg) {
            var now = Date.now();
            var msgId = msg + '_' + Math.floor(now / 100);
            if (msgId === _lastMsgId && now - _lastMsgTime < 200) return;
            _lastMsgId = msgId; _lastMsgTime = now;
            handleMessage(msg);
        }

        function handleMessage(msg) {
            if (msg.indexOf('peds:') === 0) {
                // peds:112,0,0,114,...  (40 comma-separated quest numbers: F1_1..F4_10)
                var nums = msg.substring(5).split(',');
                var freshOwned = {};
                for (var p = 0; p < nums.length; p++) {
                    var qn = parseInt(nums[p], 10);
                    if (qn > 0) {
                        var bvKey = QUEST_NUM_TO_BV[qn];
                        if (bvKey) freshOwned[bvKey] = (freshOwned[bvKey] || 0) + 1;
                    }
                }
                ownedBrainrots = freshOwned;
                renderTabs();
                render();
                return;
            }
            if (!msg.startsWith('inv:')) return;
            var payload = msg.substring(4);
            var pairs = payload.split('&');
            // First pass: extract username
            for (var i = 0; i < pairs.length; i++) {
                var eq = pairs[i].indexOf('=');
                if (eq < 0) continue;
                var key = pairs[i].substring(0, eq).trim();
                if (key === 'username') {
                    myUsername = pairs[i].substring(eq + 1).trim().replace(/^["']|["']$/g, '');
                    break;
                }
            }
            // Fresh accumulator: a brainrot is "owned" if at least one pedestal slot holds its quest num
            var freshOwned = {};
            for (var i = 0; i < pairs.length; i++) {
                var eq = pairs[i].indexOf('=');
                if (eq < 0) continue;
                var key = pairs[i].substring(0, eq).trim();
                if (key === 'username') continue;
                var val = parseVarValue(pairs[i].substring(eq + 1));
                // Pedestal slots — the game's source of truth
                // Ped_F{floor}_{slot} = quest number of the brainrot on that pedestal (0 = empty)
                if (/^Ped_F\d+_\d+$/.test(key)) {
                    var qn = Math.round(val);
                    if (qn > 0) {
                        var bvKey = QUEST_NUM_TO_BV[qn];
                        if (bvKey) {
                            freshOwned[bvKey] = (freshOwned[bvKey] || 0) + 1;
                        }
                    }
                } else if (key.startsWith('Own_bv_')) {
                    // Legacy fallback for rooms that populate Own_bv_* directly
                    var legacyKey = key.substring(4);
                    if (!(legacyKey in freshOwned)) {
                        var legacyVal = Math.round(val);
                        if (legacyVal > 0) freshOwned[legacyKey] = legacyVal;
                    }
                }
            }
            ownedBrainrots = freshOwned;
            renderTabs();
            render();
        }

        if (sdk) sdk.setMessageListener(function(msg) { processMessage(msg); });
        window.addEventListener('message', function(event) {
            if (event.data && typeof event.data === 'string') processMessage(event.data);
            else if (event.data && event.data.portalsMessage) processMessage(event.data.portalsMessage);
        });

        function _doFocusGame() {
            if (typeof PortalsSdk !== 'undefined' && PortalsSdk.focusGameKeyboard) PortalsSdk.focusGameKeyboard();
        }
        document.addEventListener('click', function(e) {
            if (document.hidden) return;
            _doFocusGame();
        });
        document.addEventListener('keydown', function(e) { if (!document.hidden) _doFocusGame(); });
        _doFocusGame();
        setTimeout(_doFocusGame, 100);

        function requestSync() {
            if (!sdk) return;
            sdk.sendMessageToUnity(JSON.stringify({TaskName:'hud_sync',TaskTargetState:'SetAnyToActive'}));
        }
        if (sdk) {
            setTimeout(requestSync, 300);
            setTimeout(requestSync, 1000);
        }

        renderTabs();
        render();

        // Debug mode
        if (!sdk) {
            ownedBrainrots = {'bv_Banana':3,'bv_Trippi_Troppi':1,'bv_Sig_ma_Boy':2,'bv_TaTas':1,'bv_Meowl':1};
            renderTabs();
            render();
        }
    </script>
</body>
</html>
