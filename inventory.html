<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Index</title>
    <script src="https://portals-labs.github.io/portals-sdk/portals-sdk.js?v=10005456"></script>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
    <link href="theme.css?v=1742508000" rel="stylesheet">
    <style>
        :root {
            --accent: #B4844D;
            --accent-rgb: 180, 132, 77;
            --brown-dark: #3a2614;
            --brown-mid: #5c3d22;
            --brown-light: #8b5e34;
            --brown-bg: rgba(58, 38, 20, 0.95);
        }

        body {
            margin: 0;
            font-family: 'Nunito', sans-serif;
        }

        .frame {
            position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
            width: 560px; max-height: 82vh;
            background: linear-gradient(180deg, rgba(80, 52, 28, 0.96), rgba(42, 28, 14, 0.98));
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 3px solid rgba(180, 132, 77, 0.6);
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.6), 0 0 60px rgba(180, 132, 77, 0.15), inset 0 2px 0 rgba(255,255,255,0.08);
            display:flex; flex-direction:column; overflow:hidden;
        }

        .header {
            padding: 14px 20px; text-align:center; position:relative; flex-shrink:0;
            background: linear-gradient(180deg, rgba(180, 132, 77, 0.3) 0%, rgba(139, 94, 52, 0.1) 100%);
            border-bottom: 2px solid rgba(180, 132, 77, 0.35);
        }
        .header h1 {
            font-family: 'Luckiest Guy', Impact, sans-serif;
            font-size: 28px;
            color: #ffd9a8; margin: 0;
            letter-spacing: 2px;
            text-shadow: 2px 2px 0 rgba(0,0,0,0.6), 0 0 20px rgba(255, 180, 100, 0.4);
        }

        /* Rarity tabs */
        .tabs {
            display:flex; flex-shrink:0;
            background: rgba(30, 20, 10, 0.6);
            border-bottom: 2px solid rgba(180, 132, 77, 0.25);
            padding: 4px 6px 0;
            gap: 2px;
        }
        .tab {
            flex: 1; padding: 8px 4px;
            font-family: 'Luckiest Guy', Impact, sans-serif;
            font-size: 11px;
            text-align: center;
            cursor: pointer;
            border-radius: 10px 10px 0 0;
            color: rgba(255, 217, 168, 0.5);
            background: transparent;
            transition: all 0.15s;
            letter-spacing: 0.5px;
            text-shadow: 1px 1px 0 rgba(0,0,0,0.3);
            border-top: 2px solid transparent;
            border-left: 2px solid transparent;
            border-right: 2px solid transparent;
        }
        .tab:hover { color: rgba(255, 217, 168, 0.8); }
        .tab.active {
            color: #fff;
            background: linear-gradient(180deg, rgba(180, 132, 77, 0.5), rgba(139, 94, 52, 0.2));
            border-color: rgba(180, 132, 77, 0.5);
            border-bottom-color: transparent;
            box-shadow: 0 -2px 12px rgba(180, 132, 77, 0.2);
        }
        .tab .count { font-family: 'Nunito', sans-serif; font-size: 9px; opacity: 0.7; display:block; margin-top:1px; }

        .body {
            flex:1; overflow-y:auto; padding: 14px;
            background: rgba(30, 20, 10, 0.4);
        }
        .body::-webkit-scrollbar { width: 8px; }
        .body::-webkit-scrollbar-track { background: transparent; }
        .body::-webkit-scrollbar-thumb { background: rgba(180, 132, 77, 0.5); border-radius: 10px; }

        /* Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .card {
            background: linear-gradient(180deg, rgba(58, 38, 20, 0.9), rgba(30, 20, 10, 0.95));
            border: 2px solid rgba(139, 94, 52, 0.5);
            border-radius: 14px;
            padding: 8px 6px 6px;
            display: flex; flex-direction: column; align-items: center;
            box-shadow: 0 3px 0 rgba(0,0,0,0.4), inset 0 2px 0 rgba(255,255,255,0.05);
            transition: all 0.15s;
            position: relative;
        }
        .card.owned {
            border-color: rgba(255, 200, 100, 0.8);
            background: linear-gradient(180deg, rgba(120, 80, 36, 0.9), rgba(60, 40, 18, 0.95));
            box-shadow: 0 3px 0 rgba(0,0,0,0.4), 0 0 14px rgba(255, 200, 100, 0.25), inset 0 2px 0 rgba(255,255,255,0.12);
        }

        .card-img-wrap {
            width: 100%; aspect-ratio: 1;
            background: rgba(15, 10, 5, 0.5);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
            margin-bottom: 6px;
            border: 1px solid rgba(139, 94, 52, 0.3);
        }
        .card-img {
            width: 90%; height: 90%; object-fit: contain;
            image-rendering: -webkit-optimize-contrast;
        }
        .card:not(.owned) .card-img {
            filter: brightness(0) opacity(0.35);
        }
        .card.owned .card-img {
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
        }

        .card-name {
            font-family: 'Luckiest Guy', Impact, sans-serif;
            font-size: 10px;
            color: #ffd9a8;
            text-align: center;
            line-height: 1.1;
            margin-bottom: 2px;
            min-height: 22px;
            display: flex; align-items: center; justify-content: center;
            text-shadow: 1px 1px 0 rgba(0,0,0,0.6);
            letter-spacing: 0.3px;
        }
        .card:not(.owned) .card-name {
            color: rgba(255, 217, 168, 0.35);
        }

        .card-gps {
            font-family: 'Luckiest Guy', Impact, sans-serif;
            font-size: 11px;
            color: #ffd966;
            text-align: center;
            line-height: 1;
            margin: 1px 0 2px;
            text-shadow: 1px 1px 0 rgba(0,0,0,0.6), 0 0 6px rgba(255,200,80,0.4);
        }
        .card:not(.owned) .card-gps {
            color: rgba(255, 217, 168, 0.3);
            text-shadow: 1px 1px 0 rgba(0,0,0,0.4);
        }

        .card-zone {
            font-family: 'Nunito', sans-serif;
            font-size: 8px;
            font-weight: 800;
            color: rgba(255, 217, 168, 0.55);
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }
        .card:not(.owned) .card-zone {
            color: rgba(255, 217, 168, 0.25);
        }

        .card-count {
            position: absolute;
            top: -6px; right: -6px;
            background: linear-gradient(180deg, #ffd966, #cc8800);
            color: #3a1a00;
            font-family: 'Luckiest Guy', Impact, sans-serif;
            font-size: 11px;
            min-width: 22px; height: 22px;
            border-radius: 50%;
            border: 2px solid #3a2614;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 2px 0 rgba(0,0,0,0.5);
            padding: 0 3px;
        }

        .summary {
            flex-shrink:0; padding:8px 16px;
            background: rgba(20, 12, 6, 0.7);
            border-top: 2px solid rgba(180, 132, 77, 0.3);
            display:flex; justify-content:space-between;
            font-family: 'Luckiest Guy', Impact, sans-serif;
            font-size:12px;
            color: rgba(255, 217, 168, 0.85);
            letter-spacing: 0.5px;
            text-shadow: 1px 1px 0 rgba(0,0,0,0.6);
        }
    </style>
</head>
<body>
    <div class="frame">
        <div class="header">
            <h1>INDEX</h1>
        </div>
        <div class="tabs" id="tabs"></div>
        <div class="body" id="body-content"></div>
        <div class="summary" id="summary-bar"></div>
    </div>

    <script>
        var sdk = typeof PortalsSdk !== 'undefined' ? PortalsSdk : null;
        var currentTab = 'common';
        var IMG_BASE = 'https://jbgibbons093.github.io/base-tycoon/brainrots/';
        var IMG_VERSION = '1776020000';

        // Brainrots by rarity (zones mapped to tiers)
        var RARITIES = [
            { id: 'common', label: 'COMMON', zones: ['Beach', 'Meadow'] },
            { id: 'uncommon', label: 'UNCOMMON', zones: ['Forest', 'Jungle'] },
            { id: 'rare', label: 'RARE', zones: ['Cave', 'Crystal_Cove'] },
            { id: 'epic', label: 'EPIC', zones: ['Boss_Arena', 'Volcano'] },
            { id: 'legendary', label: 'LEGENDARY', zones: ['Ancient_Ruins', 'Sky_Platform'] },
            { id: 'mythic', label: 'MYTHIC', zones: ['The_Void'] }
        ];

        var ZONES = {
            Beach: ["bv_Banana","bv_BurbaloniLuliloli","bv_Noobini_Pizzanini","bv_Tim_Cheese","bv_Image_removebg_preview_29","bv_Fluriflura","bv_Pandaccini_Bananini","bv_Puffaball","bv_Liliri_Lalira","bv_Pipi_Kiwi"],
            Meadow: ["bv_Pakrah","bv_Lionel_Cactuseli","bv_Cocofanto","bv_ChimpanziniBananini","bv_Africa_by_toto_to_sahur","bv_Ballerinolololo","bv_POTATO","bv_Cocosini_Mama"],
            Forest: ["bv_PIGEONS_ARE_SPIES_MADE_BY","bv_Teenage_turtle","bv_Dolphini_Jetskini","bv_Slitta_Sprinta","bv_Trippi_Troppi","bv_Clickerinocrabo","bv_Astronaut","bv_Cant_come_up_with_a_funny","bv_Lol_Fridge"],
            Jungle: ["bv_Boneca_Ambalabu","bv_Cupcake_Koala","bv_Lavadorito_Spinito","bv_Cacto_Hipopotamo1","bv_TaTas","bv_Pintealotto","bv_Moby","bv_Watermelon_Doggy","bv_Garamadundung","bv_Trenostruzzo_Turbo_3000"],
            Cave: ["bv_Cappuccino_Assassino","bv_Burguro_And_Fryuro","bv_AvocadiniGuffo","bv_Homicidio_doloso","bv_Brri_Brri_Bicus_Dicus_Bom","bv_Skibidi_toilet"],
            Crystal_Cove: ["bv_PeroLemonfulldetial","bv_Avocadini_Antilopini","bv_Dolphin_But_Banana","bv_wombo","bv_Berry_berry_bicus_dickus","bv_Cerberus"],
            Boss_Arena: ["bv_NewBlueberrinni","bv_Quackula","bv_Sig_ma_Boy","bv_GOAT","bv_Strawberrelli_Flamingelli","bv_Pi_Pi_Watermelon","bv_GlorboFruttodrillo","bv_Time_moving_slow","bv_Quivioli_Ameleonni","bv_Lebron_james","bv_SigmaGirl","bv_Tartaruga_Cisternaaaa"],
            Volcano: ["bv_Tracoducotulu","bv_Toiletto","bv_Mythic_lucky_block","bv_Ballerina_cappucinaaaa21pct","bv_King_von","bv_Jacko_Spaventosa","bv_Travis_scott","bv_Cavallo_Virtuoso","bv_Lil_wayne","bv_Bombardiro_Crocodilo","bv_Te_Te_Te_Sahur","bv_Carti"],
            Ancient_Ruins: ["bv_Tralalita","bv_Everybody_hates_Chihuanin","bv_TractorDino","bv_BrainrotGodLuckyBlock","bv_Tukanno_Bananno","bv_Gorillo_Watermelondrillo","bv_Money_Money_Man","bv_Matteofr","bv_Trippi_Troppi_Troppa_Trip"],
            Sky_Platform: ["bv_Dragon_Gingerini","bv_Graipuss","bv_TangTangVfx","bv_Nuclearo_Dinosauro","bv_LasTralaleritas","bv_Job","bv_Los_Tralaleritos","bv_Chicliterita_bicicliterit","bv_SecretLuckyBlock","bv_KetupatKepat","bv_La_vacca_no_effects"],
            The_Void: ["bv_Chicleteira","bv_TralaleroTralala","bv_Strawberryelephant","bv_Magi_Ribbitini","bv_Meowl","bv_Money_money_puggy"]
        };

        var GOLD_PER_SECOND = {
            'bv_Banana':1.3,'bv_BurbaloniLuliloli':1.4,'bv_Noobini_Pizzanini':1.9,'bv_Tim_Cheese':1.9,'bv_Image_removebg_preview_29':2.4,'bv_Fluriflura':1.7,'bv_Pandaccini_Bananini':2.0,'bv_Puffaball':2.5,'bv_Liliri_Lalira':2.7,'bv_Pipi_Kiwi':1.3,
            'bv_Pakrah':1.4,'bv_Lionel_Cactuseli':1.8,'bv_Cocofanto':1.1,'bv_ChimpanziniBananini':1.7,'bv_Africa_by_toto_to_sahur':2.8,'bv_Ballerinolololo':2.6,'bv_POTATO':1.0,'bv_Cocosini_Mama':1.2,
            'bv_PIGEONS_ARE_SPIES_MADE_BY':7.4,'bv_Teenage_turtle':9.5,'bv_Dolphini_Jetskini':7.4,'bv_Slitta_Sprinta':6.8,'bv_Trippi_Troppi':7.2,'bv_Clickerinocrabo':7.4,'bv_Astronaut':6.4,'bv_Cant_come_up_with_a_funny':8.9,'bv_Lol_Fridge':8.8,
            'bv_Boneca_Ambalabu':9.4,'bv_Cupcake_Koala':5.8,'bv_Lavadorito_Spinito':7.9,'bv_Cacto_Hipopotamo1':9.0,'bv_TaTas':5.4,'bv_Pintealotto':5.3,'bv_Moby':5.4,'bv_Watermelon_Doggy':9.3,'bv_Garamadundung':9.2,'bv_Trenostruzzo_Turbo_3000':8.6,
            'bv_Cappuccino_Assassino':10.8,'bv_Burguro_And_Fryuro':16.8,'bv_AvocadiniGuffo':17.5,'bv_Homicidio_doloso':15.6,'bv_Brri_Brri_Bicus_Dicus_Bom':16.9,'bv_Skibidi_toilet':15.2,
            'bv_PeroLemonfulldetial':19.9,'bv_Avocadini_Antilopini':16.0,'bv_Dolphin_But_Banana':15.7,'bv_wombo':15.2,'bv_Berry_berry_bicus_dickus':19.3,'bv_Cerberus':14.9,
            'bv_NewBlueberrinni':25.0,'bv_Quackula':26.7,'bv_Sig_ma_Boy':33.3,'bv_GOAT':29.5,'bv_Strawberrelli_Flamingelli':24.3,'bv_Pi_Pi_Watermelon':25.3,'bv_GlorboFruttodrillo':25.5,'bv_Time_moving_slow':33.3,'bv_Quivioli_Ameleonni':22.5,'bv_Lebron_james':31.0,'bv_SigmaGirl':38.2,'bv_Tartaruga_Cisternaaaa':29.3,
            'bv_Tracoducotulu':44.5,'bv_Toiletto':59.7,'bv_Mythic_lucky_block':79.5,'bv_Ballerina_cappucinaaaa21pct':55.9,'bv_King_von':53.7,'bv_Jacko_Spaventosa':76.0,'bv_Travis_scott':78.4,'bv_Cavallo_Virtuoso':41.9,'bv_Lil_wayne':74.3,'bv_Bombardiro_Crocodilo':72.8,'bv_Te_Te_Te_Sahur':54.3,'bv_Carti':48.7,
            'bv_Tralalita':139.1,'bv_Everybody_hates_Chihuanin':145.6,'bv_TractorDino':94.2,'bv_BrainrotGodLuckyBlock':87.8,'bv_Tukanno_Bananno':97.2,'bv_Gorillo_Watermelondrillo':142.2,'bv_Money_Money_Man':148.8,'bv_Matteofr':98.1,'bv_Trippi_Troppi_Troppa_Trip':148.6,
            'bv_Dragon_Gingerini':204.5,'bv_Graipuss':169.4,'bv_TangTangVfx':198.0,'bv_Nuclearo_Dinosauro':156.0,'bv_LasTralaleritas':219.4,'bv_Job':266.4,'bv_Los_Tralaleritos':228.2,'bv_Chicliterita_bicicliterit':246.1,'bv_SecretLuckyBlock':211.1,'bv_KetupatKepat':165.2,'bv_La_vacca_no_effects':227.8,
            'bv_Chicleteira':428.9,'bv_TralaleroTralala':405.3,'bv_Strawberryelephant':443.1,'bv_Magi_Ribbitini':413.9,'bv_Meowl':456.6,'bv_Money_money_puggy':448.5
        };

        var ownedBrainrots = {};
        var myUsername = '';

        function prettyName(bvKey) { return bvKey.substring(3).replace(/_/g, ' '); }
        function zonePretty(z) { return z.replace(/_/g, ' '); }

        function parseVarValue(raw) {
            if (raw === undefined || raw === null || raw === '') return 0;
            raw = String(raw).trim();
            var num = Number(raw);
            if (!isNaN(num)) return num;
            try {
                var parsed = JSON.parse(raw);
                if (typeof parsed === 'number') return parsed;
                if (typeof parsed === 'object' && parsed !== null) {
                    if (myUsername) {
                        var uLower = myUsername.toLowerCase();
                        for (var k in parsed) {
                            if (k.toLowerCase() === uLower) return Number(parsed[k]) || 0;
                        }
                    }
                    var vals = Object.values(parsed);
                    return vals.length > 0 ? (Number(vals[0]) || 0) : 0;
                }
            } catch(e) {
                if (raw.indexOf('=') > -1) {
                    var eqParts = raw.replace(/[{}"]/g, '').split('&');
                    for (var i = 0; i < eqParts.length; i++) {
                        var ep = eqParts[i].split('=');
                        if (ep.length === 2 && myUsername && ep[0].toLowerCase() === myUsername.toLowerCase()) {
                            return Number(ep[1]) || 0;
                        }
                    }
                }
            }
            var m = raw.match(/[=:](\d+\.?\d*)/);
            if (m) return parseFloat(m[1]) || 0;
            return 0;
        }

        function getBrainrotsForRarity(rarityId) {
            var rarity = RARITIES.find(function(r){return r.id === rarityId;});
            if (!rarity) return [];
            var list = [];
            for (var i = 0; i < rarity.zones.length; i++) {
                var zone = rarity.zones[i];
                var brs = ZONES[zone] || [];
                for (var j = 0; j < brs.length; j++) {
                    list.push({bv: brs[j], zone: zone});
                }
            }
            return list;
        }

        function renderTabs() {
            var html = '';
            for (var i = 0; i < RARITIES.length; i++) {
                var r = RARITIES[i];
                var list = getBrainrotsForRarity(r.id);
                var ownedCount = 0;
                for (var j = 0; j < list.length; j++) {
                    if ((ownedBrainrots[list[j].bv] || 0) > 0) ownedCount++;
                }
                var isActive = currentTab === r.id;
                html += '<div class="tab' + (isActive ? ' active' : '') + '" onclick="switchTab(\'' + r.id + '\')">';
                html += r.label;
                html += '<span class="count">' + ownedCount + '/' + list.length + '</span>';
                html += '</div>';
            }
            document.getElementById('tabs').innerHTML = html;
        }

        function switchTab(tab) {
            currentTab = tab;
            renderTabs();
            render();
        }

        function render() {
            var body = document.getElementById('body-content');
            var list = getBrainrotsForRarity(currentTab);
            var html = '<div class="grid">';
            var ownedCount = 0;
            for (var i = 0; i < list.length; i++) {
                var bv = list[i].bv;
                var zone = list[i].zone;
                var count = ownedBrainrots[bv] || 0;
                if (count > 0) ownedCount++;
                var imgUrl = IMG_BASE + encodeURIComponent(bv) + '.webp?v=' + IMG_VERSION;
                html += '<div class="card' + (count > 0 ? ' owned' : '') + '">';
                html += '<div class="card-img-wrap"><img class="card-img" src="' + imgUrl + '" alt="" onerror="this.style.display=\'none\'" /></div>';
                var gps = GOLD_PER_SECOND[bv] || 0;
                html += '<div class="card-name">' + prettyName(bv) + '</div>';
                html += '<div class="card-gps">$' + gps.toFixed(1) + '/s</div>';
                html += '<div class="card-zone">' + zonePretty(zone) + '</div>';
                if (count > 1) html += '<div class="card-count">x' + count + '</div>';
                html += '</div>';
            }
            html += '</div>';
            body.innerHTML = html;

            // Summary
            var totalOwned = 0, totalTypes = 0, totalBrainrots = 0;
            for (var zn in ZONES) {
                for (var k = 0; k < ZONES[zn].length; k++) {
                    totalBrainrots++;
                    var c = ownedBrainrots[ZONES[zn][k]] || 0;
                    if (c > 0) { totalTypes++; totalOwned += c; }
                }
            }
            document.getElementById('summary-bar').innerHTML =
                '<span>' + ownedCount + '/' + list.length + ' in tab</span>' +
                '<span>' + totalTypes + '/' + totalBrainrots + ' total</span>';
        }

        var _lastMsgId = '', _lastMsgTime = 0;
        function processMessage(msg) {
            var now = Date.now();
            var msgId = msg + '_' + Math.floor(now / 100);
            if (msgId === _lastMsgId && now - _lastMsgTime < 200) return;
            _lastMsgId = msgId; _lastMsgTime = now;
            handleMessage(msg);
        }

        function handleMessage(msg) {
            if (!msg.startsWith('inv:')) return;
            var payload = msg.substring(4);
            var pairs = payload.split('&');
            // First pass: extract username
            for (var i = 0; i < pairs.length; i++) {
                var eq = pairs[i].indexOf('=');
                if (eq < 0) continue;
                var key = pairs[i].substring(0, eq).trim();
                if (key === 'username') {
                    myUsername = pairs[i].substring(eq + 1).trim().replace(/^["']|["']$/g, '');
                    break;
                }
            }
            for (var i = 0; i < pairs.length; i++) {
                var eq = pairs[i].indexOf('=');
                if (eq < 0) continue;
                var key = pairs[i].substring(0, eq).trim();
                if (key === 'username') continue;
                var val = parseVarValue(pairs[i].substring(eq + 1));
                if (key.startsWith('Own_bv_')) {
                    var bvKey = key.substring(4);
                    ownedBrainrots[bvKey] = Math.round(val);
                }
            }
            renderTabs();
            render();
        }

        if (sdk) sdk.setMessageListener(function(msg) { processMessage(msg); });
        window.addEventListener('message', function(event) {
            if (event.data && typeof event.data === 'string') processMessage(event.data);
            else if (event.data && event.data.portalsMessage) processMessage(event.data.portalsMessage);
        });

        function _doFocusGame() {
            if (typeof PortalsSdk !== 'undefined' && PortalsSdk.focusGameKeyboard) PortalsSdk.focusGameKeyboard();
        }
        document.addEventListener('click', function(e) {
            if (document.hidden) return;
            _doFocusGame();
        });
        document.addEventListener('keydown', function(e) { if (!document.hidden) _doFocusGame(); });
        _doFocusGame();
        setTimeout(_doFocusGame, 100);

        function requestSync() {
            if (!sdk) return;
            sdk.sendMessageToUnity(JSON.stringify({TaskName:'hud_sync',TaskTargetState:'SetAnyToActive'}));
        }
        if (sdk) {
            setTimeout(requestSync, 300);
            setTimeout(requestSync, 1000);
        }

        renderTabs();
        render();

        // Debug mode
        if (!sdk) {
            ownedBrainrots = {'bv_Banana':3,'bv_Trippi_Troppi':1,'bv_Sig_ma_Boy':2,'bv_TaTas':1,'bv_Meowl':1};
            renderTabs();
            render();
        }
    </script>
</body>
</html>
