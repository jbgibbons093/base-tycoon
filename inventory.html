<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Inventory</title>
    <script src="https://portals-labs.github.io/portals-sdk/portals-sdk.js?v=10005456"></script>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
    <style>
        html, body { margin:0; padding:0; background:transparent!important; overflow:hidden; font-family:'Nunito',sans-serif; user-select:none; }

        .frame {
            position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
            width:520px; max-height:80vh;
            background:white; border:5px solid #6C3483; border-radius:24px;
            box-shadow:0 10px 0 rgba(0,0,0,0.15),0 15px 40px rgba(0,0,0,0.3);
            display:flex; flex-direction:column; overflow:hidden;
        }

        .header {
            background:linear-gradient(180deg,#9B59B6 0%,#6C3483 100%);
            padding:12px 20px; text-align:center; position:relative; flex-shrink:0;
        }
        .header h1 { font-family:'Luckiest Guy',cursive; font-size:30px; color:white; margin:0; text-shadow:3px 3px 0 rgba(0,0,0,0.2); }
        .close-x {
            position:absolute; top:8px; right:12px; width:32px; height:32px; border-radius:50%;
            background:linear-gradient(180deg,#C39BD3,#7D3C98); border:3px solid #5B2C6F;
            box-shadow:0 2px 0 rgba(0,0,0,0.2); display:flex; align-items:center; justify-content:center;
            cursor:pointer; font-family:'Luckiest Guy',cursive; font-size:18px; color:white; text-shadow:1px 1px 0 rgba(0,0,0,0.3);
        }
        .close-x:active { transform:translateY(2px); box-shadow:none; }
        .hint { font-size:11px; color:rgba(255,255,255,0.7); margin-top:4px; }

        /* Tabs */
        .tabs { display:flex; flex-shrink:0; background:#F0ECF5; border-bottom:3px solid #D2B4DE; }
        .tab {
            flex:1; padding:10px 0; text-align:center; cursor:pointer;
            font-family:'Luckiest Guy',cursive; font-size:16px; color:#7D3C98;
            transition:background 0.15s;
        }
        .tab:hover { background:#E8DAEF; }
        .tab.active { background:white; color:#6C3483; border-bottom:3px solid #6C3483; margin-bottom:-3px; }

        /* Body */
        .body { flex:1; overflow-y:auto; padding:12px; background:#FDFBFE; }
        .body::-webkit-scrollbar { width:6px; }
        .body::-webkit-scrollbar-thumb { background:#D2B4DE; border-radius:3px; }

        /* Brainrot list */
        .zone-header {
            font-family:'Luckiest Guy',cursive; font-size:15px; color:#6C3483;
            margin:12px 0 6px; padding:4px 10px;
            background:linear-gradient(90deg,#F4ECF7,transparent); border-radius:8px;
        }
        .zone-header:first-child { margin-top:0; }
        .zone-header .zone-count { font-family:'Nunito',sans-serif; font-size:12px; font-weight:800; color:#9B59B6; margin-left:6px; }

        .br-row {
            display:flex; align-items:center; padding:6px 10px; border-radius:10px; margin:2px 0;
            background:#FAFAFA; border:2px solid #F0ECF5;
        }
        .br-row.owned { background:#F0FFF0; border-color:#A9DFBF; }
        .br-name { flex:1; font-size:13px; font-weight:800; color:#2C3E50; }
        .br-name .br-pretty { }
        .br-gps { font-family:'Luckiest Guy',cursive; font-size:13px; color:#F39C12; margin:0 10px; white-space:nowrap; }
        .br-owned {
            font-family:'Luckiest Guy',cursive; font-size:13px; padding:2px 10px;
            border-radius:10px; min-width:30px; text-align:center;
        }
        .br-owned.has { background:#27AE60; color:white; }
        .br-owned.none { background:#ECF0F1; color:#BDC3C7; }

        /* Players list */
        .player-card {
            display:flex; align-items:center; padding:10px 12px; margin:6px 0;
            border-radius:14px; border:3px solid #E8DAEF; background:white;
        }
        .player-card.empty { opacity:0.35; }
        .player-card.carrying { border-color:#F39C12; background:#FFFBF0; }
        .p-base {
            width:36px; height:36px; border-radius:50%;
            background:linear-gradient(180deg,#9B59B6,#6C3483); border:3px solid #5B2C6F;
            display:flex; align-items:center; justify-content:center;
            font-family:'Luckiest Guy',cursive; font-size:16px; color:white;
            text-shadow:1px 1px 0 rgba(0,0,0,0.2); flex-shrink:0;
        }
        .p-info { flex:1; margin-left:10px; }
        .p-label { font-family:'Luckiest Guy',cursive; font-size:14px; color:#2C3E50; }
        .p-gold { font-size:12px; font-weight:800; color:#27AE60; }
        .p-carry { font-size:11px; font-weight:800; color:#F39C12; margin-top:2px; }
        .p-empty-label { font-size:13px; font-weight:800; color:#BDC3C7; }

        /* Summary bar */
        .summary {
            flex-shrink:0; padding:8px 16px; background:#F4ECF7; border-top:2px solid #E8DAEF;
            display:flex; justify-content:space-between; font-size:12px; font-weight:800; color:#6C3483;
        }
    </style>
</head>
<body>
    <div class="frame">
        <div class="header">
            <h1>INVENTORY</h1>
            <div class="hint">Press E or ESC to close</div>
            <div class="close-x" onclick="closeInv()">X</div>
        </div>
        <div class="tabs">
            <div class="tab active" id="tab-brainrots" onclick="switchTab('brainrots')">BRAINROTS</div>
            <div class="tab" id="tab-players" onclick="switchTab('players')">PLAYERS</div>
        </div>
        <div class="body" id="body-content"></div>
        <div class="summary" id="summary-bar"></div>
    </div>

    <script>

        };

        var GOLD_PER_SECOND = {
            'bv_Banana':1.3,'bv_BurbaloniLuliloli':1.4,'bv_Noobini_Pizzanini':1.9,'bv_Tim_Cheese':1.9,'bv_Image_removebg_preview_29':2.4,'bv_Fluriflura':1.7,'bv_Pandaccini_Bananini':2.0,'bv_Puffaball':2.5,'bv_Liliri_Lalira':2.7,'bv_Pipi_Kiwi':1.3,
            'bv_Pakrah':1.4,'bv_Lionel_Cactuseli':1.8,'bv_Cocofanto':1.1,'bv_ChimpanziniBananini':1.7,'bv_Africa_by_toto_to_sahur':2.8,'bv_Ballerinolololo':2.6,'bv_POTATO':1.0,'bv_Cocosini_Mama':1.2,
            'bv_PIGEONS_ARE_SPIES_MADE_BY':7.4,'bv_Teenage_turtle':9.5,'bv_Dolphini_Jetskini':7.4,'bv_Slitta_Sprinta':6.8,'bv_Trippi_Troppi':7.2,'bv_Clickerinocrabo':7.4,'bv_Astronaut':6.4,'bv_Cant_come_up_with_a_funny':8.9,'bv_Lol_Fridge':8.8,
            'bv_Boneca_Ambalabu':9.4,'bv_Cupcake_Koala':5.8,'bv_Lavadorito_Spinito':7.9,'bv_Cacto_Hipopotamo1':9.0,'bv_TaTas':5.4,'bv_Pintealotto':5.3,'bv_Moby':5.4,'bv_Watermelon_Doggy':9.3,'bv_Garamadundung':9.2,'bv_Trenostruzzo_Turbo_3000':8.6,
            'bv_Cappuccino_Assassino':10.8,'bv_Burguro_And_Fryuro':16.8,'bv_AvocadiniGuffo':17.5,'bv_Homicidio_doloso':15.6,'bv_Brri_Brri_Bicus_Dicus_Bom':16.9,'bv_Skibidi_toilet':15.2,
            'bv_PeroLemonfulldetial':19.9,'bv_Avocadini_Antilopini':16.0,'bv_Dolphin_But_Banana':15.7,'bv_wombo':15.2,'bv_Berry_berry_bicus_dickus':19.3,'bv_Cerberus':14.9,
            'bv_NewBlueberrinni':25.0,'bv_Quackula':26.7,'bv_Sig_ma_Boy':33.3,'bv_GOAT':29.5,'bv_Strawberrelli_Flamingelli':24.3,'bv_Pi_Pi_Watermelon':25.3,'bv_GlorboFruttodrillo':25.5,'bv_Time_moving_slow':33.3,'bv_Quivioli_Ameleonni':22.5,'bv_Lebron_james':31.0,'bv_SigmaGirl':38.2,'bv_Tartaruga_Cisternaaaa':29.3,
            'bv_Tracoducotulu':44.5,'bv_Toiletto':59.7,'bv_Mythic_lucky_block':79.5,'bv_Ballerina_cappucinaaaa21pct':55.9,'bv_King_von':53.7,'bv_Jacko_Spaventosa':76.0,'bv_Travis_scott':78.4,'bv_Cavallo_Virtuoso':41.9,'bv_Lil_wayne':74.3,'bv_Bombardiro_Crocodilo':72.8,'bv_Te_Te_Te_Sahur':54.3,'bv_Carti':48.7,
            'bv_Tralalita':139.1,'bv_Everybody_hates_Chihuanin':145.6,'bv_TractorDino':94.2,'bv_BrainrotGodLuckyBlock':87.8,'bv_Tukanno_Bananno':97.2,'bv_Gorillo_Watermelondrillo':142.2,'bv_Money_Money_Man':148.8,'bv_Matteofr':98.1,'bv_Trippi_Troppi_Troppa_Trip':148.6,
            'bv_Dragon_Gingerini':204.5,'bv_Graipuss':169.4,'bv_TangTangVfx':198.0,'bv_Nuclearo_Dinosauro':156.0,'bv_LasTralaleritas':219.4,'bv_Job':266.4,'bv_Los_Tralaleritos':228.2,'bv_Chicliterita_bicicliterit':246.1,'bv_SecretLuckyBlock':211.1,'bv_KetupatKepat':165.2,'bv_La_vacca_no_effects':227.8,
            'bv_Chicleteira':428.9,'bv_TralaleroTralala':405.3,'bv_Strawberryelephant':443.1,'bv_Magi_Ribbitini':413.9,'bv_Meowl':456.6,'bv_Money_money_puggy':448.5
        };

        // Quest number -> bv_key (for decoding carrying info)
        var QUEST_NUM_TO_BV = {112:"bv_Banana",114:"bv_BurbaloniLuliloli",116:"bv_Noobini_Pizzanini",118:"bv_Tim_Cheese",120:"bv_Image_removebg_preview_29",122:"bv_Fluriflura",124:"bv_Pandaccini_Bananini",126:"bv_Puffaball",128:"bv_Liliri_Lalira",130:"bv_Pipi_Kiwi",132:"bv_Pakrah",134:"bv_Lionel_Cactuseli",136:"bv_Cocofanto",138:"bv_ChimpanziniBananini",140:"bv_Africa_by_toto_to_sahur",142:"bv_Ballerinolololo",144:"bv_POTATO",146:"bv_Cocosini_Mama",148:"bv_PIGEONS_ARE_SPIES_MADE_BY",150:"bv_Teenage_turtle",152:"bv_Dolphini_Jetskini",154:"bv_Slitta_Sprinta",156:"bv_Trippi_Troppi",158:"bv_Clickerinocrabo",160:"bv_Astronaut",162:"bv_Cant_come_up_with_a_funny",164:"bv_Lol_Fridge",166:"bv_Boneca_Ambalabu",168:"bv_Cupcake_Koala",170:"bv_Lavadorito_Spinito",172:"bv_Cacto_Hipopotamo1",174:"bv_TaTas",176:"bv_Pintealotto",178:"bv_Moby",180:"bv_Watermelon_Doggy",182:"bv_Garamadundung",184:"bv_Trenostruzzo_Turbo_3000",186:"bv_Cappuccino_Assassino",188:"bv_Burguro_And_Fryuro",190:"bv_AvocadiniGuffo",192:"bv_Homicidio_doloso",194:"bv_Brri_Brri_Bicus_Dicus_Bom",196:"bv_Skibidi_toilet",198:"bv_PeroLemonfulldetial",200:"bv_Avocadini_Antilopini",202:"bv_Dolphin_But_Banana",204:"bv_wombo",206:"bv_Berry_berry_bicus_dickus",208:"bv_Cerberus",210:"bv_NewBlueberrinni",212:"bv_Quackula",214:"bv_Sig_ma_Boy",216:"bv_GOAT",218:"bv_Strawberrelli_Flamingelli",220:"bv_Pi_Pi_Watermelon",222:"bv_GlorboFruttodrillo",224:"bv_Time_moving_slow",226:"bv_Quivioli_Ameleonni",228:"bv_Lebron_james",230:"bv_SigmaGirl",232:"bv_Tartaruga_Cisternaaaa",234:"bv_Tracoducotulu",236:"bv_Toiletto",238:"bv_Mythic_lucky_block",240:"bv_Ballerina_cappucinaaaa21pct",242:"bv_King_von",244:"bv_Jacko_Spaventosa",246:"bv_Travis_scott",248:"bv_Cavallo_Virtuoso",250:"bv_Lil_wayne",252:"bv_Bombardiro_Crocodilo",254:"bv_Te_Te_Te_Sahur",256:"bv_Carti",258:"bv_Tralalita",260:"bv_Everybody_hates_Chihuanin",262:"bv_TractorDino",264:"bv_BrainrotGodLuckyBlock",266:"bv_Tukanno_Bananno",268:"bv_Gorillo_Watermelondrillo",270:"bv_Money_Money_Man",272:"bv_Matteofr",274:"bv_Trippi_Troppi_Troppa_Trip",276:"bv_Dragon_Gingerini",278:"bv_Graipuss",280:"bv_TangTangVfx",282:"bv_Nuclearo_Dinosauro",284:"bv_LasTralaleritas",286:"bv_Job",288:"bv_Los_Tralaleritos",290:"bv_Chicliterita_bicicliterit",292:"bv_SecretLuckyBlock",294:"bv_KetupatKepat",296:"bv_La_vacca_no_effects",298:"bv_Chicleteira",300:"bv_TralaleroTralala",302:"bv_Strawberryelephant",304:"bv_Magi_Ribbitini",306:"bv_Meowl",308:"bv_Money_money_puggy"};

        // ---- STATE ----
        var ownedBrainrots = {}; // "bv_Banana" -> count
        var players = []; // [{baseId:1, gold:0, carry:0}, ...] for bases 1-10
        for (var i = 1; i <= 10; i++) players.push({baseId: i, gold: 0, carry: 0});
        var myBaseId = 0;

        function prettyName(bvKey) {
            return bvKey.substring(3).replace(/_/g, ' ');
        }

        function fmt(n) {
            n = Math.floor(n);
            if (n >= 1e9) return (n/1e9).toFixed(1)+'B';
            if (n >= 1e6) return (n/1e6).toFixed(1)+'M';
            if (n >= 1e3) return (n/1e3).toFixed(1)+'K';
            return n.toLocaleString();
        }

        function parseVarValue(raw) {
            if (raw === undefined || raw === null || raw === '') return 0;
            raw = String(raw).trim();
            var num = Number(raw);
            if (!isNaN(num)) return num;
            try {
                var parsed = JSON.parse(raw);
                if (typeof parsed === 'number') return parsed;
                if (typeof parsed === 'object' && parsed !== null) {
                    var vals = Object.values(parsed);
                    return vals.length > 0 ? (Number(vals[0]) || 0) : 0;
                }
            } catch(e) {}
            var m = raw.match(/[=:](\d+\.?\d*)/);
            if (m) return parseFloat(m[1]) || 0;
            return 0;
        }

        function zonePretty(z) { return z.replace(/_/g, ' '); }

        // ---- TABS ----
        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('tab-brainrots').className = 'tab' + (tab === 'brainrots' ? ' active' : '');
            document.getElementById('tab-players').className = 'tab' + (tab === 'players' ? ' active' : '');
            render();
        }

        // ---- RENDER ----
        function render() {
            if (currentTab === 'brainrots') renderBrainrots();
            else renderPlayers();
        }

        function renderBrainrots() {
            var body = document.getElementById('body-content');
            var html = '';
            var totalOwned = 0;
            var totalTypes = 0;
            var totalBrainrots = 0;
            var totalRate = 0;
            var zoneNames = Object.keys(ZONES);

            for (var zi = 0; zi < zoneNames.length; zi++) {
                var zone = zoneNames[zi];
                var brainrots = ZONES[zone];
                var zoneOwned = 0;
                var zoneHtml = '';

                for (var bi = 0; bi < brainrots.length; bi++) {
                    var bv = brainrots[bi];
                    var count = ownedBrainrots[bv] || 0;
                    var gps = GOLD_PER_SECOND[bv] || 0;
                    totalBrainrots++;
                    if (count > 0) { totalOwned += count; totalTypes++; totalRate += count * gps; zoneOwned += count; }

                    zoneHtml += '<div class="br-row' + (count > 0 ? ' owned' : '') + '">';
                    zoneHtml += '<div class="br-name">' + prettyName(bv) + '</div>';
                    zoneHtml += '<div class="br-gps">$' + gps.toFixed(1) + '/s</div>';
                    zoneHtml += '<div class="br-owned ' + (count > 0 ? 'has' : 'none') + '">' + count + '</div>';
                    zoneHtml += '</div>';
                }

                html += '<div class="zone-header">' + zonePretty(zone) + '<span class="zone-count">' + zoneOwned + ' owned</span></div>';
                html += zoneHtml;
            }

            body.innerHTML = html;
            document.getElementById('summary-bar').innerHTML =
                '<span>' + totalTypes + '/' + totalBrainrots + ' types collected</span>' +
                '<span>' + totalOwned + ' total owned</span>' +
                '<span>$' + totalRate.toFixed(1) + '/s income</span>';
        }

        function renderPlayers() {
            var body = document.getElementById('body-content');
            var html = '';
            var activePlayers = 0;

            for (var i = 0; i < players.length; i++) {
                var p = players[i];
                var isActive = p.gold > 0 || p.carry > 0 || p.baseId === myBaseId;
                var isMe = p.baseId === myBaseId;
                var carryName = '';
                if (p.carry > 0 && QUEST_NUM_TO_BV[p.carry]) {
                    carryName = prettyName(QUEST_NUM_TO_BV[p.carry]);
                }

                if (isActive) activePlayers++;

                html += '<div class="player-card' + (isActive ? '' : ' empty') + (carryName ? ' carrying' : '') + '">';
                html += '<div class="p-base">' + p.baseId + '</div>';
                html += '<div class="p-info">';

                if (isActive) {
                    html += '<div class="p-label">Base ' + p.baseId + (isMe ? ' (YOU)' : '') + '</div>';
                    html += '<div class="p-gold">$' + fmt(p.gold) + '</div>';
                    if (carryName) {
                        html += '<div class="p-carry">Carrying: ' + carryName + '</div>';
                    }
                } else {
                    html += '<div class="p-empty-label">Empty</div>';
                }

                html += '</div></div>';
            }

            body.innerHTML = html;
            document.getElementById('summary-bar').innerHTML =
                '<span>' + activePlayers + '/10 bases claimed</span>' +
                '<span>Press E to close</span>';
        }

        function closeInv() { if(sdk){sdk.focusGameKeyboard();sdk.closeIframe();} }

        // ---- MESSAGE HANDLING ----
        var _lastMsgId = '', _lastMsgTime = 0;
        function processMessage(msg) {
            var now = Date.now();
            var msgId = msg + '_' + Math.floor(now / 100);
            if (msgId === _lastMsgId && now - _lastMsgTime < 200) return;
            _lastMsgId = msgId; _lastMsgTime = now;
            handleMessage(msg);
        }

        function handleMessage(msg) {
            if (!msg.startsWith('inv:')) return;

            var payload = msg.substring(4);
            var pairs = payload.split('&');
            for (var i = 0; i < pairs.length; i++) {
                var eq = pairs[i].indexOf('=');
                if (eq < 0) continue;
                var key = pairs[i].substring(0, eq).trim();
                var val = parseVarValue(pairs[i].substring(eq + 1));

                if (key.startsWith('Own_bv_')) {
                    var bvKey = key.substring(4); // "bv_Banana"
                    ownedBrainrots[bvKey] = Math.round(val);
                } else if (key === 'My_Base_ID') {
                    myBaseId = Math.round(val);
                } else if (key.startsWith('PGold_')) {
                    var idx = parseInt(key.substring(6)) - 1;
                    if (idx >= 0 && idx < 10) players[idx].gold = val;
                } else if (key.startsWith('PCarry_')) {
                    var idx2 = parseInt(key.substring(7)) - 1;
                    if (idx2 >= 0 && idx2 < 10) players[idx2].carry = Math.round(val);
                }
            }
            render();
        }

        // ---- SDK ----
        if (sdk) { sdk.setMessageListener(function(msg) { processMessage(msg); }); }
        window.addEventListener('message', function(event) {
            if (event.data && typeof event.data === 'string') processMessage(event.data);
            else if (event.data && event.data.portalsMessage) processMessage(event.data.portalsMessage);
        });

        // ---- KEYBOARD REFOCUS ----
        function _doFocusGame() {
            if (typeof PortalsSdk !== 'undefined' && PortalsSdk.focusGameKeyboard) PortalsSdk.focusGameKeyboard();
        }
        document.addEventListener('click', function(e) {
            if (document.hidden) return;
            if (e && e.target) {
                var tag = e.target.tagName;
                if (tag === 'BUTTON' || tag === 'SELECT' || tag === 'INPUT') return;
                if (e.target.closest && e.target.closest('button, select')) return;
            }
            _doFocusGame();
        });
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' || e.key === 'e' || e.key === 'E') { e.preventDefault(); closeInv(); return; }
            if (!document.hidden) _doFocusGame();
        });
        document.addEventListener('mouseup', function(e) {
            if (e && e.target) {
                var tag = e.target.tagName;
                if (tag === 'BUTTON' || tag === 'SELECT' || tag === 'INPUT') return;
                if (e.target.closest && e.target.closest('button, select')) return;
            }
            setTimeout(_doFocusGame, 50);
        });
        _doFocusGame();
        setTimeout(_doFocusGame, 100);
        setTimeout(_doFocusGame, 300);

        render();
        // Debug mode
        if (!sdk) {

        }
