<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Rebirth</title>
    <script src="https://portals-labs.github.io/portals-sdk/portals-sdk.js?v=10005456"></script>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
    <style>
        html, body {
            margin: 0; padding: 0;
            background: transparent !important;
            overflow: hidden;
            font-family: 'Nunito', sans-serif;
            user-select: none;
        }

        .shop-frame {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 460px;
            background: white;
            border: 5px solid #D63031;
            border-radius: 24px;
            box-shadow: 0 10px 0 rgba(0,0,0,0.15), 0 15px 40px rgba(0,0,0,0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .shop-header {
            background: linear-gradient(180deg, #FF7675 0%, #D63031 100%);
            padding: 14px 20px;
            text-align: center;
            position: relative;
            flex-shrink: 0;
        }
        .shop-header h1 {
            font-family: 'Luckiest Guy', cursive;
            font-size: 32px;
            color: white;
            margin: 0;
            text-shadow: 3px 3px 0 rgba(0,0,0,0.2);
        }
        .header-badges {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 6px;
        }
        .gold-badge {
            display: inline-block;
            padding: 4px 16px;
            border-radius: 20px;
            background: linear-gradient(180deg, #FFE44D, #FFB800);
            border: 3px solid #CC8800;
            box-shadow: 0 2px 0 rgba(0,0,0,0.15);
            font-family: 'Luckiest Guy', cursive;
            font-size: 15px;
            color: #4A2800;
        }
        .rebirth-badge {
            display: inline-block;
            padding: 4px 16px;
            border-radius: 20px;
            background: linear-gradient(180deg, #FF7B7B, #FF3B3B);
            border: 3px solid #CC2222;
            box-shadow: 0 2px 0 rgba(0,0,0,0.15);
            font-family: 'Luckiest Guy', cursive;
            font-size: 15px;
            color: white;
            text-shadow: 1px 1px 0 rgba(0,0,0,0.2);
        }
        .close-x {
            position: absolute;
            top: 8px; right: 12px;
            width: 32px; height: 32px;
            border-radius: 50%;
            background: linear-gradient(180deg, #FF7675, #D63031);
            border: 3px solid #A02020;
            box-shadow: 0 2px 0 rgba(0,0,0,0.2);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            font-family: 'Luckiest Guy', cursive;
            font-size: 18px; color: white;
            text-shadow: 1px 1px 0 rgba(0,0,0,0.3);
        }
        .close-x:active { transform: translateY(2px); box-shadow: none; }

        .shop-body {
            padding: 20px;
            background: #F0F3F5;
            text-align: center;
        }

        /* Rebirth panel */
        .rebirth-panel {
            background: white;
            border: 4px solid #D63031;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 0 rgba(214,48,49,0.2);
        }
        .rebirth-panel h2 {
            font-family: 'Luckiest Guy', cursive;
            font-size: 26px;
            color: #D63031;
            margin: 0 0 4px;
            text-shadow: 2px 2px 0 rgba(0,0,0,0.1);
        }
        .rebirth-panel .sub {
            font-size: 12px; font-weight: 800; color: #636E72;
        }
        .rebirth-cost-badge {
            display: inline-block;
            margin: 14px 0;
            padding: 8px 24px;
            border-radius: 20px;
            background: linear-gradient(180deg, #FFE44D, #FFB800);
            border: 3px solid #CC8800;
            box-shadow: 0 3px 0 rgba(0,0,0,0.15);
            font-family: 'Luckiest Guy', cursive;
            font-size: 20px;
            color: #4A2800;
        }
        .rebirth-reward {
            display: inline-block;
            padding: 6px 18px;
            border-radius: 14px;
            background: linear-gradient(180deg, #E8FFE8, #D4FFD4);
            border: 3px solid #2ECC40;
            font-family: 'Luckiest Guy', cursive;
            font-size: 13px;
            color: #0A5A0A;
            margin: 8px 0;
        }
        .rebirth-progress {
            margin: 12px 0;
            font-size: 11px; font-weight: 800; color: #95A5A6;
        }
        .rebirth-bar-track {
            width: 80%;
            margin: 6px auto;
            height: 14px;
            background: #DFE6E9;
            border-radius: 7px;
            border: 2px solid #B2BEC3;
            overflow: hidden;
        }
        .rebirth-bar-fill {
            height: 100%;
            border-radius: 7px;
            background: linear-gradient(90deg, #FF7675, #D63031);
            transition: width 0.4s;
        }
        .rebirth-btn {
            display: inline-block;
            margin-top: 14px;
            padding: 12px 36px;
            border: 3px solid;
            border-radius: 16px;
            font-family: 'Luckiest Guy', cursive;
            font-size: 18px;
            cursor: pointer;
            box-shadow: 0 4px 0 rgba(0,0,0,0.15);
            transition: all 0.1s;
            text-shadow: 1px 1px 0 rgba(0,0,0,0.2);
        }
        .rebirth-btn:active { transform: translateY(3px); box-shadow: none; }
        .rebirth-btn.ready {
            background: linear-gradient(180deg, #FF7675, #D63031);
            border-color: #A02020;
            color: white;
        }
        .rebirth-btn.not-ready {
            background: linear-gradient(180deg, #DFE6E9, #B2BEC3);
            border-color: #95A5A6;
            color: #95A5A6;
            cursor: not-allowed;
            text-shadow: none;
        }
        .rebirth-stars {
            font-size: 28px;
            margin: 6px 0;
        }
        .rebirth-max {
            font-family: 'Luckiest Guy', cursive;
            font-size: 14px;
            color: #2ECC40;
            margin-top: 12px;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 20px; left: 50%;
            transform: translateX(-50%);
            padding: 10px 24px;
            border-radius: 14px;
            background: linear-gradient(180deg, #FF7675, #D63031);
            border: 3px solid #A02020;
            box-shadow: 0 3px 0 rgba(0,0,0,0.2);
            font-family: 'Luckiest Guy', cursive;
            font-size: 16px; color: white;
            text-shadow: 1px 1px 0 rgba(0,0,0,0.2);
            animation: pop 0.3s ease, fadeOut 0.3s ease 2s forwards;
            z-index: 30;
        }
        @keyframes pop { 0%{transform:translateX(-50%) scale(0.5);opacity:0} 70%{transform:translateX(-50%) scale(1.1)} 100%{transform:translateX(-50%) scale(1);opacity:1} }
        @keyframes fadeOut { to{opacity:0} }
    </style>
</head>
<body>
    <div class="shop-frame">
        <div class="shop-header">
            <h1>REBIRTH</h1>
            <div class="header-badges">
                <div class="gold-badge" id="gold-display">Gold: 0</div>
                <div class="rebirth-badge" id="rebirth-display">Rebirth: 0</div>
            </div>
            <div class="close-x" onclick="closeShop()">X</div>
        </div>
        <div class="shop-body" id="rebirth-content"></div>
    </div>

    <script>
        const sdk = typeof PortalsSdk !== 'undefined' ? PortalsSdk : null;

        // ---- SOUND SYSTEM ----
        var _mp3Sounds = {};
        (function() {
            var files = { talent: 'talent.mp3', levelup: 'levelup.mp3', click: 'click.mp3', uipop: 'ui-pop.mp3' };
            for (var k in files) { var a = new Audio(files[k]); a.preload = 'auto'; a.volume = (k === 'click') ? 0.5 : 0.3; _mp3Sounds[k] = a; }
        })();
        function playSound(type) { var s = _mp3Sounds[type]; if (s) { s.currentTime = 0; s.play().catch(function(){}); } }

        var myUsername = '';
        const REBIRTH_COSTS = [500000, 2000000, 10000000];
        const REBIRTH_BONUSES = [
            '1.5x Permanent Gold Income',
            '2x Permanent Gold Income\n+ Unlock Ancient Ruins zone',
            '3x Permanent Gold Income\n+ Unlock Sky Platform & The Void zones\n+ Exclusive Night Skybox'
        ];
        const REBIRTH_KEEPS = 'Your base, floors, and base upgrades are kept.';
        const REBIRTH_RESETS = 'Gold, brainrots, zone unlocks, weapons, gear, and items are reset.';

        let state = { gold: 0, rebirth: 0 };

        function fmt(n) {
            if (n >= 1e9) return (n/1e9).toFixed(1)+'B';
            if (n >= 1e6) return (n/1e6).toFixed(1)+'M';
            if (n >= 1e3) return (n/1e3).toFixed(1)+'K';
            return n.toLocaleString();
        }

        function render() {
            document.getElementById('gold-display').textContent = 'Gold: ' + fmt(state.gold);
            document.getElementById('rebirth-display').textContent = 'Rebirth: ' + state.rebirth;
            const el = document.getElementById('rebirth-content');
            const nextRebirth = state.rebirth + 1;
            const maxRebirth = REBIRTH_COSTS.length;

            if (state.rebirth >= maxRebirth) {
                const stars = '\u2B50'.repeat(state.rebirth);
                const bonusLines = REBIRTH_BONUSES[state.rebirth-1].split('\n').map(l => '<div>' + l.trim() + '</div>').join('');
                el.innerHTML = `
                    <div class="rebirth-panel">
                        <div class="rebirth-stars">${stars}</div>
                        <h2>MAX REBIRTH!</h2>
                        <div class="sub">You've reached Rebirth ${state.rebirth}. All zones unlocked.</div>
                        <div class="rebirth-reward" style="margin-top:14px">${bonusLines}</div>
                        <div class="rebirth-max">All permanent bonuses active</div>
                    </div>
                `;
                return;
            }

            const cost = REBIRTH_COSTS[state.rebirth];
            const canRebirth = state.gold >= cost;
            const progress = Math.min(100, (state.gold / cost) * 100);
            const stars = state.rebirth > 0 ? '\u2B50'.repeat(state.rebirth) : '';
            const bonusLines = REBIRTH_BONUSES[state.rebirth].split('\n').map(l => '<div>' + l.trim() + '</div>').join('');

            el.innerHTML = `
                <div class="rebirth-panel">
                    ${stars ? '<div class="rebirth-stars">' + stars + '</div>' : ''}
                    <h2>REBIRTH ${nextRebirth}</h2>
                    <div class="rebirth-reward" style="margin-bottom:8px">${bonusLines}</div>
                    <div class="rebirth-cost-badge">$ ${fmt(cost)}</div>
                    <div class="sub" style="margin-top:8px;color:#2ECC40;font-weight:900">${REBIRTH_KEEPS}</div>
                    <div class="sub" style="margin-top:4px;color:#D63031;font-weight:900">${REBIRTH_RESETS}</div>
                    <div class="rebirth-progress">
                        ${fmt(state.gold)} / ${fmt(cost)} gold
                    </div>
                    <div class="rebirth-bar-track">
                        <div class="rebirth-bar-fill" style="width:${progress}%"></div>
                    </div>
                    <button class="rebirth-btn ${canRebirth ? 'ready' : 'not-ready'}"
                            onclick="doRebirth()" ${canRebirth ? '' : 'disabled'}>
                        ${canRebirth ? 'REBIRTH NOW!' : 'NEED ' + fmt(cost) + 'g'}
                    </button>
                </div>
            `;
        }

        function doRebirth() {
            const cost = REBIRTH_COSTS[state.rebirth];
            if (state.gold < cost) return;
            state.gold -= cost;
            state.rebirth++;
            render();
            playSound('talent');
            if (sdk) {
                sdk.sendMessageToUnity(JSON.stringify({
                    TaskName: 'do_rebirth',
                    TaskTargetState: 'SetNotActiveToActive'
                }));
            }
            toast('REBIRTH ' + state.rebirth + '!');
        }

        function toast(text) {
            const old = document.querySelector('.toast'); if(old)old.remove();
            const t = document.createElement('div'); t.className = 'toast'; t.textContent = text;
            document.body.appendChild(t); setTimeout(()=>{if(t.parentNode)t.remove();},2500);
        }

        function closeShop() { playSound('click'); if(sdk){sdk.focusGameKeyboard();sdk.closeIframe();} }

        /** Parse a variable value from Portals |var| interpolation.
         *  Multiplayer sends JSON objects like {"Player1":100,"Player2":87}.
         *  We match by myUsername to get the local player's value. */
        function parseVarValue(raw) {
            if (raw === undefined || raw === null || raw === '') return 0;
            raw = String(raw).trim();
            var num = Number(raw);
            if (!isNaN(num)) return num;
            try {
                var parsed = JSON.parse(raw);
                if (typeof parsed === 'number') return parsed;
                if (typeof parsed === 'object' && parsed !== null) {
                    // Try username match first (case-insensitive)
                    if (myUsername) {
                        var uLower = myUsername.toLowerCase();
                        for (var k in parsed) {
                            if (k.toLowerCase() === uLower) return Number(parsed[k]) || 0;
                        }
                    }
                    // Fallback: first value
                    var vals = Object.values(parsed);
                    return vals.length > 0 ? (Number(vals[0]) || 0) : 0;
                }
            } catch(e) {
                // Portals = format: {"name"="val"&"name2"="val2"}
                if (raw.indexOf('=') > -1) {
                    var eqParts = raw.replace(/[{}"]/g, '').split('&');
                    for (var i = 0; i < eqParts.length; i++) {
                        var ep = eqParts[i].split('=');
                        if (ep.length === 2 && myUsername && ep[0].toLowerCase() === myUsername.toLowerCase()) {
                            return Number(ep[1]) || 0;
                        }
                    }
                }
            }
            return 0;
        }

        // --- Message deduplication ---
        let _lastMsgId = '', _lastMsgTime = 0;
        function processMessage(msg) {
            const now = Date.now();
            const msgId = msg + '_' + Math.floor(now / 100);
            if (msgId === _lastMsgId && now - _lastMsgTime < 200) return;
            _lastMsgId = msgId; _lastMsgTime = now;
            handleMessage(msg);
        }

        function handleMessage(msg) {
            console.log('[Rebirth] Received:', msg);

            // inv: format — "inv:Gold=|Gold|&Rebirth=|Rebirth|&username=PlayerName"
            if (msg.startsWith('inv:')) {
                const payload = msg.substring(4);
                const pairs = payload.split('&');
                // First pass: extract username (raw string, not numeric)
                for (const pair of pairs) {
                    const eq = pair.indexOf('=');
                    if (eq < 0) continue;
                    const key = pair.substring(0, eq).trim();
                    if (key === 'username') {
                        myUsername = pair.substring(eq + 1).trim();
                        break;
                    }
                }
                // Second pass: parse numeric values
                for (const pair of pairs) {
                    const eq = pair.indexOf('=');
                    if (eq < 0) continue;
                    const key = pair.substring(0, eq).trim();
                    if (key === 'username') continue;
                    const val = parseVarValue(pair.substring(eq + 1));
                    if (key === 'Gold') state.gold = val;
                    else if (key === 'Rebirth') state.rebirth = val;
                }
                render();
                return;
            }

            // gold: format
            if (msg.startsWith('gold:')) {
                state.gold = parseFloat(msg.substring(5)) || 0;
                render();
                return;
            }

            // JSON format
            try {
                const d = JSON.parse(msg);
                if (d.gold !== undefined) state.gold = parseFloat(d.gold) || 0;
                if (d.rebirth !== undefined) state.rebirth = parseInt(d.rebirth) || 0;
                render();
            } catch(e) {}
        }

        // --- SDK message listener ---
        if (sdk) {
            sdk.setMessageListener(function(msg) { processMessage(msg); });
        }
        window.addEventListener('message', function(event) {
            if (event.data && typeof event.data === 'string') processMessage(event.data);
            else if (event.data && event.data.portalsMessage) processMessage(event.data.portalsMessage);
        });

        // --- Keyboard refocus ---
        function _doFocusGame() {
            if (typeof PortalsSdk !== 'undefined' && PortalsSdk.focusGameKeyboard) PortalsSdk.focusGameKeyboard();
        }
        document.addEventListener('click', function(e) {
            if (document.hidden) return;
            if (e && e.target) {
                var tag = e.target.tagName;
                if (tag === 'BUTTON' || tag === 'SELECT' || tag === 'INPUT') return;
                if (e.target.closest && e.target.closest('button, select')) return;
            }
            _doFocusGame();
        });
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') { e.preventDefault(); closeShop(); return; }
            if (!document.hidden) _doFocusGame();
        });
        document.addEventListener('mouseup', function(e) {
            if (e && e.target) {
                var tag = e.target.tagName;
                if (tag === 'BUTTON' || tag === 'SELECT' || tag === 'INPUT') return;
                if (e.target.closest && e.target.closest('button, select')) return;
            }
            setTimeout(_doFocusGame, 50);
        });
        _doFocusGame();
        setTimeout(_doFocusGame, 100);
        setTimeout(_doFocusGame, 300);

        const params = new URLSearchParams(window.location.search);
        if (params.get('gold')) state.gold = parseFloat(params.get('gold')) || 0;
        if (params.get('rebirth')) state.rebirth = parseInt(params.get('rebirth')) || 0;

        render();

        // Dev mode preview
        if (!sdk) {
            state.gold = 150000;
            state.rebirth = 1;
            render();
        }
    </script>
</body>
</html>
