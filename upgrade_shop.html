<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Upgrades</title>
    <script src="https://portals-labs.github.io/portals-sdk/portals-sdk.js?v=10005456"></script>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
    <style>
        html, body {
            margin: 0; padding: 0;
            background: transparent !important;
            overflow: hidden;
            font-family: 'Nunito', sans-serif;
            user-select: none;
        }

        .shop-frame {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 540px;
            max-height: 90vh;
            background: white;
            border: 5px solid #D68910;
            border-radius: 24px;
            box-shadow: 0 10px 0 rgba(0,0,0,0.15), 0 15px 40px rgba(0,0,0,0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .shop-header {
            background: linear-gradient(180deg, #FFD866 0%, #F39C12 100%);
            padding: 14px 20px;
            text-align: center;
            position: relative;
            flex-shrink: 0;
        }
        .shop-header h1 {
            font-family: 'Luckiest Guy', cursive;
            font-size: 30px;
            color: white;
            margin: 0;
            text-shadow: 3px 3px 0 rgba(0,0,0,0.2);
        }
        .gold-badge {
            display: inline-block;
            margin-top: 6px;
            padding: 4px 16px;
            border-radius: 20px;
            background: linear-gradient(180deg, #FFE44D, #FFB800);
            border: 3px solid #CC8800;
            box-shadow: 0 2px 0 rgba(0,0,0,0.15);
            font-family: 'Luckiest Guy', cursive;
            font-size: 15px;
            color: #4A2800;
        }
        .close-x {
            position: absolute;
            top: 8px; right: 12px;
            width: 32px; height: 32px;
            border-radius: 50%;
            background: linear-gradient(180deg, #FF7675, #D63031);
            border: 3px solid #A02020;
            box-shadow: 0 2px 0 rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-family: 'Luckiest Guy', cursive;
            font-size: 18px;
            color: white;
            text-shadow: 1px 1px 0 rgba(0,0,0,0.3);
        }
        .close-x { transition: transform 0.15s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .close-x:hover { transform: scale(1.15); }
        .close-x:active { transform: scale(0.85); transition-duration: 0.05s; }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 0;
            background: #E8EEF2;
            flex-shrink: 0;
        }
        .tab {
            flex: 1;
            padding: 10px 6px;
            text-align: center;
            font-family: 'Luckiest Guy', cursive;
            font-size: 13px;
            cursor: pointer;
            color: #95A5A6;
            border-bottom: 4px solid transparent;
            transition: transform 0.15s cubic-bezier(0.34, 1.56, 0.64, 1), color 0.15s, border-bottom-color 0.15s, background 0.15s;
        }
        .tab:hover { color: #636E72; transform: scale(1.05); }
        .tab:active { transform: scale(0.92); transition-duration: 0.05s; }
        .tab.active {
            color: #2C3E50;
            border-bottom-color: #3498DB;
            background: white;
        }
        .tab .tab-icon { font-size: 18px; display: block; margin-bottom: 2px; }

        /* Body */
        .shop-body {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            background: #F0F3F5;
        }
        .shop-body::-webkit-scrollbar { width: 6px; }
        .shop-body::-webkit-scrollbar-thumb { background: #B2BEC3; border-radius: 3px; }

        .panel { display: none; }
        .panel.active { display: block; }

        /* Upgrade cards */
        .upgrade-card {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            margin-bottom: 8px;
            background: white;
            border: 3px solid #DFE6E9;
            border-radius: 16px;
            box-shadow: 0 3px 0 rgba(0,0,0,0.06);
            transition: all 0.15s;
        }
        .upgrade-card:hover { transform: translateY(-2px); border-color: #74B9FF; }
        .upgrade-card.owned {
            border-color: #2ECC40;
            background: linear-gradient(180deg, #EFFFEF 0%, #E0FFE0 100%);
        }
        .u-icon {
            width: 48px; height: 48px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            flex-shrink: 0;
            border: 3px solid;
            box-shadow: 0 2px 0 rgba(0,0,0,0.1);
        }
        .u-info { flex: 1; min-width: 0; }
        .u-name {
            font-family: 'Luckiest Guy', cursive;
            font-size: 15px;
            color: #2C3E50;
        }
        .u-tier {
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 1px 8px;
            border-radius: 6px;
            display: inline-block;
            margin-left: 6px;
            vertical-align: middle;
        }
        .u-desc {
            font-size: 11px;
            font-weight: 700;
            color: #636E72;
            margin-top: 2px;
        }

        /* Action buttons */
        .u-btn {
            padding: 8px 16px;
            border: 3px solid;
            border-radius: 12px;
            font-family: 'Luckiest Guy', cursive;
            font-size: 13px;
            cursor: pointer;
            box-shadow: 0 4px 0 rgba(0,0,0,0.2);
            transition: transform 0.15s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.15s;
            flex-shrink: 0;
            text-shadow: 1px 1px 0 rgba(0,0,0,0.15);
        }
        .u-btn:hover { transform: scale(1.05) translateY(-2px); box-shadow: 0 6px 0 rgba(0,0,0,0.2); }
        .u-btn:active { transform: scale(0.92) translateY(3px); box-shadow: 0 1px 0 rgba(0,0,0,0.2); transition-duration: 0.05s; }
        .btn-buy {
            background: linear-gradient(180deg, #FFE44D, #FFB800);
            border-color: #CC8800;
            color: #4A2800;
        }
        .btn-done {
            background: linear-gradient(180deg, #6EF06E, #2ECC40);
            border-color: #1FA030;
            color: #0A3A0A;
            cursor: default;
        }
        .btn-locked {
            background: linear-gradient(180deg, #DFE6E9, #B2BEC3);
            border-color: #95A5A6;
            color: #95A5A6;
            cursor: not-allowed;
            text-shadow: none;
        }

        /* Tier colors */
        .tier-common { background: #DFE6E9; color: #636E72; }
        .tier-rare { background: #74B9FF; color: white; }
        .tier-epic { background: linear-gradient(135deg, #A29BFE, #6C5CE7); color: white; }
        .tier-legendary { background: linear-gradient(135deg, #FFD700, #FFA500); color: #4A2800; }
        .tier-mythic { background: linear-gradient(135deg, #FF6B6B, #EE5A24); color: white; }
        .tier-god { background: linear-gradient(135deg, #FF4757, #C44569); color: white; }
        .tier-secret { background: linear-gradient(135deg, #A29BFE, #6C5CE7); color: white; }
        .tier-og { background: linear-gradient(135deg, #2C003E, #6600CC); color: #DDA0DD; }

        /* Icon background colors */
        .icon-beach { background: linear-gradient(180deg, #FFEAA7, #F5DEB3); border-color: #D4A76A; }
        .icon-meadow { background: linear-gradient(180deg, #B8F0B8, #98FB98); border-color: #60C060; }
        .icon-forest { background: linear-gradient(180deg, #55C855, #228B22); border-color: #1A6B1A; }
        .icon-jungle { background: linear-gradient(180deg, #70D08A, #2E8B57); border-color: #1E6B3A; }
        .icon-cave { background: linear-gradient(180deg, #88B8E8, #4682B4); border-color: #306090; }
        .icon-crystal { background: linear-gradient(180deg, #80F0FF, #00E5FF); border-color: #00A0B0; }
        .icon-boss { background: linear-gradient(180deg, #FF8888, #FF4444); border-color: #CC2020; }
        .icon-volcano { background: linear-gradient(180deg, #FF8844, #FF4500); border-color: #CC3000; }
        .icon-ruins { background: linear-gradient(180deg, #FFD866, #CC8800); border-color: #996600; }
        .icon-sky { background: linear-gradient(180deg, #C0A8FF, #9370DB); border-color: #6A40B0; }
        .icon-void { background: linear-gradient(180deg, #9933FF, #6600CC); border-color: #4400AA; }
        .icon-floor { background: linear-gradient(180deg, #A8D8EA, #74B9FF); border-color: #4A90C0; }


        /* Toast */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 24px;
            border-radius: 14px;
            background: linear-gradient(180deg, #FFE44D, #FFB800);
            border: 3px solid #CC8800;
            box-shadow: 0 3px 0 rgba(0,0,0,0.2);
            font-family: 'Luckiest Guy', cursive;
            font-size: 16px;
            color: #4A2800;
            animation: pop 0.3s ease, fadeOut 0.3s ease 2s forwards;
            z-index: 30;
        }
        @keyframes pop { 0%{transform:translateX(-50%) scale(0.5);opacity:0} 70%{transform:translateX(-50%) scale(1.1)} 100%{transform:translateX(-50%) scale(1);opacity:1} }
        @keyframes fadeOut { to{opacity:0} }
        .spend-particle {
            position: absolute;
            font-family: 'Luckiest Guy', cursive;
            font-size: 14px; font-weight: 900; color: #E74C3C;
            pointer-events: none; z-index: 100;
            text-shadow: 1px 1px 0 rgba(0,0,0,0.3);
            animation: spendFly 1s ease-out forwards;
        }
        @keyframes spendFly {
            0% { opacity: 1; transform: translate(0,0) scale(1); }
            100% { opacity: 0; transform: translate(var(--dx),var(--dy)) scale(0.5); }
        }
    </style>
</head>
<body>
    <div class="shop-frame">
        <div class="shop-header">
            <h1>UPGRADES</h1>
            <div class="gold-badge" id="gold-display">$0</div>
            <div class="close-x" onclick="closeShop()">X</div>
        </div>

        <div class="tabs">
            <div class="tab active" data-tab="zones" onclick="switchTab('zones')">
                <span class="tab-icon">&#x1F30D;</span>Zones
            </div>
            <div class="tab" data-tab="floors" onclick="switchTab('floors')">
                <span class="tab-icon">&#x1F3E2;</span>Floors
            </div>
        </div>

        <div class="shop-body">
            <div class="panel active" id="panel-zones"></div>
            <div class="panel" id="panel-floors"></div>
        </div>
    </div>

    <script>
        const sdk = typeof PortalsSdk !== 'undefined' ? PortalsSdk : null;

        // ---- SOUND SYSTEM ----
        var _mp3Sounds = {};
        (function() {
            var files = { purchase: 'purchase.mp3', click: 'click.mp3', levelup: 'levelup.mp3', talent: 'talent.mp3', uipop: 'ui-pop.mp3' };
            for (var k in files) { var a = new Audio(files[k]); a.preload = 'auto'; a.volume = (k === 'click') ? 0.5 : 0.3; _mp3Sounds[k] = a; }
        })();
        function playSound(type) { var s = _mp3Sounds[type]; if (s) { s.currentTime = 0; s.play().catch(function(){}); } }
        function spawnSpendParticles(count) {
            count = count || 6;
            var badge = document.getElementById('gold-display');
            if (!badge) return;
            badge.style.position = 'relative';
            for (var i = 0; i < count; i++) {
                (function(idx) {
                    setTimeout(function() {
                        var p = document.createElement('div');
                        p.className = 'spend-particle';
                        p.textContent = '-$';
                        var dx = (Math.random() - 0.5) * 80;
                        var dy = -(20 + Math.random() * 50);
                        p.style.setProperty('--dx', dx + 'px');
                        p.style.setProperty('--dy', dy + 'px');
                        p.style.left = (Math.random() * 60) + '%';
                        p.style.top = '0px';
                        badge.appendChild(p);
                        setTimeout(function() { if (p.parentNode) p.remove(); }, 1100);
                    }, idx * 50);
                })(i);
            }
        }

        const ZONES = [
            { id:'beach_zone', name:'Beach Zone', tier:'Common', tierClass:'tier-common', iconClass:'icon-beach', cost:0, icon:'\u{1F3D6}', gold:'1-3g', reqFloor:1, taskName:null },
            { id:'meadow', name:'Meadow', tier:'Common', tierClass:'tier-common', iconClass:'icon-meadow', cost:0, icon:'\u{1F33F}', gold:'1-3g', reqFloor:1, taskName:null },
            { id:'forest_zone', name:'Forest Zone', tier:'Rare', tierClass:'tier-rare', iconClass:'icon-forest', cost:2000, icon:'\u{1F332}', gold:'5-10g', reqFloor:2, taskName:'unlock_forest_zone' },
            { id:'jungle_zone', name:'Jungle Zone', tier:'Rare', tierClass:'tier-rare', iconClass:'icon-jungle', cost:2000, icon:'\u{1F334}', gold:'5-10g', reqFloor:2, taskName:'unlock_jungle_zone' },
            { id:'cave_zone', name:'Cave Zone', tier:'Epic', tierClass:'tier-epic', iconClass:'icon-cave', cost:8000, icon:'\u{1FAA8}', gold:'10-20g', reqFloor:3, taskName:'unlock_cave_zone' },
            { id:'crystal_cove', name:'Crystal Cove', tier:'Epic', tierClass:'tier-epic', iconClass:'icon-crystal', cost:8000, icon:'\u{1F48E}', gold:'10-20g', reqFloor:3, taskName:'unlock_crystal_cove' },
            { id:'boss_arena', name:'Boss Arena', tier:'Legendary', tierClass:'tier-legendary', iconClass:'icon-boss', cost:25000, icon:'\u{2694}', gold:'20-40g', reqFloor:3, taskName:'unlock_boss_arena' },
            { id:'volcano_zone', name:'Volcano Zone', tier:'Mythic', tierClass:'tier-mythic', iconClass:'icon-volcano', cost:75000, icon:'\u{1F30B}', gold:'40-80g', reqFloor:4, taskName:'unlock_volcano_zone' },
            { id:'ancient_ruins', name:'Ancient Ruins', tier:'Brainrot God', tierClass:'tier-god', iconClass:'icon-ruins', cost:200000, icon:'\u{1F3DB}', gold:'80-150g', reqFloor:4, rebirth:1, taskName:'unlock_ancient_ruins' },
            { id:'sky_platform', name:'Sky Platform', tier:'Secret', tierClass:'tier-secret', iconClass:'icon-sky', cost:500000, icon:'\u{2601}', gold:'150-300g', reqFloor:4, rebirth:2, taskName:'unlock_sky_platform' },
            { id:'the_void', name:'The Void', tier:'OG', tierClass:'tier-og', iconClass:'icon-void', cost:1000000, icon:'\u{1F573}', gold:'300-500g', reqFloor:4, rebirth:3, taskName:'unlock_the_void' },
        ];

        const FLOORS = [
            { num:2, cost:1000, slots:10, bonus:'+10% Rare gold', taskName:'unlock_floor_2' },
            { num:3, cost:5000, slots:10, bonus:'+10% Epic gold', taskName:'unlock_floor_3' },
            { num:4, cost:20000, slots:10, bonus:'+15% Legendary+ gold', taskName:'unlock_floor_4' },
        ];

        let state = {
            gold: 0,
            unlockedZones: ['Beach Zone', 'Meadow'],
            unlockedFloors: [1],
            rebirth: 0,
            hasBase: false,
            baseId: 0
        };

        function fmt(n) {
            if (n >= 1e9) return (n/1e9).toFixed(1)+'B';
            if (n >= 1e6) return (n/1e6).toFixed(1)+'M';
            if (n >= 1e3) return (n/1e3).toFixed(1)+'K';
            return n.toLocaleString();
        }

        function switchTab(tab) {
            playSound('click');
            document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
            document.querySelectorAll('.panel').forEach(p => p.classList.toggle('active', p.id === 'panel-' + tab));
        }

        function renderZones() {
            const el = document.getElementById('panel-zones');
            el.innerHTML = '';
            ZONES.forEach(z => {
                const unlocked = state.unlockedZones.includes(z.name);
                const isFree = z.cost === 0;
                const needsFloor = z.reqFloor && !state.unlockedFloors.includes(z.reqFloor);
                const needsRebirth = z.rebirth && state.rebirth < z.rebirth;
                const canBuy = !unlocked && !isFree && !needsFloor && !needsRebirth && state.gold >= z.cost;

                let btnClass, btnText;
                if (unlocked || isFree) { btnClass = 'btn-done'; btnText = 'UNLOCKED'; }
                else if (needsFloor) { btnClass = 'btn-locked'; btnText = 'Floor ' + z.reqFloor; }
                else if (needsRebirth) { btnClass = 'btn-locked'; btnText = 'Rebirth ' + z.rebirth; }
                else if (canBuy) { btnClass = 'btn-buy'; btnText = fmt(z.cost) + 'g'; }
                else { btnClass = 'btn-locked'; btnText = fmt(z.cost) + 'g'; }

                let reqText = '';
                if (z.reqFloor > 1) reqText += 'Requires Floor ' + z.reqFloor;
                if (z.rebirth) reqText += (reqText ? ' &bull; ' : '') + 'Requires Rebirth ' + z.rebirth;

                const card = document.createElement('div');
                card.className = 'upgrade-card' + (unlocked || isFree ? ' owned' : '');
                card.innerHTML = `
                    <div class="u-icon ${z.iconClass}">${z.icon}</div>
                    <div class="u-info">
                        <div class="u-name">${z.name} <span class="u-tier ${z.tierClass}">${z.tier}</span></div>
                        <div class="u-desc">Brainrots: ${z.gold}/cycle${reqText ? ' &bull; ' + reqText : ''}</div>
                    </div>
                    <button class="u-btn ${btnClass}" data-zone="${z.name}">${btnText}</button>
                `;
                el.appendChild(card);
            });
            el.querySelectorAll('.u-btn.btn-buy').forEach(btn => {
                btn.addEventListener('click', () => buyZone(btn.dataset.zone));
            });
        }

        function renderFloors() {
            const el = document.getElementById('panel-floors');
            el.innerHTML = '';
            if (!state.hasBase) {
                el.innerHTML = '<div style="text-align:center;padding:30px;"><div style="font-size:40px;margin-bottom:8px;">&#x1F3E0;</div><div style="font-family:Luckiest Guy,cursive;font-size:16px;color:#95A5A6;">Claim a base first!</div></div>';
                return;
            }
            FLOORS.forEach(f => {
                const unlocked = state.unlockedFloors.includes(f.num);
                const canBuy = !unlocked && state.gold >= f.cost;

                let btnClass, btnText;
                if (unlocked) { btnClass = 'btn-done'; btnText = 'UNLOCKED'; }
                else if (canBuy) { btnClass = 'btn-buy'; btnText = fmt(f.cost) + 'g'; }
                else { btnClass = 'btn-locked'; btnText = fmt(f.cost) + 'g'; }

                const card = document.createElement('div');
                card.className = 'upgrade-card' + (unlocked ? ' owned' : '');
                card.innerHTML = `
                    <div class="u-icon icon-floor">&#x1F3E2;</div>
                    <div class="u-info">
                        <div class="u-name">Floor ${f.num}</div>
                        <div class="u-desc">${f.slots} pedestal slots &bull; ${f.bonus}</div>
                    </div>
                    <button class="u-btn ${btnClass}" data-floor="${f.num}">${btnText}</button>
                `;
                el.appendChild(card);
            });
            el.querySelectorAll('.u-btn.btn-buy').forEach(btn => {
                btn.addEventListener('click', () => buyFloor(parseInt(btn.dataset.floor)));
            });
        }

        function renderAll() {
            document.getElementById('gold-display').innerHTML = '$' + fmt(state.gold);
            renderZones();
            renderFloors();
        }

        function buyZone(zoneName) {
            const z = ZONES.find(x => x.name === zoneName);
            if (!z || !z.taskName || state.unlockedZones.includes(z.name) || state.gold < z.cost) return;
            if (z.reqFloor && !state.unlockedFloors.includes(z.reqFloor)) return;
            if (z.rebirth && state.rebirth < z.rebirth) return;
            state.gold -= z.cost;
            state.unlockedZones.push(z.name);
            renderAll();
            playSound('talent');
            spawnSpendParticles(8);
            if (sdk) {
                sdk.sendMessageToUnity(JSON.stringify({
                    TaskName: z.taskName,
                    TaskTargetState: 'SetNotActiveToActive'
                }));
            }
            toast(z.name + ' Unlocked!');
        }

        function buyFloor(floorNum) {
            const f = FLOORS.find(x => x.num === floorNum);
            if (!f || !state.hasBase || state.unlockedFloors.includes(f.num) || state.gold < f.cost) return;
            state.gold -= f.cost;
            state.unlockedFloors.push(f.num);
            renderAll();
            playSound('levelup');
            spawnSpendParticles(8);
            if (sdk) {
                // Send base-specific floor unlock: unlock_floor_2_b3 for base 3
                var taskName = f.taskName + '_b' + state.baseId;
                sdk.sendMessageToUnity(JSON.stringify({
                    TaskName: taskName,
                    TaskTargetState: 'SetNotActiveToActive'
                }));
            }
            toast('Floor ' + f.num + ' Unlocked!');
        }

        function toast(text) {
            const old = document.querySelector('.toast'); if(old)old.remove();
            const t = document.createElement('div'); t.className = 'toast'; t.textContent = text;
            document.body.appendChild(t); setTimeout(()=>{if(t.parentNode)t.remove();},2500);
        }

        function closeShop() { playSound('click'); if(sdk){sdk.focusGameKeyboard();sdk.closeIframe();} }

        /** Parse a variable value from Portals |var| interpolation. */
        function parseVarValue(raw) {
            if (raw === undefined || raw === null || raw === '') return 0;
            raw = String(raw).trim();
            const num = Number(raw);
            if (!isNaN(num)) return num;
            try {
                const parsed = JSON.parse(raw);
                if (typeof parsed === 'number') return parsed;
                if (typeof parsed === 'object' && parsed !== null) {
                    const vals = Object.values(parsed);
                    return vals.length > 0 ? (Number(vals[0]) || 0) : 0;
                }
            } catch(e) {}
            return 0;
        }

        // --- Message deduplication ---
        let _lastMsgId = '', _lastMsgTime = 0;
        function processMessage(msg) {
            const now = Date.now();
            const msgId = msg + '_' + Math.floor(now / 100);
            if (msgId === _lastMsgId && now - _lastMsgTime < 200) return;
            _lastMsgId = msgId; _lastMsgTime = now;
            handleMessage(msg);
        }

        function handleMessage(msg) {
            console.log('[UpgradeShop] Received:', msg);

            // inv: format — "inv:Gold=|Gold|&Rebirth=|Rebirth|&..."
            if (msg.startsWith('inv:')) {
                const payload = msg.substring(4);
                const pairs = payload.split('&');
                for (const pair of pairs) {
                    const eq = pair.indexOf('=');
                    if (eq < 0) continue;
                    const key = pair.substring(0, eq).trim();
                    const val = parseVarValue(pair.substring(eq + 1));
                    if (key === 'Gold') state.gold = val;
                    else if (key === 'Rebirth') state.rebirth = val;
                    else if (key === 'My_Base_ID') { state.baseId = val; state.hasBase = val > 0; }
                }
                // Sync unlock state from server variables
                var ZONE_VAR_MAP = {
                    'Zone_Forest_Zone_Unlocked': 'Forest Zone',
                    'Zone_Jungle_Zone_Unlocked': 'Jungle Zone',
                    'Zone_Cave_Zone_Unlocked': 'Cave Zone',
                    'Zone_Crystal_Cove_Unlocked': 'Crystal Cove',
                    'Zone_Boss_Arena_Unlocked': 'Boss Arena',
                    'Zone_Volcano_Zone_Unlocked': 'Volcano Zone',
                    'Zone_Ancient_Ruins_Unlocked': 'Ancient Ruins',
                    'Zone_Sky_Platform_Unlocked': 'Sky Platform',
                    'Zone_The_Void_Unlocked': 'The Void'
                };
                var FLOOR_VAR_MAP = {
                    'Floor_2_Unlocked': 2,
                    'Floor_3_Unlocked': 3,
                    'Floor_4_Unlocked': 4
                };
                for (const pair of pairs) {
                    const eq = pair.indexOf('=');
                    if (eq < 0) continue;
                    const key = pair.substring(0, eq).trim();
                    const val = parseVarValue(pair.substring(eq + 1));
                    if (ZONE_VAR_MAP[key] && val >= 1 && !state.unlockedZones.includes(ZONE_VAR_MAP[key])) {
                        state.unlockedZones.push(ZONE_VAR_MAP[key]);
                    }
                    if (FLOOR_VAR_MAP[key] && val >= 1 && !state.unlockedFloors.includes(FLOOR_VAR_MAP[key])) {
                        state.unlockedFloors.push(FLOOR_VAR_MAP[key]);
                    }
                }
                renderAll();
                return;
            }

            // gold: format
            if (msg.startsWith('gold:')) {
                state.gold = parseFloat(msg.substring(5)) || 0;
                renderAll();
                return;
            }

            // JSON format
            try {
                const data = JSON.parse(msg);
                if (data.gold !== undefined) state.gold = parseFloat(data.gold) || 0;
                if (data.unlockedZones) state.unlockedZones = data.unlockedZones;
                if (data.unlockedFloors) state.unlockedFloors = data.unlockedFloors;
                if (data.rebirth !== undefined) state.rebirth = parseInt(data.rebirth) || 0;
                if (data.hasBase !== undefined) state.hasBase = data.hasBase;
                renderAll();
            } catch(e) {}
        }

        // --- SDK message listener ---
        if (sdk) {
            sdk.setMessageListener(function(msg) { processMessage(msg); });
        }
        window.addEventListener('message', function(event) {
            if (event.data && typeof event.data === 'string') processMessage(event.data);
            else if (event.data && event.data.portalsMessage) processMessage(event.data.portalsMessage);
        });

        // --- Keyboard refocus ---
        function _doFocusGame() {
            if (typeof PortalsSdk !== 'undefined' && PortalsSdk.focusGameKeyboard) PortalsSdk.focusGameKeyboard();
        }
        document.addEventListener('click', function(e) {
            if (document.hidden) return;
            if (e && e.target) {
                var tag = e.target.tagName;
                if (tag === 'BUTTON' || tag === 'SELECT' || tag === 'INPUT') return;
                if (e.target.closest && e.target.closest('button, select')) return;
            }
            _doFocusGame();
        });
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') { e.preventDefault(); closeShop(); return; }
            if (!document.hidden) _doFocusGame();
        });
        document.addEventListener('mouseup', function(e) {
            if (e && e.target) {
                var tag = e.target.tagName;
                if (tag === 'BUTTON' || tag === 'SELECT' || tag === 'INPUT') return;
                if (e.target.closest && e.target.closest('button, select')) return;
            }
            setTimeout(_doFocusGame, 50);
        });
        _doFocusGame();
        setTimeout(_doFocusGame, 100);
        setTimeout(_doFocusGame, 300);

        const params = new URLSearchParams(window.location.search);
        if (params.get('gold')) state.gold = parseFloat(params.get('gold')) || 0;
        if (params.get('rebirth')) state.rebirth = parseInt(params.get('rebirth')) || 0;
        if (params.get('hasBase')) state.hasBase = params.get('hasBase') === 'true';
        if (params.get('tab')) switchTab(params.get('tab'));

        renderAll();

        // Dev mode preview
        if (!sdk) {
            state.gold = 150000;
            state.unlockedZones = ['Beach Zone', 'Meadow', 'Forest Zone', 'Jungle Zone'];
            state.unlockedFloors = [1, 2];
            state.rebirth = 0;
            state.hasBase = true;
            renderAll();
        }
    </script>
</body>
</html>
