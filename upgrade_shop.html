<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Upgrades</title>
    <script src="https://portals-labs.github.io/portals-sdk/portals-sdk.js?v=10005456"></script>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
    <link href="theme.css?v=1742508000" rel="stylesheet">
    <style>
        :root {
            --accent: #FFD700;
            --accent-rgb: 255, 215, 0;
        }

        .shop-frame { width: 540px; max-height: 90vh; }

        /* Upgrade cards */
        .upgrade-card {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            margin-bottom: 8px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: var(--card-radius);
            transition: all 0.2s ease;
        }
        .upgrade-card:hover {
            transform: translateY(-2px);
            border-color: rgba(var(--accent-rgb), 0.3);
            box-shadow: 0 0 18px rgba(var(--accent-rgb), 0.1);
        }
        .upgrade-card.owned {
            border-color: rgba(0,255,136,0.2);
            background: rgba(0,255,136,0.04);
        }

        .u-icon {
            width: 48px; height: 48px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            flex-shrink: 0;
            border: 2px solid;
            box-shadow: 0 0 10px rgba(var(--accent-rgb), 0.08);
        }
        .u-info { flex: 1; min-width: 0; }
        .u-name {
            font-family: var(--font-display);
            font-size: 15px;
            color: #E0E0E0;
            text-shadow: 1px 1px 0 rgba(0,0,0,0.4);
        }
        .u-tier {
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 1px 8px;
            border-radius: 999px;
            display: inline-block;
            margin-left: 6px;
            vertical-align: middle;
        }
        .u-desc {
            font-size: 11px;
            font-weight: 700;
            color: rgba(255,255,255,0.4);
            margin-top: 2px;
        }

        /* Action buttons */
        .u-btn {
            padding: 8px 16px;
            border: 2px solid;
            border-radius: 12px;
            font-family: var(--font-display);
            font-size: 13px;
            cursor: pointer;
            box-shadow: 0 4px 0 rgba(0,0,0,0.25);
            transition: transform 0.15s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.15s;
            flex-shrink: 0;
            text-shadow: 1px 1px 0 rgba(0,0,0,0.2);
        }
        .u-btn:hover { transform: scale(1.05) translateY(-2px); box-shadow: 0 6px 0 rgba(0,0,0,0.2), 0 0 12px rgba(var(--accent-rgb),0.12); }
        .u-btn:active { transform: scale(0.92) translateY(3px); box-shadow: 0 1px 0 rgba(0,0,0,0.2); transition-duration: 0.05s; }

        .panel { display: none; }
        .panel.active { display: block; }

        /* Tier colors — glass versions */
        .tier-common { background: rgba(223,230,233,0.12); color: #A0A0B0; }
        .tier-rare { background: rgba(0,229,255,0.15); color: var(--neon-cyan); }
        .tier-epic { background: linear-gradient(135deg, rgba(180,77,255,0.2), rgba(108,92,231,0.2)); color: var(--neon-purple); }
        .tier-legendary { background: linear-gradient(135deg, rgba(255,215,0,0.2), rgba(255,165,0,0.2)); color: var(--neon-gold); }
        .tier-mythic { background: linear-gradient(135deg, rgba(255,45,120,0.2), rgba(238,90,36,0.2)); color: var(--neon-red); }
        .tier-god { background: linear-gradient(135deg, rgba(255,71,87,0.2), rgba(196,69,105,0.2)); color: #FF4757; }
        .tier-secret { background: linear-gradient(135deg, rgba(0,229,255,0.15), rgba(108,92,231,0.15)); color: var(--neon-cyan); }
        .tier-og { background: linear-gradient(135deg, rgba(44,0,62,0.4), rgba(102,0,204,0.3)); color: #DDA0DD; }

        /* Icon background colors — glass versions */
        .icon-beach { background: rgba(255,234,167,0.15); border-color: rgba(212,167,106,0.4); }
        .icon-meadow { background: rgba(152,251,152,0.12); border-color: rgba(96,192,96,0.4); }
        .icon-forest { background: rgba(34,139,34,0.2); border-color: rgba(26,107,26,0.5); }
        .icon-jungle { background: rgba(46,139,87,0.2); border-color: rgba(30,107,58,0.5); }
        .icon-cave { background: rgba(70,130,180,0.2); border-color: rgba(48,96,144,0.5); }
        .icon-crystal { background: rgba(0,229,255,0.15); border-color: rgba(0,160,176,0.4); }
        .icon-boss { background: rgba(255,68,68,0.2); border-color: rgba(204,32,32,0.5); }
        .icon-volcano { background: rgba(255,69,0,0.2); border-color: rgba(204,48,0,0.5); }
        .icon-ruins { background: rgba(255,216,102,0.15); border-color: rgba(153,102,0,0.5); }
        .icon-sky { background: rgba(147,112,219,0.2); border-color: rgba(106,64,176,0.5); }
        .icon-void { background: rgba(102,0,204,0.25); border-color: rgba(68,0,170,0.5); }
        .icon-floor { background: rgba(116,185,255,0.15); border-color: rgba(74,144,192,0.4); }
    </style>
</head>
<body>
    <div class="shop-frame">
        <div class="shop-header">
            <h1>UPGRADES</h1>
            <div class="gold-badge" id="gold-display"><img src="cash.png" style="height:18px;vertical-align:middle;margin-right:4px">0</div>
            <div class="close-x" onclick="closeShop()">X</div>
        </div>

        <div class="tabs">
            <div class="tab active" data-tab="zones" onclick="switchTab('zones')">
                <span class="tab-icon">&#x1F30D;</span>Zones
            </div>
            <div class="tab" data-tab="floors" onclick="switchTab('floors')">
                <span class="tab-icon">&#x1F3E2;</span>Floors
            </div>
        </div>

        <div class="shop-body">
            <div class="panel active" id="panel-zones"></div>
            <div class="panel" id="panel-floors"></div>
        </div>
    </div>

    <script>
        const sdk = typeof PortalsSdk !== 'undefined' ? PortalsSdk : null;

        // ---- SOUND SYSTEM ----
        var _mp3Sounds = {};
        (function() {
            var files = { purchase: 'purchase.mp3', click: 'click.mp3', levelup: 'levelup.mp3', talent: 'talent.mp3', uipop: 'ui-pop.mp3' };
            for (var k in files) { var a = new Audio(files[k]); a.preload = 'auto'; a.volume = (k === 'click') ? 0.5 : 0.3; _mp3Sounds[k] = a; }
        })();
        function playSound(type) { var s = _mp3Sounds[type]; if (s) { s.currentTime = 0; s.play().catch(function(){}); } }
        function spawnSpendParticles(count) {
            count = count || 6;
            var badge = document.getElementById('gold-display');
            if (!badge) return;
            badge.style.position = 'relative';
            for (var i = 0; i < count; i++) {
                (function(idx) {
                    setTimeout(function() {
                        var p = document.createElement('div');
                        p.className = 'spend-particle';
                        p.textContent = '-$';
                        var dx = (Math.random() - 0.5) * 80;
                        var dy = -(20 + Math.random() * 50);
                        p.style.setProperty('--dx', dx + 'px');
                        p.style.setProperty('--dy', dy + 'px');
                        p.style.left = (Math.random() * 60) + '%';
                        p.style.top = '0px';
                        badge.appendChild(p);
                        setTimeout(function() { if (p.parentNode) p.remove(); }, 1100);
                    }, idx * 50);
                })(i);
            }
        }

        const ZONES = [
            { id:'beach_zone', name:'Beach Zone', tier:'Common', tierClass:'tier-common', iconClass:'icon-beach', cost:0, icon:'\u{1F3D6}', gold:'$1-3/s', reqFloor:1, taskName:null },
            { id:'meadow', name:'Meadow', tier:'Common', tierClass:'tier-common', iconClass:'icon-meadow', cost:0, icon:'\u{1F33F}', gold:'$1-3/s', reqFloor:1, taskName:null },
            { id:'forest_zone', name:'Forest Zone', tier:'Rare', tierClass:'tier-rare', iconClass:'icon-forest', cost:2000, icon:'\u{1F332}', gold:'$5-10/s', reqFloor:2, taskName:'unlock_forest_zone' },
            { id:'jungle_zone', name:'Jungle Zone', tier:'Rare', tierClass:'tier-rare', iconClass:'icon-jungle', cost:2000, icon:'\u{1F334}', gold:'$5-10/s', reqFloor:2, taskName:'unlock_jungle_zone' },
            { id:'cave_zone', name:'Cave Zone', tier:'Epic', tierClass:'tier-epic', iconClass:'icon-cave', cost:8000, icon:'\u{1FAA8}', gold:'$10-20/s', reqFloor:3, taskName:'unlock_cave_zone' },
            { id:'crystal_cove', name:'Crystal Cove', tier:'Epic', tierClass:'tier-epic', iconClass:'icon-crystal', cost:8000, icon:'\u{1F48E}', gold:'$10-20/s', reqFloor:3, taskName:'unlock_crystal_cove' },
            { id:'boss_arena', name:'Boss Arena', tier:'Legendary', tierClass:'tier-legendary', iconClass:'icon-boss', cost:25000, icon:'\u{2694}', gold:'$20-40/s', reqFloor:3, taskName:'unlock_boss_arena' },
            { id:'volcano_zone', name:'Volcano Zone', tier:'Mythic', tierClass:'tier-mythic', iconClass:'icon-volcano', cost:75000, icon:'\u{1F30B}', gold:'$40-80/s', reqFloor:4, taskName:'unlock_volcano_zone' },
            { id:'ancient_ruins', name:'Ancient Ruins', tier:'Brainrot God', tierClass:'tier-god', iconClass:'icon-ruins', cost:200000, icon:'\u{1F3DB}', gold:'$80-150/s', reqFloor:4, rebirth:1, taskName:'unlock_ancient_ruins' },
            { id:'sky_platform', name:'Sky Platform', tier:'Secret', tierClass:'tier-secret', iconClass:'icon-sky', cost:500000, icon:'\u{2601}', gold:'$150-300/s', reqFloor:4, rebirth:2, taskName:'unlock_sky_platform' },
            { id:'the_void', name:'The Void', tier:'OG', tierClass:'tier-og', iconClass:'icon-void', cost:1000000, icon:'\u{1F573}', gold:'$300-500/s', reqFloor:4, rebirth:3, taskName:'unlock_the_void' },
        ];

        const FLOORS = [
            { num:2, cost:1000, slots:10, bonus:'+10% Rare cash', taskName:'unlock_floor_2' },
            { num:3, cost:5000, slots:10, bonus:'+10% Epic cash', taskName:'unlock_floor_3' },
            { num:4, cost:20000, slots:10, bonus:'+15% Legendary+ cash', taskName:'unlock_floor_4' },
        ];

        let state = {
            gold: 0,
            unlockedZones: ['Beach Zone', 'Meadow'],
            unlockedFloors: [1],
            rebirth: 0,
            hasBase: false,
            baseId: 0
        };

        function fmt(n) {
            if (n >= 1e9) return (n/1e9).toFixed(1)+'B';
            if (n >= 1e6) return (n/1e6).toFixed(1)+'M';
            if (n >= 1e3) return (n/1e3).toFixed(1)+'K';
            return n.toLocaleString();
        }

        function switchTab(tab) {
            playSound('click');
            document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
            document.querySelectorAll('.panel').forEach(p => p.classList.toggle('active', p.id === 'panel-' + tab));
        }

        function renderZones() {
            const el = document.getElementById('panel-zones');
            el.innerHTML = '';
            ZONES.forEach(z => {
                const unlocked = state.unlockedZones.includes(z.name);
                const isFree = z.cost === 0;
                const needsFloor = z.reqFloor && !state.unlockedFloors.includes(z.reqFloor);
                const needsRebirth = z.rebirth && state.rebirth < z.rebirth;
                const canBuy = !unlocked && !isFree && !needsFloor && !needsRebirth && state.gold >= z.cost;

                let btnClass, btnText;
                if (unlocked || isFree) { btnClass = 'btn-done'; btnText = 'UNLOCKED'; }
                else if (needsFloor) { btnClass = 'btn-locked'; btnText = 'Floor ' + z.reqFloor; }
                else if (needsRebirth) { btnClass = 'btn-locked'; btnText = 'Rebirth ' + z.rebirth; }
                else if (canBuy) { btnClass = 'btn-buy'; btnText = '$' + fmt(z.cost); }
                else { btnClass = 'btn-locked'; btnText = '$' + fmt(z.cost); }

                let reqText = '';
                if (z.reqFloor > 1) reqText += 'Requires Floor ' + z.reqFloor;
                if (z.rebirth) reqText += (reqText ? ' &bull; ' : '') + 'Requires Rebirth ' + z.rebirth;

                const card = document.createElement('div');
                card.className = 'upgrade-card' + (unlocked || isFree ? ' owned' : '');
                card.innerHTML = `
                    <div class="u-icon ${z.iconClass}">${z.icon}</div>
                    <div class="u-info">
                        <div class="u-name">${z.name} <span class="u-tier ${z.tierClass}">${z.tier}</span></div>
                        <div class="u-desc">Brainrots: ${z.gold}${reqText ? ' &bull; ' + reqText : ''}</div>
                    </div>
                    <button class="u-btn ${btnClass}" data-zone="${z.name}">${btnText}</button>
                `;
                el.appendChild(card);
            });
            el.querySelectorAll('.u-btn.btn-buy').forEach(btn => {
                btn.addEventListener('click', () => buyZone(btn.dataset.zone));
            });
        }

        function renderFloors() {
            const el = document.getElementById('panel-floors');
            el.innerHTML = '';
            FLOORS.forEach(f => {
                const unlocked = state.unlockedFloors.includes(f.num);
                const canBuy = !unlocked && state.gold >= f.cost;

                let btnClass, btnText;
                if (unlocked) { btnClass = 'btn-done'; btnText = 'UNLOCKED'; }
                else if (canBuy) { btnClass = 'btn-buy'; btnText = '$' + fmt(f.cost); }
                else { btnClass = 'btn-locked'; btnText = '$' + fmt(f.cost); }

                const card = document.createElement('div');
                card.className = 'upgrade-card' + (unlocked ? ' owned' : '');
                card.innerHTML = `
                    <div class="u-icon icon-floor">&#x1F3E2;</div>
                    <div class="u-info">
                        <div class="u-name">Floor ${f.num}</div>
                        <div class="u-desc">${f.slots} pedestal slots &bull; ${f.bonus}</div>
                    </div>
                    <button class="u-btn ${btnClass}" data-floor="${f.num}">${btnText}</button>
                `;
                el.appendChild(card);
            });
            el.querySelectorAll('.u-btn.btn-buy').forEach(btn => {
                btn.addEventListener('click', () => buyFloor(parseInt(btn.dataset.floor)));
            });
        }

        function renderAll() {
            document.getElementById('gold-display').innerHTML = '<img src="cash.png" style="height:18px;vertical-align:middle;margin-right:4px">' + fmt(state.gold);
            renderZones();
            renderFloors();
        }

        function buyZone(zoneName) {
            const z = ZONES.find(x => x.name === zoneName);
            if (!z || !z.taskName || state.unlockedZones.includes(z.name) || state.gold < z.cost) return;
            if (z.reqFloor && !state.unlockedFloors.includes(z.reqFloor)) return;
            if (z.rebirth && state.rebirth < z.rebirth) return;
            state.gold -= z.cost;
            state.unlockedZones.push(z.name);
            renderAll();
            playSound('talent');
            spawnSpendParticles(8);
            if (sdk) {
                sdk.sendMessageToUnity(JSON.stringify({
                    TaskName: z.taskName,
                    TaskTargetState: 'SetNotActiveToActive'
                }));
            }
            toast(z.name + ' Unlocked!');
        }

        function buyFloor(floorNum) {
            const f = FLOORS.find(x => x.num === floorNum);
            if (!f || state.unlockedFloors.includes(f.num) || state.gold < f.cost) return;
            if (state.baseId <= 0) { toast('Waiting for base assignment...'); return; }
            state.gold -= f.cost;
            state.unlockedFloors.push(f.num);
            renderAll();
            playSound('levelup');
            spawnSpendParticles(8);
            if (sdk) {
                var taskName = f.taskName + '_b' + state.baseId;
                sdk.sendMessageToUnity(JSON.stringify({
                    TaskName: taskName,
                    TaskTargetState: 'SetNotActiveToActive'
                }));
            }
            toast('Floor ' + f.num + ' Unlocked!');
        }

        function toast(text) {
            const old = document.querySelector('.toast'); if(old)old.remove();
            const t = document.createElement('div'); t.className = 'toast'; t.textContent = text;
            document.body.appendChild(t); setTimeout(()=>{if(t.parentNode)t.remove();},2500);
        }

        function closeShop() { playSound('click'); if(sdk){sdk.focusGameKeyboard();sdk.closeIframe();} }

        /** Parse a variable value from Portals |var| interpolation. */
        function parseVarValue(raw) {
            if (raw === undefined || raw === null || raw === '') return 0;
            raw = String(raw).trim();
            const num = Number(raw);
            if (!isNaN(num)) return num;
            try {
                const parsed = JSON.parse(raw);
                if (typeof parsed === 'number') return parsed;
                if (typeof parsed === 'object' && parsed !== null) {
                    const vals = Object.values(parsed);
                    return vals.length > 0 ? (Number(vals[0]) || 0) : 0;
                }
            } catch(e) {}
            // Fallback: extract number after = or : (handles Portals {"name"=1} format)
            var m = raw.match(/[=:](\d+\.?\d*)/);
            if (m) return parseFloat(m[1]) || 0;
            return 0;
        }

        // --- Message deduplication ---
        let _lastMsgId = '', _lastMsgTime = 0;
        function processMessage(msg) {
            const now = Date.now();
            const msgId = msg + '_' + Math.floor(now / 100);
            if (msgId === _lastMsgId && now - _lastMsgTime < 200) return;
            _lastMsgId = msgId; _lastMsgTime = now;
            handleMessage(msg);
        }

        function handleMessage(msg) {
            console.log('[UpgradeShop] Received:', msg);

            // base:N — direct base assignment from claim trigger
            if (msg.startsWith('base:')) {
                var id = parseInt(msg.substring(5)) || 0;
                if (id > 0) { state.baseId = id; state.hasBase = true; renderAll(); }
                return;
            }

            // inv: format — "inv:Gold=|Gold|&Rebirth=|Rebirth|&..."
            if (msg.startsWith('inv:')) {
                const payload = msg.substring(4);
                const pairs = payload.split('&');
                for (const pair of pairs) {
                    const eq = pair.indexOf('=');
                    if (eq < 0) continue;
                    const key = pair.substring(0, eq).trim();
                    const val = parseVarValue(pair.substring(eq + 1));
                    if (key === 'Gold') state.gold = val;
                    else if (key === 'Rebirth') state.rebirth = val;
                    else if (key === 'player_Base_num') { state.baseId = val; state.hasBase = val > 0; }
                }
                // Sync unlock state from server variables
                var ZONE_VAR_MAP = {
                    'Zone_Forest_Zone_Unlocked': 'Forest Zone',
                    'Zone_Jungle_Zone_Unlocked': 'Jungle Zone',
                    'Zone_Cave_Zone_Unlocked': 'Cave Zone',
                    'Zone_Crystal_Cove_Unlocked': 'Crystal Cove',
                    'Zone_Boss_Arena_Unlocked': 'Boss Arena',
                    'Zone_Volcano_Zone_Unlocked': 'Volcano Zone',
                    'Zone_Ancient_Ruins_Unlocked': 'Ancient Ruins',
                    'Zone_Sky_Platform_Unlocked': 'Sky Platform',
                    'Zone_The_Void_Unlocked': 'The Void'
                };
                var FLOOR_VAR_MAP = {
                    'Floor_2_Unlocked': 2,
                    'Floor_3_Unlocked': 3,
                    'Floor_4_Unlocked': 4
                };
                for (const pair of pairs) {
                    const eq = pair.indexOf('=');
                    if (eq < 0) continue;
                    const key = pair.substring(0, eq).trim();
                    const val = parseVarValue(pair.substring(eq + 1));
                    if (ZONE_VAR_MAP[key] && val >= 1 && !state.unlockedZones.includes(ZONE_VAR_MAP[key])) {
                        state.unlockedZones.push(ZONE_VAR_MAP[key]);
                    }
                    if (FLOOR_VAR_MAP[key] && val >= 1 && !state.unlockedFloors.includes(FLOOR_VAR_MAP[key])) {
                        state.unlockedFloors.push(FLOOR_VAR_MAP[key]);
                    }
                }
                renderAll();
                return;
            }

            // gold: format
            if (msg.startsWith('gold:')) {
                state.gold = parseFloat(msg.substring(5)) || 0;
                renderAll();
                return;
            }

            // JSON format
            try {
                const data = JSON.parse(msg);
                if (data.gold !== undefined) state.gold = parseFloat(data.gold) || 0;
                if (data.unlockedZones) state.unlockedZones = data.unlockedZones;
                if (data.unlockedFloors) state.unlockedFloors = data.unlockedFloors;
                if (data.rebirth !== undefined) state.rebirth = parseInt(data.rebirth) || 0;
                if (data.hasBase !== undefined) state.hasBase = data.hasBase;
                renderAll();
            } catch(e) {}
        }

        // --- SDK message listener ---
        if (sdk) {
            sdk.setMessageListener(function(msg) { processMessage(msg); });
        }
        window.addEventListener('message', function(event) {
            if (event.data && typeof event.data === 'string') processMessage(event.data);
            else if (event.data && event.data.portalsMessage) processMessage(event.data.portalsMessage);
        });

        // --- Keyboard refocus ---
        function _doFocusGame() {
            if (typeof PortalsSdk !== 'undefined' && PortalsSdk.focusGameKeyboard) PortalsSdk.focusGameKeyboard();
        }
        document.addEventListener('click', function(e) {
            if (document.hidden) return;
            if (e && e.target) {
                var tag = e.target.tagName;
                if (tag === 'BUTTON' || tag === 'SELECT' || tag === 'INPUT') return;
                if (e.target.closest && e.target.closest('button, select')) return;
            }
            _doFocusGame();
        });
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') { e.preventDefault(); closeShop(); return; }
            if (!document.hidden) _doFocusGame();
        });
        document.addEventListener('mouseup', function(e) {
            if (e && e.target) {
                var tag = e.target.tagName;
                if (tag === 'BUTTON' || tag === 'SELECT' || tag === 'INPUT') return;
                if (e.target.closest && e.target.closest('button, select')) return;
            }
            setTimeout(_doFocusGame, 50);
        });
        _doFocusGame();
        setTimeout(_doFocusGame, 100);
        setTimeout(_doFocusGame, 300);

        // Read baseId from SDK storage (set by HUD on claim)
        if (sdk && sdk.storageGet) {
            sdk.storageGet('baseId', function(val) {
                if (val) {
                    var id = parseInt(val) || 0;
                    if (id > 0) { state.baseId = id; state.hasBase = true; renderAll(); }
                }
            });
        }

        // Also request variable sync from Portals
        function requestSync() {
            if (!sdk) return;
            sdk.sendMessageToUnity(JSON.stringify({
                TaskName: 'hud_sync',
                TaskTargetState: 'SetAnyToActive'
            }));
        }
        if (sdk) {
            setTimeout(requestSync, 300);
            setTimeout(requestSync, 1500);
        }

        const params = new URLSearchParams(window.location.search);
        if (params.get('gold')) state.gold = parseFloat(params.get('gold')) || 0;
        if (params.get('rebirth')) state.rebirth = parseInt(params.get('rebirth')) || 0;
        if (params.get('hasBase')) state.hasBase = params.get('hasBase') === 'true';
        if (params.get('tab')) switchTab(params.get('tab'));

        renderAll();

        // Dev mode preview
        if (!sdk) {
            state.gold = 150000;
            state.unlockedZones = ['Beach Zone', 'Meadow', 'Forest Zone', 'Jungle Zone'];
            state.unlockedFloors = [1, 2];
            state.rebirth = 0;
            state.hasBase = true;
            renderAll();
        }
    </script>
