<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Upgrades</title>
    <script src="https://portals-labs.github.io/portals-sdk/portals-sdk.js?v=10005456"></script>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
    <style>
        html, body {
            margin: 0; padding: 0;
            background: rgba(0,0,0,0.5);
            overflow: hidden;
            font-family: 'Nunito', sans-serif;
            user-select: none;
        }

        .shop-frame {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 540px;
            max-height: 90vh;
            background: white;
            border: 5px solid #2176AA;
            border-radius: 24px;
            box-shadow: 0 10px 0 rgba(0,0,0,0.15), 0 15px 40px rgba(0,0,0,0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .shop-header {
            background: linear-gradient(180deg, #74B9FF 0%, #3498DB 100%);
            padding: 14px 20px;
            text-align: center;
            position: relative;
            flex-shrink: 0;
        }
        .shop-header h1 {
            font-family: 'Luckiest Guy', cursive;
            font-size: 30px;
            color: white;
            margin: 0;
            text-shadow: 3px 3px 0 rgba(0,0,0,0.2);
        }
        .gold-badge {
            display: inline-block;
            margin-top: 6px;
            padding: 4px 16px;
            border-radius: 20px;
            background: linear-gradient(180deg, #FFE44D, #FFB800);
            border: 3px solid #CC8800;
            box-shadow: 0 2px 0 rgba(0,0,0,0.15);
            font-family: 'Luckiest Guy', cursive;
            font-size: 15px;
            color: #4A2800;
        }
        .close-x {
            position: absolute;
            top: 8px; right: 12px;
            width: 32px; height: 32px;
            border-radius: 50%;
            background: linear-gradient(180deg, #FF7675, #D63031);
            border: 3px solid #A02020;
            box-shadow: 0 2px 0 rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-family: 'Luckiest Guy', cursive;
            font-size: 18px;
            color: white;
            text-shadow: 1px 1px 0 rgba(0,0,0,0.3);
        }
        .close-x:active { transform: translateY(2px); box-shadow: none; }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 0;
            background: #E8EEF2;
            flex-shrink: 0;
        }
        .tab {
            flex: 1;
            padding: 10px 6px;
            text-align: center;
            font-family: 'Luckiest Guy', cursive;
            font-size: 13px;
            cursor: pointer;
            color: #95A5A6;
            border-bottom: 4px solid transparent;
            transition: all 0.15s;
        }
        .tab:hover { color: #636E72; }
        .tab.active {
            color: #2C3E50;
            border-bottom-color: #3498DB;
            background: white;
        }
        .tab .tab-icon { font-size: 18px; display: block; margin-bottom: 2px; }

        /* Body */
        .shop-body {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            background: #F0F3F5;
        }
        .shop-body::-webkit-scrollbar { width: 6px; }
        .shop-body::-webkit-scrollbar-thumb { background: #B2BEC3; border-radius: 3px; }

        .panel { display: none; }
        .panel.active { display: block; }

        /* Upgrade cards */
        .upgrade-card {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            margin-bottom: 8px;
            background: white;
            border: 3px solid #DFE6E9;
            border-radius: 16px;
            box-shadow: 0 3px 0 rgba(0,0,0,0.06);
            transition: all 0.15s;
        }
        .upgrade-card:hover { transform: translateY(-2px); border-color: #74B9FF; }
        .upgrade-card.owned {
            border-color: #2ECC40;
            background: linear-gradient(180deg, #EFFFEF 0%, #E0FFE0 100%);
        }
        .u-icon {
            width: 48px; height: 48px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            flex-shrink: 0;
            border: 3px solid;
            box-shadow: 0 2px 0 rgba(0,0,0,0.1);
        }
        .u-info { flex: 1; min-width: 0; }
        .u-name {
            font-family: 'Luckiest Guy', cursive;
            font-size: 15px;
            color: #2C3E50;
        }
        .u-tier {
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 1px 8px;
            border-radius: 6px;
            display: inline-block;
            margin-left: 6px;
            vertical-align: middle;
        }
        .u-desc {
            font-size: 11px;
            font-weight: 700;
            color: #636E72;
            margin-top: 2px;
        }

        /* Action buttons */
        .u-btn {
            padding: 8px 16px;
            border: 3px solid;
            border-radius: 12px;
            font-family: 'Luckiest Guy', cursive;
            font-size: 13px;
            cursor: pointer;
            box-shadow: 0 3px 0 rgba(0,0,0,0.12);
            transition: all 0.1s;
            flex-shrink: 0;
            text-shadow: 1px 1px 0 rgba(0,0,0,0.15);
        }
        .u-btn:active { transform: translateY(2px); box-shadow: none; }
        .btn-buy {
            background: linear-gradient(180deg, #FFE44D, #FFB800);
            border-color: #CC8800;
            color: #4A2800;
        }
        .btn-done {
            background: linear-gradient(180deg, #6EF06E, #2ECC40);
            border-color: #1FA030;
            color: #0A3A0A;
            cursor: default;
        }
        .btn-locked {
            background: linear-gradient(180deg, #DFE6E9, #B2BEC3);
            border-color: #95A5A6;
            color: #95A5A6;
            cursor: not-allowed;
            text-shadow: none;
        }

        /* Tier colors */
        .tier-common { background: #DFE6E9; color: #636E72; }
        .tier-rare { background: #74B9FF; color: white; }
        .tier-epic { background: linear-gradient(135deg, #A29BFE, #6C5CE7); color: white; }
        .tier-legendary { background: linear-gradient(135deg, #FFD700, #FFA500); color: #4A2800; }
        .tier-mythic { background: linear-gradient(135deg, #FF6B6B, #EE5A24); color: white; }
        .tier-god { background: linear-gradient(135deg, #FF4757, #C44569); color: white; }
        .tier-secret { background: linear-gradient(135deg, #A29BFE, #6C5CE7); color: white; }
        .tier-og { background: linear-gradient(135deg, #2C003E, #6600CC); color: #DDA0DD; }

        /* Icon background colors */
        .icon-beach { background: linear-gradient(180deg, #FFEAA7, #F5DEB3); border-color: #D4A76A; }
        .icon-meadow { background: linear-gradient(180deg, #B8F0B8, #98FB98); border-color: #60C060; }
        .icon-forest { background: linear-gradient(180deg, #55C855, #228B22); border-color: #1A6B1A; }
        .icon-jungle { background: linear-gradient(180deg, #70D08A, #2E8B57); border-color: #1E6B3A; }
        .icon-cave { background: linear-gradient(180deg, #88B8E8, #4682B4); border-color: #306090; }
        .icon-crystal { background: linear-gradient(180deg, #80F0FF, #00E5FF); border-color: #00A0B0; }
        .icon-boss { background: linear-gradient(180deg, #FF8888, #FF4444); border-color: #CC2020; }
        .icon-volcano { background: linear-gradient(180deg, #FF8844, #FF4500); border-color: #CC3000; }
        .icon-ruins { background: linear-gradient(180deg, #FFD866, #CC8800); border-color: #996600; }
        .icon-sky { background: linear-gradient(180deg, #C0A8FF, #9370DB); border-color: #6A40B0; }
        .icon-void { background: linear-gradient(180deg, #9933FF, #6600CC); border-color: #4400AA; }
        .icon-floor { background: linear-gradient(180deg, #A8D8EA, #74B9FF); border-color: #4A90C0; }
        .icon-income { background: linear-gradient(180deg, #FFE44D, #FFB800); border-color: #CC8800; }

        /* Rebirth panel */
        .rebirth-panel {
            background: white;
            border: 4px solid #D63031;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 0 rgba(214,48,49,0.2);
        }
        .rebirth-panel h2 {
            font-family: 'Luckiest Guy', cursive;
            font-size: 26px;
            color: #D63031;
            margin: 0 0 4px;
            text-shadow: 2px 2px 0 rgba(0,0,0,0.1);
        }
        .rebirth-panel .sub {
            font-size: 12px; font-weight: 800; color: #636E72;
        }
        .rebirth-cost-badge {
            display: inline-block;
            margin: 14px 0;
            padding: 8px 24px;
            border-radius: 20px;
            background: linear-gradient(180deg, #FFE44D, #FFB800);
            border: 3px solid #CC8800;
            box-shadow: 0 3px 0 rgba(0,0,0,0.15);
            font-family: 'Luckiest Guy', cursive;
            font-size: 20px;
            color: #4A2800;
        }
        .rebirth-reward {
            display: inline-block;
            padding: 6px 18px;
            border-radius: 14px;
            background: linear-gradient(180deg, #E8FFE8, #D4FFD4);
            border: 3px solid #2ECC40;
            font-family: 'Luckiest Guy', cursive;
            font-size: 13px;
            color: #0A5A0A;
            margin: 8px 0;
        }
        .rebirth-progress {
            margin: 12px 0;
            font-size: 11px; font-weight: 800; color: #95A5A6;
        }
        .rebirth-bar-track {
            width: 80%;
            margin: 6px auto;
            height: 14px;
            background: #DFE6E9;
            border-radius: 7px;
            border: 2px solid #B2BEC3;
            overflow: hidden;
        }
        .rebirth-bar-fill {
            height: 100%;
            border-radius: 7px;
            background: linear-gradient(90deg, #FF7675, #D63031);
            transition: width 0.4s;
        }
        .rebirth-btn {
            display: inline-block;
            margin-top: 14px;
            padding: 12px 36px;
            border: 3px solid;
            border-radius: 16px;
            font-family: 'Luckiest Guy', cursive;
            font-size: 18px;
            cursor: pointer;
            box-shadow: 0 4px 0 rgba(0,0,0,0.15);
            transition: all 0.1s;
            text-shadow: 1px 1px 0 rgba(0,0,0,0.2);
        }
        .rebirth-btn:active { transform: translateY(3px); box-shadow: none; }
        .rebirth-btn.ready {
            background: linear-gradient(180deg, #FF7675, #D63031);
            border-color: #A02020;
            color: white;
        }
        .rebirth-btn.not-ready {
            background: linear-gradient(180deg, #DFE6E9, #B2BEC3);
            border-color: #95A5A6;
            color: #95A5A6;
            cursor: not-allowed;
            text-shadow: none;
        }
        .rebirth-stars {
            font-size: 28px;
            margin: 6px 0;
        }
        .rebirth-max {
            font-family: 'Luckiest Guy', cursive;
            font-size: 14px;
            color: #2ECC40;
            margin-top: 12px;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 24px;
            border-radius: 14px;
            background: linear-gradient(180deg, #FFE44D, #FFB800);
            border: 3px solid #CC8800;
            box-shadow: 0 3px 0 rgba(0,0,0,0.2);
            font-family: 'Luckiest Guy', cursive;
            font-size: 16px;
            color: #4A2800;
            animation: pop 0.3s ease, fadeOut 0.3s ease 2s forwards;
            z-index: 30;
        }
        @keyframes pop { 0%{transform:translateX(-50%) scale(0.5);opacity:0} 70%{transform:translateX(-50%) scale(1.1)} 100%{transform:translateX(-50%) scale(1);opacity:1} }
        @keyframes fadeOut { to{opacity:0} }
    </style>
</head>
<body>
    <div class="shop-frame">
        <div class="shop-header">
            <h1>UPGRADES</h1>
            <div class="gold-badge" id="gold-display">&#x1F4B0; 0</div>
            <div class="close-x" onclick="closeShop()">X</div>
        </div>

        <div class="tabs">
            <div class="tab active" data-tab="zones" onclick="switchTab('zones')">
                <span class="tab-icon">&#x1F30D;</span>Zones
            </div>
            <div class="tab" data-tab="floors" onclick="switchTab('floors')">
                <span class="tab-icon">&#x1F3E2;</span>Floors
            </div>
            <div class="tab" data-tab="income" onclick="switchTab('income')">
                <span class="tab-icon">&#x1F4B0;</span>Income
            </div>
            <div class="tab" data-tab="rebirth" onclick="switchTab('rebirth')">
                <span class="tab-icon">&#x1F525;</span>Rebirth
            </div>
        </div>

        <div class="shop-body">
            <div class="panel active" id="panel-zones"></div>
            <div class="panel" id="panel-floors"></div>
            <div class="panel" id="panel-income"></div>
            <div class="panel" id="panel-rebirth"></div>
        </div>
    </div>

    <script>
        const sdk = typeof PortalsSdk !== 'undefined' ? PortalsSdk : null;

        const ZONES = [
            { id:'beach_zone', name:'Beach Zone', tier:'Common', tierClass:'tier-common', iconClass:'icon-beach', cost:0, icon:'\u{1F3D6}', gold:'1-3g' },
            { id:'meadow', name:'Meadow', tier:'Common', tierClass:'tier-common', iconClass:'icon-meadow', cost:0, icon:'\u{1F33F}', gold:'1-3g' },
            { id:'forest_zone', name:'Forest Zone', tier:'Rare', tierClass:'tier-rare', iconClass:'icon-forest', cost:2000, icon:'\u{1F332}', gold:'5-10g' },
            { id:'jungle_zone', name:'Jungle Zone', tier:'Rare', tierClass:'tier-rare', iconClass:'icon-jungle', cost:2000, icon:'\u{1F334}', gold:'5-10g' },
            { id:'cave_zone', name:'Cave Zone', tier:'Epic', tierClass:'tier-epic', iconClass:'icon-cave', cost:8000, icon:'\u{1FAA8}', gold:'10-20g' },
            { id:'crystal_cove', name:'Crystal Cove', tier:'Epic', tierClass:'tier-epic', iconClass:'icon-crystal', cost:8000, icon:'\u{1F48E}', gold:'10-20g' },
            { id:'boss_arena', name:'Boss Arena', tier:'Legendary', tierClass:'tier-legendary', iconClass:'icon-boss', cost:25000, icon:'\u{2694}', gold:'20-40g' },
            { id:'volcano_zone', name:'Volcano Zone', tier:'Mythic', tierClass:'tier-mythic', iconClass:'icon-volcano', cost:75000, icon:'\u{1F30B}', gold:'40-80g' },
            { id:'ancient_ruins', name:'Ancient Ruins', tier:'Brainrot God', tierClass:'tier-god', iconClass:'icon-ruins', cost:200000, icon:'\u{1F3DB}', gold:'80-150g', rebirth:1 },
            { id:'sky_platform', name:'Sky Platform', tier:'Secret', tierClass:'tier-secret', iconClass:'icon-sky', cost:500000, icon:'\u{2601}', gold:'150-300g', rebirth:2 },
            { id:'the_void', name:'The Void', tier:'OG', tierClass:'tier-og', iconClass:'icon-void', cost:1000000, icon:'\u{1F573}', gold:'300-500g', rebirth:3 },
        ];

        const FLOORS = [
            { num:2, cost:1000, slots:10, bonus:'+10% Rare gold' },
            { num:3, cost:5000, slots:10, bonus:'+10% Epic gold' },
            { num:4, cost:20000, slots:10, bonus:'+15% Legendary+ gold' },
        ];

        const INCOME_UPGRADES = [
            { level:1, cost:10000, multiplier:1.1, desc:'+10% Income' },
            { level:2, cost:50000, multiplier:1.25, desc:'+25% Income' },
            { level:3, cost:200000, multiplier:1.5, desc:'+50% Income' },
            { level:4, cost:500000, multiplier:2.0, desc:'2x Income' },
            { level:5, cost:1500000, multiplier:3.0, desc:'3x Income' },
        ];

        const REBIRTH_COSTS = [500000, 2000000, 10000000];
        const REBIRTH_BONUSES = ['1.5x Permanent Income', '2x Permanent + Ancient Ruins', '3x Permanent + Sky + Void'];

        let state = {
            gold: 0,
            unlockedZones: ['Beach Zone', 'Meadow'],
            unlockedFloors: [1],
            incomeLevel: 0,
            rebirth: 0,
            hasBase: false
        };

        function fmt(n) {
            if (n >= 1e9) return (n/1e9).toFixed(1)+'B';
            if (n >= 1e6) return (n/1e6).toFixed(1)+'M';
            if (n >= 1e3) return (n/1e3).toFixed(1)+'K';
            return n.toLocaleString();
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
            document.querySelectorAll('.panel').forEach(p => p.classList.toggle('active', p.id === 'panel-' + tab));
        }

        function renderZones() {
            const el = document.getElementById('panel-zones');
            el.innerHTML = '';
            ZONES.forEach(z => {
                const unlocked = state.unlockedZones.includes(z.name);
                const canBuy = !unlocked && state.gold >= z.cost && z.cost > 0;
                const isFree = z.cost === 0;
                const needsRebirth = z.rebirth && state.rebirth < z.rebirth;

                let btnClass, btnText;
                if (unlocked || isFree) { btnClass = 'btn-done'; btnText = 'UNLOCKED'; }
                else if (needsRebirth) { btnClass = 'btn-locked'; btnText = 'Rebirth ' + z.rebirth; }
                else if (canBuy) { btnClass = 'btn-buy'; btnText = fmt(z.cost) + 'g'; }
                else { btnClass = 'btn-locked'; btnText = fmt(z.cost) + 'g'; }

                const card = document.createElement('div');
                card.className = 'upgrade-card' + (unlocked || isFree ? ' owned' : '');
                card.innerHTML = `
                    <div class="u-icon ${z.iconClass}">${z.icon}</div>
                    <div class="u-info">
                        <div class="u-name">${z.name} <span class="u-tier ${z.tierClass}">${z.tier}</span></div>
                        <div class="u-desc">Brainrots: ${z.gold}/cycle${z.rebirth ? ' &bull; Requires Rebirth '+z.rebirth : ''}</div>
                    </div>
                    <button class="u-btn ${btnClass}" data-zone="${z.name}">${btnText}</button>
                `;
                el.appendChild(card);
            });
            el.querySelectorAll('.u-btn.btn-buy').forEach(btn => {
                btn.addEventListener('click', () => buyZone(btn.dataset.zone));
            });
        }

        function renderFloors() {
            const el = document.getElementById('panel-floors');
            el.innerHTML = '';
            if (!state.hasBase) {
                el.innerHTML = '<div style="text-align:center;padding:30px;"><div style="font-size:40px;margin-bottom:8px;">&#x1F3E0;</div><div style="font-family:Luckiest Guy,cursive;font-size:16px;color:#95A5A6;">Claim a base first!</div></div>';
                return;
            }
            FLOORS.forEach(f => {
                const unlocked = state.unlockedFloors.includes(f.num);
                const canBuy = !unlocked && state.gold >= f.cost;

                let btnClass, btnText;
                if (unlocked) { btnClass = 'btn-done'; btnText = 'UNLOCKED'; }
                else if (canBuy) { btnClass = 'btn-buy'; btnText = fmt(f.cost) + 'g'; }
                else { btnClass = 'btn-locked'; btnText = fmt(f.cost) + 'g'; }

                const card = document.createElement('div');
                card.className = 'upgrade-card' + (unlocked ? ' owned' : '');
                card.innerHTML = `
                    <div class="u-icon icon-floor">&#x1F3E2;</div>
                    <div class="u-info">
                        <div class="u-name">Floor ${f.num}</div>
                        <div class="u-desc">${f.slots} pedestal slots &bull; ${f.bonus}</div>
                    </div>
                    <button class="u-btn ${btnClass}" data-floor="${f.num}">${btnText}</button>
                `;
                el.appendChild(card);
            });
            el.querySelectorAll('.u-btn.btn-buy').forEach(btn => {
                btn.addEventListener('click', () => buyFloor(parseInt(btn.dataset.floor)));
            });
        }

        function renderIncome() {
            const el = document.getElementById('panel-income');
            el.innerHTML = '';
            INCOME_UPGRADES.forEach(u => {
                const owned = state.incomeLevel >= u.level;
                const isNext = state.incomeLevel === u.level - 1;
                const canBuy = isNext && state.gold >= u.cost;

                let btnClass, btnText;
                if (owned) { btnClass = 'btn-done'; btnText = 'OWNED'; }
                else if (canBuy) { btnClass = 'btn-buy'; btnText = fmt(u.cost) + 'g'; }
                else { btnClass = 'btn-locked'; btnText = fmt(u.cost) + 'g'; }

                const card = document.createElement('div');
                card.className = 'upgrade-card' + (owned ? ' owned' : '');
                card.innerHTML = `
                    <div class="u-icon icon-income">&#x1F4B0;</div>
                    <div class="u-info">
                        <div class="u-name">Income Lv.${u.level} <span style="font-family:Luckiest Guy,cursive;font-size:12px;color:#CC8800;margin-left:4px">${u.multiplier}x</span></div>
                        <div class="u-desc">${u.desc} &bull; All base income multiplied</div>
                    </div>
                    <button class="u-btn ${btnClass}" data-level="${u.level}">${btnText}</button>
                `;
                el.appendChild(card);
            });
            el.querySelectorAll('.u-btn.btn-buy').forEach(btn => {
                btn.addEventListener('click', () => buyIncome(parseInt(btn.dataset.level)));
            });
        }

        function renderRebirth() {
            const el = document.getElementById('panel-rebirth');
            const nextRebirth = state.rebirth + 1;
            const maxRebirth = REBIRTH_COSTS.length;

            if (state.rebirth >= maxRebirth) {
                const stars = '\u2B50'.repeat(state.rebirth);
                el.innerHTML = `
                    <div class="rebirth-panel">
                        <div class="rebirth-stars">${stars}</div>
                        <h2>MAX REBIRTH!</h2>
                        <div class="sub">You've reached Rebirth ${state.rebirth}. All zones unlocked.</div>
                        <div class="rebirth-reward" style="margin-top:14px">${REBIRTH_BONUSES[state.rebirth-1]}</div>
                        <div class="rebirth-max">All permanent bonuses active</div>
                    </div>
                `;
                return;
            }

            const cost = REBIRTH_COSTS[state.rebirth];
            const canRebirth = state.gold >= cost;
            const progress = Math.min(100, (state.gold / cost) * 100);
            const stars = state.rebirth > 0 ? '\u2B50'.repeat(state.rebirth) : '';

            el.innerHTML = `
                <div class="rebirth-panel">
                    ${stars ? '<div class="rebirth-stars">' + stars + '</div>' : ''}
                    <h2>REBIRTH ${nextRebirth}</h2>
                    <div class="sub">Reset zone unlocks & placed brainrots</div>
                    <div class="sub" style="margin-top:2px">Keep: Base, Floors, Income upgrades</div>
                    <div class="rebirth-cost-badge">&#x1F4B0; ${fmt(cost)}</div>
                    <div class="rebirth-reward">${REBIRTH_BONUSES[state.rebirth]}</div>
                    <div class="rebirth-progress">
                        ${fmt(state.gold)} / ${fmt(cost)} gold
                    </div>
                    <div class="rebirth-bar-track">
                        <div class="rebirth-bar-fill" style="width:${progress}%"></div>
                    </div>
                    <button class="rebirth-btn ${canRebirth ? 'ready' : 'not-ready'}"
                            onclick="doRebirth()" ${canRebirth ? '' : 'disabled'}>
                        ${canRebirth ? 'REBIRTH NOW!' : 'NEED ' + fmt(cost) + 'g'}
                    </button>
                </div>
            `;
        }

        function renderAll() {
            document.getElementById('gold-display').innerHTML = '&#x1F4B0; ' + fmt(state.gold);
            renderZones();
            renderFloors();
            renderIncome();
            renderRebirth();
        }

        function buyZone(zoneName) {
            const z = ZONES.find(x => x.name === zoneName);
            if (!z || state.unlockedZones.includes(z.name) || state.gold < z.cost) return;
            state.gold -= z.cost;
            state.unlockedZones.push(z.name);
            renderAll();
            if (sdk) {
                const taskName = 'unlock_' + z.id;
                sdk.sendMessageToUnity(JSON.stringify({
                    TaskName: taskName,
                    TaskTargetState: 'SetNotActiveToActive'
                }));
            }
            toast(z.name + ' Unlocked!');
        }

        function buyFloor(floorNum) {
            const f = FLOORS.find(x => x.num === floorNum);
            if (!f || state.unlockedFloors.includes(f.num) || state.gold < f.cost) return;
            state.gold -= f.cost;
            state.unlockedFloors.push(f.num);
            renderAll();
            if (sdk) {
                sdk.sendMessageToUnity(JSON.stringify({
                    TaskName: 'unlock_floor_' + f.num,
                    TaskTargetState: 'SetNotActiveToActive'
                }));
            }
            toast('Floor ' + f.num + ' Unlocked!');
        }

        function buyIncome(level) {
            const u = INCOME_UPGRADES.find(x => x.level === level);
            if (!u || state.incomeLevel >= level || state.gold < u.cost) return;
            state.gold -= u.cost;
            state.incomeLevel = level;
            renderAll();
            if (sdk) {
                sdk.sendMessageToUnity(JSON.stringify({
                    TaskName: 'income_upgrade_' + level,
                    TaskTargetState: 'SetNotActiveToActive'
                }));
            }
            toast('Income Lv.' + level + ' - ' + u.multiplier + 'x!');
        }

        function doRebirth() {
            const cost = REBIRTH_COSTS[state.rebirth];
            if (state.gold < cost) return;
            state.gold -= cost;
            state.rebirth++;
            state.unlockedZones = ['Beach Zone', 'Meadow'];
            state.incomeLevel = 0;
            renderAll();
            if (sdk) {
                sdk.sendMessageToUnity(JSON.stringify({
                    TaskName: 'do_rebirth',
                    TaskTargetState: 'SetNotActiveToActive'
                }));
            }
            toast('REBIRTH ' + state.rebirth + '!');
        }

        function toast(text) {
            const old = document.querySelector('.toast'); if(old)old.remove();
            const t = document.createElement('div'); t.className = 'toast'; t.textContent = text;
            document.body.appendChild(t); setTimeout(()=>{if(t.parentNode)t.remove();},2500);
        }

        function closeShop() { if(sdk){sdk.focusGameKeyboard();sdk.closeIframe();} }

        if (sdk) {
            sdk.setMessageListener(function(msg) {
                try {
                    const data = JSON.parse(msg);
                    if (data.gold !== undefined) state.gold = parseFloat(data.gold) || 0;
                    if (data.unlockedZones) state.unlockedZones = data.unlockedZones;
                    if (data.unlockedFloors) state.unlockedFloors = data.unlockedFloors;
                    if (data.incomeLevel !== undefined) state.incomeLevel = parseInt(data.incomeLevel) || 0;
                    if (data.rebirth !== undefined) state.rebirth = parseInt(data.rebirth) || 0;
                    if (data.hasBase !== undefined) state.hasBase = data.hasBase;
                    renderAll();
                } catch(e) {
                    if (msg.startsWith('gold:')) {
                        state.gold = parseFloat(msg.substring(5)) || 0;
                        renderAll();
                    }
                }
            });
        }

        const params = new URLSearchParams(window.location.search);
        if (params.get('gold')) state.gold = parseFloat(params.get('gold')) || 0;
        if (params.get('rebirth')) state.rebirth = parseInt(params.get('rebirth')) || 0;
        if (params.get('hasBase')) state.hasBase = params.get('hasBase') === 'true';

        renderAll();

        // Dev mode preview
        if (!sdk) {
            state.gold = 150000;
            state.unlockedZones = ['Beach Zone', 'Meadow', 'Forest Zone', 'Jungle Zone'];
            state.unlockedFloors = [1, 2];
            state.incomeLevel = 1;
            state.rebirth = 0;
            state.hasBase = true;
            renderAll();
        }
    </script>
</body>
</html>
