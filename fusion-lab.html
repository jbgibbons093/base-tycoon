<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Fusion Lab</title>
    <script src="https://portals-labs.github.io/portals-sdk/portals-sdk.js?v=10005456"></script>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --cyan: #00e5ff;
            --cyan-rgb: 0, 229, 255;
            --purple: #b44dff;
            --purple-rgb: 180, 77, 255;
            --dark: rgba(10, 12, 28, 0.96);
            --panel: rgba(20, 25, 50, 0.95);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Nunito', sans-serif; background: transparent; overflow: hidden; }

        .frame {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 600px; max-height: 85vh;
            background: linear-gradient(180deg, rgba(15, 18, 40, 0.97), rgba(8, 10, 25, 0.98));
            border: 2px solid rgba(0, 229, 255, 0.4);
            border-radius: 20px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.7), 0 0 80px rgba(0, 229, 255, 0.1), inset 0 1px 0 rgba(255,255,255,0.05);
            display: flex; flex-direction: column; overflow: hidden;
        }

        .header {
            padding: 14px 20px; text-align: center; flex-shrink: 0;
            background: linear-gradient(180deg, rgba(0, 229, 255, 0.15), transparent);
            border-bottom: 2px solid rgba(0, 229, 255, 0.2);
        }
        .header h1 {
            font-family: 'Luckiest Guy', Impact, sans-serif;
            font-size: 30px; color: var(--cyan); margin: 0;
            letter-spacing: 3px;
            text-shadow: 0 0 20px rgba(var(--cyan-rgb), 0.6), 2px 2px 0 rgba(0,0,0,0.8);
        }
        .header .tracker {
            font-size: 13px; color: rgba(255,255,255,0.5); margin-top: 2px;
        }

        .fusion-area {
            display: flex; align-items: center; justify-content: center; gap: 12px;
            padding: 16px 20px; flex-shrink: 0;
            background: rgba(0, 229, 255, 0.03);
        }
        .slot {
            width: 110px; height: 110px;
            border: 2px dashed rgba(var(--cyan-rgb), 0.4);
            border-radius: 14px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.2s;
            background: rgba(var(--cyan-rgb), 0.05);
            position: relative;
        }
        .slot:hover { border-color: rgba(var(--cyan-rgb), 0.7); background: rgba(var(--cyan-rgb), 0.1); }
        .slot.filled { border-style: solid; border-color: var(--cyan); }
        .slot img { width: 70px; height: 70px; object-fit: contain; }
        .slot .slot-label {
            font-size: 10px; color: rgba(255,255,255,0.5); margin-top: 4px;
            text-align: center; max-width: 100px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .slot .slot-placeholder {
            font-size: 11px; color: rgba(var(--cyan-rgb), 0.4); font-weight: 800;
        }
        .slot .remove-btn {
            position: absolute; top: -6px; right: -6px; width: 20px; height: 20px;
            background: #ff4444; border: none; border-radius: 50%; color: white;
            font-size: 12px; cursor: pointer; display: none; line-height: 20px; text-align: center;
        }
        .slot.filled .remove-btn { display: block; }

        .plus-sign {
            font-family: 'Luckiest Guy'; font-size: 32px; color: rgba(var(--cyan-rgb), 0.5);
        }

        .fuse-btn {
            padding: 10px 28px; border: 2px solid var(--cyan); border-radius: 12px;
            background: linear-gradient(180deg, rgba(var(--cyan-rgb), 0.2), rgba(var(--cyan-rgb), 0.05));
            color: var(--cyan); font-family: 'Luckiest Guy'; font-size: 20px;
            cursor: pointer; letter-spacing: 2px; transition: all 0.3s;
        }
        .fuse-btn:hover:not(:disabled) {
            background: linear-gradient(180deg, rgba(var(--cyan-rgb), 0.4), rgba(var(--cyan-rgb), 0.15));
            box-shadow: 0 0 30px rgba(var(--cyan-rgb), 0.3);
        }
        .fuse-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        .inventory-label {
            padding: 8px 20px 4px; font-size: 12px; color: rgba(255,255,255,0.4);
            font-weight: 800; letter-spacing: 1px; text-transform: uppercase; flex-shrink: 0;
        }

        .possible {
            display: none; flex-shrink: 0;
            padding: 6px 14px 10px;
            border-bottom: 1px solid rgba(var(--cyan-rgb), 0.12);
            background: rgba(0, 229, 255, 0.02);
        }
        .possible.show { display: block; }
        .possible-label {
            font-size: 11px; color: rgba(var(--cyan-rgb), 0.7);
            font-weight: 800; letter-spacing: 1px; text-transform: uppercase;
            margin: 0 4px 6px; display: flex; justify-content: space-between; align-items: center;
        }
        .possible-label .range-hint { color: rgba(255,255,255,0.35); font-weight: 700; font-size: 10px; letter-spacing: 0; text-transform: none; }
        .possible-strip {
            display: flex; gap: 6px; overflow-x: auto; padding-bottom: 4px;
            scrollbar-width: thin;
        }
        .possible-strip::-webkit-scrollbar { height: 4px; }
        .possible-strip::-webkit-scrollbar-thumb { background: rgba(var(--cyan-rgb), 0.3); border-radius: 2px; }
        .pchip {
            flex: 0 0 auto; width: 72px;
            background: rgba(255,255,255,0.04);
            border: 2px solid rgba(255,255,255,0.12);
            border-radius: 8px; padding: 4px; text-align: center;
        }
        .pchip.owned { opacity: 0.35; }
        .pchip img { width: 44px; height: 44px; object-fit: contain; }
        .pchip .pname {
            font-size: 8px; color: rgba(255,255,255,0.7);
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
            margin-top: 2px;
        }
        .pchip .pgps { font-size: 9px; color: #ffd700; font-weight: 800; margin-top: 1px; }
        .pchip .prob { font-size: 9px; font-weight: 900; margin-top: 1px; color: #00e5ff; }
        .pchip.owned .prob { color: rgba(255,255,255,0.4); }
        .pchip .prar { font-size: 7px; font-weight: 900; letter-spacing: 0.3px; margin-top: 1px;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .slot .slot-rar { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 100px; }
        .pchip.tier-Rare { border-color: #0088FF; }
        .pchip.tier-Epic { border-color: #AA55FF; }
        .pchip.tier-Legendary { border-color: #FFA500; }
        .pchip.tier-Mythic { border-color: #FF4500; }
        .pchip.tier-BrainrotGod { border-color: #FF0000; }
        .pchip.tier-Secret { border-color: #00FFFF; }
        .pchip.tier-OG { border-color: #FF00FF; }
        .pchip.tier-Glitch { border-color: #ff00ff; }
        .possible-empty {
            font-size: 11px; color: rgba(255,100,100,0.7); text-align: center;
            padding: 4px 0; font-weight: 700;
        }

        .inventory {
            flex: 1; overflow-y: auto; padding: 6px 14px 14px;
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px;
            align-content: start;
        }
        .inventory::-webkit-scrollbar { width: 6px; }
        .inventory::-webkit-scrollbar-thumb { background: rgba(var(--cyan-rgb), 0.3); border-radius: 3px; }

        .inv-card {
            background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px; padding: 6px; text-align: center; cursor: pointer;
            transition: all 0.15s;
        }
        .inv-card:hover { background: rgba(var(--cyan-rgb), 0.1); border-color: rgba(var(--cyan-rgb), 0.4); }
        .inv-card.selected { border-color: var(--cyan); background: rgba(var(--cyan-rgb), 0.15); box-shadow: 0 0 12px rgba(var(--cyan-rgb), 0.2); }
        .inv-card.fusion-owned { border-color: rgba(var(--purple-rgb), 0.5); }
        .inv-card img { width: 52px; height: 52px; object-fit: contain; }
        .inv-card .card-name {
            font-size: 9px; color: rgba(255,255,255,0.6); margin-top: 2px;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .inv-card .card-gps {
            font-size: 10px; color: rgba(var(--cyan-rgb), 0.7); font-weight: 800;
        }
        .inv-card .card-rar {
            font-size: 8px; font-weight: 900; letter-spacing: 0.3px; margin-top: 1px;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .slot .slot-gps { font-size: 10px; color: #ffd700; font-weight: 800; margin-top: 2px; }
        .slot .slot-rar { font-size: 8px; font-weight: 900; letter-spacing: 0.3px; margin-top: 1px; }
        .inv-card .card-count {
            position: absolute; top: 2px; right: 4px; font-size: 10px; color: #ffd700; font-weight: 900;
        }

        /* Result overlay */
        .result-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.85); display: none;
            flex-direction: column; align-items: center; justify-content: center;
            z-index: 200;
        }
        .result-overlay.show { display: flex; }
        .result-card {
            text-align: center; padding: 30px 40px; border-radius: 20px;
            border: 2px solid; animation: resultPop 0.5s ease-out;
        }
        @keyframes resultPop { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .result-card img { width: 120px; height: 120px; object-fit: contain; }
        .result-card .result-tier {
            font-family: 'Luckiest Guy'; font-size: 16px; letter-spacing: 2px; margin-top: 8px;
        }
        .result-card .result-name {
            font-family: 'Luckiest Guy'; font-size: 22px; color: white; margin-top: 4px;
        }
        .result-card .result-gps {
            font-size: 16px; color: #ffd700; font-weight: 800; margin-top: 4px;
        }
        .result-card .result-note {
            font-size: 12px; color: rgba(255,255,255,0.5); margin-top: 8px;
        }
        .result-ok {
            margin-top: 16px; padding: 10px 32px; border-radius: 10px;
            border: 2px solid var(--cyan); background: rgba(var(--cyan-rgb), 0.15);
            color: var(--cyan); font-family: 'Luckiest Guy'; font-size: 16px;
            cursor: pointer; letter-spacing: 1px;
        }

        .tier-Rare { border-color: #0088FF; }
        .tier-Rare .result-tier, .tier-Rare .result-name { color: #0088FF; }
        .tier-Epic { border-color: #AA55FF; }
        .tier-Epic .result-tier, .tier-Epic .result-name { color: #AA55FF; }
        .tier-Legendary { border-color: #FFA500; }
        .tier-Legendary .result-tier, .tier-Legendary .result-name { color: #FFA500; }
        .tier-Mythic { border-color: #FF4500; }
        .tier-BrainrotGod { border-color: #FF0000; }
        .tier-Secret { border-color: #00FFFF; }
        .tier-OG { border-color: #FF00FF; }
        .tier-Glitch { border-color: #ff00ff; }
        .tier-Glitch .result-tier, .tier-Glitch .result-name { color: #ff00ff; }
        .result-card.tier-Glitch { animation: glitchPop 0.5s ease-out, glitchShake 0.15s infinite 0.5s; }
        @keyframes glitchShake { 0%,100%{transform:translate(0)} 25%{transform:translate(-2px,1px)} 75%{transform:translate(2px,-1px)} }

        .complete-msg {
            text-align: center; padding: 20px; color: rgba(255,255,255,0.4);
            font-size: 14px; font-weight: 800;
        }

        .close-x {
            position: absolute; top: 10px; right: 14px;
            width: 32px; height: 32px; border-radius: 50%;
            background: linear-gradient(180deg, rgba(255,100,100,0.85), rgba(200,40,40,0.85));
            border: 2px solid rgba(255,255,255,0.12);
            box-shadow: 0 0 12px rgba(255,50,50,0.3);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            font-family: 'Luckiest Guy', Impact, sans-serif; font-size: 18px;
            color: white; text-shadow: 1px 1px 0 rgba(0,0,0,0.4);
            transition: transform 0.15s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 10;
        }
        .close-x:hover { transform: scale(1.15); }
        .close-x:active { transform: scale(0.85); transition-duration: 0.05s; }
    </style>
</head>

        // === SDK SETUP ===
        function _doFocusGame() {
            if (typeof PortalsSdk !== 'undefined' && PortalsSdk.focusGameKeyboard) PortalsSdk.focusGameKeyboard();
        }
        document.addEventListener('click', function() { _doFocusGame(); });
        document.addEventListener('keydown', function() { _doFocusGame(); });

        var _lastMsg = '', _lastMsgT = 0;
        function processMessage(msg) {
            var now = Date.now();
            var id = msg.substring(0, 60) + '_' + Math.floor(now / 100);
            if (id === _lastMsg && now - _lastMsgT < 200) return;
            _lastMsg = id; _lastMsgT = now;
            handleMessage(msg);
        }

        if (sdk) {
            sdk.setMessageListener(function(msg) { processMessage(msg); });
        }
        window.addEventListener('message', function(e) {
            if (e.data && typeof e.data === 'string') processMessage(e.data);
            else if (e.data && e.data.portalsMessage) processMessage(e.data.portalsMessage);
        });

        function requestSync() {
            if (!sdk) return;
            sdk.sendMessageToUnity(JSON.stringify({ TaskName: 'hud_sync', TaskTargetState: 'SetAnyToActive' }));
        }

        function closeShop() {
            if (sdk) { try { sdk.focusGameKeyboard(); } catch(e){} try { sdk.closeIframe(); } catch(e){} }
        }
        document.addEventListener('keydown', function(e){
            if (e.key === 'Escape') { e.preventDefault(); closeShop(); }
        });
        setTimeout(requestSync, 300);
        setTimeout(requestSync, 1000);
        setTimeout(requestSync, 2500);

        function parseVarValue(raw) {
            if (raw === undefined || raw === null || raw === '') return 0;
            raw = String(raw).trim();
            var num = Number(raw);
            if (!isNaN(num)) return num;
            try {
                var parsed = JSON.parse(raw);
                if (typeof parsed === 'number') return parsed;
                if (typeof parsed === 'object' && parsed !== null) {
                    if (myUsername) {
                        var uLower = myUsername.toLowerCase();
                        for (var k in parsed) { if (k.toLowerCase() === uLower) return Number(parsed[k]) || 0; }
                    }
                    var vals = Object.values(parsed);
                    return vals.length > 0 ? (Number(vals[0]) || 0) : 0;
                }
            } catch(e) {}
            var m = raw.match(/[=:](\d+\.?\d*)/);
            return m ? parseFloat(m[1]) || 0 : 0;
        }

        // === MESSAGE HANDLER ===
        function handleMessage(msg) {
            if (msg.startsWith('peds:')) {
                var nums = msg.substring(5).split(',');
                pedestals = [];
                ownedFusionQs = [];
                var idx = 0;
                for (var f = 1; f <= 4; f++) {
                    for (var s = 1; s <= 10; s++) {
                        var qn = parseInt(nums[idx], 10) || 0;
                        if (qn > 0 && QBV[qn]) {
                            pedestals.push({ floor: f, slot: s, questNum: qn, bv: QBV[qn] });
                            if (FUSION_QS[qn]) ownedFusionQs.push(qn);
                        }
                        idx++;
                    }
                }
                render();
            } else if (msg.startsWith('inv:')) {
                var pairs = msg.substring(4).split('&');
                pedestals = [];
                ownedFusionQs = [];
                for (var i = 0; i < pairs.length; i++) {
                    var eq = pairs[i].indexOf('=');
                    if (eq < 0) continue;
                    var key = pairs[i].substring(0, eq).trim();
                    var val = parseVarValue(pairs[i].substring(eq + 1));
                    var pm = key.match(/^Ped_F(\d+)_(\d+)$/);
                    if (pm) {
                        var qn = Math.round(val);
                        if (qn > 0 && QBV[qn]) {
                            pedestals.push({ floor: parseInt(pm[1]), slot: parseInt(pm[2]), questNum: qn, bv: QBV[qn] });
                            if (FUSION_QS[qn]) ownedFusionQs.push(qn);
                        }
                    }
                    if (key === 'username') myUsername = pairs[i].substring(eq + 1).trim();
                }
                render();
            }
        }

        // === RENDERING ===
        var NAMEOV = {
            'bv_Image_removebg_preview_29': 'Lerulerulerule',
            'bv_Africa_by_toto_to_sahur': 'To to to Sahur',
            'bv_PIGEONS_ARE_SPIES_MADE_BY': 'Piccione Macchina',
            'bv_Cant_come_up_with_a_funny': 'Bombombini Gusini'
        };
        
        var TIER_COLORS = {
            'Common': ['AAAAAA'],
            'Rare': ['0088FF'],
            'Epic': ['AA55FF'],
            'Legendary': ['FFA500'],
            'Mythic': ['FF0000', 'FF2200', 'FF4500', 'FF6600', 'FF8800', 'FFAA00'],
            'Brainrot God': ['FF0000', 'FF7700', 'FFFF00', '00FF00', '0088FF', 'AA00FF', 'FF00FF'],
            'Secret': ['00FFFF', '88FFFF', 'FFFFFF', '88FFFF', '00FFFF', '00CCCC'],
            'OG': ['FF00FF', 'FF69B4'],
            'Glitch': ['FF00FF']
        };
        function escHtml(s) {
            return String(s).replace(/[&<>"']/g, function(c) {
                return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
            });
        }
        function tierHtml(text, tier) {
            var colors = TIER_COLORS[tier] || ['FFFFFF'];
            if (colors.length === 1) return '<span style="color:#' + colors[0] + '">' + escHtml(text) + '</span>';
            var out = '', j = 0, raw = String(text);
            for (var i = 0; i < raw.length; i++) {
                var ch = raw.charAt(i);
                if (ch === ' ') { out += ' '; continue; }
                out += '<span style="color:#' + colors[j % colors.length] + '">' + escHtml(ch) + '</span>';
                j++;
            }
            return out;
        }
        function tierForBv(bv) {
            for (var i = 0; i < FB.length; i++) if (FB[i].bv === bv) return FB[i].tier;
            var rar = rarityOf(bv);
            if (!rar) return null;
            return rar.label === 'BRAINROT GOD' ? 'Brainrot God' : rar.label.charAt(0) + rar.label.slice(1).toLowerCase();
        }

        function imgUrl(bv) {
            return IMG_BASE + bv + '.webp?v=' + IMG_V;
        }

        function fmtGps(gps) {
            if (gps >= 1000) return (gps / 1000).toFixed(1) + 'K';
            return gps.toFixed(1);
        }

        function render() {
            var grid = document.getElementById('invGrid');
            var html = '';

            if (pedestals.length === 0) {
                html = '<div class="complete-msg" style="grid-column:1/-1">No brainrots on pedestals.<br>Deposit brainrots first!</div>';
            } else {
                // Sort by rarity rank DESC, then floor/slot
                var sorted = pedestals.slice().sort(function(a, b) {
                    var ra = (RBV[a.bv] !== undefined) ? RBV[a.bv] : -1;
                    var rb = (RBV[b.bv] !== undefined) ? RBV[b.bv] : -1;
                    if (rb !== ra) return rb - ra;
                    if (a.floor !== b.floor) return a.floor - b.floor;
                    return a.slot - b.slot;
                });
                var TIER_CLS = {'Rare':'Rare','Epic':'Epic','Legendary':'Legendary','Mythic':'Mythic','Brainrot God':'BrainrotGod','Secret':'Secret','OG':'OG','Glitch':'Glitch','Common':'Common','Uncommon':'Uncommon'};
                for (var i = 0; i < sorted.length; i++) {
                    var p = sorted[i];
                    var origIdx = pedestals.indexOf(p);
                    var isFusion = FUSION_QS[p.questNum];
                    var isSelectedA = slotA && slotA.floor === p.floor && slotA.slot === p.slot;
                    var isSelectedB = slotB && slotB.floor === p.floor && slotB.slot === p.slot;
                    var tier = tierForBv(p.bv);
                    var tierCls = TIER_CLS[tier] ? ' tier-' + TIER_CLS[tier] : '';
                    var cls = 'inv-card' + tierCls;
                    if (isSelectedA || isSelectedB) cls += ' selected';
                    if (isFusion) cls += ' fusion-owned';

                    var gps = GPS_BY_BV[p.bv] || 0;
                    var rar = rarityOf(p.bv);
                    html += '<div class="' + cls + '" onclick="selectBrainrot(' + origIdx + ')" style="position:relative">';
                    html += '<img src="' + imgUrl(p.bv) + '" onerror="this.src=\'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2252%22 height=%2252%22><text x=%2226%22 y=%2234%22 text-anchor=%22middle%22 font-size=%2224%22>?</text></svg>\'">';
                    html += '<div class="card-name">' + richName(p.bv) + '</div>';
                    if (gps > 0) html += '<div class="card-gps">' + fmtGps(gps) + '/s</div>';
                    if (rar) html += '<div class="card-rar">' + richRarity(p.bv) + '</div>';
                    html += '</div>';
                }
            }
            grid.innerHTML = html;

            // Update slots
            renderSlot('slotA', slotA, 'SLOT A');
            renderSlot('slotB', slotB, 'SLOT B');

            // Possible outcomes preview
            renderPossibleOutcomes();

            // Fuse button
            document.getElementById('fuseBtn').disabled = !slotA || !slotB || fuseLocked;

            // Tracker
            var discovered = ownedFusionQs.length;
            document.getElementById('tracker').textContent = discovered + ' / 40 Discovered';
        }

        function computeOutcomeProbabilities() {
            // Returns {probs: map q -> probability, minT, maxT}
            var rA = CR[slotA.bv] || [1, 5];
            var rB = CR[slotB.bv] || [1, 5];
            var nAB = (rA[1] - rA[0] + 1) * (rB[1] - rB[0] + 1);
            var pT = {}; // total -> P(T=total)
            for (var a = rA[0]; a <= rA[1]; a++) {
                for (var b = rB[0]; b <= rB[1]; b++) {
                    var t = a + b;
                    pT[t] = (pT[t] || 0) + 1 / nAB;
                }
            }
            // Unowned fusion candidates for fallback
            var unowned = [];
            for (var i = 0; i < FB.length; i++) {
                if (ownedFusionQs.indexOf(FB[i].q) === -1) unowned.push(FB[i]);
            }
            var probs = {};
            for (var tKey in pT) {
                var t = +tKey;
                var ptAtT = pT[tKey];
                var cands = [];
                for (var i = 0; i < FB.length; i++) {
                    var fb = FB[i];
                    if (fb.rs[0] <= t && t <= fb.rs[1] && ownedFusionQs.indexOf(fb.q) === -1) cands.push(fb);
                }
                if (cands.length === 0) {
                    if (unowned.length === 0) continue;
                    var best = unowned[0];
                    var bestDist = Math.abs(t - (best.rs[0] + best.rs[1]) / 2);
                    for (var i = 1; i < unowned.length; i++) {
                        var d = Math.abs(t - (unowned[i].rs[0] + unowned[i].rs[1]) / 2);
                        if (d < bestDist) { best = unowned[i]; bestDist = d; }
                    }
                    probs[best.q] = (probs[best.q] || 0) + ptAtT;
                } else {
                    var share = ptAtT / cands.length;
                    for (var i = 0; i < cands.length; i++) {
                        probs[cands[i].q] = (probs[cands[i].q] || 0) + share;
                    }
                }
            }
            return { probs: probs, minT: rA[0] + rB[0], maxT: rA[1] + rB[1] };
        }

        function renderPossibleOutcomes() {
            var box = document.getElementById('possibleBox');
            var strip = document.getElementById('possibleStrip');
            var hint = document.getElementById('rangeHint');
            if (!slotA || !slotB) { box.classList.remove('show'); return; }
            var rA = CR[slotA.bv] || [1, 5];
            var rB = CR[slotB.bv] || [1, 5];
            var minT = rA[0] + rB[0];
            var maxT = rA[1] + rB[1];

            var probData = computeOutcomeProbabilities();
            var probs = probData.probs;

            // Include anything with a non-zero probability (covers in-range plus fallback grants)
            var hits = [];
            for (var i = 0; i < FB.length; i++) {
                var fb = FB[i];
                if ((probs[fb.q] || 0) > 0) hits.push(fb);
            }
            // Sort by probability desc, then tier
            var tierOrder = { 'Rare': 0, 'Epic': 1, 'Legendary': 2, 'Mythic': 3, 'Brainrot God': 4, 'Secret': 5, 'OG': 6, 'Glitch': 7 };
            hits.sort(function(a, b) {
                var pa = probs[a.q] || 0, pb = probs[b.q] || 0;
                if (pb !== pa) return pb - pa;
                var d = (tierOrder[a.tier] || 0) - (tierOrder[b.tier] || 0);
                return d !== 0 ? d : a.gps - b.gps;
            });
            var unownedHits = [];
            for (var j = 0; j < hits.length; j++) {
                if (ownedFusionQs.indexOf(hits[j].q) === -1) unownedHits.push(hits[j]);
            }
            hint.textContent = 'score ' + minT + '-' + maxT + ' · ' + unownedHits.length + ' possible';
            if (hits.length === 0) {
                strip.innerHTML = '<div class="possible-empty">No matching fusions — closest unowned will be granted.</div>';
            } else {
                var html = '';
                for (var k = 0; k < hits.length; k++) {
                    var h = hits[k];
                    var owned = ownedFusionQs.indexOf(h.q) !== -1;
                    var tierClass = 'tier-' + h.tier.replace(/ /g, '');
                    var p = probs[h.q] || 0;
                    var pctStr = p >= 0.995 ? '99%' : p >= 0.01 ? (p * 100).toFixed(0) + '%' : p > 0 ? '<1%' : '0%';
                    var rar = rarityOf(h.bv);
                    var titleTxt = (BV_RICH[h.bv]?BV_RICH[h.bv].np:h.bv) + ' · ' + (p * 100).toFixed(2) + '%' + (owned ? ' (already owned)' : '');
                    html += '<div class="pchip ' + tierClass + (owned ? ' owned' : '') + '" title="' + titleTxt + '">';
                    html += '<img src="' + imgUrl(h.bv) + '" onerror="this.style.visibility=\'hidden\'">';
                    html += '<div class="pname">' + richName(h.bv) + '</div>';
                    html += '<div class="pgps">' + fmtGps(h.gps) + '/s</div>';
                    html += '<div class="prob">' + pctStr + '</div>';
                    if (rar) html += '<div class="prar">' + richRarity(h.bv) + '</div>';
                    html += '</div>';
                }
                strip.innerHTML = html;
            }
            box.classList.add('show');
        }

        function renderSlot(elemId, data, placeholder) {
            var el = document.getElementById(elemId);
            if (data) {
                el.className = 'slot filled';
                var gps = GPS_BY_BV[data.bv] || 0;
                var rar = rarityOf(data.bv);
                var parts = '<img src="' + imgUrl(data.bv) + '"><div class="slot-label">' + richName(data.bv) + '</div>';
                if (gps > 0) parts += '<div class="slot-gps">' + fmtGps(gps) + '/s</div>';
                if (rar) parts += '<div class="slot-rar">' + richRarity(data.bv) + '</div>';
                parts += '<button class="remove-btn" onclick="event.stopPropagation();clearSlot(\'' + elemId.charAt(4) + '\')">&times;</button>';
                el.innerHTML = parts;
            } else {
                el.className = 'slot';
                el.innerHTML = '<span class="slot-placeholder">' + placeholder + '</span>';
            }
        }

        // === INTERACTION ===
        function selectBrainrot(idx) {
            var p = pedestals[idx];
            // Don't select if already in a slot
            if (slotA && slotA.floor === p.floor && slotA.slot === p.slot) { clearSlot('A'); return; }
            if (slotB && slotB.floor === p.floor && slotB.slot === p.slot) { clearSlot('B'); return; }

            if (!slotA) { slotA = p; }
            else if (!slotB) { slotB = p; }
            else { slotB = p; } // replace B if both filled
            render();
        }

        function clearSlot(which) {
            if (which === 'A') slotA = null;
            else slotB = null;
            render();
        }

        // === FUSION ALGORITHM ===
        function randInt(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        function doFuse() {
            if (!slotA || !slotB || fuseLocked) return;
            fuseLocked = true;
            document.getElementById('fuseBtn').disabled = true;

            var bvA = slotA.bv;
            var bvB = slotB.bv;
            var rangeA = CR[bvA] || [1, 5];
            var rangeB = CR[bvB] || [1, 5];

            var pointsA = randInt(rangeA[0], rangeA[1]);
            var pointsB = randInt(rangeB[0], rangeB[1]);
            var total = pointsA + pointsB;

            // Find candidates: in range AND not already owned
            var candidates = [];
            for (var i = 0; i < FB.length; i++) {
                var fb = FB[i];
                if (total >= fb.rs[0] && total <= fb.rs[1] && ownedFusionQs.indexOf(fb.q) === -1) {
                    candidates.push(fb);
                }
            }

            var result;
            if (candidates.length > 0) {
                result = candidates[Math.floor(Math.random() * candidates.length)];
            } else {
                // Fallback: closest unowned
                var unowned = [];
                for (var i = 0; i < FB.length; i++) {
                    if (ownedFusionQs.indexOf(FB[i].q) === -1) unowned.push(FB[i]);
                }
                if (unowned.length === 0) {
                    fuseLocked = false;
                    alert('Collection Complete! You own all 40 fusion brainrots!');
                    render();
                    return;
                }
                unowned.sort(function(a, b) {
                    var midA = (a.rs[0] + a.rs[1]) / 2;
                    var midB = (b.rs[0] + b.rs[1]) / 2;
                    return Math.abs(total - midA) - Math.abs(total - midB);
                });
                result = unowned[0];
            }

            // Send quest triggers to Portals
            if (sdk) {
                // Clear slot A
                sdk.sendMessageToUnity(JSON.stringify({
                    TaskName: 'fuse_clr_F' + slotA.floor + '_' + slotA.slot,
                    TaskTargetState: 'SetNotActiveToActive'
                }));
                // Clear slot B (200ms delay)
                setTimeout(function() {
                    sdk.sendMessageToUnity(JSON.stringify({
                        TaskName: 'fuse_clr_F' + slotB.floor + '_' + slotB.slot,
                        TaskTargetState: 'SetNotActiveToActive'
                    }));
                }, 200);
                // Grant result (500ms delay)
                setTimeout(function() {
                    sdk.sendMessageToUnity(JSON.stringify({
                        TaskName: 'fuse_gr_' + result.q,
                        TaskTargetState: 'SetNotActiveToActive'
                    }));
                }, 500);
                // Request fresh sync (1000ms)
                setTimeout(function() {
                    sdk.sendMessageToUnity(JSON.stringify({
                        TaskName: 'hud_sync',
                        TaskTargetState: 'SetAnyToActive'
                    }));
                }, 1000);
            }

            // Show result
            setTimeout(function() {
                showResult(result);
            }, 600);
        }

        function showResult(fb) {
            var tierClass = 'tier-' + fb.tier.replace(/ /g, '');
            var card = document.getElementById('resultCard');
            card.className = 'result-card ' + tierClass;
            document.getElementById('resultImg').src = imgUrl(fb.bv);
            document.getElementById('resultTier').innerHTML = richRarity(fb.bv);
            document.getElementById('resultName').innerHTML = richName(fb.bv);
            document.getElementById('resultGps').textContent = fmtGps(fb.gps) + ' gold/sec';
            document.getElementById('resultOverlay').classList.add('show');
        }

        function closeResult() {
            document.getElementById('resultOverlay').classList.remove('show');
            slotA = null;
            slotB = null;
            fuseLocked = false;
            // Re-sync after fusion
            setTimeout(requestSync, 300);
            setTimeout(function() { render(); }, 500);
        }

        // Initial render
        render();
    </script>
</body>
