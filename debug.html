<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Debug Panel</title>
    <script src="https://portals-labs.github.io/portals-sdk/portals-sdk.js?v=10005456"></script>
    <style>
        html, body {
            margin: 0; padding: 0;
            background: transparent !important;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            color: #0f0;
            user-select: none;
        }
        .debug-panel {
            position: fixed;
            bottom: 70px;
            right: 10px;
            background: rgba(0,0,0,0.85);
            border: 2px solid #0f0;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 13px;
            line-height: 1.5;
            max-width: 340px;
            max-height: 70vh;
            overflow-y: auto;
            z-index: 999;
            pointer-events: auto;
            cursor: default;
        }
        .debug-panel h3 {
            margin: 0 0 6px 0;
            color: #0ff;
            font-size: 14px;
            border-bottom: 1px solid #0ff;
            padding-bottom: 4px;
        }
        .section { margin-bottom: 10px; }
        .section-title {
            color: #ff0;
            font-weight: bold;
            font-size: 12px;
            margin-top: 8px;
        }
        .var-row { display: flex; justify-content: space-between; }
        .var-name { color: #aaa; }
        .var-val { color: #0f0; font-weight: bold; }
        .var-val.active { color: #0f0; }
        .var-val.zero { color: #666; }
        .var-val.highlight { color: #ff0; }
        .msg-log {
            margin-top: 8px;
            border-top: 1px solid #333;
            padding-top: 6px;
            max-height: 150px;
            overflow-y: auto;
            font-size: 11px;
            color: #888;
        }
        .msg-log div { word-break: break-all; margin-bottom: 2px; }
        .msg-log .ts { color: #555; }
    </style>
</head>
<body>
    <div class="debug-panel" id="panel">
        <h3>DEBUG PANEL</h3>
        <div class="section">
            <div class="section-title">ECONOMY</div>
            <div class="var-row"><span class="var-name">Gold</span><span class="var-val" id="v-Gold">0</span></div>
            <div class="var-row"><span class="var-name">My_Base_ID</span><span class="var-val" id="v-My_Base_ID">0</span></div>
            <div class="var-row"><span class="var-name">CollectTimer</span><span class="var-val" id="v-CollectTimer">0</span></div>
        </div>
        <div class="section">
            <div class="section-title">CARRYING</div>
            <div class="var-row"><span class="var-name">Carrying</span><span class="var-val" id="v-Carrying">0</span></div>
            <div class="var-row"><span class="var-name">Carrying_Which</span><span class="var-val" id="v-Carrying_Which">0</span></div>
            <div class="var-row"><span class="var-name">Carrying_Gold</span><span class="var-val" id="v-Carrying_Gold">0</span></div>
        </div>
        <div class="section">
            <div class="section-title">OWNERSHIP (Own_bv_*)</div>
            <div id="own-vars"></div>
        </div>
        <div class="section">
            <div class="section-title">BASE INCOME (Base_*_Income_*)</div>
            <div id="income-vars"></div>
        </div>
        <div class="section">
            <div class="section-title">MESSAGE LOG</div>
            <div class="msg-log" id="msg-log"></div>
        </div>
    </div>

    <script>
        const sdk = typeof PortalsSdk !== 'undefined' ? PortalsSdk : null;

        const trackedVars = {};
        const coreVars = ['Gold', 'My_Base_ID', 'CollectTimer', 'Carrying', 'Carrying_Which', 'Carrying_Gold'];
        const ownVarsEl = document.getElementById('own-vars');
        const incomeVarsEl = document.getElementById('income-vars');
        const msgLog = document.getElementById('msg-log');

        function parseVarValue(raw) {
            if (raw === undefined || raw === null || raw === '') return 0;
            raw = String(raw).trim();
            const num = Number(raw);
            if (!isNaN(num)) return num;
            try {
                const parsed = JSON.parse(raw);
                if (typeof parsed === 'number') return parsed;
                if (typeof parsed === 'object' && parsed !== null) {
                    const vals = Object.values(parsed);
                    return vals.length > 0 ? (Number(vals[0]) || 0) : 0;
                }
            } catch(e) {}
            return 0;
        }

        function updateVar(key, val) {
            trackedVars[key] = val;
            const el = document.getElementById('v-' + key);
            if (el) {
                el.textContent = val;
                el.className = 'var-val ' + (val > 0 ? 'active' : 'zero');
            } else if (key.startsWith('Own_bv_')) {
                renderOwnVars();
            } else if (key.match(/^Base_\d+_Income_/)) {
                renderIncomeVars();
            }
        }

        function renderOwnVars() {
            const keys = Object.keys(trackedVars).filter(k => k.startsWith('Own_bv_')).sort();
            if (keys.length === 0) { ownVarsEl.innerHTML = '<span class="var-name">(none yet)</span>'; return; }
            // Only show non-zero ones, plus count
            const nonZero = keys.filter(k => trackedVars[k] > 0);
            let html = `<div class="var-row"><span class="var-name">Total owned</span><span class="var-val highlight">${nonZero.length} / ${keys.length}</span></div>`;
            for (const k of nonZero) {
                const short = k.replace('Own_bv_', '');
                html += `<div class="var-row"><span class="var-name">${short}</span><span class="var-val active">1</span></div>`;
            }
            ownVarsEl.innerHTML = html;
        }

        function renderIncomeVars() {
            const keys = Object.keys(trackedVars).filter(k => k.match(/^Base_\d+_Income_/)).sort();
            if (keys.length === 0) { incomeVarsEl.innerHTML = '<span class="var-name">(none yet)</span>'; return; }
            const nonZero = keys.filter(k => trackedVars[k] > 0);
            let html = '';
            for (const k of nonZero) {
                html += `<div class="var-row"><span class="var-name">${k}</span><span class="var-val active">${trackedVars[k]}</span></div>`;
            }
            if (!html) html = '<span class="var-name">(all zero)</span>';
            incomeVarsEl.innerHTML = html;
        }

        function logMsg(msg) {
            const time = new Date().toLocaleTimeString('en-US', {hour12:false});
            const div = document.createElement('div');
            const short = msg.length > 120 ? msg.substring(0, 120) + '...' : msg;
            div.innerHTML = `<span class="ts">${time}</span> ${short}`;
            msgLog.insertBefore(div, msgLog.firstChild);
            while (msgLog.children.length > 30) msgLog.removeChild(msgLog.lastChild);
        }

        let _lastMsgId = '', _lastMsgTime = 0;
        function processMessage(msg) {
            const now = Date.now();
            const msgId = msg + '_' + Math.floor(now / 100);
            if (msgId === _lastMsgId && now - _lastMsgTime < 200) return;
            _lastMsgId = msgId; _lastMsgTime = now;
            logMsg(msg);
            handleMessage(msg);
        }

        function handleMessage(msg) {
            if (msg.startsWith('inv:')) {
                const payload = msg.substring(4);
                const pairs = payload.split('&');
                for (const pair of pairs) {
                    const eq = pair.indexOf('=');
                    if (eq < 0) continue;
                    const key = pair.substring(0, eq).trim();
                    const val = parseVarValue(pair.substring(eq + 1));
                    updateVar(key, val);
                }
                return;
            }
            if (msg.startsWith('dbg:')) {
                const payload = msg.substring(4);
                const pairs = payload.split('&');
                for (const pair of pairs) {
                    const eq = pair.indexOf('=');
                    if (eq < 0) continue;
                    const key = pair.substring(0, eq).trim();
                    const val = parseVarValue(pair.substring(eq + 1));
                    updateVar(key, val);
                }
                return;
            }
            // Also parse gold: carry: base: etc
            if (msg.startsWith('gold:')) updateVar('Gold', parseFloat(msg.substring(5))||0);
            else if (msg.startsWith('base:')) updateVar('My_Base_ID', parseInt(msg.substring(5))||0);
        }

        if (sdk) {
            sdk.setMessageListener(function(msg) { processMessage(msg); });
        }
        window.addEventListener('message', function(event) {
            if (event.data && typeof event.data === 'string') processMessage(event.data);
            else if (event.data && event.data.portalsMessage) processMessage(event.data.portalsMessage);
        });

        function _doFocusGame() {
            if (typeof PortalsSdk !== 'undefined' && PortalsSdk.focusGameKeyboard) PortalsSdk.focusGameKeyboard();
        }
        document.addEventListener('keydown', function() { if (!document.hidden) _doFocusGame(); });
        _doFocusGame();
        setTimeout(_doFocusGame, 100);
        setTimeout(_doFocusGame, 300);

        renderOwnVars();
        renderIncomeVars();
    </script>
</body>
</html>
