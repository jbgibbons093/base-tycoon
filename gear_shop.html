<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Gear Shop</title>
    <script src="https://portals-labs.github.io/portals-sdk/portals-sdk.js?v=10005456"></script>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
    <style>
        html, body {
            margin: 0; padding: 0;
            background: rgba(0,0,0,0.5);
            overflow: hidden;
            font-family: 'Nunito', sans-serif;
            user-select: none;
        }

        .shop-frame {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 520px;
            max-height: 90vh;
            background: white;
            border: 5px solid #6C5CE7;
            border-radius: 24px;
            box-shadow: 0 10px 0 rgba(0,0,0,0.15), 0 15px 40px rgba(0,0,0,0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .shop-header {
            background: linear-gradient(180deg, #A29BFE 0%, #6C5CE7 100%);
            padding: 14px 20px;
            text-align: center;
            position: relative;
            flex-shrink: 0;
        }
        .shop-header h1 {
            font-family: 'Luckiest Guy', cursive;
            font-size: 30px;
            color: white;
            margin: 0;
            text-shadow: 3px 3px 0 rgba(0,0,0,0.2);
        }
        .gold-badge {
            display: inline-block;
            margin-top: 6px;
            padding: 4px 16px;
            border-radius: 20px;
            background: linear-gradient(180deg, #FFE44D, #FFB800);
            border: 3px solid #CC8800;
            box-shadow: 0 2px 0 rgba(0,0,0,0.15);
            font-family: 'Luckiest Guy', cursive;
            font-size: 15px;
            color: #4A2800;
        }
        .close-x {
            position: absolute;
            top: 8px; right: 12px;
            width: 32px; height: 32px;
            border-radius: 50%;
            background: linear-gradient(180deg, #FF7675, #D63031);
            border: 3px solid #A02020;
            box-shadow: 0 2px 0 rgba(0,0,0,0.2);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            font-family: 'Luckiest Guy', cursive;
            font-size: 18px; color: white;
            text-shadow: 1px 1px 0 rgba(0,0,0,0.3);
        }
        .close-x:active { transform: translateY(2px); box-shadow: none; }

        .shop-body {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            background: #F0F3F5;
        }
        .shop-body::-webkit-scrollbar { width: 6px; }
        .shop-body::-webkit-scrollbar-thumb { background: #B2BEC3; border-radius: 3px; }

        .gear-card {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            margin-bottom: 8px;
            background: white;
            border: 3px solid #DFE6E9;
            border-radius: 16px;
            box-shadow: 0 3px 0 rgba(0,0,0,0.06);
            transition: all 0.15s;
        }
        .gear-card:hover { transform: translateY(-2px); border-color: #A29BFE; }
        .gear-card.owned {
            border-color: #2ECC40;
            background: linear-gradient(180deg, #EFFFEF 0%, #E0FFE0 100%);
        }
        .gear-card.max-level {
            border-color: #FFB800;
            background: linear-gradient(180deg, #FFFDE8 0%, #FFF5CC 100%);
        }

        .g-icon {
            width: 52px; height: 52px;
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 28px;
            flex-shrink: 0;
            border: 3px solid;
            box-shadow: 0 2px 0 rgba(0,0,0,0.1);
        }
        .icon-speed { background: linear-gradient(180deg, #74B9FF, #3498DB); border-color: #2176AA; }
        .icon-carry { background: linear-gradient(180deg, #FFB347, #FF8C00); border-color: #CC6600; }
        .icon-armor { background: linear-gradient(180deg, #95A5A6, #636E72); border-color: #4A4A4A; }
        .icon-luck { background: linear-gradient(180deg, #FFEAA7, #FDCB6E); border-color: #CC9900; }

        .g-info { flex: 1; min-width: 0; }
        .g-name {
            font-family: 'Luckiest Guy', cursive;
            font-size: 15px;
            color: #2C3E50;
        }
        .g-level {
            font-size: 11px; font-weight: 800;
            padding: 1px 8px;
            border-radius: 6px;
            display: inline-block;
            margin-left: 6px;
            vertical-align: middle;
            background: #A29BFE;
            color: white;
        }
        .g-desc {
            font-size: 11px; font-weight: 700;
            color: #636E72;
            margin-top: 2px;
        }
        .g-effect {
            font-size: 11px; font-weight: 800;
            color: #6C5CE7;
            margin-top: 2px;
        }

        .g-btn {
            padding: 8px 16px;
            border: 3px solid;
            border-radius: 12px;
            font-family: 'Luckiest Guy', cursive;
            font-size: 13px;
            cursor: pointer;
            box-shadow: 0 3px 0 rgba(0,0,0,0.12);
            transition: all 0.1s;
            flex-shrink: 0;
            text-shadow: 1px 1px 0 rgba(0,0,0,0.15);
        }
        .g-btn:active { transform: translateY(2px); box-shadow: none; }
        .btn-buy {
            background: linear-gradient(180deg, #FFE44D, #FFB800);
            border-color: #CC8800;
            color: #4A2800;
        }
        .btn-maxed {
            background: linear-gradient(180deg, #FFEAA7, #FDCB6E);
            border-color: #CC9900;
            color: #664400;
            cursor: default;
        }
        .btn-locked {
            background: linear-gradient(180deg, #DFE6E9, #B2BEC3);
            border-color: #95A5A6;
            color: #95A5A6;
            cursor: not-allowed;
            text-shadow: none;
        }

        /* Level pips */
        .level-pips {
            display: flex; gap: 3px; margin-top: 4px;
        }
        .pip {
            width: 16px; height: 6px;
            border-radius: 3px;
            background: #DFE6E9;
            border: 1px solid #B2BEC3;
        }
        .pip.filled {
            background: linear-gradient(90deg, #A29BFE, #6C5CE7);
            border-color: #5A4BD0;
        }

        .toast {
            position: fixed;
            bottom: 20px; left: 50%;
            transform: translateX(-50%);
            padding: 10px 24px;
            border-radius: 14px;
            background: linear-gradient(180deg, #A29BFE, #6C5CE7);
            border: 3px solid #5A4BD0;
            box-shadow: 0 3px 0 rgba(0,0,0,0.2);
            font-family: 'Luckiest Guy', cursive;
            font-size: 16px; color: white;
            text-shadow: 1px 1px 0 rgba(0,0,0,0.2);
            animation: pop 0.3s ease, fadeOut 0.3s ease 2s forwards;
            z-index: 30;
        }
        @keyframes pop { 0%{transform:translateX(-50%) scale(0.5);opacity:0} 70%{transform:translateX(-50%) scale(1.1)} 100%{transform:translateX(-50%) scale(1);opacity:1} }
        @keyframes fadeOut { to{opacity:0} }
    </style>
</head>
<body>
    <div class="shop-frame">
        <div class="shop-header">
            <h1>GEAR SHOP</h1>
            <div class="gold-badge" id="gold-display">&#x1F4B0; 0</div>
            <div class="close-x" onclick="closeShop()">X</div>
        </div>
        <div class="shop-body" id="gear-list"></div>
    </div>

    <script>
        const sdk = typeof PortalsSdk !== 'undefined' ? PortalsSdk : null;

        const GEAR = [
            {
                id: 'speed_boots', name: 'Speed Boots', icon: '\u{1F45F}', iconClass: 'icon-speed',
                maxLevel: 5,
                taskPrefix: 'gear_speed',
                levels: [
                    { cost: 3000, effect: 'Run +20%', desc: 'Faster movement profile' },
                    { cost: 10000, effect: 'Run +40%', desc: 'Noticeable speed increase' },
                    { cost: 35000, effect: 'Run +60%', desc: 'Serious hustle' },
                    { cost: 100000, effect: 'Run +80%', desc: 'Zooming through zones' },
                    { cost: 300000, effect: 'Run +100%', desc: 'Max movement speed' }
                ]
            },
            {
                id: 'carry_pack', name: 'Carry Pack', icon: '\u{1F392}', iconClass: 'icon-carry',
                maxLevel: 5,
                taskPrefix: 'gear_carry',
                levels: [
                    { cost: 2000, effect: 'Carry 2 brainrots', desc: 'Haul more per trip' },
                    { cost: 8000, effect: 'Carry 3 brainrots', desc: 'Triple carry' },
                    { cost: 25000, effect: 'Carry 4 brainrots', desc: 'Quad loader' },
                    { cost: 80000, effect: 'Carry 5 brainrots', desc: 'Heavy hauler' },
                    { cost: 250000, effect: 'Carry 6 brainrots', desc: 'Max payload' }
                ]
            },
            {
                id: 'armor', name: 'Battle Armor', icon: '\u{1F6E1}', iconClass: 'icon-armor',
                maxLevel: 4,
                taskPrefix: 'gear_armor',
                levels: [
                    { cost: 5000, effect: '+25 Max HP', desc: 'Basic protection' },
                    { cost: 20000, effect: '+50 Max HP', desc: 'Reinforced plates' },
                    { cost: 75000, effect: '+75 Max HP', desc: 'Heavy armor' },
                    { cost: 200000, effect: '+100 Max HP', desc: 'Tank mode' }
                ]
            },
            {
                id: 'lucky_charm', name: 'Lucky Charm', icon: '\u{1F340}', iconClass: 'icon-luck',
                maxLevel: 3,
                taskPrefix: 'gear_luck',
                levels: [
                    { cost: 20000, effect: '+10% gold per cycle', desc: 'Bonus income' },
                    { cost: 100000, effect: '+25% gold per cycle', desc: 'Lucky earner' },
                    { cost: 500000, effect: '+50% gold per cycle', desc: 'Fortune favors you' }
                ]
            }
        ];

        let state = { gold: 0, gearLevels: {} };
        GEAR.forEach(g => { state.gearLevels[g.id] = 0; });

        function fmt(n) {
            if (n >= 1e9) return (n/1e9).toFixed(1)+'B';
            if (n >= 1e6) return (n/1e6).toFixed(1)+'M';
            if (n >= 1e3) return (n/1e3).toFixed(1)+'K';
            return n.toLocaleString();
        }

        function render() {
            document.getElementById('gold-display').innerHTML = '&#x1F4B0; ' + fmt(state.gold);
            const list = document.getElementById('gear-list');
            list.innerHTML = '';

            GEAR.forEach(g => {
                const level = state.gearLevels[g.id] || 0;
                const maxed = level >= g.maxLevel;
                const nextLevel = maxed ? null : g.levels[level];
                const canBuy = nextLevel && state.gold >= nextLevel.cost;

                let btnClass, btnText;
                if (maxed) { btnClass = 'btn-maxed'; btnText = 'MAXED'; }
                else if (canBuy) { btnClass = 'btn-buy'; btnText = fmt(nextLevel.cost) + 'g'; }
                else { btnClass = 'btn-locked'; btnText = fmt(nextLevel.cost) + 'g'; }

                const currentEffect = level > 0 ? g.levels[level-1].effect : 'Not owned';
                const nextEffect = nextLevel ? nextLevel.effect : '';

                let pipsHTML = '';
                for (let i = 0; i < g.maxLevel; i++) {
                    pipsHTML += '<div class="pip' + (i < level ? ' filled' : '') + '"></div>';
                }

                const card = document.createElement('div');
                card.className = 'gear-card' + (maxed ? ' max-level' : level > 0 ? ' owned' : '');
                card.innerHTML = `
                    <div class="g-icon ${g.iconClass}">${g.icon}</div>
                    <div class="g-info">
                        <div class="g-name">${g.name} ${level > 0 ? '<span class="g-level">Lv.' + level + '</span>' : ''}</div>
                        <div class="g-desc">${maxed ? g.levels[g.maxLevel-1].desc : nextLevel.desc}</div>
                        <div class="g-effect">${maxed ? currentEffect + ' (MAX)' : level > 0 ? currentEffect + ' &rarr; ' + nextEffect : nextEffect}</div>
                        <div class="level-pips">${pipsHTML}</div>
                    </div>
                    <button class="g-btn ${btnClass}" data-gear="${g.id}">${btnText}</button>
                `;
                list.appendChild(card);
            });

            list.querySelectorAll('.g-btn.btn-buy').forEach(btn => {
                btn.addEventListener('click', () => buyGear(btn.dataset.gear));
            });
        }

        function buyGear(gearId) {
            const g = GEAR.find(x => x.id === gearId);
            const level = state.gearLevels[gearId] || 0;
            if (!g || level >= g.maxLevel) return;
            const next = g.levels[level];
            if (state.gold < next.cost) return;

            state.gold -= next.cost;
            state.gearLevels[gearId] = level + 1;
            render();

            if (sdk) {
                sdk.sendMessageToUnity(JSON.stringify({
                    TaskName: g.taskPrefix + '_' + (level + 1),
                    TaskTargetState: 'SetNotActiveToActive'
                }));
            }
            toast(g.name + ' Lv.' + (level + 1) + '!');
        }

        function toast(text) {
            const old = document.querySelector('.toast'); if(old)old.remove();
            const t = document.createElement('div'); t.className = 'toast'; t.textContent = text;
            document.body.appendChild(t); setTimeout(()=>{if(t.parentNode)t.remove();},2500);
        }

        function closeShop() { if(sdk){sdk.focusGameKeyboard();sdk.closeIframe();} }

        if (sdk) {
            sdk.setMessageListener(function(msg) {
                try {
                    const d = JSON.parse(msg);
                    if (d.gold !== undefined) state.gold = parseFloat(d.gold) || 0;
                    if (d.gearLevels) {
                        for (const [k, v] of Object.entries(d.gearLevels)) {
                            state.gearLevels[k] = parseInt(v) || 0;
                        }
                    }
                    render();
                } catch(e) {
                    if (msg.startsWith('gold:')) {
                        state.gold = parseFloat(msg.substring(5)) || 0;
                        render();
                    }
                }
            });
        }

        const params = new URLSearchParams(window.location.search);
        if (params.get('gold')) state.gold = parseFloat(params.get('gold')) || 0;

        render();
        if (!sdk) { state.gold = 50000; state.gearLevels = {speed_boots:2, carry_pack:1, armor:0, magnet:0, lucky_charm:0}; render(); }
    </script>
</body>
</html>
