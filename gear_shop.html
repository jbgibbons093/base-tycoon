<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Gear Shop</title>
    <script src="https://portals-labs.github.io/portals-sdk/portals-sdk.js?v=10005456"></script>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
    <link href="theme.css?v=1742508000" rel="stylesheet">
    <style>
        :root {
            --accent: #00E5FF;
            --accent-rgb: 0, 229, 255;
        }

        .shop-frame { width: 520px; max-height: 90vh; }

        .gear-card {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            margin-bottom: 8px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: var(--card-radius);
            transition: all 0.2s ease;
        }
        .gear-card:hover {
            transform: translateY(-2px);
            border-color: rgba(var(--accent-rgb), 0.3);
            box-shadow: 0 0 18px rgba(var(--accent-rgb), 0.1);
        }
        .gear-card.owned {
            border-color: rgba(0,255,136,0.2);
            background: rgba(0,255,136,0.04);
        }
        .gear-card.max-level {
            border-color: rgba(var(--neon-gold-rgb),0.25);
            background: rgba(var(--neon-gold-rgb),0.04);
            box-shadow: 0 0 14px rgba(var(--neon-gold-rgb),0.08);
        }

        .g-icon {
            width: 52px; height: 52px;
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 28px;
            flex-shrink: 0;
            border: 2px solid;
            box-shadow: 0 0 12px rgba(var(--accent-rgb), 0.12);
        }
        .icon-speed { background: linear-gradient(180deg, rgba(0,229,255,0.3), rgba(0,180,220,0.3)); border-color: rgba(0,229,255,0.4); }
        .icon-armor { background: linear-gradient(180deg, rgba(149,165,166,0.3), rgba(99,110,114,0.3)); border-color: rgba(149,165,166,0.4); }

        .g-info { flex: 1; min-width: 0; }
        .g-name {
            font-family: var(--font-display);
            font-size: 15px;
            color: #E0E0E0;
            text-shadow: 1px 1px 0 rgba(0,0,0,0.4);
        }
        .g-level {
            font-size: 11px; font-weight: 800;
            padding: 1px 8px;
            border-radius: 999px;
            display: inline-block;
            margin-left: 6px;
            vertical-align: middle;
            background: rgba(var(--neon-purple-rgb),0.25);
            color: var(--neon-purple);
            border: 1px solid rgba(var(--neon-purple-rgb),0.2);
        }
        .g-desc {
            font-size: 11px; font-weight: 700;
            color: rgba(255,255,255,0.4);
            margin-top: 2px;
        }
        .g-effect {
            font-size: 11px; font-weight: 800;
            color: var(--neon-purple);
            margin-top: 2px;
            text-shadow: 0 0 6px rgba(var(--neon-purple-rgb),0.3);
        }

        .g-btn {
            padding: 8px 16px;
            border: 2px solid;
            border-radius: 12px;
            font-family: var(--font-display);
            font-size: 13px;
            cursor: pointer;
            box-shadow: 0 4px 0 rgba(0,0,0,0.25);
            transition: transform 0.15s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.15s;
            flex-shrink: 0;
            text-shadow: 1px 1px 0 rgba(0,0,0,0.2);
        }
        .g-btn:hover { transform: scale(1.05) translateY(-2px); box-shadow: 0 6px 0 rgba(0,0,0,0.2), 0 0 12px rgba(var(--accent-rgb),0.12); }
        .g-btn:active { transform: scale(0.92) translateY(3px); box-shadow: 0 1px 0 rgba(0,0,0,0.2); transition-duration: 0.05s; }
        .g-btn.btn-maxed {
            background: linear-gradient(180deg, rgba(255,234,167,0.8), rgba(253,203,110,0.8));
            border-color: rgba(204,153,0,0.5);
            color: #664400;
            cursor: default;
        }

        /* Level pips */
        .level-pips {
            display: flex; gap: 3px; margin-top: 4px;
        }
        .pip {
            width: 16px; height: 6px;
            border-radius: 3px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.06);
        }
        .pip.filled {
            background: linear-gradient(90deg, var(--neon-purple), #6C5CE7);
            border-color: rgba(var(--neon-purple-rgb),0.4);
            box-shadow: 0 0 6px rgba(var(--neon-purple-rgb),0.3);
        }
    </style>
</head>
<body>
    <div class="shop-frame">
        <div class="shop-header">
            <h1>GEAR</h1>
            <div class="gold-badge" id="gold-display"><img src="cash.png" style="height:18px;vertical-align:middle;margin-right:4px">0</div>
            <div class="close-x" onclick="closeShop()">X</div>
        </div>
        <div class="shop-body" id="gear-list"></div>
    </div>

    <script>
        const sdk = typeof PortalsSdk !== 'undefined' ? PortalsSdk : null;

        // ---- SOUND SYSTEM ----
        var _mp3Sounds = {};
        (function() {
            var files = { purchase: 'cash-new.mp3', click: 'click.mp3', levelup: 'levelup.mp3', uipop: 'ui-pop.mp3' };
            for (var k in files) { var a = new Audio(files[k]); a.preload = 'auto'; a.volume = (k === 'click') ? 0.5 : 0.3; _mp3Sounds[k] = a; }
        })();
        function playSound(type) { var s = _mp3Sounds[type]; if (s) { s.currentTime = 0; s.play().catch(function(){}); } }
        function spawnSpendParticles(count) {
            count = count || 6;
            var badge = document.getElementById('gold-display');
            if (!badge) return;
            badge.style.position = 'relative';
            for (var i = 0; i < count; i++) {
                (function(idx) {
                    setTimeout(function() {
                        var p = document.createElement('div');
                        p.className = 'spend-particle';
                        p.textContent = '-$';
                        var dx = (Math.random() - 0.5) * 80;
                        var dy = -(20 + Math.random() * 50);
                        p.style.setProperty('--dx', dx + 'px');
                        p.style.setProperty('--dy', dy + 'px');
                        p.style.left = (Math.random() * 60) + '%';
                        p.style.top = '0px';
                        badge.appendChild(p);
                        setTimeout(function() { if (p.parentNode) p.remove(); }, 1100);
                    }, idx * 50);
                })(i);
            }
        }

        const GEAR = [
            {
                id: 'speed_boots', name: 'Speed Boots', icon: '<img src="spr_boots.png" style="width:60px;height:60px;object-fit:contain">', iconClass: 'icon-speed',
                maxLevel: 5,
                taskPrefix: 'gear_speed',
                levels: [
                    { cost: 3000, effect: 'Run +20%', desc: 'Faster movement profile' },
                    { cost: 10000, effect: 'Run +40%', desc: 'Noticeable speed increase' },
                    { cost: 35000, effect: 'Run +60%', desc: 'Serious hustle' },
                    { cost: 100000, effect: 'Run +80%', desc: 'Zooming through zones' },
                    { cost: 300000, effect: 'Run +100%', desc: 'Max movement speed' }
                ]
            },
            {
                id: 'armor', name: 'Battle Armor', icon: '<img src="spr_armor.png" style="width:60px;height:60px;object-fit:contain">', iconClass: 'icon-armor',
                maxLevel: 4,
                taskPrefix: 'gear_armor',
                levels: [
                    { cost: 5000, effect: '+25 Max HP', desc: 'Basic protection' },
                    { cost: 20000, effect: '+50 Max HP', desc: 'Reinforced plates' },
                    { cost: 75000, effect: '+75 Max HP', desc: 'Heavy armor' },
                    { cost: 200000, effect: '+100 Max HP', desc: 'Tank mode' }
                ]
            }
        ];

        let state = { gold: 0, gearLevels: {} };
        GEAR.forEach(g => { state.gearLevels[g.id] = 0; });

        function fmt(n) {
            if (n >= 1e9) return (n/1e9).toFixed(1)+'B';
            if (n >= 1e6) return (n/1e6).toFixed(1)+'M';
            if (n >= 1e3) return (n/1e3).toFixed(1)+'K';
            return n.toLocaleString();
        }

        function render() {
            document.getElementById('gold-display').innerHTML = '<img src="cash.png" style="height:18px;vertical-align:middle;margin-right:4px">' + fmt(state.gold);
            const list = document.getElementById('gear-list');
            list.innerHTML = '';

            GEAR.forEach(g => {
                const level = state.gearLevels[g.id] || 0;
                const maxed = level >= g.maxLevel;
                const nextLevel = maxed ? null : g.levels[level];
                const canBuy = nextLevel && state.gold >= nextLevel.cost;

                let btnClass, btnText;
                if (maxed) { btnClass = 'btn-maxed'; btnText = 'MAXED'; }
                else if (canBuy) { btnClass = 'btn-buy'; btnText = '$' + fmt(nextLevel.cost); }
                else { btnClass = 'btn-locked'; btnText = '$' + fmt(nextLevel.cost); }

                const currentEffect = level > 0 ? g.levels[level-1].effect : 'Not owned';
                const nextEffect = nextLevel ? nextLevel.effect : '';

                let pipsHTML = '';
                for (let i = 0; i < g.maxLevel; i++) {
                    pipsHTML += '<div class="pip' + (i < level ? ' filled' : '') + '"></div>';
                }

                const card = document.createElement('div');
                card.className = 'gear-card' + (maxed ? ' max-level' : level > 0 ? ' owned' : '');
                card.innerHTML = `
                    <div class="g-icon ${g.iconClass}">${g.icon}</div>
                    <div class="g-info">
                        <div class="g-name">${g.name} ${level > 0 ? '<span class="g-level">Lv.' + level + '</span>' : ''}</div>
                        <div class="g-desc">${maxed ? g.levels[g.maxLevel-1].desc : nextLevel.desc}</div>
                        <div class="g-effect">${maxed ? currentEffect + ' (MAX)' : level > 0 ? currentEffect + ' &rarr; ' + nextEffect : nextEffect}</div>
                        <div class="level-pips">${pipsHTML}</div>
                    </div>
                    <button class="g-btn ${btnClass}" data-gear="${g.id}">${btnText}</button>
                `;
                list.appendChild(card);
            });

            list.querySelectorAll('.g-btn.btn-buy').forEach(btn => {
                btn.addEventListener('click', () => buyGear(btn.dataset.gear));
            });
        }

        function buyGear(gearId) {
            const g = GEAR.find(x => x.id === gearId);
            const level = state.gearLevels[gearId] || 0;
            if (!g || level >= g.maxLevel) return;
            const next = g.levels[level];
            if (state.gold < next.cost) return;

            state.gold -= next.cost;
            state.gearLevels[gearId] = level + 1;
            render();
            playSound(state.gearLevels[gearId] >= g.maxLevel ? 'levelup' : 'purchase');
            spawnSpendParticles(8);

            if (sdk) {
                var taskName = g.taskPrefix + '_' + (level + 1);
                sdk.sendMessageToUnity(JSON.stringify({
                    TaskName: taskName,
                    TaskTargetState: 'SetNotActiveToActive'
                }));
            }
            toast(g.name + ' Lv.' + (level + 1) + '!');
        }

        function toast(text) {
            const old = document.querySelector('.toast'); if(old)old.remove();
            const t = document.createElement('div'); t.className = 'toast'; t.textContent = text;
            document.body.appendChild(t); setTimeout(()=>{if(t.parentNode)t.remove();},2500);
        }

        function closeShop() { playSound('click'); if(sdk){sdk.focusGameKeyboard();sdk.closeIframe();} }

        /** Parse a variable value from Portals |var| interpolation. */
        function parseVarValue(raw) {
            if (raw === undefined || raw === null || raw === '') return 0;
            raw = String(raw).trim();
            const num = Number(raw);
            if (!isNaN(num)) return num;
            try {
                const parsed = JSON.parse(raw);
                if (typeof parsed === 'number') return parsed;
                if (typeof parsed === 'object' && parsed !== null) {
                    const vals = Object.values(parsed);
                    return vals.length > 0 ? (Number(vals[0]) || 0) : 0;
                }
            } catch(e) {}
            var m = raw.match(/[=:](\d+\.?\d*)/);
            if (m) return parseFloat(m[1]) || 0;
            return 0;
        }

        // --- Message deduplication ---
        let _lastMsgId = '', _lastMsgTime = 0;
        function processMessage(msg) {
            const now = Date.now();
            const msgId = msg + '_' + Math.floor(now / 100);
            if (msgId === _lastMsgId && now - _lastMsgTime < 200) return;
            _lastMsgId = msgId; _lastMsgTime = now;
            handleMessage(msg);
        }

        function handleMessage(msg) {
            console.log('[GearShop] Received:', msg);

            // inv: format — "inv:Gold=|Gold|&Gear_SpeedBoots=|Gear_SpeedBoots|&..."
            if (msg.startsWith('inv:')) {
                const payload = msg.substring(4);
                const pairs = payload.split('&');
                for (const pair of pairs) {
                    const eq = pair.indexOf('=');
                    if (eq < 0) continue;
                    const key = pair.substring(0, eq).trim();
                    const val = parseVarValue(pair.substring(eq + 1));
                    if (key === 'Gold') state.gold = val;
                    else if (key === 'Gear_SpeedBoots') state.gearLevels.speed_boots = val;

                    else if (key === 'Gear_Armor') state.gearLevels.armor = val;
                }
                render();
                return;
            }

            // gold: format
            if (msg.startsWith('gold:')) {
                state.gold = parseFloat(msg.substring(5)) || 0;
                render();
                return;
            }

            // JSON format
            try {
                const d = JSON.parse(msg);
                if (d.gold !== undefined) state.gold = parseFloat(d.gold) || 0;
                if (d.gearLevels) {
                    for (const [k, v] of Object.entries(d.gearLevels)) {
                        state.gearLevels[k] = parseInt(v) || 0;
                    }
                }
                render();
            } catch(e) {}
        }

        // --- SDK message listener ---
        if (sdk) {
            sdk.setMessageListener(function(msg) { processMessage(msg); });
        }
        window.addEventListener('message', function(event) {
            if (event.data && typeof event.data === 'string') processMessage(event.data);
            else if (event.data && event.data.portalsMessage) processMessage(event.data.portalsMessage);
        });

        // --- Keyboard refocus ---
        function _doFocusGame() {
            if (typeof PortalsSdk !== 'undefined' && PortalsSdk.focusGameKeyboard) PortalsSdk.focusGameKeyboard();
        }
        document.addEventListener('click', function(e) {
            if (document.hidden) return;
            if (e && e.target) {
                var tag = e.target.tagName;
                if (tag === 'BUTTON' || tag === 'SELECT' || tag === 'INPUT') return;
                if (e.target.closest && e.target.closest('button, select')) return;
            }
            _doFocusGame();
        });
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') { e.preventDefault(); closeShop(); return; }
            if (!document.hidden) _doFocusGame();
        });
        document.addEventListener('mouseup', function(e) {
            if (e && e.target) {
                var tag = e.target.tagName;
                if (tag === 'BUTTON' || tag === 'SELECT' || tag === 'INPUT') return;
                if (e.target.closest && e.target.closest('button, select')) return;
            }
            setTimeout(_doFocusGame, 50);
        });
        _doFocusGame();
        setTimeout(_doFocusGame, 100);
        setTimeout(_doFocusGame, 300);

        // Request variable sync from Portals after iframe is loaded
        function requestSync() {
            if (!sdk) return;
            sdk.sendMessageToUnity(JSON.stringify({
                TaskName: 'hud_sync',
                TaskTargetState: 'SetAnyToActive'
            }));
        }
        if (sdk) {
            setTimeout(requestSync, 300);
            setTimeout(requestSync, 1000);
            setTimeout(requestSync, 2500);
        }

        const params = new URLSearchParams(window.location.search);
        if (params.get('gold')) state.gold = parseFloat(params.get('gold')) || 0;

        render();
        if (!sdk) { state.gold = 50000; state.gearLevels = {speed_boots:2, armor:0}; render(); }
    </script>
</body>
</html>
