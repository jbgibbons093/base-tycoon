<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Brainrot Tycoon HUD</title>
    <script src="https://portals-labs.github.io/portals-sdk/portals-sdk.js?v=10005456"></script>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
    <style>
        html, body {
            margin: 0; padding: 0;
            background: transparent !important;
            overflow: hidden;
            font-family: 'Nunito', sans-serif;
            color: white;
            user-select: none;
            -webkit-text-stroke: 0.5px rgba(0,0,0,0.15);
        }

        /* ---- TOP CURRENCY BARS ---- */
        .top-bar {
            position: fixed;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 10;
        }

        .currency-pill {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 6px 4px 4px;
            border-radius: 28px;
            border: 3px solid rgba(0,0,0,0.25);
            box-shadow: 0 4px 0 rgba(0,0,0,0.2), 0 6px 12px rgba(0,0,0,0.15);
            position: relative;
            min-width: 90px;
        }
        .currency-pill .icon-circle {
            width: 36px; height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            border: 3px solid rgba(0,0,0,0.2);
            flex-shrink: 0;
        }
        .currency-pill .val {
            font-family: 'Luckiest Guy', cursive;
            font-size: 20px;
            text-shadow: 2px 2px 0 rgba(0,0,0,0.3);
            letter-spacing: 0.5px;
        }

        /* Gold pill */
        .pill-gold {
            background: linear-gradient(180deg, #FFE44D 0%, #FFB800 100%);
            border-color: #CC8800;
        }
        .pill-gold .icon-circle { background: #FFA500; border-color: #CC7700; }
        .pill-gold .val { color: #4A2800; }

        /* Base pill */
        .pill-base {
            background: linear-gradient(180deg, #6EF06E 0%, #2ECC40 100%);
            border-color: #1FA030;
        }
        .pill-base .icon-circle { background: #22AA22; border-color: #188818; }
        .pill-base .val { color: #0A3A0A; }

        /* Rebirth pill */
        .pill-rebirth {
            background: linear-gradient(180deg, #FF7B7B 0%, #FF3B3B 100%);
            border-color: #CC2222;
        }
        .pill-rebirth .icon-circle { background: #DD2222; border-color: #AA1111; }
        .pill-rebirth .val { color: #3A0000; }

        /* ---- CARRY BANNER ---- */
        .carry-banner {
            position: fixed;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            padding: 6px 20px;
            border-radius: 16px;
            background: linear-gradient(180deg, #FFB347 0%, #FF8C00 100%);
            border: 3px solid #CC6600;
            box-shadow: 0 3px 0 rgba(0,0,0,0.2);
            font-family: 'Luckiest Guy', cursive;
            font-size: 16px;
            color: #3A1800;
            text-shadow: 1px 1px 0 rgba(255,255,255,0.3);
            z-index: 10;
            display: none;
            white-space: nowrap;
        }
        .carry-banner.show { display: block; }

        /* ---- TOAST ---- */
        .toast-container {
            position: fixed;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            gap: 6px;
            align-items: center;
            z-index: 30;
        }
        .toast {
            padding: 8px 20px;
            border-radius: 14px;
            background: linear-gradient(180deg, #FFE44D, #FFB800);
            border: 3px solid #CC8800;
            box-shadow: 0 3px 0 rgba(0,0,0,0.2);
            font-family: 'Luckiest Guy', cursive;
            font-size: 16px;
            color: #4A2800;
            text-shadow: 1px 1px 0 rgba(255,255,255,0.3);
            animation: toastPop 0.3s ease, toastOut 0.3s ease 2s forwards;
            white-space: nowrap;
        }
        @keyframes toastPop {
            0% { transform: scale(0.5); opacity: 0; }
            70% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes toastOut {
            to { opacity: 0; transform: translateY(-10px) scale(0.9); }
        }

        /* Pop animation */
        .pop { animation: popBounce 0.3s ease; }
        @keyframes popBounce {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <!-- TOP CURRENCY BARS -->
    <div class="top-bar">
        <div class="currency-pill pill-gold" id="pill-gold">
            <div class="icon-circle">&#x1F4B0;</div>
            <span class="val" id="val-gold">0</span>
        </div>
        <div class="currency-pill pill-base" id="pill-base">
            <div class="icon-circle">&#x1F3E0;</div>
            <span class="val" id="val-base">---</span>
        </div>
        <div class="currency-pill pill-rebirth" id="pill-rebirth">
            <div class="icon-circle">&#x1F525;</div>
            <span class="val" id="val-rebirth">0</span>
        </div>
    </div>

    <!-- CARRY BANNER -->
    <div class="carry-banner" id="carry-banner">
        &#x1F9F8; Carrying: <span id="carry-gold">0</span>g
    </div>

    <!-- TOAST -->
    <div class="toast-container" id="toasts"></div>

    <script>
        const sdk = typeof PortalsSdk !== 'undefined' ? PortalsSdk : null;

        let state = { gold: 0, baseId: 0, carrying: 0, carryGold: 0, rebirth: 0 };

        const valGold = document.getElementById('val-gold');
        const valBase = document.getElementById('val-base');
        const valRebirth = document.getElementById('val-rebirth');
        const carryBanner = document.getElementById('carry-banner');
        const carryGoldEl = document.getElementById('carry-gold');
        const toastContainer = document.getElementById('toasts');

        function fmt(n) {
            if (n >= 1e9) return (n/1e9).toFixed(1)+'B';
            if (n >= 1e6) return (n/1e6).toFixed(1)+'M';
            if (n >= 1e3) return (n/1e3).toFixed(1)+'K';
            return Math.floor(n).toLocaleString();
        }

        function updateDisplay() {
            valGold.textContent = fmt(state.gold);
            valBase.textContent = state.baseId > 0 ? '#' + state.baseId : '---';
            valRebirth.textContent = state.rebirth;
            if (state.carrying > 0) {
                carryBanner.classList.add('show');
                carryGoldEl.textContent = state.carryGold;
            } else {
                carryBanner.classList.remove('show');
            }
        }

        function pop(el) {
            el.classList.remove('pop');
            void el.offsetWidth;
            el.classList.add('pop');
        }

        function showToast(text) {
            const t = document.createElement('div');
            t.className = 'toast';
            t.textContent = text;
            toastContainer.appendChild(t);
            setTimeout(() => { if (t.parentNode) t.remove(); }, 2500);
        }

        if (sdk) {
            sdk.setMessageListener(function(msg) {
                try {
                    const d = JSON.parse(msg);
                    if (d.gold !== undefined) { state.gold = parseFloat(d.gold)||0; pop(document.getElementById('pill-gold')); }
                    if (d.baseId !== undefined) state.baseId = parseInt(d.baseId)||0;
                    if (d.carrying !== undefined) state.carrying = parseFloat(d.carrying)||0;
                    if (d.carryGold !== undefined) state.carryGold = parseFloat(d.carryGold)||0;
                    if (d.rebirth !== undefined) state.rebirth = parseInt(d.rebirth)||0;
                    if (d.toast) showToast(d.toast);
                    updateDisplay();
                    return;
                } catch(e) {}
                if (msg.startsWith('gold:')) {
                    const v = parseFloat(msg.substring(5))||0;
                    const diff = v - state.gold;
                    state.gold = v; updateDisplay(); pop(document.getElementById('pill-gold'));
                    if (diff > 0) showToast('+' + fmt(diff) + ' Gold');
                } else if (msg.startsWith('carry:')) {
                    const p = msg.substring(6).split(',');
                    state.carrying = parseFloat(p[0])||0;
                    state.carryGold = parseFloat(p[1])||0;
                    updateDisplay();
                } else if (msg.startsWith('base:')) {
                    state.baseId = parseInt(msg.substring(5))||0; updateDisplay();
                } else if (msg.startsWith('rebirth:')) {
                    state.rebirth = parseInt(msg.substring(8))||0; updateDisplay();
                } else if (msg.startsWith('toast:')) {
                    showToast(msg.substring(6));
                }
            });
        }

        updateDisplay();
        if (!sdk) { state.gold = 42350; state.baseId = 3; state.carrying = 1; state.carryGold = 14.6; state.rebirth = 1; updateDisplay(); }
    </script>
</body>
</html>
