<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Brainrot Tycoon HUD</title>
    <script src="https://portals-labs.github.io/portals-sdk/portals-sdk.js?v=10005456"></script>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
    <style>
        html, body {
            margin: 0; padding: 0;
            background: transparent !important;
            overflow: hidden;
            font-family: 'Nunito', sans-serif;
            color: white;
            user-select: none;
            -webkit-text-stroke: 0.5px rgba(0,0,0,0.15);
        }

        /* ---- BOTTOM-LEFT HUD STACK ---- */
        .hud-stack {
            position: fixed;
            bottom: 70px;
            left: 12px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 6px;
            z-index: 10;
        }

        .currency-pill {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 6px 4px 4px;
            border-radius: 28px;
            border: 3px solid rgba(0,0,0,0.25);
            box-shadow: 0 4px 0 rgba(0,0,0,0.2), 0 6px 12px rgba(0,0,0,0.15);
            position: relative;
            min-width: 90px;
        }
        .currency-pill .icon-circle {
            width: 36px; height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            border: 3px solid rgba(0,0,0,0.2);
            flex-shrink: 0;
        }
        .currency-pill .val {
            font-family: 'Luckiest Guy', cursive;
            font-size: 20px;
            text-shadow: 2px 2px 0 rgba(0,0,0,0.3);
            letter-spacing: 0.5px;
        }

        /* Cash pill */
        .pill-gold {
            background: linear-gradient(180deg, #5BDB5B 0%, #2EAA2E 100%);
            border-color: #1E8A1E;
        }
        .pill-gold .icon-circle { background: #228B22; border-color: #1A6B1A; }
        .pill-gold .val { color: #0A2A0A; }

        /* Cash stack icon (CSS-drawn) */
        .cash-icon {
            width: 26px; height: 20px;
            position: relative;
        }
        .cash-bill {
            position: absolute;
            width: 22px; height: 10px;
            border-radius: 2px;
            border: 1.5px solid rgba(0,0,0,0.3);
            left: 50%; transform: translateX(-50%);
        }
        .cash-bill:nth-child(1) { background: #1B5E20; bottom: 0; }
        .cash-bill:nth-child(2) { background: #2E7D32; bottom: 4px; }
        .cash-bill:nth-child(3) { background: #43A047; bottom: 8px; }
        .cash-bill .dollar {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 8px;
            font-weight: 900;
            color: rgba(255,255,255,0.8);
            font-family: 'Nunito', sans-serif;
        }

        /* ---- CARRY BANNER (below cash in stack) ---- */
        .carry-banner {
            padding: 4px 14px;
            border-radius: 14px;
            background: linear-gradient(180deg, #FFB347 0%, #FF8C00 100%);
            border: 3px solid #CC6600;
            box-shadow: 0 3px 0 rgba(0,0,0,0.2);
            font-family: 'Luckiest Guy', cursive;
            font-size: 14px;
            color: #3A1800;
            text-shadow: 1px 1px 0 rgba(255,255,255,0.3);
            display: none;
            white-space: nowrap;
        }
        .carry-banner.show { display: block; }

        /* ---- CLAIM BASE BANNER ---- */
        .claim-banner {
            padding: 4px 14px;
            border-radius: 14px;
            background: linear-gradient(180deg, #74B9FF 0%, #0984E3 100%);
            border: 3px solid #0660A0;
            box-shadow: 0 3px 0 rgba(0,0,0,0.2);
            font-family: 'Luckiest Guy', cursive;
            font-size: 14px;
            color: white;
            text-shadow: 1px 1px 0 rgba(0,0,0,0.3);
            display: none;
            white-space: nowrap;
            animation: claimPulse 2s ease-in-out infinite;
        }
        .claim-banner.show { display: block; }
        @keyframes claimPulse {
            0%, 100% { box-shadow: 0 3px 0 rgba(0,0,0,0.2); }
            50% { box-shadow: 0 3px 0 rgba(0,0,0,0.2), 0 0 12px rgba(9,132,227,0.4); }
        }
        /* ---- SPECTATOR BANNER ---- */
        .spectator-banner {
            padding: 6px 18px;
            border-radius: 14px;
            background: linear-gradient(180deg, #636E72 0%, #2D3436 100%);
            border: 3px solid #1A1A2E;
            box-shadow: 0 3px 0 rgba(0,0,0,0.3);
            font-family: 'Luckiest Guy', cursive;
            font-size: 15px;
            color: #DFE6E9;
            text-shadow: 1px 1px 0 rgba(0,0,0,0.5);
            display: none;
            white-space: nowrap;
        }
        .spectator-banner.show { display: block; }

        /* ---- SPAWN TIMERS (vertical, above notifs) ---- */
        .spawn-strip {
            display: flex;
            flex-direction: column;
            gap: 4px;
            align-items: flex-start;
        }
        .spawn-pip {
            display: flex;
            align-items: center;
            gap: 6px;
            position: relative;
        }
        .spawn-pip .pip-name {
            font-family: 'Luckiest Guy', cursive;
            font-size: 11px;
            color: white;
            text-shadow: 1px 1px 0 rgba(0,0,0,0.5);
            white-space: nowrap;
            min-width: 90px;
            text-align: right;
        }
        .spawn-pip .pip-ring {
            position: relative;
            width: 28px;
            height: 28px;
            flex-shrink: 0;
        }
        .spawn-pip .pip-ring svg {
            width: 28px;
            height: 28px;
            transform: rotate(-90deg);
        }
        .spawn-pip .pip-ring-bg {
            fill: none;
            stroke: rgba(0,0,0,0.3);
            stroke-width: 3;
        }
        .spawn-pip .pip-ring-fill {
            fill: none;
            stroke-width: 3.5;
            stroke-linecap: round;
            transition: stroke-dashoffset 0.9s linear;
        }
        .spawn-pip .pip-secs {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Nunito', sans-serif;
            font-weight: 900;
            font-size: 9px;
            color: white;
            text-shadow: 1px 1px 0 rgba(0,0,0,0.5);
        }
        .spawn-pip.full .pip-name {
            opacity: 0.4;
        }
        .spawn-pip.full .pip-ring {
            opacity: 0.4;
        }

        /* ---- NOTIFICATION FEED (above cash in stack) ---- */
        .notif-container {
            display: flex;
            flex-direction: column;
            gap: 4px;
            align-items: flex-start;
            pointer-events: none;
        }
        .notif {
            padding: 5px 12px;
            border-radius: 12px;
            box-shadow: 0 2px 0 rgba(0,0,0,0.2);
            font-family: 'Luckiest Guy', cursive;
            font-size: 12px;
            text-shadow: 1px 1px 0 rgba(0,0,0,0.2);
            white-space: nowrap;
            animation: notifSlide 0.3s ease, notifOut 0.4s ease 3s forwards;
        }
        .notif-gold {
            background: linear-gradient(180deg, #FFE44D, #FFB800);
            border: 3px solid #CC8800;
            color: #4A2800;
        }
        .notif-pickup {
            background: linear-gradient(180deg, #FFB347, #FF8C00);
            border: 3px solid #CC6600;
            color: #3A1800;
        }
        .notif-deposit {
            background: linear-gradient(180deg, #6EF06E, #2ECC40);
            border: 3px solid #1FA030;
            color: #0A3A0A;
        }
        .notif-spawn {
            background: linear-gradient(180deg, #74B9FF, #3498DB);
            border: 3px solid #2176AA;
            color: #0A1A3A;
        }
        .notif-info {
            background: linear-gradient(180deg, #DFE6E9, #B2BEC3);
            border: 3px solid #95A5A6;
            color: #2C3E50;
        }
        .notif-error {
            background: linear-gradient(180deg, #FF6B6B, #E74C3C);
            border: 3px solid #C0392B;
            color: #FFFFFF;
        }
        @keyframes notifSlide {
            0% { transform: translateX(-80px); opacity: 0; }
            70% { transform: translateX(3px); }
            100% { transform: translateX(0); opacity: 1; }
        }
        @keyframes notifOut {
            to { opacity: 0; transform: translateX(-40px); }
        }

        /* ---- LEGACY TOAST (keep for compat) ---- */
        .toast-container {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            gap: 6px;
            align-items: center;
            z-index: 30;
        }
        .toast {
            padding: 8px 20px;
            border-radius: 14px;
            background: linear-gradient(180deg, #FFE44D, #FFB800);
            border: 3px solid #CC8800;
            box-shadow: 0 3px 0 rgba(0,0,0,0.2);
            font-family: 'Luckiest Guy', cursive;
            font-size: 16px;
            color: #4A2800;
            text-shadow: 1px 1px 0 rgba(255,255,255,0.3);
            animation: toastPop 0.3s ease, toastOut 0.3s ease 2s forwards;
            white-space: nowrap;
        }
        @keyframes toastPop {
            0% { transform: scale(0.5); opacity: 0; }
            70% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes toastOut {
            to { opacity: 0; transform: translateY(-10px) scale(0.9); }
        }

        /* Pending gold sub-text */
        .gold-pending {
            font-family: 'Nunito', sans-serif;
            font-size: 11px;
            font-weight: 800;
            color: #8B6914;
            opacity: 0.8;
            margin-top: -2px;
            text-align: center;
        }
        .gold-rate {
            font-family: 'Nunito', sans-serif;
            font-size: 9px;
            font-weight: 700;
            color: #8B6914;
            opacity: 0.6;
            text-align: center;
        }
        .pill-gold { flex-direction: column; align-items: center; padding: 4px 10px; }
        .pill-gold .gold-row { display: flex; align-items: center; gap: 6px; }

        /* Pop animation */
        .pop { animation: popBounce 0.3s ease; }
        @keyframes popBounce {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        /* Cash particle animation */
        .cash-particle {
            position: absolute;
            font-family: 'Luckiest Guy', cursive;
            font-size: 16px;
            font-weight: 900;
            pointer-events: none;
            z-index: 100;
            text-shadow: 1px 1px 0 rgba(0,0,0,0.3);
            animation: cashFly 1s ease-out forwards;
        }
        .cash-particle.earn { color: #2ECC40; }
        .cash-particle.spend { color: #E74C3C; }
        @keyframes cashFly {
            0% { opacity: 1; transform: translate(0, 0) scale(1); }
            100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(0.5); }
        }

        /* ---- KILL NOTIFICATION ---- */
        .notif-kill {
            background: linear-gradient(180deg, #6EF06E, #2ECC40);
            border: 3px solid #1FA030;
            color: #0A3A0A;
        }

        /* ---- DEATH/KILL SCREEN FLASH ---- */
        .screen-flash {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            z-index: 50;
            animation: flashFade 0.6s ease-out forwards;
        }
        .screen-flash.death { background: rgba(231, 76, 60, 0.35); }
        .screen-flash.kill { background: rgba(46, 204, 64, 0.25); }
        @keyframes flashFade {
            0% { opacity: 1; }
            100% { opacity: 0; }
        }

        /* ---- TUTORIAL NOTIFICATION ---- */
        .tutorial-banner {
            position: fixed;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            padding: 8px 20px;
            border-radius: 16px;
            background: linear-gradient(180deg, #74B9FF 0%, #0984E3 100%);
            border: 3px solid #0660A0;
            box-shadow: 0 4px 0 rgba(0,0,0,0.2), 0 0 16px rgba(9,132,227,0.3);
            font-family: 'Luckiest Guy', cursive;
            font-size: 15px;
            color: white;
            text-shadow: 1px 1px 0 rgba(0,0,0,0.3);
            white-space: nowrap;
            z-index: 40;
            display: none;
            animation: tutorialPulse 2.5s ease-in-out infinite;
            pointer-events: none;
        }
        .tutorial-banner.show { display: block; }
        @keyframes tutorialPulse {
            0%, 100% { box-shadow: 0 4px 0 rgba(0,0,0,0.2), 0 0 16px rgba(9,132,227,0.3); }
            50% { box-shadow: 0 4px 0 rgba(0,0,0,0.2), 0 0 24px rgba(9,132,227,0.5); }
        }

        /* ---- CENTER KILL/DEATH TEXT ---- */
        .center-alert {
            position: fixed;
            top: 30%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Luckiest Guy', cursive;
            font-size: 32px;
            text-shadow: 2px 2px 0 rgba(0,0,0,0.4), 0 0 20px rgba(0,0,0,0.3);
            pointer-events: none;
            z-index: 51;
            animation: alertPop 0.4s ease, alertOut 0.4s ease 1.5s forwards;
            white-space: nowrap;
        }
        .center-alert.death { color: #FF4444; }
        .center-alert.kill { color: #2ECC40; }
        @keyframes alertPop {
            0% { transform: translate(-50%, -50%) scale(0.3); opacity: 0; }
            60% { transform: translate(-50%, -50%) scale(1.15); }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }
        @keyframes alertOut {
            to { opacity: 0; transform: translate(-50%, -60%) scale(0.8); }
        }
    </style>
</head>
<body>
    <!-- BOTTOM-LEFT HUD STACK (top to bottom: timers, notifs, cash, carry) -->
    <div class="hud-stack">
        <!-- SPAWN TIMERS (topmost in stack) -->
        <div class="spawn-strip" id="spawn-strip"></div>

        <!-- NOTIFICATION FEED (above cash) -->
        <div class="notif-container" id="notifs"></div>

        <!-- CASH PILL -->
        <div class="currency-pill pill-gold" id="pill-gold">
            <div class="gold-row">
                <div class="icon-circle">
                    <div class="cash-icon">
                        <div class="cash-bill"><span class="dollar">$</span></div>
                        <div class="cash-bill"></div>
                        <div class="cash-bill"><span class="dollar">$</span></div>
                    </div>
                </div>
                <span class="val" id="val-gold">0</span>
            </div>
            <div class="gold-pending" id="gold-pending" style="display:none">+0 pending</div>
            <div class="gold-rate" id="gold-rate" style="display:none">0/s</div>
        </div>

        <!-- CARRY BANNER (below cash) -->
        <div class="carry-banner" id="carry-banner">
            &#x1F9F8; Carrying <span id="carry-name">???</span> ($<span id="carry-gold">0</span>/s)
        </div>

        <!-- CLAIM BASE BANNER -->
        <div class="claim-banner" id="claim-banner">
            &#x1F3E0; Find a base and claim it!
        </div>
        <!-- SPECTATOR BANNER -->
        <div class="spectator-banner" id="spectator-banner">
            &#x1F441; Spectator Mode — All bases taken
        </div>
    </div>

    <!-- TUTORIAL BANNER (top center) -->
    <div class="tutorial-banner" id="tutorial-banner"></div>

    <!-- TOAST (legacy) -->
    <div class="toast-container" id="toasts"></div>

    <script>
        const sdk = typeof PortalsSdk !== 'undefined' ? PortalsSdk : null;

        // ---- SOUND SYSTEM (Web Audio API — HUD has noPointerEvents so no user gestures) ----
        // Match farming sim HUD pattern: create AudioContext eagerly, resume before each play
        var _audioCtx = null;
        var _audioBuffers = {};

        (function() {
            try {
                _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            } catch(e) {}
            if (!_audioCtx) return;
            var files = {
                purchase: 'purchase.mp3', click: 'click.mp3', levelup: 'levelup.mp3',
                uipop: 'ui-pop.mp3', harvest: 'harvest.mp3', talent: 'talent.mp3',
                xp: 'xp-gain.mp3', cropready: 'cropready.mp3',
                notification: 'notification.mp3', pickup: 'brainrot-collect.mp3',
                deposit: 'deposit-brainrot.mp3', death: 'death.mp3', kill: 'kill.mp3'
            };
            for (var k in files) {
                (function(key, url) {
                    fetch(url)
                        .then(function(r) { return r.arrayBuffer(); })
                        .then(function(buf) { return _audioCtx.decodeAudioData(buf); })
                        .then(function(decoded) { _audioBuffers[key] = decoded; })
                        .catch(function() {});
                })(k, files[k]);
            }
        })();

        function playSound(type) {
            try {
                if (!_audioCtx || !_audioBuffers[type]) return;
                if (_audioCtx.state === 'suspended') _audioCtx.resume();
                var source = _audioCtx.createBufferSource();
                var gain = _audioCtx.createGain();
                source.buffer = _audioBuffers[type];
                gain.gain.value = (type === 'click') ? 0.5 : 0.3;
                source.connect(gain);
                gain.connect(_audioCtx.destination);
                source.start(0);
            } catch(e) {}
        }

        let state = { gold: 0, baseId: 0, carrying: 0, carryGold: 0, carryName: '', carryBvKey: '', lastCarryName: '', rebirth: 0, pendingGold: 0, earningRate: 0 };
        var myUsername = '';

        /* ---- MULTIPLAYER VALUE PARSER ---- */
        // Portals sends multiplayer vars as objects like {"player1":val1,"player2":val2}
        // or with = signs like {"player1"="val1","player2"="val2"}
        // This extracts only the local player's value using myUsername
        function parseVarValue(raw) {
            if (typeof raw !== 'string') return parseFloat(raw) || 0;
            raw = raw.trim();
            if (raw.charAt(0) !== '{') return parseFloat(raw) || 0;
            if (!myUsername) return parseFloat(raw) || 0;
            // Try standard JSON first
            try {
                var obj = JSON.parse(raw);
                if (typeof obj === 'object' && obj !== null) {
                    // Case-insensitive username match
                    var keys = Object.keys(obj);
                    for (var i = 0; i < keys.length; i++) {
                        if (keys[i].toLowerCase() === myUsername.toLowerCase()) {
                            return parseFloat(obj[keys[i]]) || 0;
                        }
                    }
                    return 0;
                }
                return parseFloat(raw) || 0;
            } catch(e) {}
            // Fallback: parse Portals format {"name"="val"&"name2"="val2"} or comma-separated
            try {
                var inner = raw.substring(1, raw.length - 1).trim();
                // Split on & or , (Portals may use either as separator inside braces)
                var entries = inner.split(/[&,]/);
                for (var j = 0; j < entries.length; j++) {
                    var entry = entries[j].trim();
                    if (!entry) continue;
                    // Split on first = or :
                    var sep = entry.indexOf('=');
                    if (sep < 0) sep = entry.indexOf(':');
                    if (sep < 0) continue;
                    var k = entry.substring(0, sep).trim().replace(/^["']|["']$/g, '');
                    var v = entry.substring(sep + 1).trim().replace(/^["']|["']$/g, '');
                    if (k.toLowerCase() === myUsername.toLowerCase()) {
                        return parseFloat(v) || 0;
                    }
                }
            } catch(e2) {}
            return 0;
        }

        const valGold = document.getElementById('val-gold');
        const carryBanner = document.getElementById('carry-banner');
        const carryGoldEl = document.getElementById('carry-gold');
        const carryNameEl = document.getElementById('carry-name');
        const toastContainer = document.getElementById('toasts');
        const notifContainer = document.getElementById('notifs');

        /* ---- FORMAT ---- */
        function fmt(n) {
            if (n >= 1e9) return (n/1e9).toFixed(1)+'B';
            if (n >= 1e6) return (n/1e6).toFixed(1)+'M';
            if (n >= 1e3) return (n/1e3).toFixed(1)+'K';
            return Math.floor(n).toLocaleString();
        }

        /* ---- DISPLAY ---- */
        function updateDisplay() {
            valGold.textContent = fmt(state.gold);
            if (state.carrying > 0) {
                carryBanner.classList.add('show');
                carryNameEl.textContent = state.carryName || '???';
                carryGoldEl.textContent = state.carryGold;
            } else {
                carryBanner.classList.remove('show');
            }
            // Claim banner replaced by tutorial system — tutorial step 1 handles this
            // Spectator banner
            var specBanner = document.getElementById('spectator-banner');
            if (specBanner) {
                if (state.spectator && state.baseId <= 0) specBanner.classList.add('show');
                else specBanner.classList.remove('show');
            }
        }

        function pop(el) {
            el.classList.remove('pop');
            void el.offsetWidth;
            el.classList.add('pop');
        }

        /* ---- CASH PARTICLE BURST ---- */
        function spawnCashParticles(type, count) {
            // type: 'earn' (green $) or 'spend' (red -$)
            count = count || 6;
            var pill = document.getElementById('pill-gold');
            if (!pill) return;
            for (var i = 0; i < count; i++) {
                (function(idx) {
                    setTimeout(function() {
                        var p = document.createElement('div');
                        p.className = 'cash-particle ' + type;
                        p.textContent = type === 'earn' ? '$' : '-$';
                        // Random direction — mostly upward
                        var dx = (Math.random() - 0.5) * 80;
                        var dy = -(30 + Math.random() * 60);
                        p.style.setProperty('--dx', dx + 'px');
                        p.style.setProperty('--dy', dy + 'px');
                        p.style.left = (10 + Math.random() * 30) + 'px';
                        p.style.top = '0px';
                        pill.appendChild(p);
                        setTimeout(function() { if (p.parentNode) p.remove(); }, 1100);
                    }, idx * 60);
                })(i);
            }
        }

        /* ---- NOTIFICATION SYSTEM ---- */
        // types: gold, pickup, deposit, spawn, info
        function notify(text, type) {
            type = type || 'info';
            const el = document.createElement('div');
            el.className = 'notif notif-' + type;
            el.textContent = text;
            notifContainer.appendChild(el);
            // Cap at 5 visible
            while (notifContainer.children.length > 5) {
                notifContainer.removeChild(notifContainer.firstChild);
            }
            setTimeout(function() { if (el.parentNode) el.remove(); }, 3500);
        }

        /* ---- DEATH/KILL ALERTS ---- */
        function showScreenFlash(type) {
            var flash = document.createElement('div');
            flash.className = 'screen-flash ' + type;
            document.body.appendChild(flash);
            setTimeout(function() { if (flash.parentNode) flash.remove(); }, 700);
        }

        function showCenterAlert(text, type) {
            var alert = document.createElement('div');
            alert.className = 'center-alert ' + type;
            alert.textContent = text;
            document.body.appendChild(alert);
            setTimeout(function() { if (alert.parentNode) alert.remove(); }, 2000);
        }

        function showDeathAlert(goldLost) {
            showScreenFlash('death');
            showCenterAlert('YOU DIED', 'death');
            playSound('death');
            // Wipe uncollected pending gold on death
            var lostPending = Math.floor(state.pendingGold);

                    for (var pi = 0; pi < pairs.length; pi++) {
                        var eq = pairs[pi].indexOf('=');
                        if (eq > 0) params[pairs[pi].substring(0, eq)] = pairs[pi].substring(eq + 1);
                    }
                    // Store local player username
                    if (params.username) {
                        var uraw = params.username;
                        // If pipe interpolation returned a JSON-like object, extract first key as username
                        if (uraw.charAt(0) === '{') {
                            try {
                                var uobj = JSON.parse(uraw);
                                var ukeys = Object.keys(uobj);
                                if (ukeys.length > 0) uraw = ukeys[0];
                            } catch(eu) {
                                // Portals format {"name"="val"} — extract first key
                                var um = uraw.match(/^\{"?([^"=&}]+)/);
                                if (um) uraw = um[1];
                            }
                        }
                        myUsername = uraw.replace(/^["']|["']$/g, '');
                    }
                    if (params.Gold !== undefined) {
                        var gv = parseVarValue(params.Gold);
                        if (gv !== state.gold) {
                            state.gold = gv;
                            pop(document.getElementById('pill-gold'));
                        }
                    }
                    // Parse base ID — auto-repopulate on claim (baseId 0 -> N)
                    if (params.My_Base_ID !== undefined) {
                        var newBaseId = Math.round(parseVarValue(params.My_Base_ID));
                        // Fallback: if parseVarValue returned 0 but raw value has a number, extract it
                        if (newBaseId === 0 && params.My_Base_ID !== '0') {
                            var bidMatch = params.My_Base_ID.match(/[=:](\d+)/);
                            if (bidMatch) newBaseId = parseInt(bidMatch[1]) || 0;
                        }
                        if (state.baseId <= 0 && newBaseId > 0) {
                            setTimeout(function() { repopulateBase(newBaseId); }, 800);
                        }
                        state.baseId = newBaseId;
                    }
                    // Parse carrying brainrot from server variable
                    if (params.My_Carrying_Brainrot !== undefined) {
                        var carryNum = Math.round(parseVarValue(params.My_Carrying_Brainrot));
                        if (carryNum > 0 && QUEST_NUM_TO_BV[carryNum]) {
                            var bvKey = QUEST_NUM_TO_BV[carryNum];
                            state.carrying = 1;
                            state.carryBvKey = bvKey;
                            state.carryName = bvKey.substring(3).replace(/_/g, ' ');
                            state.carryGold = GOLD_PER_SECOND[bvKey] || 0;
                        } else if (carryNum === 0) {
                            // Save last name for deposit notification (sync may arrive before deposit: msg)
                            state.lastCarryName = state.carryName || state.lastCarryName || '';
                            state.carrying = 0;
                            state.carryBvKey = '';
                            state.carryName = '';
                            state.carryGold = 0;
                        }
                    }
                    // Parse owned brainrot counts
                    parseOwnedBrainrots(params);
                    // Sync zone counts from server ZC_ variables
                    var zoneNames = Object.keys(ZONES);
                    for (var zi = 0; zi < zoneNames.length; zi++) {
                        var z = zoneNames[zi];
                        var zk = 'ZC_' + z;
                        if (params[zk] !== undefined) {
                            var oldCount = spawnCounts[z] || 0;
                            var newCount = Math.round(parseVarValue(params[zk]));
                            spawnCounts[z] = newCount;
                            var interval = ZONE_SPAWN_INTERVALS[z] || SPAWN_INTERVAL;
                            // Zone went from full to not full — restart timer
                            if (oldCount >= MAX_PER_ZONE && newCount < MAX_PER_ZONE) {
                                spawnTimers[z] = interval;
                            }
                            // Zone dropped count — reset timer to full interval
                            if (newCount < oldCount && newCount < MAX_PER_ZONE) {
                                spawnTimers[z] = interval;
                            }
                        }
                    }
                    updateTimerUI();
                    parseTutorialVars(params);
                    // Auto-claim: server computed Auto_Claim_Base = smallest open base (0 = all taken)
                    if (state.baseId <= 0 && !state.autoClaimSent && params.Auto_Claim_Base !== undefined) {
                        var rawAcb = params.Auto_Claim_Base;
                        // Extract number — handle plain "1", JSON {"name":1}, or Portals {"name"="1"}
                        var acb = 0;
                        if (rawAcb.charAt(0) === '{') {
                            var acbMatch = rawAcb.match(/[=:](\d+)/);
                            if (acbMatch) acb = parseInt(acbMatch[1]) || 0;
                        } else {
                            acb = Math.round(parseFloat(rawAcb)) || 0;
                        }
                        state.autoClaimSent = true;
                        if (acb > 0 && sdk) {
                            setTimeout(function() {
                                sdk.sendMessageToUnity(JSON.stringify({
                                    TaskName: 'claim_base_' + acb,

                    updateDisplay();
                    checkTutorial();
                } else if (msg === 'collect:go') {

                    if (diff > 0) notify('+$' + fmt(diff) + ' Cash', 'gold');
                } else if (msg.startsWith('pickup:')) {
                    if (state.carrying > 0) {

                        playSound('uipop');

                    } else {
                        playSound('pickup');
                        var pMatch = msg.match(/Picked up (.+?)! \(([0-9.]+)g/);
                        if (pMatch) {
                            state.carrying = 1;
                            state.carryName = pMatch[1].replace(/_/g, ' ');

                            // Decrement zone spawn count
                            var pickupZone = BV_TO_ZONE[state.carryBvKey];
                            if (pickupZone && spawnCounts[pickupZone] > 0) spawnCounts[pickupZone]--;
                            updateDisplay();
                            checkTutorial();
                        } else {
                            notify(msg.substring(7), 'pickup');
                        }
                    }
                } else if (msg.startsWith('deposit:')) {
                    // Parse base number from message: "Deposited brainrot at Base N!"
                    var baseMatch = msg.match(/Base (\d+)/);
                    var depositBase = baseMatch ? parseInt(baseMatch[1]) : 0;
                    // Room-side logic already gates on My_Base_ID — just deposit

                        state.carryBvKey = '';
                        state.carryGold = 0;
                        updateDisplay();

                } else if (msg.startsWith('carry:')) {
                    var p = msg.substring(6).split(',');
                    state.carrying = parseFloat(p[0])||0;
                    state.carryGold = parseFloat(p[1])||0;

        function repopulateBase(baseNum) {
            if (!sdk) return;
            console.log('[HUD] Repopulating base ' + baseNum + ' with owned brainrots');
            var delay = 0;
            var keys = Object.keys(ownedBrainrots);
            var totalFired = 0;
            for (var i = 0; i < keys.length; i++) {
                var bvKey = keys[i];
                var count = ownedBrainrots[bvKey] || 0;
                var dropStem = BV_DROP_MAP[bvKey];
                if (!dropStem || count <= 0) continue;
                var taskName = dropStem + '_b' + baseNum;
                // Fire once per copy owned (duplicate stacks at same position)
                for (var c = 0; c < count; c++) {
                    (function(tn, d) {
                        setTimeout(function() {
                            sdk.sendMessageToUnity(JSON.stringify({
                                TaskName: tn,
                                TaskTargetState: 'SetNotActiveToActive'
                            }));
                            // Reset back to NotActive after 100ms so it can fire again
                            setTimeout(function() {
                                sdk.sendMessageToUnity(JSON.stringify({
                                    TaskName: tn,
                                    TaskTargetState: 'SetActiveToNotActive'
                                }));
                            }, 100);
                        }, d);
                    })(taskName, delay);
                    delay += 50;
                    totalFired++;
                }
            }
            console.log('[HUD] Fired ' + totalFired + ' DuplicateItem tasks over ' + delay + 'ms');
            if (totalFired > 0) {
                notify('Restoring ' + totalFired + ' brainrots...', 'info');
            }
        }

        function resetAllBrainrots() {
            if (!sdk) return;
            // Collect all brainrot keys from all zones
            var allBv = [];
            var zNames = Object.keys(ZONES);
            for (var i = 0; i < zNames.length; i++) {
                var pool = ZONES[zNames[i]];
                for (var j = 0; j < pool.length; j++) {
                    allBv.push(pool[j]);
                }
            }
            // Stagger to avoid flooding — send two resets per brainrot
            // (Active->NotActive and Completed->NotActive) since SetAnyToNotActive doesn't exist
            for (var k = 0; k < allBv.length; k++) {
                (function(bvKey, delay) {
                    setTimeout(function() {
                        sdk.sendMessageToUnity(JSON.stringify({
                            TaskName: bvKey,
                            TaskTargetState: 'SetActiveToNotActive'
                        }));
                    }, delay);
                    setTimeout(function() {
                        sdk.sendMessageToUnity(JSON.stringify({
                            TaskName: bvKey,
                            TaskTargetState: 'SetCompletedToNotActive'
                        }));
                    }, delay + 25);
                })(allBv[k], k * 60);
            }
            // Reset all zone counts to 0
            for (var zi = 0; zi < zNames.length; zi++) {
                spawnCounts[zNames[zi]] = 0;
            }
        }

                    purchaseVars.Own_Shotgun > 0 || purchaseVars.Gear_Armor > 0 ||
                    purchaseVars.Gear_SpeedBoots > 0 || purchaseVars.Gear_CarryPack > 0 ||
                    purchaseVars.Inv_Health_Pack > 0 || purchaseVars.Inv_Speed_Potion > 0 ||
                    purchaseVars.Inv_Base_Teleport > 0 || purchaseVars.Inv_Shield > 0 ||
                    purchaseVars.anyItemBought > 0);
        }

        function hasAnyItem() {
            return (purchaseVars.Inv_Health_Pack > 0 || purchaseVars.Inv_Speed_Potion > 0 ||
                    purchaseVars.Inv_Base_Teleport > 0 || purchaseVars.Inv_Shield > 0);
        }

        function hasAnyGear() {
            return (purchaseVars.Gear_SpeedBoots > 0 || purchaseVars.Gear_Armor > 0);
        }

        function hasGunEquipped() {
            return purchaseVars.Equipped_Weapon > 0;
        }

        function hasAnyFloorUnlock() {
            return (purchaseVars.Floor_2_Unlocked > 0 || purchaseVars.Floor_3_Unlocked > 0 ||
                    purchaseVars.Floor_4_Unlocked > 0);
        }

        function countZonesUnlocked() {
            var count = 0;
            var keys = Object.keys(zoneUnlockVars);
            for (var i = 0; i < keys.length; i++) {
                if (zoneUnlockVars[keys[i]] > 0) count++;
            }
            return count;
        }

        function hasAnyWeapon() {
            return (purchaseVars.Own_Pistol > 0 || purchaseVars.Own_Rifle > 0 ||
                    purchaseVars.Own_Shotgun > 0);
        }

        function hasAnyZoneUnlock() {
            var keys = Object.keys(zoneUnlockVars);
            for (var i = 0; i < keys.length; i++) {
                if (zoneUnlockVars[keys[i]] > 0) return true;
            }
            return false;
        }

        // Load all tutorial flags from Portals storage
        function loadTutorialStorage(callback) {
            var steps = TUTORIAL_STEPS;
            var remaining = steps.length;
            if (!sdk) { callback(); return; }
            for (var i = 0; i < steps.length; i++) {
                (function(step) {
                    sdk.storageGet(step.id, function(val) {
                        if (val === 'done') tutorialStorage[step.id] = true;
                        remaining--;
                        if (remaining <= 0) {
                            tutorialLoaded = true;
                            callback();
                        }
                    });
                })(steps[i]);
            }
            // Timeout fallback in case storageGet doesn't call back
            setTimeout(function() {
                if (!tutorialLoaded) {
                    tutorialLoaded = true;
                    callback();
                }
            }, 3000);
        }

        function markTutorialDone(stepId) {
            if (tutorialStorage[stepId]) return;
            tutorialStorage[stepId] = true;
            if (sdk) sdk.storageSet(stepId, 'done');
        }

        // Auto-skip completed steps for returning players
        function autoSkipTutorial() {
            if (state.baseId > 0) markTutorialDone('tut_claim_base');
            if (countOwnedBrainrots() > 0) {
                markTutorialDone('tut_claim_base');
                markTutorialDone('tut_collect_brainrot');
                markTutorialDone('tut_deposit');
            }
            if (state.gold > 0 || hasAnyPurchase()) {
                markTutorialDone('tut_claim_base');
                markTutorialDone('tut_collect_brainrot');
                markTutorialDone('tut_deposit');
                markTutorialDone('tut_collect_gold');
            }
            if (hasAnyWeapon()) {
                markTutorialDone('tut_buy_gun');
            }
            if (hasGunEquipped()) {
                markTutorialDone('tut_buy_gun');
                markTutorialDone('tut_equip_gun');
                markTutorialDone('tut_pvp');
            }
            if (hasAnyItem()) {
                markTutorialDone('tut_buy_items');
            }
            if (hasAnyGear()) {
                markTutorialDone('tut_buy_gear');
            }
            if (hasAnyFloorUnlock()) {
                markTutorialDone('tut_buy_floor');
            }
            if (hasAnyZoneUnlock()) {
                markTutorialDone('tut_unlock_zone');
            }
            if (state.rebirth > 0) {
                markTutorialDone('tut_rebirth');
            }
        }

        var currentTutorialSteps = [];

        function checkTutorial() {
            if (!tutorialLoaded) return;

            // On first sync, auto-skip already-completed steps
            if (tutorialFirstSync) {
                tutorialFirstSync = false;
                autoSkipTutorial();
            }

            // Collect all active steps: first non-stackable, or all stackable whose conditions are met
            var activeSteps = [];
            var foundNonStackable = false;
            for (var i = 0; i < TUTORIAL_STEPS.length; i++) {
                var step = TUTORIAL_STEPS[i];
                if (tutorialStorage[step.id]) continue; // already done

                // Check if this step should complete
                if (step.doneIf()) {
                    markTutorialDone(step.id);
                    continue;
                }

                // Check if this step should show
                if (step.showIf()) {
                    if (!step.stackable) {
                        // Non-stackable step: show only this one, stop looking
                        activeSteps = [step];
                        foundNonStackable = true;
                        break;
                    } else {
                        activeSteps.push(step);
                    }
                }
            }

            // Build a key string to detect changes
            var stepIds = [];
            for (var s = 0; s < activeSteps.length; s++) stepIds.push(activeSteps[s].id);
            var key = stepIds.join(',');

            if (activeSteps.length > 0 && key !== currentTutorialSteps.join(',')) {
                currentTutorialSteps = stepIds;
                // Build stacked banner content
                if (activeSteps.length === 1) {
                    tutorialBanner.textContent = activeSteps[0].msg;
                } else {
                    tutorialBanner.innerHTML = '';
                    for (var m = 0; m < activeSteps.length; m++) {
                        var line = document.createElement('div');
                        line.textContent = activeSteps[m].msg;
                        if (m > 0) line.style.marginTop = '4px';
                        tutorialBanner.appendChild(line);
                    }
                }
                tutorialBanner.classList.add('show');
            } else if (activeSteps.length === 0) {
                currentTutorialSteps = [];
                tutorialBanner.classList.remove('show');
            }
        }

        // Parse purchase/zone variables from inv: params
        function parseTutorialVars(params) {
            var purchaseKeys = ['Own_Pistol', 'Own_Rifle', 'Own_Shotgun', 'Gear_Armor', 'Gear_SpeedBoots', 'Gear_CarryPack',
                                'Inv_Health_Pack', 'Inv_Speed_Potion', 'Inv_Base_Teleport', 'Inv_Shield',
                                'Floor_2_Unlocked', 'Floor_3_Unlocked', 'Floor_4_Unlocked', 'Equipped_Weapon'];
            for (var i = 0; i < purchaseKeys.length; i++) {
                if (params[purchaseKeys[i]] !== undefined) {
                    purchaseVars[purchaseKeys[i]] = parseVarValue(params[purchaseKeys[i]]);
                }
            }
            // Check for any item purchase (weapons, gear, inventory items, etc.)
            var paramKeys = Object.keys(params);
            for (var j = 0; j < paramKeys.length; j++) {
                var k = paramKeys[j];
                if ((k.startsWith('Own_') && !k.startsWith('Own_bv_')) ||
                    k.startsWith('Gear_') || k.startsWith('Inv_') || k.startsWith('Floor_')) {
                    var v = parseVarValue(params[k]);
                    if (v > 0) purchaseVars.anyItemBought = 1;
                }
                // Zone unlock variables (Zone_Forest_Zone_Unlocked, Zone_Cave_Zone_Unlocked, etc.)
                if (k.startsWith('Zone_') && k.endsWith('_Unlocked')) {
                    zoneUnlockVars[k] = parseVarValue(params[k]);
                }
            }
        }

        /* ---- INIT ---- */
        updateDisplay();
        if (sdk) {
            resetAllBrainrots();
            // Reset ZC_ variables server-side on login
            sdk.sendMessageToUnity(JSON.stringify({
                TaskName: 'reset_zc_login',
                TaskTargetState: 'SetNotActiveToActive'
            }));
            // Start spawn timers after reset completes (~6s for 99 brainrots at 60ms each)
            setTimeout(function() { startSpawnTimers(); }, 7000);
            startGoldAccumulator();
            // Load tutorial progress from storage
            loadTutorialStorage(function() {
                checkTutorial();
            });
        } else {
            // Dev preview
            state.gold = 42350; state.baseId = 3; state.carrying = 1; state.carryGold = 14.6; state.rebirth = 1;
            updateDisplay();
            notify('+125 Gold', 'gold');
            setTimeout(function() { notify('Picked up Banana! (1.3g)', 'pickup'); }, 500);
            setTimeout(function() { notify('Deposited Banana!', 'deposit'); }, 1000);
        }
    </script>
</body>
</html>
