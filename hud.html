<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Brainrot Tycoon HUD</title>
    <script src="https://portals-labs.github.io/portals-sdk/portals-sdk.js?v=10005456"></script>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
    <link href="theme.css?v=1742508000" rel="stylesheet">
    <style>
        html, body {
            margin: 0; padding: 0;
            background: transparent !important;
            overflow: hidden;
            font-family: 'Nunito', sans-serif;
            color: white;
            user-select: none;
            -webkit-text-stroke: 0.5px rgba(0,0,0,0.15);
        }

        /* ---- BOTTOM-LEFT HUD STACK ---- */
        .hud-stack {
            position: fixed;
            bottom: 120px;
            left: 12px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 6px;
            z-index: 10;
        }

        .currency-pill {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 10px;
            padding: 8px 16px 8px 10px;
            border-radius: 999px;
            border: 2px solid rgba(0,0,0,0.2);
            box-shadow: 0 4px 0 rgba(0,0,0,0.2), 0 6px 12px rgba(0,0,0,0.15);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            position: relative;
            min-width: 200px;
        }
        .currency-pill .icon-circle {
            width: 48px; height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            border: 3px solid rgba(0,0,0,0.2);
            flex-shrink: 0;
        }
        .currency-pill .val {
            font-family: 'Luckiest Guy', cursive;
            font-size: 28px;
            text-shadow: 2px 2px 0 rgba(0,0,0,0.3);
            letter-spacing: 0.5px;
        }

        /* Cash pill */
        .pill-gold {
            background: linear-gradient(180deg, rgba(91,219,91,0.88) 0%, rgba(46,170,46,0.88) 100%);
            border-color: rgba(30,138,30,0.6);
        }
        .pill-gold .icon-circle { background: rgba(34,139,34,0.9); border-color: rgba(26,107,26,0.7); }
        .pill-gold .val { color: #0A2A0A; }

        /* Cash stack icon (CSS-drawn) */
        .cash-icon {
            width: 26px; height: 20px;
            position: relative;
        }
        .cash-bill {
            position: absolute;
            width: 22px; height: 10px;
            border-radius: 2px;
            border: 1.5px solid rgba(0,0,0,0.3);
            left: 50%; transform: translateX(-50%);
        }
        .cash-bill:nth-child(1) { background: #1B5E20; bottom: 0; }
        .cash-bill:nth-child(2) { background: #2E7D32; bottom: 4px; }
        .cash-bill:nth-child(3) { background: #43A047; bottom: 8px; }
        .cash-bill .dollar {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 8px;
            font-weight: 900;
            color: rgba(255,255,255,0.8);
            font-family: 'Nunito', sans-serif;
        }

        /* ---- CARRY BANNER (below cash in stack) ---- */
        .carry-banner {
            padding: 4px 14px;
            border-radius: 999px;
            background: linear-gradient(180deg, rgba(255,179,71,0.9) 0%, rgba(255,140,0,0.9) 100%);
            border: 2px solid rgba(204,102,0,0.6);
            box-shadow: 0 3px 0 rgba(0,0,0,0.2);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            font-family: 'Luckiest Guy', cursive;
            font-size: 14px;
            color: #3A1800;
            text-shadow: 1px 1px 0 rgba(255,255,255,0.3);
            display: none;
            white-space: nowrap;
        }
        .carry-banner.show { display: block; }

        /* ---- CLAIM BASE BANNER ---- */
        .claim-banner {
            padding: 12px 28px;
            border-radius: 999px;
            background: linear-gradient(180deg, rgba(116,185,255,0.95) 0%, rgba(9,132,227,0.95) 100%);
            border: 2px solid rgba(6,96,160,0.6);
            box-shadow: 0 4px 0 rgba(0,0,0,0.3), 0 0 24px rgba(9,132,227,0.4);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            font-family: 'Luckiest Guy', cursive;
            font-size: 22px;
            color: white;
            text-shadow: 2px 2px 0 rgba(0,0,0,0.3);
            display: none;
            white-space: nowrap;
            animation: bannerPop 0.5s cubic-bezier(0.175,0.885,0.32,1.275), bannerGlow 2s ease-in-out 0.5s infinite;
        }
        .claim-banner.show { display: block; }
        @keyframes bannerPop {
            0% { transform: scale(0.3); opacity: 0; }
            60% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes bannerGlow {
            0%, 100% { box-shadow: 0 4px 0 rgba(0,0,0,0.3), 0 0 24px rgba(9,132,227,0.4); }
            50% { box-shadow: 0 4px 0 rgba(0,0,0,0.3), 0 0 40px rgba(9,132,227,0.7), 0 0 60px rgba(9,132,227,0.3); }
        }
        /* ---- SPECTATOR BANNER ---- */
        .spectator-banner {
            padding: 6px 18px;
            border-radius: 999px;
            background: linear-gradient(180deg, rgba(99,110,114,0.85) 0%, rgba(45,52,54,0.85) 100%);
            border: 2px solid rgba(26,26,46,0.5);
            box-shadow: 0 3px 0 rgba(0,0,0,0.3);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            font-family: 'Luckiest Guy', cursive;
            font-size: 15px;
            color: #DFE6E9;
            text-shadow: 1px 1px 0 rgba(0,0,0,0.5);
            display: none;
            white-space: nowrap;
        }
        .spectator-banner.show { display: block; }

        /* ---- SPAWN TIMERS (vertical, above notifs) ---- */
        .spawn-strip {
            display: flex;
            flex-direction: column;
            gap: 4px;
            align-items: flex-start;
        }
        .spawn-pip {
            display: flex;
            align-items: center;
            gap: 6px;
            position: relative;
        }
        .spawn-pip .pip-name {
            font-family: 'Luckiest Guy', cursive;
            font-size: 11px;
            color: white;
            text-shadow: 1px 1px 0 rgba(0,0,0,0.5);
            white-space: nowrap;
            min-width: 90px;
            text-align: right;
        }
        .spawn-pip .pip-ring {
            position: relative;
            width: 28px;
            height: 28px;
            flex-shrink: 0;
        }
        .spawn-pip .pip-ring svg {
            width: 28px;
            height: 28px;
            transform: rotate(-90deg);
        }
        .spawn-pip .pip-ring-bg {
            fill: none;
            stroke: rgba(0,0,0,0.3);
            stroke-width: 3;
        }
        .spawn-pip .pip-ring-fill {
            fill: none;
            stroke-width: 3.5;
            stroke-linecap: round;
            transition: stroke-dashoffset 0.9s linear;
        }
        .spawn-pip .pip-secs {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Nunito', sans-serif;
            font-weight: 900;
            font-size: 9px;
            color: white;
            text-shadow: 1px 1px 0 rgba(0,0,0,0.5);
        }
        .spawn-pip.full .pip-name {
            opacity: 0.4;
        }
        .spawn-pip.full .pip-ring {
            opacity: 0.4;
        }

        /* ---- NOTIFICATION FEED (above cash in stack) ---- */
        .notif-container {
            position: fixed;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: center;
            pointer-events: none;
            z-index: 50;
        }
        .notif {
            padding: 10px 24px;
            border-radius: 999px;
            box-shadow: 0 4px 0 rgba(0,0,0,0.3), 0 0 20px rgba(0,0,0,0.15);
            font-family: 'Luckiest Guy', cursive;
            font-size: 18px;
            text-shadow: 1px 1px 0 rgba(0,0,0,0.25);
            white-space: nowrap;
            animation: notifPop 0.4s cubic-bezier(0.175,0.885,0.32,1.275), notifOut 0.5s ease 4.5s forwards;
        }
        .notif-gold {
            background: linear-gradient(180deg, rgba(255,228,77,0.92), rgba(255,184,0,0.92));
            border: 2px solid rgba(204,136,0,0.6);
            color: #4A2800;
        }
        .notif-pickup {
            background: linear-gradient(180deg, rgba(255,179,71,0.92), rgba(255,140,0,0.92));
            border: 2px solid rgba(204,102,0,0.6);
            color: #3A1800;
        }
        .notif-deposit {
            background: linear-gradient(180deg, rgba(110,240,110,0.92), rgba(46,204,64,0.92));
            border: 2px solid rgba(31,160,48,0.6);
            color: #0A3A0A;
        }
        .notif-spawn {
            background: linear-gradient(180deg, rgba(116,185,255,0.92), rgba(52,152,219,0.92));
            border: 2px solid rgba(33,118,170,0.6);
            color: #0A1A3A;
        }
        .notif-info {
            background: linear-gradient(180deg, rgba(223,230,233,0.92), rgba(178,190,195,0.92));
            border: 2px solid rgba(149,165,166,0.6);
            color: #2C3E50;
        }
        .notif-error {
            background: linear-gradient(180deg, rgba(255,107,107,0.92), rgba(231,76,60,0.92));
            border: 2px solid rgba(192,57,43,0.6);
            color: #FFFFFF;
        }
        @keyframes notifPop {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.12); }
            70% { transform: scale(0.95); }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes notifOut {
            to { opacity: 0; transform: scale(0.8) translateY(-10px); }
        }

        /* ---- LEGACY TOAST (keep for compat) ---- */
        .toast-container {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            gap: 6px;
            align-items: center;
            z-index: 30;
        }
        .toast {
            padding: 8px 20px;
            border-radius: 999px;
            background: linear-gradient(180deg, rgba(255,228,77,0.92), rgba(255,184,0,0.92));
            border: 2px solid rgba(204,136,0,0.6);
            box-shadow: 0 3px 0 rgba(0,0,0,0.2);
            font-family: 'Luckiest Guy', cursive;
            font-size: 16px;
            color: #4A2800;
            text-shadow: 1px 1px 0 rgba(255,255,255,0.3);
            animation: toastPop 0.3s ease, toastOut 0.3s ease 2s forwards;
            white-space: nowrap;
        }
        @keyframes toastPop {
            0% { transform: scale(0.5); opacity: 0; }
            70% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes toastOut {
            to { opacity: 0; transform: translateY(-10px) scale(0.9); }
        }

        /* Pending gold sub-text */
        .gold-pending {
            font-family: 'Nunito', sans-serif;
            font-size: 14px;
            font-weight: 800;
            color: #8B6914;
            opacity: 0.8;
            margin-top: -2px;
        }
        .gold-rate {
            font-family: 'Nunito', sans-serif;
            font-size: 12px;
            font-weight: 700;
            color: #8B6914;
            opacity: 0.6;
        }
        .pill-gold .gold-row { display: flex; align-items: center; gap: 6px; }
        .pill-gold .right-col { display: flex; flex-direction: column; }

        /* Pop animation */
        .pop { animation: popBounce 0.3s ease; }
        @keyframes popBounce {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        /* Cash particle animation */
        .cash-particle {
            position: absolute;
            font-family: 'Luckiest Guy', cursive;
            font-size: 16px;
            font-weight: 900;
            pointer-events: none;
            z-index: 100;
            text-shadow: 1px 1px 0 rgba(0,0,0,0.3);
            animation: cashFly 1s ease-out forwards;
        }
        .cash-particle.earn { color: #2ECC40; }
        .cash-particle.spend { color: #E74C3C; }
        @keyframes cashFly {
            0% { opacity: 1; transform: translate(0, 0) scale(1); }
            100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(0.5); }
        }

        /* ---- KILL NOTIFICATION ---- */
        .notif-kill {
            background: linear-gradient(180deg, rgba(110,240,110,0.92), rgba(46,204,64,0.92));
            border: 2px solid rgba(31,160,48,0.6);
            color: #0A3A0A;
        }

        /* ---- DEATH/KILL SCREEN FLASH ---- */
        .screen-flash {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            z-index: 50;
            animation: flashFade 0.6s ease-out forwards;
        }
        .screen-flash.death { background: rgba(231, 76, 60, 0.35); }
        .screen-flash.kill { background: rgba(46, 204, 64, 0.25); }
        @keyframes flashFade {
            0% { opacity: 1; }
            100% { opacity: 0; }
        }

        /* ---- TUTORIAL NOTIFICATION ---- */
        .tutorial-banner {
            padding: 12px 28px;
            border-radius: 999px;
            background: linear-gradient(180deg, rgba(255,234,100,0.95) 0%, rgba(255,184,0,0.95) 100%);
            border: 2px solid rgba(204,136,0,0.6);
            box-shadow: 0 4px 0 rgba(0,0,0,0.3), 0 0 24px rgba(255,184,0,0.4);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            font-family: 'Luckiest Guy', cursive;
            font-size: 20px;
            color: #3A1800;
            text-shadow: 1px 1px 0 rgba(255,255,255,0.3);
            white-space: nowrap;
            display: none;
            animation: bannerPop 0.5s cubic-bezier(0.175,0.885,0.32,1.275), tutorialGlow 2s ease-in-out 0.5s infinite;
        }
        .tutorial-banner.show { display: block; }
        @keyframes tutorialGlow {
            0%, 100% { box-shadow: 0 4px 0 rgba(0,0,0,0.3), 0 0 24px rgba(255,184,0,0.4); }
            50% { box-shadow: 0 4px 0 rgba(0,0,0,0.3), 0 0 40px rgba(255,184,0,0.7), 0 0 60px rgba(255,184,0,0.3); }
        }

        /* ---- CENTER KILL/DEATH TEXT ---- */
        .center-alert {
            position: fixed;
            top: 30%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Luckiest Guy', cursive;
            font-size: 32px;
            text-shadow: 2px 2px 0 rgba(0,0,0,0.4), 0 0 20px rgba(0,0,0,0.3);
            pointer-events: none;
            z-index: 51;
            animation: alertPop 0.4s ease, alertOut 0.4s ease 1.5s forwards;
            white-space: nowrap;
        }
        .center-alert.death { color: #FF4444; }
        .center-alert.kill { color: #2ECC40; }
        @keyframes alertPop {
            0% { transform: translate(-50%, -50%) scale(0.3); opacity: 0; }
            60% { transform: translate(-50%, -50%) scale(1.15); }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }
        @keyframes alertOut {
            to { opacity: 0; transform: translate(-50%, -60%) scale(0.8); }
        }
    </style>
</head>
<body>
    <!-- BOTTOM-LEFT HUD STACK (top to bottom: timers, notifs, cash, carry) -->
    <div class="hud-stack">
        <div class="spawn-strip" id="spawn-strip"></div>

        <!-- NOTIFICATION FEED (above cash) -->
        <div class="notif-container" id="notifs"></div>

        <!-- CASH PILL -->
        <div class="currency-pill pill-gold" id="pill-gold">
            <div class="icon-circle">
                <img src="cash.png" style="height:40px;width:40px;object-fit:contain">
            </div>
            <div class="right-col">
                <span class="val" id="val-gold">0</span>
                <div class="gold-pending" id="gold-pending" style="display:none">+0 pending</div>
                <div class="gold-rate" id="gold-rate" style="display:none">0/s</div>
            </div>
        </div>

        <!-- CARRY BANNER (below cash) -->
        <div class="carry-banner" id="carry-banner">
            &#x1F9F8; Carrying <span id="carry-name">???</span> ($<span id="carry-gold">0</span>/s)
        </div>

        <!-- SPECTATOR BANNER -->
        <div class="spectator-banner" id="spectator-banner">
            &#x1F441; Spectator Mode — All bases taken
        </div>
    </div>

    <!-- TOP CENTER BANNERS (stacked vertically) -->
    <div style="position:fixed;top:12px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:8px;z-index:40;pointer-events:none;">
        <div class="claim-banner" id="claim-banner">
            &#x1F3E0; Find a base and claim it!
        </div>
        <div class="tutorial-banner" id="tutorial-banner"></div>
    </div>

    <!-- TOAST (legacy) -->
    <div class="toast-container" id="toasts"></div>

    <script>
        const sdk = typeof PortalsSdk !== 'undefined' ? PortalsSdk : null;
        console.log('[HUD] v30 loaded, sdk=' + (sdk ? 'OK' : 'NULL'));
        // DEBUG: visible log panel
        var _dbg = document.createElement('div');
        _dbg.id = 'dbg';
        _dbg.style.cssText = 'position:fixed;top:4px;right:4px;width:340px;max-height:200px;overflow-y:auto;background:rgba(0,0,0,0.85);color:lime;font:10px monospace;padding:6px;z-index:99999;border-radius:4px;pointer-events:auto;';
        _dbg.innerHTML = '<b>HUD v31</b> sdk=' + (sdk ? 'OK' : 'NULL') + '<br>';
        document.body.appendChild(_dbg);
        var _dbgLines = 0;
        var _dbgLog = [];
        function dbg(msg) {
            _dbgLines++;
            var line = new Date().toISOString().substr(11,12) + ' ' + msg;
            _dbgLog.push(line);
            if (_dbgLines > 80) { _dbg.innerHTML = '<b>HUD v31b</b> (cleared)<br>'; _dbgLines = 1; }
            _dbg.innerHTML += msg + '<br>';
            _dbg.scrollTop = _dbg.scrollHeight;
            try { localStorage.setItem('hud_dbg', _dbgLog.join('\n')); } catch(e) {}
        }
        function _writeState() {
            try {
                localStorage.setItem('hud_state', JSON.stringify({
                    gold: state.gold, baseId: state.baseId, carrying: state.carrying,
                    carryName: state.carryName, carryBvKey: state.carryBvKey, carryGold: state.carryGold,
                    rebirth: state.rebirth, earningRate: state.earningRate,
                    pedestals: pedestals, lastAutoDepGoValue: lastAutoDepGoValue,
                    ts: Date.now()
                }));
            } catch(e) {}
        }
        setInterval(_writeState, 1000);

        // ---- SOUND SYSTEM (Web Audio API — HUD has noPointerEvents so no user gestures) ----
        // Match farming sim HUD pattern: create AudioContext eagerly, resume before each play
        var _audioCtx = null;
        var _audioBuffers = {};

        (function() {
            try {
                _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            } catch(e) {}
            if (!_audioCtx) return;
            var files = {
                purchase: 'purchase.mp3', click: 'click.mp3', levelup: 'levelup.mp3',
                uipop: 'ui-pop.mp3', harvest: 'harvest.mp3', talent: 'talent.mp3',
                xp: 'xp-gain.mp3', cropready: 'cropready.mp3',
                notification: 'notification.mp3', pickup: 'brainrot-collect.mp3',
                deposit: 'deposit-brainrot.mp3', death: 'death.mp3', kill: 'kill.mp3'
            };
            for (var k in files) {
                (function(key, url) {
                    fetch(url)
                        .then(function(r) { return r.arrayBuffer(); })
                        .then(function(buf) { return _audioCtx.decodeAudioData(buf); })
                        .then(function(decoded) { _audioBuffers[key] = decoded; })
                        .catch(function() {});
                })(k, files[k]);
            }
        })();

        function playSound(type) {
            try {
                if (!_audioCtx || !_audioBuffers[type]) return;
                if (_audioCtx.state === 'suspended') _audioCtx.resume();
                var source = _audioCtx.createBufferSource();
                var gain = _audioCtx.createGain();
                source.buffer = _audioBuffers[type];
                gain.gain.value = (type === 'click') ? 0.5 : 0.3;
                source.connect(gain);
                gain.connect(_audioCtx.destination);
                source.start(0);
            } catch(e) {}
        }

        let state = { gold: 0, baseId: 0, carrying: 0, carryGold: 0, carryName: '', carryBvKey: '', lastCarryName: '', rebirth: 0, pendingGold: 0, earningRate: 0, hasDied: false };
        var baseDisplayFired = false;
        var prevBaseOwners = {};
        var pedestals = {};
        for (var _fi = 1; _fi <= 4; _fi++) { pedestals[_fi] = {}; for (var _si = 1; _si <= 10; _si++) pedestals[_fi][_si] = 0; }
        var prevPedestals = {};
        for (var _fi2 = 1; _fi2 <= 4; _fi2++) { prevPedestals[_fi2] = {}; for (var _si2 = 1; _si2 <= 10; _si2++) prevPedestals[_fi2][_si2] = 0; }
        var lastAutoDepositTime = 0;
        var autoDepositInFlight = false;
        var lastAutoDepGoValue = 0;
        var myUsername = '';

        function handleAutoDeposit() {
            dbg('handleAutoDeposit() carry=' + state.carrying + ' base=' + state.baseId);
            if (state.carrying <= 0 || state.baseId <= 0) {
                dbg('BLOCKED: carry=' + state.carrying + ' base=' + state.baseId);
                return;
            }
            var now = Date.now();
            if (now - lastAutoDepositTime < 2000) return;
            lastAutoDepositTime = now;
            // Scan all unlocked floors for first empty slot
            var floors = [1];
            if (purchaseVars.Floor_2_Unlocked > 0) floors.push(2);
            if (purchaseVars.Floor_3_Unlocked > 0) floors.push(3);
            if (purchaseVars.Floor_4_Unlocked > 0) floors.push(4);
            var emptyFloor = 0, emptySlot = 0;
            for (var fi = 0; fi < floors.length; fi++) {
                var f = floors[fi];
                for (var si = 1; si <= 10; si++) {
                    if (pedestals[f][si] === 0) { emptyFloor = f; emptySlot = si; break; }
                }
                if (emptySlot > 0) break;
            }
            dbg('floors=' + JSON.stringify(floors) + ' scanning...');
            if (emptySlot === 0) {
                dbg('ALL FULL — no empty slot');
                playSound('uipop');
                notify('Base is full!', 'error');
                return;
            }
            var questName = 'p_auto_b' + state.baseId + '_f' + emptyFloor + '_s' + emptySlot;
            dbg('FIRING: ' + questName);

        /* ---- MULTIPLAYER VALUE PARSER ---- */
        // Portals sends multiplayer vars as objects like {"player1":val1,"player2":val2}
        // or with = signs like {"player1"="val1","player2"="val2"}
        // This extracts only the local player's value using myUsername
        function parseVarValue(raw) {
            if (typeof raw !== 'string') return parseFloat(raw) || 0;
            raw = raw.trim();
            if (raw.charAt(0) !== '{') return parseFloat(raw) || 0;
            if (!myUsername) return parseFloat(raw) || 0;
            // Try standard JSON first
            try {
                var obj = JSON.parse(raw);
                if (typeof obj === 'object' && obj !== null) {
                    // Case-insensitive username match
                    var keys = Object.keys(obj);
                    for (var i = 0; i < keys.length; i++) {
                        if (keys[i].toLowerCase() === myUsername.toLowerCase()) {
                            return parseFloat(obj[keys[i]]) || 0;
                        }
                    }
                    return 0;
                }
                return parseFloat(raw) || 0;
            } catch(e) {}
            // Fallback: parse Portals format {"name"="val"&"name2"="val2"} or comma-separated
            try {
                var inner = raw.substring(1, raw.length - 1).trim();
                // Split on & or , (Portals may use either as separator inside braces)
                var entries = inner.split(/[&,]/);
                for (var j = 0; j < entries.length; j++) {
                    var entry = entries[j].trim();
                    if (!entry) continue;
                    // Split on first = or :
                    var sep = entry.indexOf('=');
                    if (sep < 0) sep = entry.indexOf(':');
                    if (sep < 0) continue;
                    var k = entry.substring(0, sep).trim().replace(/^["']|["']$/g, '');
                    var v = entry.substring(sep + 1).trim().replace(/^["']|["']$/g, '');
                    if (k.toLowerCase() === myUsername.toLowerCase()) {
                        return parseFloat(v) || 0;
                    }
                }
            } catch(e2) {}
            return 0;
        }

        function collectGold() {
            var amount = Math.floor(state.pendingGold);
            if (amount <= 0) return;
            state.pendingGold = state.pendingGold - amount; // keep fractional remainder

            // Break into denomination tasks
            var tasks = [];
            var remaining = amount;
            for (var i = 0; i < DENOM_VALUES.length; i++) {
                var d = DENOM_VALUES[i];
                while (remaining >= d) {
                    tasks.push(DENOM_TASKS[d]);
                    remaining -= d;
                }
            }

            // Fire tasks staggered 200ms apart
            for (var t = 0; t < tasks.length; t++) {
                (function(task, delay) {
                    setTimeout(function() { triggerTask(task); }, delay);
                })(tasks[t], t * 200);
            }

            // Show notification + cash burst
            playSound('xp');
            notify('+$' + fmt(amount) + ' Cash collected!', 'gold');
            pop(document.getElementById('pill-gold'));
            spawnCashParticles('earn', 8);
            updateGoldDisplay();

ney_Man",272:"bv_Matteofr",274:"bv_Trippi_Troppi_Troppa_Trip",276:"bv_Dragon_Gingerini",278:"bv_Graipuss",280:"bv_TangTangVfx",282:"bv_Nuclearo_Dinosauro",284:"bv_LasTralaleritas",286:"bv_Job",288:"bv_Los_Tralaleritos",290:"bv_Chicliterita_bicicliterit",292:"bv_SecretLuckyBlock",294:"bv_KetupatKepat",296:"bv_La_vacca_no_effects",298:"bv_Chicleteira",300:"bv_TralaleroTralala",302:"bv_Strawberryelephant",304:"bv_Magi_Ribbitini",306:"bv_Meowl",308:"bv_Money_money_puggy"};

        // Reverse lookup: brainrot name -> zone
        var BV_TO_ZONE = {};
        (function() {
            var zoneNames = Object.keys(ZONES);
            for (var i = 0; i < zoneNames.length; i++) {
                var z = zoneNames[i];
                for (var j = 0; j < ZONES[z].length; j++) {

        })();

        // Track remaining seconds per zone and active count per zone
        var spawnTimers = {};
        var spawnCounts = {};

        function spawnRandom(zone) {
            var pool = ZONES[zone];
            if (!pool || pool.length === 0) return;
            // Check spawn cap — tracked locally per session
            if ((spawnCounts[zone] || 0) >= MAX_PER_ZONE) return;
            var pick = pool[Math.floor(Math.random() * pool.length)];
            if (sdk) {
                sdk.sendMessageToUnity(JSON.stringify({
                    TaskName: pick,
                    TaskTargetState: 'SetNotActiveToActive'
                }));
                spawnCounts[zone] = (spawnCounts[zone] || 0) + 1;
            }
        }

        var RING_CIRCUMFERENCE = 2 * Math.PI * 10; // r=10 for SVG circle

        function buildTimerUI() {
            var strip = document.getElementById('spawn-strip');
            var html = '';
            var zoneNames = Object.keys(ZONES);
            for (var i = 0; i < zoneNames.length; i++) {
                var z = zoneNames[i];
                var col = ZONE_COLORS[z] || '#888';
                var label = ZONE_LABELS[z] || z;
                var interval = ZONE_SPAWN_INTERVALS[z] || SPAWN_INTERVAL;
                html += '<div class="spawn-pip" id="pip-' + z + '">' +
                    '<span class="pip-name" style="color:' + col + '">' + label + '</span>' +
                    '<div class="pip-ring">' +
                        '<svg viewBox="0 0 28 28">' +
                            '<circle class="pip-ring-bg" cx="14" cy="14" r="10"/>' +
                            '<circle class="pip-ring-fill" id="pip-fill-' + z + '" cx="14" cy="14" r="10" ' +
                                'stroke="' + col + '" ' +
                                'stroke-dasharray="' + RING_CIRCUMFERENCE.toFixed(1) + '" ' +
                                'stroke-dashoffset="0" ' +
                                'style="filter:drop-shadow(0 0 3px ' + col + '80)"/>' +
                        '</svg>' +
                        '<div class="pip-secs" id="pip-secs-' + z + '">' + interval + '</div>' +
                    '</div>' +
                    '</div>';
                spawnTimers[z] = interval;
                spawnCounts[z] = 0;
            }
            strip.innerHTML = html;
        }

        function updateTimerUI() {
            var zoneNames = Object.keys(ZONES);
            for (var i = 0; i < zoneNames.length; i++) {
                var z = zoneNames[i];
                var interval = ZONE_SPAWN_INTERVALS[z] || SPAWN_INTERVAL;
                var remaining = spawnTimers[z] || 0;
                var pct = (interval - remaining) / interval; // 0 to 1
                var pipEl = document.getElementById('pip-' + z);
                var fillEl = document.getElementById('pip-fill-' + z);
                var secsEl = document.getElementById('pip-secs-' + z);
                var isFull = (spawnCounts[z] || 0) >= MAX_PER_ZONE;
                if (pipEl) {
                    if (isFull) { pipEl.classList.add('full'); } else { pipEl.classList.remove('full'); }
                }
                if (fillEl) {
                    var offset = RING_CIRCUMFERENCE * (1 - pct);
                    fillEl.setAttribute('stroke-dashoffset', offset.toFixed(1));
                }
                if (secsEl) {
                    secsEl.textContent = isFull ? '\u2713' : remaining;
                }
            }
        }

        function startSpawnTimers() {
            buildTimerUI();
            var zoneNames = Object.keys(ZONES);
            // Staggered initial spawn
            for (var i = 0; i < zoneNames.length; i++) {
                (function(zone, delay) {
                    var interval = ZONE_SPAWN_INTERVALS[zone] || SPAWN_INTERVAL;
                    spawnTimers[zone] = Math.ceil(delay / 1000);
                    setTimeout(function() {
                        spawnRandom(zone);
                        spawnTimers[zone] = interval;
                    }, delay);
                })(zoneNames[i], 1000 + i * 500);
            }
            // Tick every second: countdown + trigger spawns
            // Timer PAUSES when zone is at max capacity, resumes when count drops
            setInterval(function() {
                for (var i = 0; i < zoneNames.length; i++) {
                    var z = zoneNames[i];
                    var interval = ZONE_SPAWN_INTERVALS[z] || SPAWN_INTERVAL;
                    // Only tick down if zone is below max
                    if ((spawnCounts[z] || 0) >= MAX_PER_ZONE) continue;
                    if (spawnTimers[z] > 0) {
                        spawnTimers[z]--;
                    }
                    if (spawnTimers[z] <= 0) {
                        spawnRandom(z);
                        spawnTimers[z] = interval;
                    }
                }
                updateTimerUI();
            }, 1000);
        }

        /* ---- MESSAGE DEDUP ---- */
        var lastMsgHash = '';
        var lastMsgTime = 0;
        function isDupe(msg) {
            var now = Date.now();
            var hash = msg + '|' + Math.floor(now / 100);
            if (hash === lastMsgHash && now - lastMsgTime < 200) return true;
            lastMsgHash = hash;
            lastMsgTime = now;
            return false;
        }

        /* ---- MESSAGE LISTENER ---- */
        var _msgCount = 0;
        if (sdk) {
            dbg('setMessageListener registered');
            sdk.setMessageListener(function(msg) {
                _msgCount++;
                var msgShort = msg.length > 60 ? msg.substring(0, 60) + '...' : msg;
                dbg('#' + _msgCount + ' ' + msgShort);
                // Handle autodeposit BEFORE isDupe
                if (msg === 'autodeposit:go') {
                    dbg('>>> DIRECT autodeposit:go signal');
                    handleAutoDeposit();
                    return;
                }
                if (msg.indexOf('Auto_Dep_Go=1') !== -1) {
                    dbg('>>> INV has Auto_Dep_Go=1');
                }
                if (isDupe(msg)) { dbg('(isDupe, skipped)'); return; }
                try {
                    var d = JSON.parse(msg);
                    if (d.gold !== undefined) { state.gold = parseFloat(d.gold)||0; pop(document.getElementById('pill-gold')); }
                    if (d.baseId !== undefined) state.baseId = parseInt(d.baseId)||0;
                    if (d.carrying !== undefined) state.carrying = parseFloat(d.carrying)||0;
                    if (d.carryGold !== undefined) state.carryGold = parseFloat(d.carryGold)||0;
                    if (d.rebirth !== undefined) {
                        state.rebirth = parseInt(d.rebirth)||0;
                        state.pendingGold = 0;
                        state.earningRate = 0;
                        updateGoldDisplay();
                    }
                    if (d.toast) showToast(d.toast);
                    if (d.notif) notify(d.notif, d.notifType || 'info');
                    updateDisplay();
                    return;
                } catch(e) {}
                // Base tip messages from room triggers
                if (msg.startsWith('basetip:')) {
                    notify('\u{1F449} Press R on a pad to pick up a brainrot', 'info');
                    return;
                }
                // R key pickup from pedestal — show deposit tip (don't set state.carrying, inv: handles it)
                if (msg.startsWith('rpickup:')) {
                    notify('\u{1F4E6} Run over green pads to deposit or press F to drop', 'info');
                    return;
                }
                // String-based messages
                if (msg.startsWith('inv:')) {
                    // Parse key=value pairs: inv:username=bob&Gold=123&health={"bob"=100&"Hugh"=175}
                    // Bracket-aware split: don't split on & inside {} braces
                    var raw = msg.substring(4);
                    var pairs = [];
                    var depth = 0, start = 0;
                    for (var ci = 0; ci < raw.length; ci++) {
                        if (raw.charAt(ci) === '{') depth++;
                        else if (raw.charAt(ci) === '}') depth--;
                        else if (raw.charAt(ci) === '&' && depth === 0) {
                            pairs.push(raw.substring(start, ci));
                            start = ci + 1;
                        }
                    }
                    if (start < raw.length) pairs.push(raw.substring(start));
                    var params = {};
                    for (var pi = 0; pi < pairs.length; pi++) {
                        var eq = pairs[pi].indexOf('=');
                        if (eq > 0) params[pairs[pi].substring(0, eq)] = pairs[pi].substring(eq + 1);
                    }
                    // Store local player username
                    if (params.username) {
                        var uraw = params.username;
                        // If pipe interpolation returned a JSON-like object, extract first key as username
                        if (uraw.charAt(0) === '{') {
                            try {
                                var uobj = JSON.parse(uraw);
                                var ukeys = Object.keys(uobj);
                                if (ukeys.length > 0) uraw = ukeys[0];
                            } catch(eu) {
                                // Portals format {"name"="val"} — extract first key
                                var um = uraw.match(/^\{"?([^"=&}]+)/);
                                if (um) uraw = um[1];
                            }
                        }
                        myUsername = uraw.replace(/^["']|["']$/g, '');
                    }
                    if (params.Gold !== undefined) {
                        var gv = parseVarValue(params.Gold);
                        if (gv !== state.gold) {
                            state.gold = gv;
                            pop(document.getElementById('pill-gold'));
                        }
                    }
                    // Parse base ID - auto-repopulate on claim (baseId 0 -> N)
                    var newBaseId = state.baseId;
                    if (params.player_Base_num !== undefined) {
                        console.log('[HUD] player_Base_num RAW=' + params.player_Base_num + ' parsed=' + parseVarValue(params.player_Base_num));
                        newBaseId = Math.round(parseVarValue(params.player_Base_num));
                        // Fallback: if parseVarValue returned 0 but raw value has a number, extract it
                        if (newBaseId === 0 && params.player_Base_num !== '0') {
                            var bidMatch = params.player_Base_num.match(/[=:](\d+)/);
                            if (bidMatch) newBaseId = parseInt(bidMatch[1]) || 0;
                        }
                    } else if (params.My_Base_ID !== undefined) {
                        newBaseId = Math.round(parseVarValue(params.My_Base_ID));
                    }
                    if (state.baseId <= 0 && newBaseId > 0) {
                        // Base just claimed - show banner and repopulate
                        state.claimedBase = newBaseId;
                        setTimeout(function() { repopulateBase(newBaseId); }, 800);
                        // Reset stale ZC_ zone counts on server
                        if (sdk) {
                            dbg('Base claimed — firing ZC reset');
                            sdk.sendMessageToUnity(JSON.stringify({ TaskName: 'reset_zc', TaskTargetState: 'SetNotActiveToActive' }));
                        }
                    }
                    state.baseId = newBaseId;
                    // Parse carrying brainrot from server variable
                    // Skip if value is '{}' (pipe interpolation failed — don't clear carry state)
                    if (params.My_Carrying_Brainrot !== undefined && params.My_Carrying_Brainrot !== '{}') {
                        var carryNum = Math.round(parseVarValue(params.My_Carrying_Brainrot));
                        var wasCarrying = state.carrying;
                        if (carryNum > 0 && QUEST_NUM_TO_BV[carryNum]) {
                            var bvKey = QUEST_NUM_TO_BV[carryNum];
                            state.carrying = 1;
                            state.carryBvKey = bvKey;
                            state.carryName = bvKey.substring(3).replace(/_/g, ' ');
                            state.carryGold = GOLD_PER_SECOND[bvKey] || 0;
                            if (wasCarrying <= 0 && state.baseId > 0) {
                                notify('\u{1F4E6} Run over green pads to deposit or press F to drop', 'info');
                            }
                        } else if (carryNum === 0) {
                            if (autoDepositInFlight) {
                                // Autodeposit already handled carry-clear optimistically — just reset flag
                                autoDepositInFlight = false;
                            } else {
                                // Save last name for deposit notification (sync may arrive before deposit: msg)
                                state.lastCarryName = state.carryName || state.lastCarryName || '';
                                state.carrying = 0;
                                state.carryBvKey = '';
                                state.carryName = '';
                                state.carryGold = 0;
                            }
                        }
                    }
                    // Parse owned brainrot counts
                    parseOwnedBrainrots(params);
                    // Parse pedestal occupancy from Ped_F1-F4 vars
                    for (var pf = 1; pf <= 4; pf++) {
                        for (var ps = 1; ps <= 10; ps++) {
                            var pedKey = 'Ped_F' + pf + '_' + ps;
                            if (params[pedKey] !== undefined) {
                                pedestals[pf][ps] = Math.round(parseVarValue(params[pedKey]));
                            }
                        }
                    }
                    // Backup auto-deposit signal via inv: pipeline
                    if (params.Auto_Dep_Go !== undefined) {
                        var adg = Math.round(parseVarValue(params.Auto_Dep_Go));
                        if (adg === 1 && lastAutoDepGoValue !== 1) {
                            lastAutoDepGoValue = 1;
                            console.log('[HUD] Auto_Dep_Go 0→1 detected in inv: — triggering deposit');
                            handleAutoDeposit();
                        } else {
                            lastAutoDepGoValue = adg;
                        }
                    }
                    // Sync zone counts from server ZC_ variables
                    // Sync zone counts from server ZC_ variables
                    var zoneNames = Object.keys(ZONES);
                    for (var zi = 0; zi < zoneNames.length; zi++) {
                        var z = zoneNames[zi];
                        var zk = 'ZC_' + z;
                        if (params[zk] !== undefined) {
                            var oldCount = spawnCounts[z] || 0;
                            var newCount = Math.round(parseVarValue(params[zk]));
                            spawnCounts[z] = newCount;
                            var interval = ZONE_SPAWN_INTERVALS[z] || SPAWN_INTERVAL;
                            if (oldCount >= MAX_PER_ZONE && newCount < MAX_PER_ZONE) {
                                spawnTimers[z] = interval;
                            }
                            if (newCount < oldCount && newCount < MAX_PER_ZONE) {
                                spawnTimers[z] = interval;
                            }
                        }
                    }
                    // Sync carrying state from Last_Picked_Brainrot (set by room on pedestal pickup)
                    if (params.Last_Picked_Brainrot !== undefined) {
                        var bvIdx = Math.round(parseVarValue(params.Last_Picked_Brainrot));
                        if (bvIdx > 0 && QUEST_NUM_TO_BV[bvIdx] && state.carrying === 0) {
                            state.carrying = 1;
                            state.carryBvKey = QUEST_NUM_TO_BV[bvIdx];
                            state.carryName = state.carryBvKey.replace('bv_', '').replace(/_/g, ' ');
                            state.carryGold = GOLD_PER_SECOND[state.carryBvKey] || 0;
                            if (state.baseId > 0) notify('\u{1F4E6} Run over green pads to deposit or press F to drop', 'info');
                            updateDisplay();
                        }
                        // Clear it so we don't re-detect
                        params.Last_Picked_Brainrot = '0';
                    }
                    updateTimerUI();
                    parseTutorialVars(params);
                    updateDisplay();
                    checkTutorial();
                    // Fire base display update after first inv: with base data
                    if (!baseDisplayFired && state.baseId > 0 && sdk) {
                        baseDisplayFired = true;
                        setTimeout(function() {
                            sdk.sendMessageToUnity(JSON.stringify({
                                TaskName: 'show_base_display',
                                TaskTargetState: 'SetNotActiveToActive'
                            }));
                        }, 500);
                    }
                    // Re-trigger base display when any Base_X_Owner changes
                    if (baseDisplayFired && sdk) {
                        var ownerChanged = false;
                        for (var oi = 1; oi <= 10; oi++) {
                            var ok = 'Base_' + oi + '_Owner';
                            if (params[ok] !== undefined) {
                                var ov = Math.round(parseVarValue(params[ok]));
                                if (prevBaseOwners[oi] !== undefined && prevBaseOwners[oi] !== ov) {
                                    ownerChanged = true;
                                }
                                prevBaseOwners[oi] = ov;
                            }
                        }
                        if (ownerChanged) {
                            sdk.sendMessageToUnity(JSON.stringify({
                                TaskName: 'show_base_display',
                                TaskTargetState: 'SetNotActiveToActive'
                            }));
                        }
                    }
                } else if (msg === 'collect:go') {
                    // Room-side logic already gates on player_Base_num — just collect
                    if (state.pendingGold < 1) {
                        playSound('uipop');
                        notify('No cash to collect yet!', 'info');
                    } else {
                        collectGold();
                    }
                } else if (msg.startsWith('gold:')) {
                    var v = parseFloat(msg.substring(5))||0;
                    var diff = v - state.gold;
                    state.gold = v; updateDisplay(); pop(document.getElementById('pill-gold'));
                    if (diff > 0) notify('+$' + fmt(diff) + ' Cash', 'gold');
                } else if (msg.startsWith('pickup:')) {
                    if (state.carrying > 0) {
                        // Already carrying — show warning instead of fake pickup
                        playSound('uipop');
                        notify('Already carrying a brainrot!', 'info');
                    } else {
                        playSound('pickup');
                        // Dismiss claimed-base banner on first pickup
                        if (!state.claimDismissed) { state.claimDismissed = true; }
                        var pMatch = msg.match(/Picked up (.+?)! \(([0-9.]+)g/);
                        if (pMatch) {
                            state.carrying = 1;
                            state.carryName = pMatch[1].replace(/_/g, ' ');
                            state.carryBvKey = 'bv_' + pMatch[1];
                            state.carryGold = parseFloat(pMatch[2]) || 0;
                            notify('Picked up ' + state.carryName + '! (' + state.carryGold + ' cash/s)', 'pickup');
                            if (state.baseId > 0) notify('\u{1F4E6} Run over green pads to deposit or press F to drop', 'info');
                            // Decrement zone spawn count
                            var pickupZone = BV_TO_ZONE[state.carryBvKey];
                            if (pickupZone && spawnCounts[pickupZone] > 0) spawnCounts[pickupZone]--;
                            updateDisplay();
                            checkTutorial();
                        } else {
                            notify(msg.substring(7), 'pickup');
                        }
                    }
                } else if (msg.startsWith('deposit:')) {
                    // Parse base number from message: "Deposited brainrot at Base N!"
                    var baseMatch = msg.match(/Base (\d+)/);
                    var depositBase = baseMatch ? parseInt(baseMatch[1]) : 0;
                    // Room-side logic already gates on player_Base_num — just deposit
                    if (state.carrying <= 0) {
                        playSound('uipop');
                        notify('You\'re not carrying a brainrot!', 'error');
                    } else {
                        playSound('deposit');
                        var depositName = state.carryName || state.lastCarryName || 'brainrot';
                        notify('Deposited ' + depositName + '!', 'deposit');
                        state.lastCarryName = '';
                        // Increment owned brainrot count locally
                        if (state.carryBvKey) {
                            ownedBrainrots[state.carryBvKey] = (ownedBrainrots[state.carryBvKey] || 0) + 1;
                            calcEarningRate();
                            updateGoldDisplay();
                        }
                        state.carrying = 0;
                        state.carryName = '';
                        state.carryBvKey = '';
                        state.carryGold = 0;
                        updateDisplay();
                        checkTutorial();
                    }
                } else if (msg.startsWith('carry:')) {
                    var p = msg.substring(6).split(',');
                    state.carrying = parseFloat(p[0])||0;
                    state.carryGold = parseFloat(p[1])||0;
                    updateDisplay();
                } else if (msg.startsWith('rebirth:')) {
                    state.rebirth = parseInt(msg.substring(8))||0;
                    state.pendingGold = 0;
                    state.earningRate = 0;
                    updateGoldDisplay();
                    updateDisplay();
                } else if (msg.startsWith('toast:')) {
                    playSound('notification');
                    showToast(msg.substring(6));
                } else if (msg === 'drop:1') {
                    // Player dropped brainrot with F — put it back in the spawn queue
                    if (state.carryBvKey) {
                        var dropZone = BV_TO_ZONE[state.carryBvKey];
                        var droppedBv = state.carryBvKey;
                        if (dropZone && spawnCounts[dropZone] !== undefined && droppedBv) {
                            // Immediately re-spawn this specific brainrot at its zone
                            if (sdk) {
                                sdk.sendMessageToUnity(JSON.stringify({
                                    TaskName: droppedBv,
                                    TaskTargetState: 'SetNotActiveToActive'
                                }));
                            }
                            spawnCounts[dropZone] = (spawnCounts[dropZone] || 0) + 1;
                            // Reset timer so the NEXT brainrot in this zone spawns on schedule
                            var interval = ZONE_SPAWN_INTERVALS[dropZone] || SPAWN_INTERVAL;
                            spawnTimers[dropZone] = interval;
                        }
                    }
                    state.carrying = 0;
                    state.carryName = '';
                    state.carryBvKey = '';
                    state.carryGold = 0;
                    updateDisplay();
                    notify('Dropped brainrot!', 'info');
                } else if (msg.startsWith('death:')) {
                    var deathGold = msg.substring(6);
                    showDeathAlert(deathGold);
                } else if (msg.startsWith('kill:')) {
                    var killGold = msg.substring(5);
                    showKillAlert(killGold);
                } else if (msg.startsWith('repopulate:')) {
                    var baseNum = parseInt(msg.substring(11)) || 0;
                    if (baseNum > 0) repopulateBase(baseNum);
                } else if (msg === 'start_timers') {
                    console.log('[HUD] start_timers received from room');
                    if (!spawnTimersStarted) {
                        spawnTimersStarted = true;
                        startSpawnTimers();
                    }
                    // Activate carry system
                    if (sdk) sdk.sendMessageToUnity(JSON.stringify({
                        TaskName: 'carry_attach',
                        TaskTargetState: 'SetNotActiveToActive'
                    }));
                }
            });
        }

        /* ---- REPOPULATE BASE (fire DuplicateItem for all owned brainrots) ---- */
        var BV_DROP_MAP = {

        function repopulateBase(baseNum) {
            if (!sdk) return;
            console.log('[HUD] Repopulating base ' + baseNum + ' with owned brainrots');
            var delay = 0;
            var keys = Object.keys(ownedBrainrots);
            var totalFired = 0;
            for (var i = 0; i < keys.length; i++) {
                var bvKey = keys[i];
                var count = ownedBrainrots[bvKey] || 0;
                var dropStem = BV_DROP_MAP[bvKey];
                if (!dropStem || count <= 0) continue;
                var taskName = dropStem + '_b' + baseNum;
                // Fire once per copy owned (duplicate stacks at same position)
                for (var c = 0; c < count; c++) {
                    (function(tn, d) {
                        setTimeout(function() {
                            sdk.sendMessageToUnity(JSON.stringify({
                                TaskName: tn,
                                TaskTargetState: 'SetNotActiveToActive'
                            }));
                            // Reset back to NotActive after 100ms so it can fire again
                            setTimeout(function() {
                                sdk.sendMessageToUnity(JSON.stringify({
                                    TaskName: tn,
                                    TaskTargetState: 'SetActiveToNotActive'
                                }));
                            }, 100);
                        }, d);
                    })(taskName, delay);
                    delay += 50;
                    totalFired++;
                }
            }
            console.log('[HUD] Fired ' + totalFired + ' DuplicateItem tasks over ' + delay + 'ms');
            if (totalFired > 0) {
                notify('Restoring ' + totalFired + ' brainrots...', 'info');
            }
        }

        /* ---- RESET ALL BRAINROTS ON LOGIN ---- */
        function resetAllBrainrots() {
            if (!sdk) return;
            // Collect all brainrot keys from all zones
            var allBv = [];
            var zNames = Object.keys(ZONES);
            for (var i = 0; i < zNames.length; i++) {
                var pool = ZONES[zNames[i]];
                for (var j = 0; j < pool.length; j++) {
                    allBv.push(pool[j]);
                }
            }
            // Stagger to avoid flooding — send two resets per brainrot
            // (Active->NotActive and Completed->NotActive) since SetAnyToNotActive doesn't exist
            for (var k = 0; k < allBv.length; k++) {
                (function(bvKey, delay) {
                    setTimeout(function() {
                        sdk.sendMessageToUnity(JSON.stringify({
                            TaskName: bvKey,
                            TaskTargetState: 'SetActiveToNotActive'
                        }));
                    }, delay);
                    setTimeout(function() {
                        sdk.sendMessageToUnity(JSON.stringify({
                            TaskName: bvKey,
                            TaskTargetState: 'SetCompletedToNotActive'
                        }));
                    }, delay + 25);
                })(allBv[k], k * 60);
            }
            // Reset all zone counts to 0
            for (var zi = 0; zi < zNames.length; zi++) {
                spawnCounts[zNames[zi]] = 0;
            }
        }

        // Load all tutorial flags from Portals storage
        function loadTutorialStorage(callback) {
            var steps = TUTORIAL_STEPS;
            var remaining = steps.length;
            if (!sdk) { callback(); return; }
            for (var i = 0; i < steps.length; i++) {
                (function(step) {
                    sdk.storageGet(step.id, function(val) {
                        if (val === 'done') tutorialStorage[step.id] = true;
                        remaining--;
                        if (remaining <= 0) {
                            tutorialLoaded = true;
                            callback();
                        }
                    });
                })(steps[i]);
            }
            // Timeout fallback in case storageGet doesn't call back
            setTimeout(function() {
                if (!tutorialLoaded) {
                    tutorialLoaded = true;
                    callback();
                }
            }, 3000);
        }

        function markTutorialDone(stepId) {
            if (tutorialStorage[stepId]) return;
            tutorialStorage[stepId] = true;
            if (sdk) sdk.storageSet(stepId, 'done');
        }

        // Auto-skip completed steps for returning players
        function autoSkipTutorial() {
            if (state.baseId > 0) markTutorialDone('tut_claim_base');
            if (countOwnedBrainrots() > 0) {
                markTutorialDone('tut_claim_base');
                markTutorialDone('tut_collect_brainrot');
                markTutorialDone('tut_deposit');
            }
            if (state.gold > 0 || hasAnyPurchase()) {
                markTutorialDone('tut_claim_base');
                markTutorialDone('tut_collect_brainrot');
                markTutorialDone('tut_deposit');
                markTutorialDone('tut_collect_gold');
            }
            if (hasAnyWeapon()) {
                markTutorialDone('tut_buy_gun');
            }
            if (hasGunEquipped()) {
                markTutorialDone('tut_buy_gun');
                markTutorialDone('tut_equip_gun');
                markTutorialDone('tut_pvp');
            }
            if (hasAnyItem()) {
                markTutorialDone('tut_buy_items');
            }
            if (hasAnyGear()) {
                markTutorialDone('tut_buy_gear');
            }
            if (hasAnyFloorUnlock()) {
                markTutorialDone('tut_buy_floor');
            }
            if (hasAnyZoneUnlock()) {
                markTutorialDone('tut_unlock_zone');
            }
            if (state.rebirth > 0) {
                markTutorialDone('tut_rebirth');
            }
        }

        var currentTutorialSteps = [];

        function checkTutorial() {
            if (!tutorialLoaded) return;

            // On first sync, auto-skip already-completed steps
            if (tutorialFirstSync) {
                tutorialFirstSync = false;
                autoSkipTutorial();
            }

            // Collect all active steps: first non-stackable, or all stackable whose conditions are met
            var activeSteps = [];
            var foundNonStackable = false;
            for (var i = 0; i < TUTORIAL_STEPS.length; i++) {
                var step = TUTORIAL_STEPS[i];
                if (tutorialStorage[step.id]) continue; // already done

                // Check if this step should complete
                if (step.doneIf()) {
                    markTutorialDone(step.id);
                    continue;
                }

                // Check if this step should show
                if (step.showIf()) {
                    if (!step.stackable) {
                        // Non-stackable step: show only this one, stop looking
                        activeSteps = [step];
                        foundNonStackable = true;
                        break;
                    } else {
                        activeSteps.push(step);
                    }
                }
            }

            // Build a key string to detect changes
            var stepIds = [];
            for (var s = 0; s < activeSteps.length; s++) stepIds.push(activeSteps[s].id);
            var key = stepIds.join(',');

            if (activeSteps.length > 0 && key !== currentTutorialSteps.join(',')) {
                currentTutorialSteps = stepIds;
                // Build stacked banner content
                if (activeSteps.length === 1) {
                    tutorialBanner.textContent = activeSteps[0].msg;
                } else {
                    tutorialBanner.innerHTML = '';
                    for (var m = 0; m < activeSteps.length; m++) {
                        var line = document.createElement('div');
                        line.textContent = activeSteps[m].msg;
                        if (m > 0) line.style.marginTop = '4px';
                        tutorialBanner.appendChild(line);
                    }
                }
                tutorialBanner.classList.add('show');
                if (window._tutTimer) clearTimeout(window._tutTimer);
                window._tutTimer = setTimeout(function() { tutorialBanner.classList.remove('show'); }, 5000);
            } else if (activeSteps.length === 0) {
                currentTutorialSteps = [];
                tutorialBanner.classList.remove('show');
            }
        }

        // Parse purchase/zone variables from inv: params
        function parseTutorialVars(params) {
            var purchaseKeys = ['Own_Pistol', 'Own_Rifle', 'Own_Shotgun', 'Gear_Armor', 'Gear_SpeedBoots', 'Gear_CarryPack',
                                'Inv_Health_Pack', 'Inv_Speed_Potion', 'Inv_Base_Teleport', 'Inv_Shield',
                                'Floor_2_Unlocked', 'Floor_3_Unlocked', 'Floor_4_Unlocked', 'Equipped_Weapon'];
            for (var i = 0; i < purchaseKeys.length; i++) {
                if (params[purchaseKeys[i]] !== undefined) {
                    purchaseVars[purchaseKeys[i]] = parseVarValue(params[purchaseKeys[i]]);
                }
            }
            // Check for any item purchase (weapons, gear, inventory items, etc.)
            var paramKeys = Object.keys(params);
            for (var j = 0; j < paramKeys.length; j++) {
                var k = paramKeys[j];
                if ((k.startsWith('Own_') && !k.startsWith('Own_bv_')) ||
                    k.startsWith('Gear_') || k.startsWith('Inv_') || k.startsWith('Floor_')) {
                    var v = parseVarValue(params[k]);
                    if (v > 0) purchaseVars.anyItemBought = 1;
                }
                // Zone unlock variables (Zone_Forest_Zone_Unlocked, Zone_Cave_Zone_Unlocked, etc.)
                if (k.startsWith('Zone_') && k.endsWith('_Unlocked')) {
                    zoneUnlockVars[k] = parseVarValue(params[k]);
                }
            }
        }

            // Room-side 811_reset_bv_login handles resetting all bv_ quests to NotActive
            // and sends 'start_timers' message when ready
            // Fallback: also start on 7s timeout in case room signal doesn't arrive
            setTimeout(function() {
                if (!spawnTimersStarted) {
                    dbg('Fallback: starting timers (no room signal)');
                    spawnTimersStarted = true;
                    startSpawnTimers();
                }
                // Activate carry system
                sdk.sendMessageToUnity(JSON.stringify({
                    TaskName: 'carry_attach',
                    TaskTargetState: 'SetNotActiveToActive'
                }));
            }, 10000);
            startGoldAccumulator();
            // Load tutorial progress from storage
            loadTutorialStorage(function() {
                checkTutorial();
            });
        } else {
            // Dev preview
            state.gold = 42350; state.baseId = 3; state.carrying = 1; state.carryGold = 14.6; state.rebirth = 1;
            updateDisplay();
            notify('+125 Gold', 'gold');
            setTimeout(function() { notify('Picked up Banana! (1.3g)', 'pickup'); }, 500);
            setTimeout(function() { notify('Deposited Banana!', 'deposit'); }, 1000);
        }
    </script>
</body>
</html>
