<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Brainrot Tycoon HUD</title>
    <script src="https://portals-labs.github.io/portals-sdk/portals-sdk.js?v=10005456"></script>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
    <style>
        html, body {
            margin: 0; padding: 0;
            background: transparent !important;
            overflow: hidden;
            font-family: 'Nunito', sans-serif;
            color: white;
            user-select: none;
        }

        /* ---- BOTTOM-LEFT CURRENCY STACK ---- */
        .hud-stack {
            position: fixed;
            bottom: 70px;
            left: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 10;
        }

        /* Roblox-style currency pill: icon circle on left, wide rounded bar */
        .currency-pill {
            display: flex;
            align-items: center;
            height: 54px;
            border-radius: 27px;
            border: 4px solid;
            box-shadow: 0 5px 0 rgba(0,0,0,0.25), 0 8px 18px rgba(0,0,0,0.12);
            position: relative;
            min-width: 160px;
            padding-right: 18px;
        }
        .currency-pill .icon-wrap {
            width: 54px; height: 54px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            margin-left: -2px;
            position: relative;
            z-index: 2;
        }
        .currency-pill .val {
            font-family: 'Luckiest Guy', cursive;
            font-size: 26px;
            letter-spacing: 1px;
            margin-left: 8px;
            white-space: nowrap;
        }

        /* ---- GOLD PILL ---- */
        .pill-gold {
            background: linear-gradient(180deg, #FFD23F 0%, #F5A623 100%);
            border-color: #C47F17;
        }
        .pill-gold .icon-wrap {
            background: radial-gradient(circle at 40% 38%, #FFE87C, #F5A623 70%);
            border: 4px solid #B8860B;
            box-shadow: 0 3px 0 #8B6508, inset 0 2px 6px rgba(255,255,255,0.5);
        }
        .pill-gold .val {
            color: #5C3300;
            text-shadow: 1px 2px 0 rgba(255,255,255,0.3);
        }

        /* Gold coin SVG-style icon */
        .coin-icon {
            position: relative;
            width: 32px; height: 32px;
        }
        .coin-icon .coin-back {
            position: absolute;
            width: 30px; height: 30px;
            border-radius: 50%;
            background: linear-gradient(135deg, #DAA520 0%, #B8860B 100%);
            top: 2px; left: 2px;
        }
        .coin-icon .coin-front {
            position: absolute;
            width: 30px; height: 30px;
            border-radius: 50%;
            background: radial-gradient(circle at 40% 35%, #FFE44D 0%, #FFB800 50%, #E6A100 100%);
            border: 2px solid #B8860B;
            top: 0; left: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .coin-icon .coin-symbol {
            font-family: 'Luckiest Guy', cursive;
            font-size: 18px;
            color: #8B6508;
            text-shadow: 0 1px 0 rgba(255,255,255,0.45);
            margin-top: -1px;
        }

        /* ---- BASE PILL ---- */
        .pill-base {
            background: linear-gradient(180deg, #7BF07B 0%, #32C842 100%);
            border-color: #1D9E2E;
        }
        .pill-base .icon-wrap {
            background: radial-gradient(circle at 40% 38%, #90EE90, #2ECC40 70%);
            border: 4px solid #1A8A28;
            box-shadow: 0 3px 0 #146D1E, inset 0 2px 6px rgba(255,255,255,0.4);
        }
        .pill-base .val {
            color: #0D3D0D;
            text-shadow: 1px 2px 0 rgba(255,255,255,0.3);
        }

        /* House icon */
        .house-icon {
            position: relative;
            width: 30px; height: 28px;
        }
        .house-icon .roof {
            width: 0; height: 0;
            border-left: 17px solid transparent;
            border-right: 17px solid transparent;
            border-bottom: 13px solid #FFFFFF;
            position: absolute;
            top: 0; left: -2px;
            filter: drop-shadow(0 -1px 1px rgba(0,0,0,0.15));
        }
        .house-icon .walls {
            width: 24px; height: 14px;
            background: #FFFFFF;
            border-radius: 0 0 3px 3px;
            position: absolute;
            top: 11px; left: 3px;
            box-shadow: inset 0 -3px 0 rgba(0,0,0,0.08);
        }
        .house-icon .door {
            width: 7px; height: 10px;
            background: #2ECC40;
            border-radius: 3.5px 3.5px 0 0;
            position: absolute;
            bottom: 0; left: 50%;
            transform: translateX(-50%);
        }
        .house-icon .window {
            width: 5px; height: 5px;
            background: #2ECC40;
            border-radius: 1px;
            position: absolute;
            top: 2px;
        }
        .house-icon .window.l { left: 2px; }
        .house-icon .window.r { right: 2px; }

        /* ---- CARRY BANNER ---- */
        .carry-banner {
            position: fixed;
            bottom: 195px;
            left: 10px;
            padding: 7px 20px;
            border-radius: 20px;
            background: linear-gradient(180deg, #FFB347 0%, #FF8C00 100%);
            border: 4px solid #CC6600;
            box-shadow: 0 4px 0 rgba(0,0,0,0.25);
            font-family: 'Luckiest Guy', cursive;
            font-size: 17px;
            color: #3A1800;
            text-shadow: 1px 1px 0 rgba(255,255,255,0.3);
            z-index: 10;
            display: none;
            white-space: nowrap;
        }
        .carry-banner.show { display: block; }

        /* ---- TOAST ---- */
        .toast-container {
            position: fixed;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            gap: 6px;
            align-items: center;
            z-index: 30;
        }
        .toast {
            padding: 10px 24px;
            border-radius: 16px;
            background: linear-gradient(180deg, #FFE44D, #FFB800);
            border: 4px solid #CC8800;
            box-shadow: 0 4px 0 rgba(0,0,0,0.25);
            font-family: 'Luckiest Guy', cursive;
            font-size: 18px;
            color: #4A2800;
            text-shadow: 1px 1px 0 rgba(255,255,255,0.3);
            animation: toastPop 0.3s ease, toastOut 0.3s ease 2s forwards;
            white-space: nowrap;
        }
        @keyframes toastPop {
            0% { transform: scale(0.5); opacity: 0; }
            70% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes toastOut {
            to { opacity: 0; transform: translateY(-10px) scale(0.9); }
        }

        /* Pop animation */
        .pop { animation: popBounce 0.3s ease; }
        @keyframes popBounce {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <!-- CURRENCY PILLS -->
    <div class="hud-stack">
        <div class="currency-pill pill-gold" id="pill-gold">
            <div class="icon-wrap">
                <div class="coin-icon">
                    <div class="coin-back"></div>
                    <div class="coin-front">
                        <span class="coin-symbol">$</span>
                    </div>
                </div>
            </div>
            <span class="val" id="val-gold">0</span>
        </div>
        <div class="currency-pill pill-base" id="pill-base">
            <div class="icon-wrap">
                <div class="house-icon">
                    <div class="roof"></div>
                    <div class="walls">
                        <div class="window l"></div>
                        <div class="window r"></div>
                        <div class="door"></div>
                    </div>
                </div>
            </div>
            <span class="val" id="val-base">---</span>
        </div>
    </div>

    <!-- CARRY BANNER -->
    <div class="carry-banner" id="carry-banner">
        Carrying: <span id="carry-gold">0</span>g
    </div>

    <!-- TOAST -->
    <div class="toast-container" id="toasts"></div>

    <script>
        const sdk = typeof PortalsSdk !== 'undefined' ? PortalsSdk : null;

        let state = { gold: 0, baseId: 0, carrying: 0, carryGold: 0 };

        const valGold = document.getElementById('val-gold');
        const valBase = document.getElementById('val-base');
        const carryBanner = document.getElementById('carry-banner');
        const carryGoldEl = document.getElementById('carry-gold');
        const toastContainer = document.getElementById('toasts');

        function fmt(n) {
            if (n >= 1e9) return (n/1e9).toFixed(1)+'B';
            if (n >= 1e6) return (n/1e6).toFixed(1)+'M';
            if (n >= 1e3) return (n/1e3).toFixed(1)+'K';
            return Math.floor(n).toLocaleString();
        }

        function updateDisplay() {
            valGold.textContent = fmt(state.gold);
            valBase.textContent = state.baseId > 0 ? '#' + state.baseId : '---';
            if (state.carrying > 0) {
                carryBanner.classList.add('show');
                carryGoldEl.textContent = state.carryGold;
            } else {
                carryBanner.classList.remove('show');
            }
        }

        function pop(el) {
            el.classList.remove('pop');
            void el.offsetWidth;
            el.classList.add('pop');
        }

        function showToast(text) {
            const t = document.createElement('div');
            t.className = 'toast';
            t.textContent = text;
            toastContainer.appendChild(t);
            setTimeout(() => { if (t.parentNode) t.remove(); }, 2500);
        }

        /** Parse a variable value from Portals |var| interpolation. */
        function parseVarValue(raw) {
            if (raw === undefined || raw === null || raw === '') return 0;
            raw = String(raw).trim();
            const num = Number(raw);
            if (!isNaN(num)) return num;
            try {
                const parsed = JSON.parse(raw);
                if (typeof parsed === 'number') return parsed;
                if (typeof parsed === 'object' && parsed !== null) {
                    const vals = Object.values(parsed);
                    return vals.length > 0 ? (Number(vals[0]) || 0) : 0;
                }
            } catch(e) {}
            return 0;
        }

        // --- Message deduplication ---
        let _lastMsgId = '', _lastMsgTime = 0;
        function processMessage(msg) {
            const now = Date.now();
            const msgId = msg + '_' + Math.floor(now / 100);
            if (msgId === _lastMsgId && now - _lastMsgTime < 200) return;
            _lastMsgId = msgId; _lastMsgTime = now;
            handleMessage(msg);
        }

        function handleMessage(msg) {
            // inv: format — "inv:Gold=|Gold|&BaseId=|BaseId|&..."
            if (msg.startsWith('inv:')) {
                const payload = msg.substring(4);
                const pairs = payload.split('&');
                for (const pair of pairs) {
                    const eq = pair.indexOf('=');
                    if (eq < 0) continue;
                    const key = pair.substring(0, eq).trim();
                    const val = parseVarValue(pair.substring(eq + 1));
                    if (key === 'Gold') { const diff = val - state.gold; state.gold = val; pop(document.getElementById('pill-gold')); if (diff > 0) showToast('+' + fmt(diff) + ' Gold'); }
                    else if (key === 'BaseId') state.baseId = val;
                    else if (key === 'Carrying') state.carrying = val;
                    else if (key === 'CarryGold') state.carryGold = val;
                }
                updateDisplay();
                return;
            }

            // JSON format
            try {
                const d = JSON.parse(msg);
                if (d.gold !== undefined) { state.gold = parseFloat(d.gold)||0; pop(document.getElementById('pill-gold')); }
                if (d.baseId !== undefined) state.baseId = parseInt(d.baseId)||0;
                if (d.carrying !== undefined) state.carrying = parseFloat(d.carrying)||0;
                if (d.carryGold !== undefined) state.carryGold = parseFloat(d.carryGold)||0;
                if (d.toast) showToast(d.toast);
                updateDisplay();
                return;
            } catch(e) {}

            // Simple prefix formats
            if (msg.startsWith('gold:')) {
                const v = parseFloat(msg.substring(5))||0;
                const diff = v - state.gold;
                state.gold = v; updateDisplay(); pop(document.getElementById('pill-gold'));
                if (diff > 0) showToast('+' + fmt(diff) + ' Gold');
            } else if (msg.startsWith('carry:')) {
                const p = msg.substring(6).split(',');
                state.carrying = parseFloat(p[0])||0;
                state.carryGold = parseFloat(p[1])||0;
                updateDisplay();
            } else if (msg.startsWith('base:')) {
                state.baseId = parseInt(msg.substring(5))||0; updateDisplay();
            } else if (msg.startsWith('toast:')) {
                showToast(msg.substring(6));
            }
        }

        // --- SDK message listener ---
        if (sdk) {
            sdk.setMessageListener(function(msg) { processMessage(msg); });
        }
        window.addEventListener('message', function(event) {
            if (event.data && typeof event.data === 'string') processMessage(event.data);
            else if (event.data && event.data.portalsMessage) processMessage(event.data.portalsMessage);
        });

        // --- Keyboard refocus ---
        function _doFocusGame() {
            if (typeof PortalsSdk !== 'undefined' && PortalsSdk.focusGameKeyboard) PortalsSdk.focusGameKeyboard();
        }
        document.addEventListener('keydown', function() { if (!document.hidden) _doFocusGame(); });
        _doFocusGame();
        setTimeout(_doFocusGame, 100);
        setTimeout(_doFocusGame, 300);

        updateDisplay();
        if (!sdk) { state.gold = 42350; state.baseId = 3; state.carrying = 1; state.carryGold = 14.6; updateDisplay(); }
    </script>
</body>
</html>
