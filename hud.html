<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Brainrot Tycoon HUD</title>
    <script src="https://portals-labs.github.io/portals-sdk/portals-sdk.js?v=10005456"></script>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
    <style>
        html, body {
            margin: 0; padding: 0;
            background: transparent !important;
            overflow: hidden;
            font-family: 'Nunito', sans-serif;
            color: white;
            user-select: none;
            -webkit-text-stroke: 0.5px rgba(0,0,0,0.15);
        }

        /* ---- BOTTOM-LEFT HUD STACK ---- */
        .hud-stack {
            position: fixed;
            bottom: 70px;
            left: 12px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 6px;
            z-index: 10;
        }

        .currency-pill {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 6px 4px 4px;
            border-radius: 28px;
            border: 3px solid rgba(0,0,0,0.25);
            box-shadow: 0 4px 0 rgba(0,0,0,0.2), 0 6px 12px rgba(0,0,0,0.15);
            position: relative;
            min-width: 90px;
        }
        .currency-pill .icon-circle {
            width: 36px; height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            border: 3px solid rgba(0,0,0,0.2);
            flex-shrink: 0;
        }
        .currency-pill .val {
            font-family: 'Luckiest Guy', cursive;
            font-size: 20px;
            text-shadow: 2px 2px 0 rgba(0,0,0,0.3);
            letter-spacing: 0.5px;
        }

        /* Cash pill */
        .pill-gold {
            background: linear-gradient(180deg, #5BDB5B 0%, #2EAA2E 100%);
            border-color: #1E8A1E;
        }
        .pill-gold .icon-circle { background: #228B22; border-color: #1A6B1A; }
        .pill-gold .val { color: #0A2A0A; }

        /* Cash stack icon (CSS-drawn) */
        .cash-icon {
            width: 26px; height: 20px;
            position: relative;
        }
        .cash-bill {
            position: absolute;
            width: 22px; height: 10px;
            border-radius: 2px;
            border: 1.5px solid rgba(0,0,0,0.3);
            left: 50%; transform: translateX(-50%);
        }
        .cash-bill:nth-child(1) { background: #1B5E20; bottom: 0; }
        .cash-bill:nth-child(2) { background: #2E7D32; bottom: 4px; }
        .cash-bill:nth-child(3) { background: #43A047; bottom: 8px; }
        .cash-bill .dollar {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 8px;
            font-weight: 900;
            color: rgba(255,255,255,0.8);
            font-family: 'Nunito', sans-serif;
        }

        /* ---- CARRY BANNER (below cash in stack) ---- */
        .carry-banner {
            padding: 4px 14px;
            border-radius: 14px;
            background: linear-gradient(180deg, #FFB347 0%, #FF8C00 100%);
            border: 3px solid #CC6600;
            box-shadow: 0 3px 0 rgba(0,0,0,0.2);
            font-family: 'Luckiest Guy', cursive;
            font-size: 14px;
            color: #3A1800;
            text-shadow: 1px 1px 0 rgba(255,255,255,0.3);
            display: none;
            white-space: nowrap;
        }
        .carry-banner.show { display: block; }

        /* ---- SPAWN TIMERS (vertical, above notifs) ---- */
        .spawn-strip {
            display: flex;
            flex-direction: column;
            gap: 6px;
            align-items: flex-start;
        }
        .spawn-pip {
            display: flex;
            align-items: center;
            gap: 4px;
            font-family: 'Luckiest Guy', cursive;
            font-size: 10px;
            color: white;
            text-shadow: 1px 1px 0 rgba(0,0,0,0.4);
            position: relative;
        }
        .spawn-pip .pip-bg {
            width: 28px; height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .spawn-pip .pip-label {
            font-size: 8px;
            position: relative;
            z-index: 1;
        }
        .spawn-pip .pip-time {
            font-size: 9px;
            font-family: 'Nunito', sans-serif;
            font-weight: 800;
            color: rgba(255,255,255,0.8);
            white-space: nowrap;
        }

        /* ---- NOTIFICATION FEED (above cash in stack) ---- */
        .notif-container {
            display: flex;
            flex-direction: column;
            gap: 4px;
            align-items: flex-start;
            pointer-events: none;
        }
        .notif {
            padding: 5px 12px;
            border-radius: 12px;
            box-shadow: 0 2px 0 rgba(0,0,0,0.2);
            font-family: 'Luckiest Guy', cursive;
            font-size: 12px;
            text-shadow: 1px 1px 0 rgba(0,0,0,0.2);
            white-space: nowrap;
            animation: notifSlide 0.3s ease, notifOut 0.4s ease 3s forwards;
        }
        .notif-gold {
            background: linear-gradient(180deg, #FFE44D, #FFB800);
            border: 3px solid #CC8800;
            color: #4A2800;
        }
        .notif-pickup {
            background: linear-gradient(180deg, #FFB347, #FF8C00);
            border: 3px solid #CC6600;
            color: #3A1800;
        }
        .notif-deposit {
            background: linear-gradient(180deg, #6EF06E, #2ECC40);
            border: 3px solid #1FA030;
            color: #0A3A0A;
        }
        .notif-spawn {
            background: linear-gradient(180deg, #74B9FF, #3498DB);
            border: 3px solid #2176AA;
            color: #0A1A3A;
        }
        .notif-info {
            background: linear-gradient(180deg, #DFE6E9, #B2BEC3);
            border: 3px solid #95A5A6;
            color: #2C3E50;
        }
        .notif-error {
            background: linear-gradient(180deg, #FF6B6B, #E74C3C);
            border: 3px solid #C0392B;
            color: #FFFFFF;
        }
        @keyframes notifSlide {
            0% { transform: translateX(-80px); opacity: 0; }
            70% { transform: translateX(3px); }
            100% { transform: translateX(0); opacity: 1; }
        }
        @keyframes notifOut {
            to { opacity: 0; transform: translateX(-40px); }
        }

        /* ---- LEGACY TOAST (keep for compat) ---- */
        .toast-container {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            gap: 6px;
            align-items: center;
            z-index: 30;
        }
        .toast {
            padding: 8px 20px;
            border-radius: 14px;
            background: linear-gradient(180deg, #FFE44D, #FFB800);
            border: 3px solid #CC8800;
            box-shadow: 0 3px 0 rgba(0,0,0,0.2);
            font-family: 'Luckiest Guy', cursive;
            font-size: 16px;
            color: #4A2800;
            text-shadow: 1px 1px 0 rgba(255,255,255,0.3);
            animation: toastPop 0.3s ease, toastOut 0.3s ease 2s forwards;
            white-space: nowrap;
        }
        @keyframes toastPop {
            0% { transform: scale(0.5); opacity: 0; }
            70% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes toastOut {
            to { opacity: 0; transform: translateY(-10px) scale(0.9); }
        }

        /* Pending gold sub-text */
        .gold-pending {
            font-family: 'Nunito', sans-serif;
            font-size: 11px;
            font-weight: 800;
            color: #8B6914;
            opacity: 0.8;
            margin-top: -2px;
            text-align: center;
        }
        .gold-rate {
            font-family: 'Nunito', sans-serif;
            font-size: 9px;
            font-weight: 700;
            color: #8B6914;
            opacity: 0.6;
            text-align: center;
        }
        .pill-gold { flex-direction: column; align-items: center; padding: 4px 10px; }
        .pill-gold .gold-row { display: flex; align-items: center; gap: 6px; }

        /* Pop animation */
        .pop { animation: popBounce 0.3s ease; }
        @keyframes popBounce {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        /* Cash particle animation */
        .cash-particle {
            position: absolute;
            font-family: 'Luckiest Guy', cursive;
            font-size: 16px;
            font-weight: 900;
            pointer-events: none;
            z-index: 100;
            text-shadow: 1px 1px 0 rgba(0,0,0,0.3);
            animation: cashFly 1s ease-out forwards;
        }
        .cash-particle.earn { color: #2ECC40; }
        .cash-particle.spend { color: #E74C3C; }
        @keyframes cashFly {
            0% { opacity: 1; transform: translate(0, 0) scale(1); }
            100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(0.5); }
        }
    </style>
</head>
<body>
    <!-- BOTTOM-LEFT HUD STACK (top to bottom: timers, notifs, cash, carry) -->
    <div class="hud-stack">
        <!-- SPAWN TIMERS (topmost in stack) -->
        <div class="spawn-strip" id="spawn-strip"></div>

        <!-- NOTIFICATION FEED (above cash) -->
        <div class="notif-container" id="notifs"></div>

        <!-- CASH PILL -->
        <div class="currency-pill pill-gold" id="pill-gold">
            <div class="gold-row">
                <div class="icon-circle">
                    <div class="cash-icon">
                        <div class="cash-bill"><span class="dollar">$</span></div>
                        <div class="cash-bill"></div>
                        <div class="cash-bill"><span class="dollar">$</span></div>
                    </div>
                </div>
                <span class="val" id="val-gold">0</span>
            </div>
            <div class="gold-pending" id="gold-pending" style="display:none">+0 pending</div>
            <div class="gold-rate" id="gold-rate" style="display:none">0/s</div>
        </div>

        <!-- CARRY BANNER (below cash) -->
        <div class="carry-banner" id="carry-banner">
            &#x1F9F8; Carrying <span id="carry-name">???</span> (<span id="carry-gold">0</span>g)
        </div>
    </div>

    <!-- TOAST (legacy) -->
    <div class="toast-container" id="toasts"></div>

    <script>
        const sdk = typeof PortalsSdk !== 'undefined' ? PortalsSdk : null;

        // ---- SOUND SYSTEM ----
        var _mp3Sounds = {};
        (function() {
            var files = {
                purchase: 'purchase.mp3', click: 'click.mp3', levelup: 'levelup.mp3',
                uipop: 'ui-pop.mp3', harvest: 'harvest.mp3', talent: 'talent.mp3',
                xp: 'xp-gain.mp3', cropready: 'cropready.mp3',
                notification: 'notification.mp3', pickup: 'brainrot-collect.mp3',
                deposit: 'deposit-brainrot.mp3'
            };
            for (var k in files) { var a = new Audio(files[k]); a.preload = 'auto'; a.volume = (k === 'click') ? 0.5 : 0.3; _mp3Sounds[k] = a; }
        })();
        function playSound(type) { var s = _mp3Sounds[type]; if (s) { s.currentTime = 0; s.play().catch(function(){}); } }

        let state = { gold: 0, baseId: 0, carrying: 0, carryGold: 0, carryName: '', carryBvKey: '', rebirth: 0, pendingGold: 0, earningRate: 0 };

        const valGold = document.getElementById('val-gold');
        const carryBanner = document.getElementById('carry-banner');
        const carryGoldEl = document.getElementById('carry-gold');
        const carryNameEl = document.getElementById('carry-name');
        const toastContainer = document.getElementById('toasts');
        const notifContainer = document.getElementById('notifs');

        /* ---- FORMAT ---- */
        function fmt(n) {
            if (n >= 1e9) return (n/1e9).toFixed(1)+'B';
            if (n >= 1e6) return (n/1e6).toFixed(1)+'M';
            if (n >= 1e3) return (n/1e3).toFixed(1)+'K';
            return Math.floor(n).toLocaleString();
        }

        /* ---- DISPLAY ---- */
        function updateDisplay() {
            valGold.textContent = fmt(state.gold);
            if (state.carrying > 0) {
                carryBanner.classList.add('show');
                carryNameEl.textContent = state.carryName || '???';
                carryGoldEl.textContent = state.carryGold;
            } else {
                carryBanner.classList.remove('show');
            }
        }

        function pop(el) {
            el.classList.remove('pop');
            void el.offsetWidth;
            el.classList.add('pop');
        }

        /* ---- CASH PARTICLE BURST ---- */
        function spawnCashParticles(type, count) {
            // type: 'earn' (green $) or 'spend' (red -$)
            count = count || 6;
            var pill = document.getElementById('pill-gold');
            if (!pill) return;
            for (var i = 0; i < count; i++) {
                (function(idx) {
                    setTimeout(function() {
                        var p = document.createElement('div');
                        p.className = 'cash-particle ' + type;
                        p.textContent = type === 'earn' ? '$' : '-$';
                        // Random direction — mostly upward
                        var dx = (Math.random() - 0.5) * 80;
                        var dy = -(30 + Math.random() * 60);
                        p.style.setProperty('--dx', dx + 'px');
                        p.style.setProperty('--dy', dy + 'px');
                        p.style.left = (10 + Math.random() * 30) + 'px';
                        p.style.top = '0px';
                        pill.appendChild(p);
                        setTimeout(function() { if (p.parentNode) p.remove(); }, 1100);
                    }, idx * 60);
                })(i);
            }
        }

        /* ---- NOTIFICATION SYSTEM ---- */
        // types: gold, pickup, deposit, spawn, info
        function notify(text, type) {
            type = type || 'info';
            const el = document.createElement('div');
            el.className = 'notif notif-' + type;
            el.textContent = text;
            notifContainer.appendChild(el);
            // Cap at 5 visible
            while (notifContainer.children.length > 5) {
                notifContainer.removeChild(notifContainer.firstChild);
            }
            setTimeout(function() { if (el.parentNode) el.remove(); }, 3500);
        }

        // Legacy toast (still works for old messages)
        function showToast(text) {
            const t = document.createElement('div');
            t.className = 'toast';
            t.textContent = text;
            toastContainer.appendChild(t);
            setTimeout(function() { if (t.parentNode) t.remove(); }, 2500);
        }

        /* ---- SPAWN SYSTEM ---- */

        /* ---- GOLD PER SECOND (from brainrot_economy.xlsx) ---- */
        var GOLD_PER_SECOND = {

            'bv_Magi_Ribbitini': 413.9, 'bv_Meowl': 456.6,

        };

        /* ---- GOLD ACCUMULATION SYSTEM ---- */
        var ownedBrainrots = {};  // bv_Name -> count owned
        var goldPendingEl = document.getElementById('gold-pending');
        var goldRateEl = document.getElementById('gold-rate');
        var DENOM_VALUES = [100000, 50000, 10000, 5000, 1000, 500, 100, 50, 10, 5, 1];
        var DENOM_TASKS = {
            1: 'add_gold_1', 5: 'add_gold_5', 10: 'add_gold_10',
            50: 'add_gold_50', 100: 'add_gold_100', 500: 'add_gold_500',
            1000: 'add_gold_1000', 5000: 'add_gold_5000', 10000: 'add_gold_10000',
            50000: 'add_gold_50000', 100000: 'add_gold_100000'
        };

        function calcEarningRate() {
            var rate = 0;
            var keys = Object.keys(ownedBrainrots);
            for (var i = 0; i < keys.length; i++) {
                var count = ownedBrainrots[keys[i]];
                var gps = GOLD_PER_SECOND[keys[i]] || 0;
                rate += count * gps;
            }
            state.earningRate = rate;
            return rate;
        }

        // Accumulate gold every second
        function startGoldAccumulator() {
            setInterval(function() {
                if (state.earningRate > 0) {
                    state.pendingGold += state.earningRate;
                    updateGoldDisplay();
                }
            }, 1000);
        }

        function updateGoldDisplay() {
            if (state.pendingGold > 0) {
                goldPendingEl.textContent = '+' + fmt(Math.floor(state.pendingGold)) + ' pending';
                goldPendingEl.style.display = 'block';
            } else {
                goldPendingEl.style.display = 'none';
            }
            if (state.earningRate > 0) {
                goldRateEl.textContent = fmt(state.earningRate) + '/s';
                goldRateEl.style.display = 'block';
            } else {
                goldRateEl.style.display = 'none';
            }
        }

        function triggerTask(taskName) {
            if (sdk) {
                sdk.sendMessageToUnity(JSON.stringify({
                    TaskName: taskName,
                    TaskTargetState: 'SetNotActiveToActive'
                }));
            }
        }

        function collectGold() {
            var amount = Math.floor(state.pendingGold);
            if (amount <= 0) return;
            state.pendingGold = state.pendingGold - amount; // keep fractional remainder

            // Break into denomination tasks
            var tasks = [];
            var remaining = amount;
            for (var i = 0; i < DENOM_VALUES.length; i++) {
                var d = DENOM_VALUES[i];
                while (remaining >= d) {
                    tasks.push(DENOM_TASKS[d]);
                    remaining -= d;
                }
            }

            // Fire tasks staggered 200ms apart
            for (var t = 0; t < tasks.length; t++) {
                (function(task, delay) {
                    setTimeout(function() { triggerTask(task); }, delay);
                })(tasks[t], t * 200);
            }

            // Show notification + cash burst
            playSound('xp');
            notify('+' + fmt(amount) + ' Gold collected!', 'gold');
            pop(document.getElementById('pill-gold'));
            spawnCashParticles('earn', 8);
            updateGoldDisplay();
        }

        // Parse owned brainrot counts from inv: messages
        function parseOwnedBrainrots(params) {
            var keys = Object.keys(params);
            for (var i = 0; i < keys.length; i++) {
                var k = keys[i];
                if (k.startsWith('Own_bv_')) {
                    var bvKey = k.substring(4); // "bv_Banana"
                    var val = parseFloat(params[k]) || 0;
                    if (val > 0) {
                        ownedBrainrots[bvKey] = val;
                    } else {
                        delete ownedBrainrots[bvKey];
                    }
                }
            }
            calcEarningRate();
            updateGoldDisplay();
        }

        const SPAWN_INTERVAL = 30; // default fallback
        const MAX_PER_ZONE = 3;
        // Per-zone spawn intervals — higher tier zones = longer timers = rarer brainrots
        const ZONE_SPAWN_INTERVALS = {
            Beach: 15,           // Common — fast spawns
            Meadow: 20,          // Common — slightly slower
            Forest: 30,          // Rare tier starts
            Jungle: 35,          // Rare
            Cave: 45,            // Epic
            Crystal_Cove: 50,    // Epic
            Boss_Arena: 60,      // Legendary
            Volcano: 75,         // Mythic
            Ancient_Ruins: 90,   // Brainrot God
            Sky_Platform: 105,   // Secret
            The_Void: 120        // OG — rarest, 2 min spawns
        };
        const ZONE_COLORS = {
            Beach: '#FFD700', Meadow: '#2ECC40', Forest: '#228B22', Jungle: '#32CD32',
            Cave: '#8B4513', Crystal_Cove: '#00CED1', Boss_Arena: '#E74C3C', Volcano: '#FF4500',
            Ancient_Ruins: '#DAA520', Sky_Platform: '#87CEEB', The_Void: '#9B59B6'
        };
        const ZONE_LABELS = {
            Beach: 'BCH', Meadow: 'MDW', Forest: 'FOR', Jungle: 'JNG',
            Cave: 'CAV', Crystal_Cove: 'CRC', Boss_Arena: 'BOS', Volcano: 'VOL',
            Ancient_Ruins: 'RUN', Sky_Platform: 'SKY', The_Void: 'VID'
        };

        // Reverse lookup: brainrot name -> zone
        var BV_TO_ZONE = {};
        (function() {
            var zoneNames = Object.keys(ZONES);
            for (var i = 0; i < zoneNames.length; i++) {
                var z = zoneNames[i];
                for (var j = 0; j < ZONES[z].length; j++) {
                    BV_TO_ZONE[ZONES[z][j]] = z;
                }
            }
        })();

        // Track remaining seconds per zone and active count per zone
        var spawnTimers = {};
        var spawnCounts = {};

        function spawnRandom(zone) {
            var pool = ZONES[zone];
            if (!pool || pool.length === 0) return;
            // Check spawn cap — spawnCounts is synced from server ZC_ variables
            if ((spawnCounts[zone] || 0) >= MAX_PER_ZONE) return;
            var pick = pool[Math.floor(Math.random() * pool.length)];
            playSound('cropready');
            if (sdk) {
                sdk.sendMessageToUnity(JSON.stringify({
                    TaskName: pick,
                    TaskTargetState: 'SetNotActiveToActive'
                }));
                // Optimistic increment — server will confirm via ZC_ sync
                spawnCounts[zone] = (spawnCounts[zone] || 0) + 1;
            }
        }

        function buildTimerUI() {
            var strip = document.getElementById('spawn-strip');
            var html = '';
            var zoneNames = Object.keys(ZONES);
            for (var i = 0; i < zoneNames.length; i++) {
                var z = zoneNames[i];
                var col = ZONE_COLORS[z] || '#888';
                var label = ZONE_LABELS[z] || z.substring(0, 3);
                var interval = ZONE_SPAWN_INTERVALS[z] || SPAWN_INTERVAL;
                html += '<div class="spawn-pip" id="pip-' + z + '">' +
                    '<div class="pip-bg" style="background:' + col + ';">' +
                    '<span class="pip-label">' + label + '</span>' +
                    '</div>' +
                    '<span class="pip-time" id="pip-time-' + z + '">' + interval + 's</span>' +
                    '</div>';
                spawnTimers[z] = interval;
            }
            strip.innerHTML = html;
        }

        function updateTimerUI() {
            var zoneNames = Object.keys(ZONES);
            for (var i = 0; i < zoneNames.length; i++) {
                var z = zoneNames[i];
                var interval = ZONE_SPAWN_INTERVALS[z] || SPAWN_INTERVAL;
                var remaining = spawnTimers[z] || 0;
                var pct = ((interval - remaining) / interval) * 100;
                var col = ZONE_COLORS[z] || '#888';
                var pipBg = document.querySelector('#pip-' + z + ' .pip-bg');
                var timeEl = document.getElementById('pip-time-' + z);
                if (pipBg) {
                    // Show progress ring on the pip circle
                    pipBg.style.background = 'conic-gradient(' + col + ' ' + pct + '%, rgba(0,0,0,0.3) ' + pct + '%)';
                    pipBg.style.borderRadius = '50%';
                }
                if (timeEl) {
                    if ((spawnCounts[z] || 0) >= MAX_PER_ZONE) {
                        timeEl.textContent = 'FULL';
                    } else {
                        timeEl.textContent = remaining + 's';
                    }
                }
            }
        }

        function startSpawnTimers() {
            buildTimerUI();
            var zoneNames = Object.keys(ZONES);
            // Staggered initial spawn
            for (var i = 0; i < zoneNames.length; i++) {
                (function(zone, delay) {
                    var interval = ZONE_SPAWN_INTERVALS[zone] || SPAWN_INTERVAL;
                    spawnTimers[zone] = Math.ceil(delay / 1000);
                    setTimeout(function() {
                        spawnRandom(zone);
                        spawnTimers[zone] = interval;
                    }, delay);
                })(zoneNames[i], 1000 + i * 500);
            }
            // Tick every second: countdown + trigger spawns
            // Timer PAUSES when zone is at max capacity, resumes when count drops
            setInterval(function() {
                for (var i = 0; i < zoneNames.length; i++) {
                    var z = zoneNames[i];
                    var interval = ZONE_SPAWN_INTERVALS[z] || SPAWN_INTERVAL;
                    // Only tick down if zone is below max
                    if ((spawnCounts[z] || 0) >= MAX_PER_ZONE) continue;
                    if (spawnTimers[z] > 0) {
                        spawnTimers[z]--;
                    }
                    if (spawnTimers[z] <= 0) {
                        spawnRandom(z);
                        spawnTimers[z] = interval;
                    }
                }
                updateTimerUI();
            }, 1000);
        }

        /* ---- MESSAGE DEDUP ---- */
        var lastMsgHash = '';
        var lastMsgTime = 0;
        function isDupe(msg) {
            var now = Date.now();
            var hash = msg + '|' + Math.floor(now / 100);
            if (hash === lastMsgHash && now - lastMsgTime < 200) return true;
            lastMsgHash = hash;
            lastMsgTime = now;
            return false;
        }

        /* ---- MESSAGE LISTENER ---- */
        if (sdk) {
            sdk.setMessageListener(function(msg) {
                if (isDupe(msg)) return;
                try {
                    var d = JSON.parse(msg);
                    if (d.gold !== undefined) { state.gold = parseFloat(d.gold)||0; pop(document.getElementById('pill-gold')); }
                    if (d.baseId !== undefined) state.baseId = parseInt(d.baseId)||0;
                    if (d.carrying !== undefined) state.carrying = parseFloat(d.carrying)||0;
                    if (d.carryGold !== undefined) state.carryGold = parseFloat(d.carryGold)||0;
                    if (d.rebirth !== undefined) state.rebirth = parseInt(d.rebirth)||0;
                    if (d.toast) showToast(d.toast);
                    if (d.notif) notify(d.notif, d.notifType || 'info');
                    updateDisplay();
                    return;
                } catch(e) {}
                // String-based messages
                if (msg.startsWith('inv:')) {
                    // Parse key=value pairs: inv:Gold=123&Own_bv_Banana=2&...
                    var pairs = msg.substring(4).split('&');
                    var params = {};
                    for (var pi = 0; pi < pairs.length; pi++) {
                        var kv = pairs[pi].split('=');
                        if (kv.length === 2) params[kv[0]] = kv[1];
                    }
                    if (params.Gold !== undefined) {
                        var gv = parseFloat(params.Gold) || 0;
                        if (gv !== state.gold) {
                            state.gold = gv;
                            pop(document.getElementById('pill-gold'));
                        }
                    }
                    // Parse owned brainrot counts
                    parseOwnedBrainrots(params);
                    // Sync zone counts from server ZC_ variables
                    var zoneNames = Object.keys(ZONES);
                    for (var zi = 0; zi < zoneNames.length; zi++) {
                        var zk = 'ZC_' + zoneNames[zi];
                        if (params[zk] !== undefined) {
                            spawnCounts[zoneNames[zi]] = parseInt(params[zk]) || 0;
                        }
                    }
                    updateDisplay();
                } else if (msg === 'collect:go') {
                    // Player stepped on collect trigger — check base ownership first
                    if (state.baseId <= 0) {
                        playSound('uipop');
                        notify('Claim a base first!', 'error');
                    } else if (state.pendingGold < 1) {
                        playSound('uipop');
                        notify('No gold to collect yet!', 'info');
                    } else {
                        collectGold();
                    }
                } else if (msg.startsWith('gold:')) {
                    var v = parseFloat(msg.substring(5))||0;
                    var diff = v - state.gold;
                    state.gold = v; updateDisplay(); pop(document.getElementById('pill-gold'));
                    if (diff > 0) notify('+' + fmt(diff) + ' Gold', 'gold');
                } else if (msg.startsWith('pickup:')) {
                    if (state.carrying > 0) {
                        // Already carrying — show warning instead of fake pickup
                        playSound('uipop');
                        notify('Already carrying a brainrot!', 'info');
                    } else {
                        playSound('pickup');
                        notify(msg.substring(7), 'pickup');
                        var pMatch = msg.match(/Picked up (.+?)! \(([0-9.]+)g/);
                        if (pMatch) {
                            state.carrying = 1;
                            state.carryName = pMatch[1].replace(/_/g, ' ');
                            state.carryBvKey = 'bv_' + pMatch[1];
                            state.carryGold = parseFloat(pMatch[2]) || 0;
                            // Decrement zone spawn count
                            var pickupZone = BV_TO_ZONE[state.carryBvKey];
                            if (pickupZone && spawnCounts[pickupZone] > 0) spawnCounts[pickupZone]--;
                            updateDisplay();
                        }
                    }
                } else if (msg.startsWith('deposit:')) {
                    // Parse base number from message: "Deposited brainrot at Base N!"
                    var baseMatch = msg.match(/Base (\d+)/);
                    var depositBase = baseMatch ? parseInt(baseMatch[1]) : 0;
                    if (state.carrying <= 0) {
                        playSound('uipop');
                        notify('You\'re not carrying a brainrot!', 'error');
                    } else if (state.baseId <= 0) {
                        playSound('uipop');
                        notify('Claim a base first!', 'error');
                    } else if (depositBase > 0 && state.baseId !== depositBase) {
                        playSound('uipop');
                        notify('This is not your base!', 'error');
                    } else {
                        playSound('deposit');
                        notify(msg.substring(8), 'deposit');
                        // Increment owned brainrot count locally
                        if (state.carryBvKey) {
                            ownedBrainrots[state.carryBvKey] = (ownedBrainrots[state.carryBvKey] || 0) + 1;
                            calcEarningRate();
                            updateGoldDisplay();
                        }
                        state.carrying = 0;
                        state.carryName = '';
                        state.carryBvKey = '';
                        state.carryGold = 0;
                        updateDisplay();
                    }
                } else if (msg.startsWith('carry:')) {
                    var p = msg.substring(6).split(',');
                    state.carrying = parseFloat(p[0])||0;
                    state.carryGold = parseFloat(p[1])||0;
                    updateDisplay();
                } else if (msg.startsWith('base:')) {
                    state.baseId = parseInt(msg.substring(5))||0; updateDisplay();
                } else if (msg.startsWith('rebirth:')) {
                    state.rebirth = parseInt(msg.substring(8))||0; updateDisplay();
                } else if (msg.startsWith('toast:')) {
                    playSound('notification');
                    showToast(msg.substring(6));
                }
            });
        }

        /* ---- KEYBOARD REFOCUS ---- */
        function _doFocusGame() {
            if (sdk && sdk.focusGameKeyboard) sdk.focusGameKeyboard();
        }
        document.addEventListener('click', function(e) {
            if (!e.target.closest('button')) {
                _doFocusGame();
            }
        });
        document.addEventListener('keydown', _doFocusGame);
        setTimeout(_doFocusGame, 100);
        setTimeout(_doFocusGame, 300);
        setTimeout(_doFocusGame, 600);

        /* ---- RESET ALL BRAINROTS ON LOGIN ---- */
        function resetAllBrainrots() {
            if (!sdk) return;
            // Collect all brainrot keys from all zones
            var allBv = [];
            var zNames = Object.keys(ZONES);
            for (var i = 0; i < zNames.length; i++) {
                var pool = ZONES[zNames[i]];
                for (var j = 0; j < pool.length; j++) {
                    allBv.push(pool[j]);
                }
            }
            // Stagger to avoid flooding — send two resets per brainrot
            // (Active->NotActive and Completed->NotActive) since SetAnyToNotActive doesn't exist
            for (var k = 0; k < allBv.length; k++) {
                (function(bvKey, delay) {
                    setTimeout(function() {
                        sdk.sendMessageToUnity(JSON.stringify({
                            TaskName: bvKey,
                            TaskTargetState: 'SetActiveToNotActive'
                        }));
                    }, delay);
                    setTimeout(function() {
                        sdk.sendMessageToUnity(JSON.stringify({
                            TaskName: bvKey,
                            TaskTargetState: 'SetCompletedToNotActive'
                        }));
                    }, delay + 25);
                })(allBv[k], k * 60);
            }
            // Reset all zone counts to 0
            for (var zi = 0; zi < zNames.length; zi++) {
                spawnCounts[zNames[zi]] = 0;
            }
        }

        /* ---- INIT ---- */
        updateDisplay();
        if (sdk) {
            resetAllBrainrots();
            // Start spawn timers after reset completes (~6s for 99 brainrots at 60ms each)
            setTimeout(function() { startSpawnTimers(); }, 7000);
            startGoldAccumulator();
        } else {
            // Dev preview
            state.gold = 42350; state.baseId = 3; state.carrying = 1; state.carryGold = 14.6; state.rebirth = 1;
            updateDisplay();
            notify('+125 Gold', 'gold');
            setTimeout(function() { notify('Picked up Banana! (1.3g)', 'pickup'); }, 500);
            setTimeout(function() { notify('Deposited Banana!', 'deposit'); }, 1000);
        }
    </script>
</body>
