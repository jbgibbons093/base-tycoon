<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Brainrot Tycoon HUD</title>
    <script src="https://portals-labs.github.io/portals-sdk/portals-sdk.js?v=10005456"></script>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
    <style>
        html, body {
            margin: 0; padding: 0;
            background: transparent !important;
            overflow: hidden;
            font-family: 'Nunito', sans-serif;
            color: white;
            user-select: none;
            -webkit-text-stroke: 0.5px rgba(0,0,0,0.15);
        }

        /* ---- TOP CURRENCY BARS ---- */
        .top-bar {
            position: fixed;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 10;
        }

        .currency-pill {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 6px 4px 4px;
            border-radius: 28px;
            border: 3px solid rgba(0,0,0,0.25);
            box-shadow: 0 4px 0 rgba(0,0,0,0.2), 0 6px 12px rgba(0,0,0,0.15);
            position: relative;
            min-width: 90px;
        }
        .currency-pill .icon-circle {
            width: 36px; height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            border: 3px solid rgba(0,0,0,0.2);
            flex-shrink: 0;
        }
        .currency-pill .val {
            font-family: 'Luckiest Guy', cursive;
            font-size: 20px;
            text-shadow: 2px 2px 0 rgba(0,0,0,0.3);
            letter-spacing: 0.5px;
        }

        /* Gold pill */
        .pill-gold {
            background: linear-gradient(180deg, #FFE44D 0%, #FFB800 100%);
            border-color: #CC8800;
        }
        .pill-gold .icon-circle { background: #FFA500; border-color: #CC7700; }
        .pill-gold .val { color: #4A2800; }

        /* Base pill */
        .pill-base {
            background: linear-gradient(180deg, #6EF06E 0%, #2ECC40 100%);
            border-color: #1FA030;
        }
        .pill-base .icon-circle { background: #22AA22; border-color: #188818; }
        .pill-base .val { color: #0A3A0A; }

        /* Rebirth pill */
        .pill-rebirth {
            background: linear-gradient(180deg, #FF7B7B 0%, #FF3B3B 100%);
            border-color: #CC2222;
        }
        .pill-rebirth .icon-circle { background: #DD2222; border-color: #AA1111; }
        .pill-rebirth .val { color: #3A0000; }

        /* ---- CARRY BANNER ---- */
        .carry-banner {
            position: fixed;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            padding: 6px 20px;
            border-radius: 16px;
            background: linear-gradient(180deg, #FFB347 0%, #FF8C00 100%);
            border: 3px solid #CC6600;
            box-shadow: 0 3px 0 rgba(0,0,0,0.2);
            font-family: 'Luckiest Guy', cursive;
            font-size: 16px;
            color: #3A1800;
            text-shadow: 1px 1px 0 rgba(255,255,255,0.3);
            z-index: 10;
            display: none;
            white-space: nowrap;
        }
        .carry-banner.show { display: block; }

        /* ---- SPAWN TIMERS ---- */
        .spawn-strip {
            position: fixed;
            top: 56px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 4px;
            z-index: 10;
        }
        .spawn-pip {
            width: 32px; height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Luckiest Guy', cursive;
            font-size: 9px;
            color: white;
            text-shadow: 1px 1px 0 rgba(0,0,0,0.4);
            position: relative;
            background: conic-gradient(rgba(255,255,255,0.25) 0%, transparent 0%);
            border: 2px solid rgba(255,255,255,0.2);
        }
        .spawn-pip .pip-bg {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            z-index: -1;
        }
        .spawn-pip .pip-label {
            position: relative;
            z-index: 1;
        }
        .spawn-pip .pip-time {
            position: absolute;
            bottom: -12px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 7px;
            font-family: 'Nunito', sans-serif;
            font-weight: 800;
            color: rgba(255,255,255,0.7);
            white-space: nowrap;
        }

        /* ---- SIDE BUTTONS ---- */
        .side-buttons {
            position: fixed;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 10;
        }

        .side-btn {
            width: 56px; height: 56px;
            border-radius: 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 3px solid rgba(0,0,0,0.25);
            box-shadow: 0 4px 0 rgba(0,0,0,0.25);
            transition: transform 0.1s ease;
            position: relative;
        }
        .side-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 rgba(0,0,0,0.25); }
        .side-btn .btn-icon { font-size: 24px; }
        .side-btn .btn-label {
            font-family: 'Luckiest Guy', cursive;
            font-size: 9px;
            margin-top: 1px;
            text-shadow: 1px 1px 0 rgba(0,0,0,0.3);
        }

        .btn-weapon { background: linear-gradient(180deg, #FF7675 0%, #D63031 100%); border-color: #A02020; }

        /* ---- WEAPON SELECTOR POPUP ---- */
        .weapon-panel {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            border: 4px solid #2176AA;
            border-radius: 20px;
            padding: 16px;
            z-index: 20;
            display: none;
            box-shadow: 0 8px 0 rgba(0,0,0,0.15), 0 12px 30px rgba(0,0,0,0.2);
        }
        .weapon-panel.show { display: block; }

        .weapon-panel h3 {
            font-family: 'Luckiest Guy', cursive;
            font-size: 22px;
            color: #2C3E50;
            text-align: center;
            margin: 0 0 12px;
            text-shadow: 2px 2px 0 rgba(0,0,0,0.08);
        }

        .weapon-grid { display: flex; gap: 10px; }

        .weapon-card {
            width: 110px;
            padding: 12px 8px;
            border-radius: 16px;
            background: linear-gradient(180deg, #DFE6E9 0%, #B2BEC3 100%);
            border: 3px solid #95A5A6;
            text-align: center;
            cursor: pointer;
            transition: all 0.15s;
            box-shadow: 0 3px 0 rgba(0,0,0,0.15);
        }
        .weapon-card:hover { transform: translateY(-2px); border-color: #3498DB; }
        .weapon-card.equipped {
            background: linear-gradient(180deg, #74B9FF 0%, #3498DB 100%);
            border-color: #2176AA;
        }
        .weapon-card .w-icon { font-size: 36px; }
        .weapon-card .w-name {
            font-family: 'Luckiest Guy', cursive;
            font-size: 14px;
            color: #2C3E50;
            margin-top: 4px;
        }
        .weapon-card.equipped .w-name { color: white; }
        .weapon-card .w-stat {
            font-size: 10px; font-weight: 800;
            color: #636E72;
            margin-top: 2px;
        }
        .weapon-card.equipped .w-stat { color: rgba(255,255,255,0.8); }

        .weapon-close {
            display: block;
            margin: 12px auto 0;
            padding: 8px 28px;
            border-radius: 14px;
            background: linear-gradient(180deg, #FF7675 0%, #D63031 100%);
            border: 3px solid #A02020;
            box-shadow: 0 3px 0 rgba(0,0,0,0.2);
            font-family: 'Luckiest Guy', cursive;
            font-size: 14px;
            color: white;
            cursor: pointer;
            text-shadow: 1px 1px 0 rgba(0,0,0,0.3);
        }

        /* ---- BOTTOM PET/BRAINROT BAR ---- */
        .bottom-bar {
            position: fixed;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            z-index: 10;
        }
        .bottom-slot {
            width: 50px; height: 50px;
            border-radius: 50%;
            background: linear-gradient(180deg, #DFE6E9 0%, #B2BEC3 100%);
            border: 3px solid #95A5A6;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 3px 0 rgba(0,0,0,0.15);
        }
        .bottom-slot.active {
            background: linear-gradient(180deg, #74B9FF 0%, #3498DB 100%);
            border-color: #2176AA;
        }

        /* ---- NOTIFICATION FEED ---- */
        .notif-container {
            position: fixed;
            top: 100px;
            right: 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            align-items: flex-end;
            z-index: 30;
            pointer-events: none;
        }
        .notif {
            padding: 8px 16px;
            border-radius: 14px;
            box-shadow: 0 3px 0 rgba(0,0,0,0.2);
            font-family: 'Luckiest Guy', cursive;
            font-size: 15px;
            text-shadow: 1px 1px 0 rgba(0,0,0,0.2);
            white-space: nowrap;
            animation: notifSlide 0.3s ease, notifOut 0.4s ease 3s forwards;
        }
        .notif-gold {
            background: linear-gradient(180deg, #FFE44D, #FFB800);
            border: 3px solid #CC8800;
            color: #4A2800;
        }
        .notif-pickup {
            background: linear-gradient(180deg, #FFB347, #FF8C00);
            border: 3px solid #CC6600;
            color: #3A1800;
        }
        .notif-deposit {
            background: linear-gradient(180deg, #6EF06E, #2ECC40);
            border: 3px solid #1FA030;
            color: #0A3A0A;
        }
        .notif-spawn {
            background: linear-gradient(180deg, #74B9FF, #3498DB);
            border: 3px solid #2176AA;
            color: #0A1A3A;
        }
        .notif-info {
            background: linear-gradient(180deg, #DFE6E9, #B2BEC3);
            border: 3px solid #95A5A6;
            color: #2C3E50;
        }
        @keyframes notifSlide {
            0% { transform: translateX(100px); opacity: 0; }
            70% { transform: translateX(-5px); }
            100% { transform: translateX(0); opacity: 1; }
        }
        @keyframes notifOut {
            to { opacity: 0; transform: translateX(50px); }
        }

        /* ---- LEGACY TOAST (keep for compat) ---- */
        .toast-container {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            gap: 6px;
            align-items: center;
            z-index: 30;
        }
        .toast {
            padding: 8px 20px;
            border-radius: 14px;
            background: linear-gradient(180deg, #FFE44D, #FFB800);
            border: 3px solid #CC8800;
            box-shadow: 0 3px 0 rgba(0,0,0,0.2);
            font-family: 'Luckiest Guy', cursive;
            font-size: 16px;
            color: #4A2800;
            text-shadow: 1px 1px 0 rgba(255,255,255,0.3);
            animation: toastPop 0.3s ease, toastOut 0.3s ease 2s forwards;
            white-space: nowrap;
        }
        @keyframes toastPop {
            0% { transform: scale(0.5); opacity: 0; }
            70% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes toastOut {
            to { opacity: 0; transform: translateY(-10px) scale(0.9); }
        }

        /* Pop animation */
        .pop { animation: popBounce 0.3s ease; }
        @keyframes popBounce {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <!-- TOP CURRENCY BARS -->
    <div class="top-bar">
        <div class="currency-pill pill-gold" id="pill-gold">
            <div class="icon-circle">&#x1F4B0;</div>
            <span class="val" id="val-gold">0</span>
        </div>
        <div class="currency-pill pill-base" id="pill-base">
            <div class="icon-circle">&#x1F3E0;</div>
            <span class="val" id="val-base">---</span>
        </div>
        <div class="currency-pill pill-rebirth" id="pill-rebirth">
            <div class="icon-circle">&#x1F525;</div>
            <span class="val" id="val-rebirth">0</span>
        </div>
    </div>

    <!-- SPAWN TIMERS -->
    <div class="spawn-strip" id="spawn-strip"></div>

    <!-- CARRY BANNER -->
    <div class="carry-banner" id="carry-banner">
        &#x1F9F8; Carrying <span id="carry-name">???</span> (<span id="carry-gold">0</span>g)
    </div>

    <!-- SIDE BUTTON: Weapon selector only -->
    <div class="side-buttons">
        <div class="side-btn btn-weapon" onclick="toggleWeaponPanel()">
            <span class="btn-icon">&#x1F52B;</span>
            <span class="btn-label">Guns</span>
        </div>
    </div>

    <!-- NOTIFICATION FEED -->
    <div class="notif-container" id="notifs"></div>

    <!-- TOAST (legacy) -->
    <div class="toast-container" id="toasts"></div>

    <!-- WEAPON PANEL -->
    <div class="weapon-panel" id="weapon-panel">
        <h3>Select Weapon</h3>
        <div class="weapon-grid">
            <div class="weapon-card" data-weapon="pistol" onclick="selectWeapon('pistol')">
                <div class="w-icon">&#x1F52B;</div>
                <div class="w-name">Pistol</div>
                <div class="w-stat">Fast &bull; Low DMG</div>
            </div>
            <div class="weapon-card" data-weapon="rifle" onclick="selectWeapon('rifle')">
                <div class="w-icon">&#x1F3AF;</div>
                <div class="w-name">Rifle</div>
                <div class="w-stat">Balanced</div>
            </div>
            <div class="weapon-card" data-weapon="shotgun" onclick="selectWeapon('shotgun')">
                <div class="w-icon">&#x1F4A5;</div>
                <div class="w-name">Shotgun</div>
                <div class="w-stat">Slow &bull; High DMG</div>
            </div>
        </div>
        <button class="weapon-close" onclick="toggleWeaponPanel()">Close</button>
    </div>

    <script>
        const sdk = typeof PortalsSdk !== 'undefined' ? PortalsSdk : null;

        let state = { gold: 0, baseId: 0, carrying: 0, carryGold: 0, carryName: '', weapon: 'none', rebirth: 0 };

        const valGold = document.getElementById('val-gold');
        const valBase = document.getElementById('val-base');
        const valRebirth = document.getElementById('val-rebirth');
        const carryBanner = document.getElementById('carry-banner');
        const carryGoldEl = document.getElementById('carry-gold');
        const carryNameEl = document.getElementById('carry-name');
        const weaponPanel = document.getElementById('weapon-panel');
        const toastContainer = document.getElementById('toasts');
        const notifContainer = document.getElementById('notifs');

        /* ---- FORMAT ---- */
        function fmt(n) {
            if (n >= 1e9) return (n/1e9).toFixed(1)+'B';
            if (n >= 1e6) return (n/1e6).toFixed(1)+'M';
            if (n >= 1e3) return (n/1e3).toFixed(1)+'K';
            return Math.floor(n).toLocaleString();
        }

        /* ---- DISPLAY ---- */
        function updateDisplay() {
            valGold.textContent = fmt(state.gold);
            valBase.textContent = state.baseId > 0 ? '#' + state.baseId : '---';
            valRebirth.textContent = state.rebirth;
            if (state.carrying > 0) {
                carryBanner.classList.add('show');
                carryNameEl.textContent = state.carryName || '???';
                carryGoldEl.textContent = state.carryGold;
            } else {
                carryBanner.classList.remove('show');
            }
            document.querySelectorAll('.weapon-card').forEach(c => {
                c.classList.toggle('equipped', c.dataset.weapon === state.weapon);
            });
        }

        function pop(el) {
            el.classList.remove('pop');
            void el.offsetWidth;
            el.classList.add('pop');
        }

        /* ---- NOTIFICATION SYSTEM ---- */
        // types: gold, pickup, deposit, spawn, info
        function notify(text, type) {
            type = type || 'info';
            const el = document.createElement('div');
            el.className = 'notif notif-' + type;
            el.textContent = text;
            notifContainer.appendChild(el);
            // Cap at 5 visible
            while (notifContainer.children.length > 5) {
                notifContainer.removeChild(notifContainer.firstChild);
            }
            setTimeout(function() { if (el.parentNode) el.remove(); }, 3500);
        }

        // Legacy toast (still works for old messages)
        function showToast(text) {
            const t = document.createElement('div');
            t.className = 'toast';
            t.textContent = text;
            toastContainer.appendChild(t);
            setTimeout(function() { if (t.parentNode) t.remove(); }, 2500);
        }

        /* ---- WEAPON SELECTOR ---- */
        function selectWeapon(type) {
            state.weapon = type;
            updateDisplay();
            weaponPanel.classList.remove('show');
            if (sdk) {
                sdk.sendMessageToUnity(JSON.stringify({ TaskName: 'equip_' + type, TaskTargetState: 'SetNotActiveToActive' }));
                sdk.focusGameKeyboard();
            }
        }

        function toggleWeaponPanel() {
            weaponPanel.classList.toggle('show');
        }

        /* ---- SPAWN SYSTEM ---- */
        const ZONES = {
            Beach: ["bv_Banana","bv_BurbaloniLuliloli","bv_Noobini_Pizzanini","bv_Tim_Cheese","bv_Image-removebg-preview_29","bv_Fluriflura","bv_Pandaccini_Bananini","bv_Puffaball","bv_Liliri_Lalira","bv_Pipi_Kiwi"],
            Meadow: ["bv_Pakrah","bv_Lionel-Cactuseli","bv_Cocofanto","bv_ChimpanziniBananini","bv_Africa_by_toto_to_sahur","bv_Ballerinolololo","bv_POTATO","bv_Cocosini_Mama"],
            Forest: ["bv_PIGEONS_ARE_SPIES_MADE_BY","bv_Teenage_turtle","bv_Dolphini_Jetskini","bv_Slitta_Sprinta","bv_Trippi_Troppi","bv_Clickerinocrabo","bv_Astronaut","bv_Cant_come_up_with_a_funny","bv_Lol_Fridge"],
            Jungle: ["bv_Boneca_Ambalabu","bv_Cupcake_Koala","bv_Lavadorito_Spinito","bv_Cacto_Hipopotamo1","bv_TaTas","bv_Pintealotto","bv_Moby","bv_Watermelon_Doggy","bv_Garamadundung","bv_Trenostruzzo_Turbo_3000"],
            Cave: ["bv_Cappuccino_Assassino","bv_Burguro-And-Fryuro","bv_AvocadiniGuffo","bv_Homicidio_doloso","bv_Brri_Brri_Bicus_Dicus_Bom","bv_Skibidi_toilet"],
            Crystal_Cove: ["bv_PeroLemonfulldetial","bv_Avocadini_Antilopini","bv_Dolphin_But_Banana","bv_wombo","bv_Berry_berry_bicus_dickus","bv_Cerberus"],
            Boss_Arena: ["bv_NewBlueberrinni","bv_Quackula","bv_Sig_ma_Boy","bv_GOAT","bv_Strawberrelli_Flamingelli","bv_Pi_Pi_Watermelon","bv_GlorboFruttodrillo","bv_Time_moving_slow","bv_Quivioli_Ameleonni","bv_Lebron_james","bv_SigmaGirl","bv_Tartaruga_Cisternaaaa"],
            Volcano: ["bv_Tracoducotulu","bv_Toiletto","bv_Mythic_lucky_block","bv_Ballerina_cappucinaaaa21pct","bv_King_von","bv_Jacko_Spaventosa","bv_Travis_scott","bv_Cavallo_Virtuoso","bv_Lil_wayne","bv_Bombardiro_Crocodilo","bv_Te_Te_Te_Sahur","bv_Carti"],
            Ancient_Ruins: ["bv_Tralalita","bv_Everybody_hates_Chihuanin","bv_TractorDino","bv_BrainrotGodLuckyBlock","bv_Tukanno_Bananno","bv_Gorillo-Watermelondrillo","bv_Money_Money_Man","bv_Matteofr","bv_Trippi_Troppi_Troppa_Trip"],
            Sky_Platform: ["bv_Dragon_Gingerini","bv_Graipuss","bv_TangTangVfx","bv_Nuclearo_Dinosauro","bv_LasTralaleritas","bv_Job","bv_Los_Tralaleritos","bv_Chicliterita_bicicliterit","bv_SecretLuckyBlock","bv_KetupatKepat","bv_La_vacca_no_effects"],
            The_Void: ["bv_Chicleteira","bv_TralaleroTralala","bv_Strawberryelephant","bv_Magi_Ribbitini","bv_Meowl","bv_Money_money_puggy"]
        };

        const SPAWN_INTERVAL = 30; // seconds
        const MAX_PER_ZONE = 3;
        const ZONE_COLORS = {
            Beach: '#FFD700', Meadow: '#2ECC40', Forest: '#228B22', Jungle: '#32CD32',
            Cave: '#8B4513', Crystal_Cove: '#00CED1', Boss_Arena: '#E74C3C', Volcano: '#FF4500',
            Ancient_Ruins: '#DAA520', Sky_Platform: '#87CEEB', The_Void: '#9B59B6'
        };
        const ZONE_LABELS = {
            Beach: 'BCH', Meadow: 'MDW', Forest: 'FOR', Jungle: 'JNG',
            Cave: 'CAV', Crystal_Cove: 'CRC', Boss_Arena: 'BOS', Volcano: 'VOL',
            Ancient_Ruins: 'RUN', Sky_Platform: 'SKY', The_Void: 'VID'
        };

        // Reverse lookup: brainrot name -> zone
        var BV_TO_ZONE = {};
        (function() {
            var zoneNames = Object.keys(ZONES);
            for (var i = 0; i < zoneNames.length; i++) {
                var z = zoneNames[i];
                for (var j = 0; j < ZONES[z].length; j++) {
                    BV_TO_ZONE[ZONES[z][j]] = z;
                }
            }
        })();

        // Track remaining seconds per zone and active count per zone
        var spawnTimers = {};
        var spawnCounts = {};

        function spawnRandom(zone) {
            var pool = ZONES[zone];
            if (!pool || pool.length === 0) return;
            // Check spawn cap
            if ((spawnCounts[zone] || 0) >= MAX_PER_ZONE) return;
            var pick = pool[Math.floor(Math.random() * pool.length)];
            if (sdk) {
                sdk.sendMessageToUnity(JSON.stringify({
                    TaskName: pick,
                    TaskTargetState: 'SetNotActiveToActive'
                }));
                spawnCounts[zone] = (spawnCounts[zone] || 0) + 1;
            }
        }

        function buildTimerUI() {
            var strip = document.getElementById('spawn-strip');
            var html = '';
            var zoneNames = Object.keys(ZONES);
            for (var i = 0; i < zoneNames.length; i++) {
                var z = zoneNames[i];
                var col = ZONE_COLORS[z] || '#888';
                var label = ZONE_LABELS[z] || z.substring(0, 3);
                html += '<div class="spawn-pip" id="pip-' + z + '">' +
                    '<div class="pip-bg" style="background:' + col + ';opacity:0.7;"></div>' +
                    '<span class="pip-label">' + label + '</span>' +
                    '<span class="pip-time" id="pip-time-' + z + '">30</span>' +
                    '</div>';
                spawnTimers[z] = SPAWN_INTERVAL;
            }
            strip.innerHTML = html;
        }

        function updateTimerUI() {
            var zoneNames = Object.keys(ZONES);
            for (var i = 0; i < zoneNames.length; i++) {
                var z = zoneNames[i];
                var remaining = spawnTimers[z] || 0;
                var pct = ((SPAWN_INTERVAL - remaining) / SPAWN_INTERVAL) * 100;
                var col = ZONE_COLORS[z] || '#888';
                var pip = document.getElementById('pip-' + z);
                var timeEl = document.getElementById('pip-time-' + z);
                if (pip) {
                    pip.style.background = 'conic-gradient(' + col + ' ' + pct + '%, rgba(0,0,0,0.4) ' + pct + '%)';
                }
                if (timeEl) {
                    timeEl.textContent = remaining + 's';
                }
            }
        }

        function startSpawnTimers() {
            buildTimerUI();
            var zoneNames = Object.keys(ZONES);
            // Staggered initial spawn
            for (var i = 0; i < zoneNames.length; i++) {
                (function(zone, delay) {
                    spawnTimers[zone] = Math.ceil(delay / 1000);
                    setTimeout(function() {
                        spawnRandom(zone);
                        spawnTimers[zone] = SPAWN_INTERVAL;
                    }, delay);
                })(zoneNames[i], 1000 + i * 500);
            }
            // Tick every second: countdown + trigger spawns
            setInterval(function() {
                for (var i = 0; i < zoneNames.length; i++) {
                    var z = zoneNames[i];
                    if (spawnTimers[z] > 0) {
                        spawnTimers[z]--;
                    }
                    if (spawnTimers[z] <= 0) {
                        spawnRandom(z);
                        spawnTimers[z] = SPAWN_INTERVAL;
                    }
                }
                updateTimerUI();
            }, 1000);
        }

        /* ---- MESSAGE DEDUP ---- */
        var lastMsgHash = '';
        var lastMsgTime = 0;
        function isDupe(msg) {
            var now = Date.now();
            var hash = msg + '|' + Math.floor(now / 100);
            if (hash === lastMsgHash && now - lastMsgTime < 200) return true;
            lastMsgHash = hash;
            lastMsgTime = now;
            return false;
        }

        /* ---- MESSAGE LISTENER ---- */
        if (sdk) {
            sdk.setMessageListener(function(msg) {
                if (isDupe(msg)) return;
                try {
                    var d = JSON.parse(msg);
                    if (d.gold !== undefined) { state.gold = parseFloat(d.gold)||0; pop(document.getElementById('pill-gold')); }
                    if (d.baseId !== undefined) state.baseId = parseInt(d.baseId)||0;
                    if (d.carrying !== undefined) state.carrying = parseFloat(d.carrying)||0;
                    if (d.carryGold !== undefined) state.carryGold = parseFloat(d.carryGold)||0;
                    if (d.weapon !== undefined) state.weapon = d.weapon;
                    if (d.rebirth !== undefined) state.rebirth = parseInt(d.rebirth)||0;
                    if (d.toast) showToast(d.toast);
                    if (d.notif) notify(d.notif, d.notifType || 'info');
                    updateDisplay();
                    return;
                } catch(e) {}
                // String-based messages
                if (msg.startsWith('gold:')) {
                    var v = parseFloat(msg.substring(5))||0;
                    var diff = v - state.gold;
                    state.gold = v; updateDisplay(); pop(document.getElementById('pill-gold'));
                    if (diff > 0) notify('+' + fmt(diff) + ' Gold', 'gold');
                } else if (msg.startsWith('pickup:')) {
                    // Format: pickup:Picked up SuffixName! (Xg/2min)
                    notify(msg.substring(7), 'pickup');
                    // Parse name and gold, update carrying state
                    var pMatch = msg.match(/Picked up (.+?)! \(([0-9.]+)g/);
                    if (pMatch) {
                        state.carrying = 1;
                        state.carryName = pMatch[1].replace(/_/g, ' ');
                        state.carryGold = parseFloat(pMatch[2]) || 0;
                        updateDisplay();
                        // Decrement spawn count for the brainrot's zone
                        var bvKey = 'bv_' + pMatch[1];
                        var pZone = BV_TO_ZONE[bvKey];
                        if (pZone && spawnCounts[pZone] > 0) {
                            spawnCounts[pZone]--;
                        }
                    }
                } else if (msg.startsWith('deposit:')) {
                    if (state.carrying > 0) {
                        notify(msg.substring(8), 'deposit');
                        state.carrying = 0;
                        state.carryName = '';
                        state.carryGold = 0;
                        updateDisplay();
                    }
                } else if (msg.startsWith('carry:')) {
                    var p = msg.substring(6).split(',');
                    state.carrying = parseFloat(p[0])||0;
                    state.carryGold = parseFloat(p[1])||0;
                    updateDisplay();
                } else if (msg.startsWith('base:')) {
                    state.baseId = parseInt(msg.substring(5))||0; updateDisplay();
                } else if (msg.startsWith('rebirth:')) {
                    state.rebirth = parseInt(msg.substring(8))||0; updateDisplay();
                } else if (msg.startsWith('toast:')) {
                    showToast(msg.substring(6));
                }
            });
        }

        /* ---- KEYBOARD REFOCUS ---- */
        function _doFocusGame() {
            if (sdk && sdk.focusGameKeyboard) sdk.focusGameKeyboard();
        }
        document.addEventListener('click', function(e) {
            if (!e.target.closest('button') && !e.target.closest('.side-btn') && !e.target.closest('.weapon-card')) {
                _doFocusGame();
            }
        });
        document.addEventListener('keydown', _doFocusGame);
        setTimeout(_doFocusGame, 100);
        setTimeout(_doFocusGame, 300);
        setTimeout(_doFocusGame, 600);

        /* ---- INIT ---- */
        updateDisplay();
        if (sdk) {
            startSpawnTimers();
        } else {
            // Dev preview
            state.gold = 42350; state.baseId = 3; state.carrying = 1; state.carryGold = 14.6; state.weapon = 'rifle'; state.rebirth = 1;
            updateDisplay();
            notify('+125 Gold', 'gold');
            setTimeout(function() { notify('Picked up Banana! (1.3g)', 'pickup'); }, 500);
            setTimeout(function() { notify('Deposited Banana!', 'deposit'); }, 1000);
        }
    </script>
</body>
</html>
