<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Players</title>
    <script src="https://portals-labs.github.io/portals-sdk/portals-sdk.js?v=10005456"></script>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
    <link href="theme.css?v=1742508000" rel="stylesheet">
    <style>
        :root {
            --accent: #B4844D;
            --accent-rgb: 180, 132, 77;
        }

        .frame {
            position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
            width:480px; max-height:80vh;
            background: var(--panel-bg);
            backdrop-filter: blur(var(--panel-blur));
            -webkit-backdrop-filter: blur(var(--panel-blur));
            border: 2px solid var(--panel-border);
            border-radius: var(--panel-radius);
            box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 60px rgba(var(--accent-rgb), 0.08);
            display:flex; flex-direction:column; overflow:hidden;
        }

        .header {
            padding:12px 20px; text-align:center; position:relative; flex-shrink:0;
            background: linear-gradient(180deg, rgba(var(--accent-rgb), 0.22) 0%, rgba(var(--accent-rgb), 0.06) 100%);
            border-bottom: 1px solid rgba(var(--accent-rgb), 0.15);
            box-shadow: 0 1px 20px rgba(var(--accent-rgb), 0.08);
        }
        .header h1 {
            font-family: var(--font-display); font-size: var(--heading-size);
            color:white; margin:0;
            text-shadow: 2px 2px 0 rgba(0,0,0,0.5), 0 0 20px rgba(var(--accent-rgb), 0.35);
        }

        .body { flex:1; overflow-y:auto; padding:12px; background: var(--body-bg); }
        .body::-webkit-scrollbar { width: var(--scrollbar-size); }
        .body::-webkit-scrollbar-track { background: transparent; }
        .body::-webkit-scrollbar-thumb { background: rgba(var(--accent-rgb), 0.5); border-radius: 10px; }

        .player-card {
            display:flex; align-items:center; padding:10px 12px; margin:6px 0;
            border-radius: var(--card-radius); border: 1px solid var(--card-border);
            background: var(--card-bg);
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .player-card:hover { border-color: rgba(var(--accent-rgb), 0.15); }
        .player-card.empty { opacity:0.35; }
        .player-card.carrying {
            border-color: rgba(var(--neon-gold-rgb), 0.3);
            background: rgba(var(--neon-gold-rgb), 0.05);
            box-shadow: 0 0 12px rgba(var(--neon-gold-rgb), 0.08);
        }
        .p-base {
            width:36px; height:36px; border-radius:50%;
            background: linear-gradient(180deg, rgba(var(--accent-rgb), 0.6), rgba(var(--accent-rgb), 0.3));
            border: 2px solid rgba(var(--accent-rgb), 0.4);
            display:flex; align-items:center; justify-content:center;
            font-family: var(--font-display); font-size:16px; color:white;
            text-shadow: 1px 1px 0 rgba(0,0,0,0.3); flex-shrink:0;
            box-shadow: 0 0 10px rgba(var(--accent-rgb), 0.15);
        }
        .p-info { flex:1; margin-left:10px; }
        .p-label { font-family: var(--font-display); font-size:14px; color:#E0E0E0; }
        .p-gold { font-size:12px; font-weight:800; color: var(--neon-green); text-shadow: 0 0 6px rgba(var(--neon-green-rgb), 0.3); }
        .p-carry { font-size:11px; font-weight:800; color: var(--neon-gold); margin-top:2px; text-shadow: 0 0 6px rgba(var(--neon-gold-rgb), 0.3); }
        .p-empty-label { font-size:13px; font-weight:800; color:rgba(255,255,255,0.2); }

        .summary {
            flex-shrink:0; padding:8px 16px;
            background: rgba(32, 24, 16, 0.5);
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            border-top: 1px solid rgba(var(--accent-rgb), 0.1);
            display:flex; justify-content:space-between;
            font-size:12px; font-weight:800; color: rgba(var(--accent-rgb), 0.7);
        }
    </style>
</head>
<body>
    <div class="frame">
        <div class="header">
            <h1>PLAYERS</h1>
        </div>
        <div class="body" id="body-content"></div>
        <div class="summary" id="summary-bar"></div>
    </div>

    <script>
        var sdk = typeof PortalsSdk !== 'undefined' ? PortalsSdk : null;

        var QUEST_NUM_TO_BV = {112:"bv_Banana",114:"bv_BurbaloniLuliloli",116:"bv_Noobini_Pizzanini",118:"bv_Tim_Cheese",120:"bv_Image_removebg_preview_29",122:"bv_Fluriflura",124:"bv_Pandaccini_Bananini",126:"bv_Puffaball",128:"bv_Liliri_Lalira",130:"bv_Pipi_Kiwi",132:"bv_Pakrah",134:"bv_Lionel_Cactuseli",136:"bv_Cocofanto",138:"bv_ChimpanziniBananini",140:"bv_Africa_by_toto_to_sahur",142:"bv_Ballerinolololo",144:"bv_POTATO",146:"bv_Cocosini_Mama",148:"bv_PIGEONS_ARE_SPIES_MADE_BY",150:"bv_Teenage_turtle",152:"bv_Dolphini_Jetskini",154:"bv_Slitta_Sprinta",156:"bv_Trippi_Troppi",158:"bv_Clickerinocrabo",160:"bv_Astronaut",162:"bv_Cant_come_up_with_a_funny",164:"bv_Lol_Fridge",166:"bv_Boneca_Ambalabu",168:"bv_Cupcake_Koala",170:"bv_Lavadorito_Spinito",172:"bv_Cacto_Hipopotamo1",174:"bv_TaTas",176:"bv_Pintealotto",178:"bv_Moby",180:"bv_Watermelon_Doggy",182:"bv_Garamadundung",184:"bv_Trenostruzzo_Turbo_3000",186:"bv_Cappuccino_Assassino",188:"bv_Burguro_And_Fryuro",190:"bv_AvocadiniGuffo",192:"bv_Homicidio_doloso",194:"bv_Brri_Brri_Bicus_Dicus_Bom",196:"bv_Skibidi_toilet",198:"bv_PeroLemonfulldetial",200:"bv_Avocadini_Antilopini",202:"bv_Dolphin_But_Banana",204:"bv_wombo",206:"bv_Berry_berry_bicus_dickus",208:"bv_Cerberus",210:"bv_NewBlueberrinni",212:"bv_Quackula",214:"bv_Sig_ma_Boy",216:"bv_GOAT",218:"bv_Strawberrelli_Flamingelli",220:"bv_Pi_Pi_Watermelon",222:"bv_GlorboFruttodrillo",224:"bv_Time_moving_slow",226:"bv_Quivioli_Ameleonni",228:"bv_Lebron_james",230:"bv_SigmaGirl",232:"bv_Tartaruga_Cisternaaaa",234:"bv_Tracoducotulu",236:"bv_Toiletto",238:"bv_Mythic_lucky_block",240:"bv_Ballerina_cappucinaaaa21pct",242:"bv_King_von",244:"bv_Jacko_Spaventosa",246:"bv_Travis_scott",248:"bv_Cavallo_Virtuoso",250:"bv_Lil_wayne",252:"bv_Bombardiro_Crocodilo",254:"bv_Te_Te_Te_Sahur",256:"bv_Carti",258:"bv_Tralalita",260:"bv_Everybody_hates_Chihuanin",262:"bv_TractorDino",264:"bv_BrainrotGodLuckyBlock",266:"bv_Tukanno_Bananno",268:"bv_Gorillo_Watermelondrillo",270:"bv_Money_Money_Man",272:"bv_Matteofr",274:"bv_Trippi_Troppi_Troppa_Trip",276:"bv_Dragon_Gingerini",278:"bv_Graipuss",280:"bv_TangTangVfx",282:"bv_Nuclearo_Dinosauro",284:"bv_LasTralaleritas",286:"bv_Job",288:"bv_Los_Tralaleritos",290:"bv_Chicliterita_bicicliterit",292:"bv_SecretLuckyBlock",294:"bv_KetupatKepat",296:"bv_La_vacca_no_effects",298:"bv_Chicleteira",300:"bv_TralaleroTralala",302:"bv_Strawberryelephant",304:"bv_Magi_Ribbitini",306:"bv_Meowl",308:"bv_Money_money_puggy",310:"bv_Karkerheart_Luvkur",312:"bv_67",314:"bv_Fizzy_Soda",316:"bv_DoiDoi",318:"bv_Cuadramat",320:"bv_Bacuru_and_Egguru",322:"bv_Holy_Arepa",324:"bv_Gattatino_Nyanino",326:"bv_carrotini_brainini",328:"bv_MalameAmarele",330:"bv_Bandito_Axolito",332:"bv_Pirate_Frog",334:"bv_Gangster_Crab",336:"bv_Tipi_Topi_Taco",338:"bv_Snailenzo",340:"bv_DJ_Panda",342:"bv_Disco_Gorilla",344:"bv_Celestial_Pegasus",346:"bv_Divine_Starfish",348:"bv_boba_panda",350:"bv_Hydra_Dragon_Cannelloni",352:"bv_Rhino_Helicopterino",354:"bv_Navidaddragon",356:"bv_cappuccino_clownino",358:"bv_Tartaragnoo",360:"bv_FrioNinja",362:"bv_Ganganzelli_Trulala",364:"bv_La_Cucaracha",366:"bv_Mummio_Rappitto",368:"bv_Nooo_my_polizia",370:"bv_Orcalero_Orcala",372:"bv_Unclito_Samito",374:"bv_StatutinoLibertino",376:"bv_Hopilikalika_Hopilika",378:"bv_tentacolo_tecnico",380:"bv_Christmas_Chachechi",382:"bv_Chocco_Bunny",384:"bv_clanker",386:"bv_dumborino_miracello",388:"bv_vulturino_skeletino"};

        var players = [];
        for (var i = 1; i <= 10; i++) players.push({baseId: i, gold: 0, carry: 0});
        var myBaseId = 0;

        var NAMEOV = {
            'bv_Image_removebg_preview_29': 'Lerulerulerule',
            'bv_Africa_by_toto_to_sahur': 'To to to Sahur',
            'bv_PIGEONS_ARE_SPIES_MADE_BY': 'Piccione Macchina',
            'bv_Cant_come_up_with_a_funny': 'Bombombini Gusini'
        };
        function prettyName(bvKey) { return NAMEOV[bvKey] || bvKey.substring(3).replace(/_/g, ' '); }
        function fmt(n) {
            n = Math.floor(n);
            if (n >= 1e9) return (n/1e9).toFixed(1)+'B';
            if (n >= 1e6) return (n/1e6).toFixed(1)+'M';
            if (n >= 1e3) return (n/1e3).toFixed(1)+'K';
            return n.toLocaleString();
        }
        function parseVarValue(raw) {
            if (raw === undefined || raw === null || raw === '') return 0;
            raw = String(raw).trim();
            var num = Number(raw);
            if (!isNaN(num)) return num;
            try {
                var parsed = JSON.parse(raw);
                if (typeof parsed === 'number') return parsed;
                if (typeof parsed === 'object' && parsed !== null) {
                    var vals = Object.values(parsed);
                    return vals.length > 0 ? (Number(vals[0]) || 0) : 0;
                }
            } catch(e) {}
            var m = raw.match(/[=:](\d+\.?\d*)/);
            if (m) return parseFloat(m[1]) || 0;
            return 0;
        }

        function render() {
            var body = document.getElementById('body-content');
            var html = '';
            var activePlayers = 0;

            for (var i = 0; i < players.length; i++) {
                var p = players[i];
                var isActive = p.gold > 0 || p.carry > 0 || p.baseId === myBaseId;
                var isMe = p.baseId === myBaseId;
                var carryName = '';
                if (p.carry > 0 && QUEST_NUM_TO_BV[p.carry]) {
                    carryName = prettyName(QUEST_NUM_TO_BV[p.carry]);
                }
                if (isActive) activePlayers++;

                html += '<div class="player-card' + (isActive ? '' : ' empty') + (carryName ? ' carrying' : '') + '">';
                html += '<div class="p-base">' + p.baseId + '</div>';
                html += '<div class="p-info">';
                if (isActive) {
                    html += '<div class="p-label">Base ' + p.baseId + (isMe ? ' (YOU)' : '') + '</div>';
                    html += '<div class="p-gold">$' + fmt(p.gold) + '</div>';
                    if (carryName) html += '<div class="p-carry">Carrying: ' + carryName + '</div>';
                } else {
                    html += '<div class="p-empty-label">Empty</div>';
                }
                html += '</div></div>';
            }

            body.innerHTML = html;
            document.getElementById('summary-bar').innerHTML =
                '<span>' + activePlayers + '/10 bases claimed</span>';
        }

        var _lastMsgId = '', _lastMsgTime = 0;
        function processMessage(msg) {
            var now = Date.now();
            var msgId = msg + '_' + Math.floor(now / 100);
            if (msgId === _lastMsgId && now - _lastMsgTime < 200) return;
            _lastMsgId = msgId; _lastMsgTime = now;
            handleMessage(msg);
        }

        function handleMessage(msg) {
            if (!msg.startsWith('inv:')) return;
            var payload = msg.substring(4);
            var pairs = payload.split('&');
            for (var i = 0; i < pairs.length; i++) {
                var eq = pairs[i].indexOf('=');
                if (eq < 0) continue;
                var key = pairs[i].substring(0, eq).trim();
                var val = parseVarValue(pairs[i].substring(eq + 1));
                if (key === 'player_Base_num') myBaseId = Math.round(val);
                else if (key.startsWith('PGold_')) {
                    var idx = parseInt(key.substring(6)) - 1;
                    if (idx >= 0 && idx < 10) players[idx].gold = val;
                } else if (key.startsWith('PCarry_')) {
                    var idx2 = parseInt(key.substring(7)) - 1;
                    if (idx2 >= 0 && idx2 < 10) players[idx2].carry = Math.round(val);
                }
            }
            render();
        }

        if (sdk) sdk.setMessageListener(function(msg) { processMessage(msg); });
        window.addEventListener('message', function(event) {
            if (event.data && typeof event.data === 'string') processMessage(event.data);
            else if (event.data && event.data.portalsMessage) processMessage(event.data.portalsMessage);
        });

        function _doFocusGame() {
            if (typeof PortalsSdk !== 'undefined' && PortalsSdk.focusGameKeyboard) PortalsSdk.focusGameKeyboard();
        }
        document.addEventListener('click', function(e) {
            if (document.hidden) return;
            if (e && e.target) {
                var tag = e.target.tagName;
                if (tag === 'BUTTON' || tag === 'SELECT' || tag === 'INPUT') return;
            }
            _doFocusGame();
        });
        document.addEventListener('keydown', function(e) { if (!document.hidden) _doFocusGame(); });
        _doFocusGame();
        setTimeout(_doFocusGame, 100);

        function requestSync() {
            if (!sdk) return;
            sdk.sendMessageToUnity(JSON.stringify({TaskName:'hud_sync',TaskTargetState:'SetAnyToActive'}));
        }
        if (sdk) {
            setTimeout(requestSync, 300);
            setTimeout(requestSync, 1000);
        }

        render();
        if (!sdk) {
            myBaseId = 3;
            players[0].gold = 15000; players[0].carry = 156;
            players[2].gold = 8500;
            players[4].gold = 42000; players[4].carry = 306;
            render();
        }
    </script>
</body>
</html>
