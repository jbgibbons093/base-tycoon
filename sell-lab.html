<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Sell Lab</title>
    <script src="https://portals-labs.github.io/portals-sdk/portals-sdk.js?v=10005456"></script>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #ffd700;
            --gold-rgb: 255, 215, 0;
            --purple: #b44dff;
            --purple-rgb: 180, 77, 255;
            --dark: rgba(10, 12, 28, 0.96);
            --panel: rgba(20, 25, 50, 0.95);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Nunito', sans-serif; background: transparent; overflow: hidden; }

        .frame {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 600px; max-height: 85vh;
            background: linear-gradient(180deg, rgba(30, 22, 8, 0.97), rgba(15, 10, 5, 0.98));
            border: 2px solid rgba(255, 215, 0, 0.4);
            border-radius: 20px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.7), 0 0 80px rgba(255, 215, 0, 0.1), inset 0 1px 0 rgba(255,255,255,0.05);
            display: flex; flex-direction: column; overflow: hidden;
        }

        .header {
            padding: 14px 20px; text-align: center; flex-shrink: 0;
            background: linear-gradient(180deg, rgba(255, 215, 0, 0.15), transparent);
            border-bottom: 2px solid rgba(255, 215, 0, 0.2);
            position: relative;
        }
        .header h1 {
            font-family: 'Luckiest Guy', Impact, sans-serif;
            font-size: 30px; color: var(--gold); margin: 0;
            letter-spacing: 3px;
            text-shadow: 0 0 20px rgba(var(--gold-rgb), 0.6), 2px 2px 0 rgba(0,0,0,0.8);
        }
        .header .tracker {
            font-size: 13px; color: rgba(255,255,255,0.55); margin-top: 2px;
        }
        .header .tracker .hint { color: var(--gold); font-weight: 800; }

        .sell-area {
            display: flex; align-items: center; justify-content: center; gap: 16px;
            padding: 18px 20px; flex-shrink: 0;
            background: rgba(255, 215, 0, 0.03);
        }
        .slot {
            width: 120px; height: 120px;
            border: 2px dashed rgba(var(--gold-rgb), 0.4);
            border-radius: 14px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.2s;
            background: rgba(var(--gold-rgb), 0.05);
            position: relative;
        }
        .slot:hover { border-color: rgba(var(--gold-rgb), 0.7); background: rgba(var(--gold-rgb), 0.1); }
        .slot.filled { border-style: solid; border-color: var(--gold); }
        .slot img { width: 72px; height: 72px; object-fit: contain; }
        .slot .slot-label {
            font-size: 10px; color: rgba(255,255,255,0.7); margin-top: 4px;
            text-align: center; max-width: 110px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .slot .slot-placeholder {
            font-size: 11px; color: rgba(var(--gold-rgb), 0.5); font-weight: 800;
        }
        .slot .remove-btn {
            position: absolute; top: -6px; right: -6px; width: 20px; height: 20px;
            background: #ff4444; border: none; border-radius: 50%; color: white;
            font-size: 12px; cursor: pointer; display: none; line-height: 20px; text-align: center;
        }
        .slot.filled .remove-btn { display: block; }
        .slot .slot-gps { font-size: 10px; color: var(--gold); font-weight: 800; margin-top: 2px; }
        .slot .slot-rar { font-size: 8px; font-weight: 900; letter-spacing: 0.3px; margin-top: 1px;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 110px; }

        .sell-info {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-width: 180px; gap: 6px;
        }
        .price-box {
            text-align: center;
            padding: 10px 16px;
            border: 2px solid rgba(var(--gold-rgb), 0.35);
            border-radius: 12px;
            background: rgba(var(--gold-rgb), 0.08);
            min-width: 160px;
        }
        .price-label {
            font-size: 10px; color: rgba(255,255,255,0.5);
            font-weight: 800; letter-spacing: 1px; text-transform: uppercase;
        }
        .price-value {
            font-family: 'Luckiest Guy', Impact, sans-serif;
            font-size: 24px; color: var(--gold);
            text-shadow: 0 0 10px rgba(var(--gold-rgb), 0.4), 2px 2px 0 rgba(0,0,0,0.6);
            letter-spacing: 1px;
            line-height: 1.1;
        }
        .price-value.empty { color: rgba(255,255,255,0.3); font-size: 16px; }
        .price-sub {
            font-size: 10px; color: rgba(255,255,255,0.5); margin-top: 2px;
        }

        .sell-btn {
            padding: 10px 28px; border: 2px solid var(--gold); border-radius: 12px;
            background: linear-gradient(180deg, rgba(var(--gold-rgb), 0.25), rgba(var(--gold-rgb), 0.08));
            color: var(--gold); font-family: 'Luckiest Guy'; font-size: 20px;
            cursor: pointer; letter-spacing: 2px; transition: all 0.3s;
            text-shadow: 1px 1px 0 rgba(0,0,0,0.5);
        }
        .sell-btn:hover:not(:disabled) {
            background: linear-gradient(180deg, rgba(var(--gold-rgb), 0.45), rgba(var(--gold-rgb), 0.18));
            box-shadow: 0 0 30px rgba(var(--gold-rgb), 0.35);
        }
        .sell-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        .inventory-label {
            padding: 8px 20px 4px; font-size: 12px; color: rgba(255,255,255,0.45);
            font-weight: 800; letter-spacing: 1px; text-transform: uppercase; flex-shrink: 0;
        }

        .inventory {
            flex: 1; overflow-y: auto; padding: 6px 14px 14px;
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px;
            align-content: start;
        }
        .inventory::-webkit-scrollbar { width: 6px; }
        .inventory::-webkit-scrollbar-thumb { background: rgba(var(--gold-rgb), 0.3); border-radius: 3px; }

        .inv-card {
            background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px; padding: 6px; text-align: center; cursor: pointer;
            transition: all 0.15s;
            position: relative;
        }
        .inv-card:hover { background: rgba(var(--gold-rgb), 0.1); border-color: rgba(var(--gold-rgb), 0.4); }
        .inv-card.selected { border-color: var(--gold); background: rgba(var(--gold-rgb), 0.15); box-shadow: 0 0 12px rgba(var(--gold-rgb), 0.3); }
        .inv-card.fusion-owned { border-color: rgba(var(--purple-rgb), 0.5); }
        .inv-card img { width: 52px; height: 52px; object-fit: contain; }
        .inv-card .card-name {
            font-size: 9px; color: rgba(255,255,255,0.65); margin-top: 2px;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .inv-card .card-price {
            font-size: 10px; color: var(--gold); font-weight: 800; margin-top: 1px;
            text-shadow: 1px 1px 0 rgba(0,0,0,0.4);
        }
        .inv-card .card-rar {
            font-size: 8px; font-weight: 900; letter-spacing: 0.3px; margin-top: 1px;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }

        /* Confirm modal */
        .confirm-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.75); display: none;
            flex-direction: column; align-items: center; justify-content: center;
            z-index: 150;
        }
        .confirm-overlay.show { display: flex; }
        .confirm-card {
            text-align: center; padding: 26px 36px; border-radius: 18px;
            border: 2px solid var(--gold);
            background: linear-gradient(180deg, rgba(30, 22, 8, 0.98), rgba(15, 10, 5, 0.99));
            box-shadow: 0 8px 40px rgba(0,0,0,0.8), 0 0 60px rgba(var(--gold-rgb), 0.15);
            max-width: 440px;
            animation: confirmPop 0.25s ease-out;
        }
        @keyframes confirmPop { from { transform: scale(0.85); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .confirm-card img {
            width: 90px; height: 90px; object-fit: contain;
            margin-bottom: 8px;
        }
        .confirm-title {
            font-family: 'Luckiest Guy', Impact, sans-serif;
            font-size: 22px; color: white; letter-spacing: 2px;
            text-shadow: 2px 2px 0 rgba(0,0,0,0.6);
        }
        .confirm-brainrot {
            font-family: 'Luckiest Guy', Impact, sans-serif;
            font-size: 20px; color: var(--gold); margin-top: 4px;
            text-shadow: 0 0 10px rgba(var(--gold-rgb), 0.5);
        }
        .confirm-price {
            font-family: 'Luckiest Guy', Impact, sans-serif;
            font-size: 28px; color: var(--gold); margin-top: 8px;
            text-shadow: 0 0 15px rgba(var(--gold-rgb), 0.6), 2px 2px 0 rgba(0,0,0,0.6);
        }
        .confirm-sub {
            font-size: 11px; color: rgba(255,255,255,0.5); margin-top: 4px;
        }
        .confirm-btns {
            display: flex; gap: 14px; justify-content: center; margin-top: 18px;
        }
        .confirm-btns button {
            padding: 10px 26px; border-radius: 10px;
            font-family: 'Luckiest Guy', Impact, sans-serif; font-size: 16px;
            cursor: pointer; letter-spacing: 1.5px; border: 2px solid;
            transition: all 0.15s;
        }
        .btn-confirm {
            border-color: var(--gold); color: var(--gold);
            background: linear-gradient(180deg, rgba(var(--gold-rgb), 0.25), rgba(var(--gold-rgb), 0.08));
            text-shadow: 1px 1px 0 rgba(0,0,0,0.5);
        }
        .btn-confirm:hover {
            background: linear-gradient(180deg, rgba(var(--gold-rgb), 0.45), rgba(var(--gold-rgb), 0.18));
            box-shadow: 0 0 22px rgba(var(--gold-rgb), 0.35);
        }
        .btn-cancel {
            border-color: rgba(255,255,255,0.3); color: rgba(255,255,255,0.7);
            background: rgba(255,255,255,0.05);
        }
        .btn-cancel:hover {
            background: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.5);
        }

        /* SOLD overlay */
        .result-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.85); display: none;
            flex-direction: column; align-items: center; justify-content: center;
            z-index: 200;
        }
        .result-overlay.show { display: flex; }
        .result-card {
            text-align: center; padding: 30px 40px; border-radius: 20px;
            border: 3px solid var(--gold);
            background: linear-gradient(180deg, rgba(30, 22, 8, 0.98), rgba(15, 10, 5, 0.99));
            animation: resultPop 0.5s ease-out;
            box-shadow: 0 0 60px rgba(var(--gold-rgb), 0.4);
        }
        @keyframes resultPop { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .result-card img { width: 110px; height: 110px; object-fit: contain; }
        .result-card .result-banner {
            font-family: 'Luckiest Guy'; font-size: 38px; letter-spacing: 4px;
            color: var(--gold);
            text-shadow: 0 0 20px rgba(var(--gold-rgb), 0.7), 3px 3px 0 rgba(0,0,0,0.7);
            margin-top: 8px;
        }
        .result-card .result-name {
            font-family: 'Luckiest Guy'; font-size: 18px; color: white; margin-top: 4px;
            text-shadow: 2px 2px 0 rgba(0,0,0,0.5);
        }
        .result-card .result-payout {
            font-family: 'Luckiest Guy'; font-size: 30px; color: var(--gold); margin-top: 10px;
            text-shadow: 0 0 15px rgba(var(--gold-rgb), 0.6), 2px 2px 0 rgba(0,0,0,0.6);
        }
        .result-card .result-note {
            font-size: 12px; color: rgba(255,255,255,0.5); margin-top: 8px;
        }
        .result-ok {
            margin-top: 16px; padding: 10px 32px; border-radius: 10px;
            border: 2px solid var(--gold); background: rgba(var(--gold-rgb), 0.18);
            color: var(--gold); font-family: 'Luckiest Guy'; font-size: 16px;
            cursor: pointer; letter-spacing: 1px;
            text-shadow: 1px 1px 0 rgba(0,0,0,0.5);
        }
        .result-ok:hover { background: rgba(var(--gold-rgb), 0.3); }

        .tier-Common { border-color: #9db7c9; }
        .tier-Uncommon { border-color: #6ecf4a; }
        .tier-Rare { border-color: #4a7fff; }
        .tier-Epic { border-color: #a155f2; }
        .tier-Legendary { border-color: #ffb347; }
        .tier-Mythic { border-color: #ff4a9f; }
        .tier-BrainrotGod { border-color: #ff2222; }
        .tier-Secret { border-color: #00ff88; }
        .tier-OG { border-color: #ffd700; }
        .tier-Glitch { border-color: #ff00ff; }

        .complete-msg {
            text-align: center; padding: 20px; color: rgba(255,255,255,0.4);
            font-size: 14px; font-weight: 800;
        }

        .close-x {
            position: absolute; top: 10px; right: 14px;
            width: 32px; height: 32px; border-radius: 50%;
            background: linear-gradient(180deg, rgba(255,100,100,0.85), rgba(200,40,40,0.85));
            border: 2px solid rgba(255,255,255,0.12);
            box-shadow: 0 0 12px rgba(255,50,50,0.3);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            font-family: 'Luckiest Guy', Impact, sans-serif; font-size: 18px;
            color: white; text-shadow: 1px 1px 0 rgba(0,0,0,0.4);
            transition: transform 0.15s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 10;
        }
        .close-x:hover { transform: scale(1.15); }
        .close-x:active { transform: scale(0.85); transition-duration: 0.05s; }
    </style>
</head>
<body>
    <div class="frame">
        <div class="header">
            <h1>SELL LAB</h1>
            <div class="tracker" id="tracker">Select a brainrot from your pedestals <span class="hint">(2 min GPS payout)</span></div>
            <div class="close-x" onclick="closeShop()">X</div>
        </div>
        <div class="sell-area">
            <div class="slot" id="slotA" onclick="clearSlot()">
                <span class="slot-placeholder">PICK ONE</span>
                <button class="remove-btn">&times;</button>
            </div>
            <div class="sell-info">
                <div class="price-box">
                    <div class="price-label">SELL PRICE</div>
                    <div class="price-value empty" id="priceValue">&mdash;</div>
                    <div class="price-sub" id="priceSub">2 minutes of passive gold</div>
                </div>
                <button class="sell-btn" id="sellBtn" disabled onclick="openConfirm()">SELL</button>
            </div>
        </div>
        <div class="inventory-label">YOUR PEDESTAL BRAINROTS</div>
        <div class="inventory" id="invGrid"></div>
    </div>

    <div class="confirm-overlay" id="confirmOverlay">
        <div class="confirm-card" id="confirmCard">
            <img id="confirmImg" src="">
            <div class="confirm-title">SELL</div>
            <div class="confirm-brainrot" id="confirmBrainrot"></div>
            <div class="confirm-price" id="confirmPrice"></div>
            <div class="confirm-sub">This brainrot will return to its spawn zone.</div>
            <div class="confirm-btns">
                <button class="btn-cancel" onclick="cancelConfirm()">CANCEL</button>
                <button class="btn-confirm" onclick="doSell()">CONFIRM</button>
            </div>
        </div>
    </div>

    <div class="result-overlay" id="resultOverlay">
        <div class="result-card" id="resultCard">
            <img id="resultImg" src="">
            <div class="result-banner">SOLD!</div>
            <div class="result-name" id="resultName"></div>
            <div class="result-payout" id="resultPayout"></div>
            <div class="result-note">Gold added to your balance.</div>
        </div>
        <button class="result-ok" onclick="closeResult()">NICE</button>
    </div>
