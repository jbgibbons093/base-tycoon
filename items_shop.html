<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Items Shop</title>
    <script src="https://portals-labs.github.io/portals-sdk/portals-sdk.js?v=10005456"></script>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
    <style>
        html, body {
            margin: 0; padding: 0;
            background: transparent !important;
            overflow: hidden;
            font-family: 'Nunito', sans-serif;
            user-select: none;
        }

        .shop-frame {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 520px;
            max-height: 90vh;
            background: #1E1E2E;
            border: 5px solid #1FA030;
            border-radius: 24px;
            box-shadow: 0 10px 0 rgba(0,0,0,0.15), 0 15px 40px rgba(0,0,0,0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .shop-header {
            background: linear-gradient(180deg, #6EF06E 0%, #2ECC71 100%);
            padding: 14px 20px;
            text-align: center;
            position: relative;
            flex-shrink: 0;
        }
        .shop-header h1 {
            font-family: 'Luckiest Guy', cursive;
            font-size: 30px;
            color: white;
            margin: 0;
            text-shadow: 3px 3px 0 rgba(0,0,0,0.2);
        }
        .gold-badge {
            display: inline-block;
            margin-top: 6px;
            padding: 4px 16px;
            border-radius: 20px;
            background: linear-gradient(180deg, #5BDB5B, #2EAA2E);
            border: 3px solid #1E8A1E;
            box-shadow: 0 2px 0 rgba(0,0,0,0.15);
            font-family: 'Luckiest Guy', cursive;
            font-size: 15px;
            color: #0A2A0A;
        }
        .close-x {
            position: absolute;
            top: 8px; right: 12px;
            width: 32px; height: 32px;
            border-radius: 50%;
            background: linear-gradient(180deg, #FF7675, #D63031);
            border: 3px solid #A02020;
            box-shadow: 0 2px 0 rgba(0,0,0,0.2);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            font-family: 'Luckiest Guy', cursive;
            font-size: 18px; color: white;
            text-shadow: 1px 1px 0 rgba(0,0,0,0.3);
        }
        .close-x { transition: transform 0.15s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .close-x:hover { transform: scale(1.15); }
        .close-x:active { transform: scale(0.85); transition-duration: 0.05s; }

        .shop-body {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            background: #2A2A3A;
        }
        .shop-body::-webkit-scrollbar { width: 6px; }
        .shop-body::-webkit-scrollbar-thumb { background: #555; border-radius: 3px; }

        .section-label {
            font-family: 'Luckiest Guy', cursive;
            font-size: 14px;
            color: #A0A0B0;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 4px 12px;
            margin-bottom: 8px;
        }

        .item-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 14px;
        }

        .item-card {
            background: #2A2A3A;
            border: 3px solid #3A3A4A;
            border-radius: 16px;
            padding: 14px 10px;
            text-align: center;
            box-shadow: 0 3px 0 rgba(0,0,0,0.06);
            transition: all 0.15s;
        }
        .item-card:hover { transform: translateY(-2px); border-color: #E17055; }

        .i-icon {
            width: 52px; height: 52px;
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 28px;
            margin: 0 auto 8px;
            border: 3px solid;
            box-shadow: 0 2px 0 rgba(0,0,0,0.1);
        }
        .icon-heal { background: linear-gradient(180deg, #6EF06E, #2ECC40); border-color: #1FA030; }
        .icon-boost { background: linear-gradient(180deg, #FFE44D, #FFB800); border-color: #CC8800; }
        .icon-speed-pot { background: linear-gradient(180deg, #74B9FF, #3498DB); border-color: #2176AA; }
        .icon-teleport { background: linear-gradient(180deg, #A29BFE, #6C5CE7); border-color: #5A4BD0; }
        .icon-shield { background: linear-gradient(180deg, #74B9FF, #0984E3); border-color: #0660A0; }

        .i-name {
            font-family: 'Luckiest Guy', cursive;
            font-size: 14px;
            color: #E0E0E0;
        }
        .i-desc {
            font-size: 10px; font-weight: 700;
            color: #A0A0B0;
            margin: 4px 0;
            min-height: 24px;
        }
        .i-stock {
            font-size: 10px; font-weight: 800;
            color: #E17055;
            margin-bottom: 6px;
        }

        .i-btn {
            display: block;
            width: 100%;
            padding: 8px;
            border: 3px solid;
            border-radius: 12px;
            font-family: 'Luckiest Guy', cursive;
            font-size: 13px;
            cursor: pointer;
            box-shadow: 0 4px 0 rgba(0,0,0,0.2);
            transition: transform 0.15s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.15s;
            text-shadow: 1px 1px 0 rgba(0,0,0,0.15);
        }
        .i-btn:hover { transform: scale(1.05) translateY(-2px); box-shadow: 0 6px 0 rgba(0,0,0,0.2); }
        .i-btn:active { transform: scale(0.92) translateY(3px); box-shadow: 0 1px 0 rgba(0,0,0,0.2); transition-duration: 0.05s; }
        .btn-buy {
            background: linear-gradient(180deg, #FFE44D, #FFB800);
            border-color: #CC8800;
            color: #4A2800;
        }
        .btn-locked {
            background: linear-gradient(180deg, #3A3A4A, #2A2A3A);
            border-color: #707080;
            color: #707080;
            cursor: not-allowed;
            text-shadow: none;
        }
        .btn-cooldown {
            background: linear-gradient(180deg, #3A3A4A, #2A2A3A);
            border-color: #707080;
            color: #A0A0B0;
            cursor: not-allowed;
            text-shadow: none;
        }

        .toast {
            position: fixed;
            bottom: 20px; left: 50%;
            transform: translateX(-50%);
            padding: 10px 24px;
            border-radius: 14px;
            background: linear-gradient(180deg, #FAB1A0, #E17055);
            border: 3px solid #1FA030;
            box-shadow: 0 3px 0 rgba(0,0,0,0.2);
            font-family: 'Luckiest Guy', cursive;
            font-size: 16px; color: white;
            text-shadow: 1px 1px 0 rgba(0,0,0,0.2);
            animation: pop 0.3s ease, fadeOut 0.3s ease 2s forwards;
            z-index: 30;
        }
        @keyframes pop { 0%{transform:translateX(-50%) scale(0.5);opacity:0} 70%{transform:translateX(-50%) scale(1.1)} 100%{transform:translateX(-50%) scale(1);opacity:1} }
        @keyframes fadeOut { to{opacity:0} }
        .spend-particle {
            position: absolute;
            font-family: 'Luckiest Guy', cursive;
            font-size: 14px; font-weight: 900; color: #E74C3C;
            pointer-events: none; z-index: 100;
            text-shadow: 1px 1px 0 rgba(0,0,0,0.3);
            animation: spendFly 1s ease-out forwards;
        }
        @keyframes spendFly {
            0% { opacity: 1; transform: translate(0,0) scale(1); }
            100% { opacity: 0; transform: translate(var(--dx),var(--dy)) scale(0.5); }
        }
    </style>
</head>
<body>
    <div class="shop-frame">
        <div class="shop-header">
            <h1>ITEMS</h1>
            <div class="gold-badge" id="gold-display"><img src="cash.png" style="height:18px;vertical-align:middle;margin-right:4px">0</div>
            <div class="close-x" onclick="closeShop()">X</div>
        </div>
        <div class="shop-body" id="items-list"></div>
    </div>

    <script>
        const sdk = typeof PortalsSdk !== 'undefined' ? PortalsSdk : null;

        // ---- SOUND SYSTEM ----
        var _mp3Sounds = {};
        (function() {
            var files = { purchase: 'purchase.mp3', click: 'click.mp3', uipop: 'ui-pop.mp3' };
            for (var k in files) { var a = new Audio(files[k]); a.preload = 'auto'; a.volume = (k === 'click') ? 0.5 : 0.3; _mp3Sounds[k] = a; }
        })();
        function playSound(type) { var s = _mp3Sounds[type]; if (s) { s.currentTime = 0; s.play().catch(function(){}); } }
        function spawnSpendParticles(count) {
            count = count || 6;
            var badge = document.getElementById('gold-display');
            if (!badge) return;
            badge.style.position = 'relative';
            for (var i = 0; i < count; i++) {
                (function(idx) {
                    setTimeout(function() {
                        var p = document.createElement('div');
                        p.className = 'spend-particle';
                        p.textContent = '-$';
                        var dx = (Math.random() - 0.5) * 80;
                        var dy = -(20 + Math.random() * 50);
                        p.style.setProperty('--dx', dx + 'px');
                        p.style.setProperty('--dy', dy + 'px');
                        p.style.left = (Math.random() * 60) + '%';
                        p.style.top = '0px';
                        badge.appendChild(p);
                        setTimeout(function() { if (p.parentNode) p.remove(); }, 1100);
                    }, idx * 50);
                })(i);
            }
        }

        const ITEMS = [
            {
                section: 'Consumables',
                items: [
                    { id:'health_pack', name:'Health Pack', icon:'\u{1FA79}', iconClass:'icon-heal', cost:800, desc:'Heal to full HP', task:'use_health_pack' },
                    { id:'speed_potion', name:'Speed Potion', icon:'\u{26A1}', iconClass:'icon-speed-pot', cost:2000, desc:'2x speed for 2 minutes', task:'use_speed_potion', cooldown:120 },
                    { id:'base_teleport', name:'Base Teleport', icon:'\u{1F300}', iconClass:'icon-teleport', cost:1000, desc:'Instant teleport to your base', task:'use_base_teleport' },
                    { id:'shield', name:'Shield Bubble', icon:'\u{1F6E1}', iconClass:'icon-shield', cost:3000, desc:'Immune to damage for 30s', task:'use_shield', cooldown:60 }
                ]
            }
        ];

        let state = { gold: 0, cooldowns: {} };

        function fmt(n) {
            if (n >= 1e9) return (n/1e9).toFixed(1)+'B';
            if (n >= 1e6) return (n/1e6).toFixed(1)+'M';
            if (n >= 1e3) return (n/1e3).toFixed(1)+'K';
            return n.toLocaleString();
        }

        function render() {
            document.getElementById('gold-display').innerHTML = '<img src="cash.png" style="height:18px;vertical-align:middle;margin-right:4px">' + fmt(state.gold);
            const list = document.getElementById('items-list');
            list.innerHTML = '';

            ITEMS.forEach(section => {
                const label = document.createElement('div');
                label.className = 'section-label';
                label.textContent = section.section;
                list.appendChild(label);

                const grid = document.createElement('div');
                grid.className = 'item-grid';

                section.items.forEach(item => {
                    const canBuy = state.gold >= item.cost;
                    const onCooldown = state.cooldowns[item.id] && state.cooldowns[item.id] > Date.now();
                    const cdRemaining = onCooldown ? Math.ceil((state.cooldowns[item.id] - Date.now()) / 1000) : 0;

                    let btnClass, btnText;
                    if (onCooldown) { btnClass = 'btn-cooldown'; btnText = cdRemaining + 's'; }
                    else if (canBuy) { btnClass = 'btn-buy'; btnText = '$' + fmt(item.cost); }
                    else { btnClass = 'btn-locked'; btnText = '$' + fmt(item.cost); }

                    const card = document.createElement('div');
                    card.className = 'item-card';
                    card.innerHTML = `
                        <div class="i-icon ${item.iconClass}">${item.icon}</div>
                        <div class="i-name">${item.name}</div>
                        <div class="i-desc">${item.desc}</div>
                        ${onCooldown ? '<div class="i-stock">Cooldown: ' + cdRemaining + 's</div>' : ''}
                        <button class="i-btn ${btnClass}" data-item="${item.id}">${btnText}</button>
                    `;
                    grid.appendChild(card);
                });

                list.appendChild(grid);
            });

            list.querySelectorAll('.i-btn.btn-buy').forEach(btn => {
                btn.addEventListener('click', () => buyItem(btn.dataset.item));
            });
        }

        function buyItem(itemId) {
            let foundItem = null;
            ITEMS.forEach(s => { s.items.forEach(i => { if (i.id === itemId) foundItem = i; }); });
            if (!foundItem) return;
            if (state.gold < foundItem.cost) return;
            if (state.cooldowns[itemId] && state.cooldowns[itemId] > Date.now()) return;

            state.gold -= foundItem.cost;
            if (foundItem.cooldown) {
                state.cooldowns[itemId] = Date.now() + (foundItem.cooldown * 1000);
            }
            render();
            playSound('purchase');
            spawnSpendParticles(8);

            if (sdk) {
                sdk.sendMessageToUnity(JSON.stringify({
                    TaskName: foundItem.task,
                    TaskTargetState: 'SetNotActiveToActive'
                }));
            }
            toast('Bought ' + foundItem.name + '!');
        }

        // Update cooldowns every second
        setInterval(() => {
            let needsUpdate = false;
            for (const [k, v] of Object.entries(state.cooldowns)) {
                if (v > 0 && v <= Date.now()) {
                    delete state.cooldowns[k];
                    needsUpdate = true;
                }
            }
            // Re-render if any active cooldowns
            const hasActive = Object.values(state.cooldowns).some(v => v > Date.now());
            if (needsUpdate || hasActive) render();
        }, 1000);

        function toast(text) {
            const old = document.querySelector('.toast'); if(old)old.remove();
            const t = document.createElement('div'); t.className = 'toast'; t.textContent = text;
            document.body.appendChild(t); setTimeout(()=>{if(t.parentNode)t.remove();},2500);
        }

        function closeShop() { playSound('click'); if(sdk){sdk.focusGameKeyboard();sdk.closeIframe();} }

        /** Parse a variable value from Portals |var| interpolation. */
        function parseVarValue(raw) {
            if (raw === undefined || raw === null || raw === '') return 0;
            raw = String(raw).trim();
            const num = Number(raw);
            if (!isNaN(num)) return num;
            try {
                const parsed = JSON.parse(raw);
                if (typeof parsed === 'number') return parsed;
                if (typeof parsed === 'object' && parsed !== null) {
                    const vals = Object.values(parsed);
                    return vals.length > 0 ? (Number(vals[0]) || 0) : 0;
                }
            } catch(e) {}
            var m = raw.match(/[=:](\d+\.?\d*)/);
            if (m) return parseFloat(m[1]) || 0;
            return 0;
        }

        // --- Message deduplication ---
        let _lastMsgId = '', _lastMsgTime = 0;
        function processMessage(msg) {
            const now = Date.now();
            const msgId = msg + '_' + Math.floor(now / 100);
            if (msgId === _lastMsgId && now - _lastMsgTime < 200) return;
            _lastMsgId = msgId; _lastMsgTime = now;
            handleMessage(msg);
        }

        function handleMessage(msg) {
            console.log('[ItemsShop] Received:', msg);

            // inv: format — "inv:Gold=|Gold|&..."
            if (msg.startsWith('inv:')) {
                const payload = msg.substring(4);
                const pairs = payload.split('&');
                for (const pair of pairs) {
                    const eq = pair.indexOf('=');
                    if (eq < 0) continue;
                    const key = pair.substring(0, eq).trim();
                    const val = parseVarValue(pair.substring(eq + 1));
                    if (key === 'Gold') state.gold = val;
                }
                render();
                return;
            }

            // gold: format
            if (msg.startsWith('gold:')) {
                state.gold = parseFloat(msg.substring(5)) || 0;
                render();
                return;
            }

            // JSON format
            try {
                const d = JSON.parse(msg);
                if (d.gold !== undefined) state.gold = parseFloat(d.gold) || 0;
                render();
            } catch(e) {}
        }

        // --- SDK message listener ---
        if (sdk) {
            sdk.setMessageListener(function(msg) { processMessage(msg); });
        }
        window.addEventListener('message', function(event) {
            if (event.data && typeof event.data === 'string') processMessage(event.data);
            else if (event.data && event.data.portalsMessage) processMessage(event.data.portalsMessage);
        });

        // --- Keyboard refocus ---
        function _doFocusGame() {
            if (typeof PortalsSdk !== 'undefined' && PortalsSdk.focusGameKeyboard) PortalsSdk.focusGameKeyboard();
        }
        document.addEventListener('click', function(e) {
            if (document.hidden) return;
            if (e && e.target) {
                var tag = e.target.tagName;
                if (tag === 'BUTTON' || tag === 'SELECT' || tag === 'INPUT') return;
                if (e.target.closest && e.target.closest('button, select')) return;
            }
            _doFocusGame();
        });
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') { e.preventDefault(); closeShop(); return; }
            if (!document.hidden) _doFocusGame();
        });
        document.addEventListener('mouseup', function(e) {
            if (e && e.target) {
                var tag = e.target.tagName;
                if (tag === 'BUTTON' || tag === 'SELECT' || tag === 'INPUT') return;
                if (e.target.closest && e.target.closest('button, select')) return;
            }
            setTimeout(_doFocusGame, 50);
        });
        _doFocusGame();
        setTimeout(_doFocusGame, 100);
        setTimeout(_doFocusGame, 300);

        // Request variable sync from Portals after iframe is loaded
        function requestSync() {
            if (!sdk) return;
            sdk.sendMessageToUnity(JSON.stringify({
                TaskName: 'hud_sync',
                TaskTargetState: 'SetAnyToActive'
            }));
        }
        if (sdk) {
            setTimeout(requestSync, 300);
            setTimeout(requestSync, 1000);
            setTimeout(requestSync, 2500);
        }

        const params = new URLSearchParams(window.location.search);
        if (params.get('gold')) state.gold = parseFloat(params.get('gold')) || 0;

        render();
        if (!sdk) { state.gold = 25000; render(); }
    </script>
</body>
</html>
